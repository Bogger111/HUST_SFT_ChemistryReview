\(\\Delta H\u003c0,\\Delta S\u003e0\\) 的反应在任何温度下 \\(\\Delta G\u003c0\\)。\n\n## 四、综合题\n\n1. 比较 \\(\\Delta U\\)、\\(\\Delta H\\)、\\(Q\\)、\\(W\\) 的区别：哪些是状态函数，哪些与途径有关？在恒容和恒压条件下分别如何联系反应热？\n\n2. 结合 \\(\\Delta G=\\Delta H-T\\Delta S\\)，总结四种 \\(\\Delta H\\)、\\(\\Delta S\\) 符号组合对反应自发性的影响，并各说明一个典型含义。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 正；负。本章规定体系得到能量为正，吸热为正，放热为负。\n\n2. C。\\(H\\) 是状态函数，\\(Q,W\\) 是过程量。\n\n3. 能量；物质。封闭体系没有物质交换，但可以有热或功等能量交换。\n\n4. B。恒压、无非体积功时 \\(Q_p=\\Delta H\\)。\n\n5. 0。稳定态单质标准生成焓为零。\n\n6. A。气体分子数增加通常意味着混乱度增大，\\(\\Delta S\u003e0\\)。\n\n7. \\(\\Delta H-T\\Delta S\\)。\n\n8. A。\\(\\Delta G\u003c0\\) 表示该条件下正向自发，但不代表反应一定很快。\n\n## 二、公式计算题答案\n\n1. 解题思路：用热力学第一定律 \\(\\Delta U=Q+W\\)。  \n   详细步骤：放热 \\(100\\text{ J}\\)，所以 \\(Q=-100\\text{ J}\\)；环境对体系做功 \\(50\\text{ J}\\)，所以 \\(W=+50\\text{ J}\\)。\n   \\[\n   \\Delta U=-100+50=-50\\text{ J}\n   \\]\n   最终答案：\\(-50\\text{ J}\\)。  \n   易错提醒：放热 \\(Q\u003c0\\)，环境对体系做功 \\(W\u003e0\\)。\n\n2. 解题思路：用 \\(\\Delta H=\\Delta U+\\Delta n_gRT\\)。  \n   详细步骤：\n   \\[\n   \\Delta n_g=1-(1+0.5)=-0.5\n   \\]\n   \\[\n   \\Delta U=\\Delta H-\\Delta n_gRT\n   \\]\n   \\[\n   \\Delta U=-241.8-[(-0.5)(8.31\\times10^{-3})(373)]\n   \\]\n   \\[\n   \\Delta U=-241.8-(-1.55)\\approx-240.3\\text{ kJ·mol}^{-1}\n   \\]\n   最终答案：约 \\(-240\\text{ kJ·mol}^{-1}\\)。  \n   易错提醒：\\(\\Delta n_g\\) 只统计气体；\\(R\\) 要用 kJ 单位。\n\n3. 解题思路：用盖斯定律。目标反应 = 反应 1 - 反应 2。  \n   详细步骤：\n   \\[\n   \\Delta H_3=\\Delta H_1-\\Delta H_2\n   \\]\n   \\[\n   \\Delta H_3=-393.5-(-283.0)=-110.5\\text{ kJ·mol}^{-1}\n   \\]\n   最终答案：\\(-110.5\\text{ kJ·mol}^{-1}\\)。  \n   易错提醒：减去一个反应等价于加上它的逆反应，焓变要变号。\n\n4. 解题思路：熵变等于生成物标准熵总和减反应物标准熵总和。  \n   详细步骤：\n   \\[\n   \\Delta S^\\theta=[S^\\theta(\\mathrm{CaO})+S^\\theta(\\mathrm{CO_2})]-S^\\theta(\\mathrm{CaCO_3})\n   \\]\n   \\[\n   \\Delta S^\\theta=(38.1+213.8)-91.7=160.2\n   \\]\n   最终答案：\\(160.2\\text{ J·mol}^{-1}\\text{·K}^{-1}\\)。  \n   易错提醒：熵单位通常是 J·mol\\(^{-1}\\)·K\\(^{-1}\\)，计算 \\(\\Delta G\\) 时要注意换成 kJ。\n\n5. 解题思路：令 \\(\\Delta G^\\theta=0\\)，则 \\(T_{\\text{转}}=\\Delta H^\\theta/\\Delta S^\\theta\\)。  \n   详细步骤：\n   \\[\n   T_{\\text{转}}=\\frac{182.6}{0.0248}=7363\\text{ K}\n   \\]\n   \\(\\Delta H\u003e0,\\Delta S\u003e0\\)，所以低温时 \\(\\Delta G\u003e0\\)，正向非自发；高温时 \\(T\\Delta S\\) 项占优，\\(\\Delta G\u003c0\\)，正向自发。  \n   最终答案：\\(T_{\\text{转}}\\approx7.36\\times10^3\\text{ K}\\)；低温非自发，高温自发。  \n   易错提醒：\\(\\Delta H\\) 和 \\(\\Delta S\\) 单位必须一致。\n\n## 三、判断题答案\n\n1. 正确。\\(Q,W\\) 与途径有关，只在过程中发生。\n\n2. 正确。这是孤立体系的定义。\n\n3. 错误。可逆过程是理想化极限过程，真实过程只能近似。\n\n4. 正确。恒容时 \\(\\Delta V=0\\)，无其他功则 \\(W=0\\)，所以 \\(Q_V=\\Delta U\\)。\n\n5. 错误。反应逆写时，\\(\\Delta H\\) 符号改变。\n\n6. 正确。键焓越大，键越强，断键越需要吸热。\n\n7. 错误。熵增原理直接适用于孤立体系；封闭体系不能只看体系熵。\n\n8. 正确。因为 \\(\\Delta G=\\Delta H-T\\Delta S\\)，当 \\(\\Delta H\u003c0,\\Delta S\u003e0\\) 时，两项都使 \\(\\Delta G\\) 为负。\n\n## 四、综合题答案\n\n1. 解析：  \n   \\(\\Delta U\\) 和 \\(\\Delta H\\) 是状态函数的变化，只与始末态有关；\\(Q\\) 和 \\(W\\) 是过程量，与途径有关。  \n   恒容、无其他功时，体系不做体积功：\n   \\[\n   Q_V=\\Delta U\n   \\]\n   恒压、只做体积功时：\n   \\[\n   Q_p=\\Delta H\n   \\]\n   对理想气体反应：\n   \\[\n   Q_p=Q_V+\\Delta n_gRT\n   \\]\n   因此反应热不总是状态函数，但在恒压或恒容等特定条件下可分别等于状态函数变化。\n\n2. 解析：  \n   由\n   \\[\n   \\Delta G=\\Delta H-T\\Delta S\n   \\]\n   可知：  \n   (1) \\(\\Delta H\u003c0,\\Delta S\u003e0\\)：放热且熵增，任意温度 \\(\\Delta G\u003c0\\)，正向自发。  \n   (2) \\(\\Delta H\u003e0,\\Delta S\u003c0\\)：吸热且熵减，任意温度 \\(\\Delta G\u003e0\\)，正向非自发。  \n   (3) \\(\\Delta H\u003c0,\\Delta S\u003c0\\)：低温时 \\(\\Delta H\\) 有利，正向自发；高温时 \\(-T\\Delta S\\) 为正且占优，正向非自发，如合成氨在标态下低温有利。  \n   (4) \\(\\Delta H\u003e0,\\Delta S\u003e0\\)：低温非自发，高温时熵增项占优，正向自发，如 \\(\\mathrm{N_2+O_2\\to2NO}\\) 需高温条件。\n",
    "chemistry_quiz/04-quiz.md":  "# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：化学平衡是指可逆反应中 \\(v_\\text{正}\\) 与 \\(v_\\text{逆}\\) \\(\\_\\_\\_\\_\\_\\_\\)，各组分浓度或分压保持不变的状态。\n\n2. 选择：对反应 \\(aA+bB\\rightleftharpoons cC+dD\\)，浓度平衡常数 \\(K_c\\) 的正确形式是  \n   A. \\(\\frac{[A]^a[B]^b}{[C]^c[D]^d}\\)  \n   B. \\(\\frac{[C]^c[D]^d}{[A]^a[B]^b}\\)  \n   C. \\(\\frac{[C][D]}{[A][B]}\\)  \n   D. \\(\\frac{[A]+[B]}{[C]+[D]}\\)\n\n3. 填空：标准压力 \\(p^\\theta\\) 在本章中取 \\(\\_\\_\\_\\_\\_\\_\\) kPa，也等于 1 bar。\n\n4. 选择：下列物质在写平衡常数表达式时通常不写入的是  \n   A. \\(CO(g)\\)  \n   B. \\(H^+(aq)\\)  \n   C. \\(Fe(s)\\)  \n   D. \\(NO_2(g)\\)\n\n5. 填空：非标准态下判断反应方向时，用反应商 \\(Q\\) 与 \\(\\_\\_\\_\\_\\_\\_\\) 比较。\n\n6. 选择：若 \\(Q/K^\\theta\u003c1\\)，则该条件下反应  \n   A. 正向自发  \n   B. 正向非自发  \n   C. 已达到平衡  \n   D. 无法判断\n\n7. 填空：若某反应式反向书写，则新反应的平衡常数等于原平衡常数的 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n8. 选择：温度升高时，吸热反应的标准平衡常数通常  \n   A. 增大  \n   B. 减小  \n   C. 不变  \n   D. 一定等于 1\n\n## 二、公式计算题\n\n1. 已知 \\(H_2(g)+I_2(g)\\rightleftharpoons 2HI(g)\\) 在某温度下平衡浓度为 \\([H_2]=0.00300\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\([I_2]=0.00200\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\([HI]=0.0180\\ \\mathrm{mol\\cdot dm^{-3}}\\)。求 \\(K_c\\)。\n\n2. 对理想气体反应 \\(N_2(g)+3H_2(g)\\rightleftharpoons 2NH_3(g)\\)，若 \\(K_c=2.00\\times10^2\\)，\\(T=500\\ \\mathrm{K}\\)，取 \\(R=8.31\\ \\mathrm{kPa\\cdot dm^3\\cdot mol^{-1}\\cdot K^{-1}}\\)，求 \\(K_p\\)。\n\n3. 某反应在 298 K 时 \\(\\Delta G_{298}^\\theta=40.0\\ \\mathrm{kJ\\cdot mol^{-1}}\\)。求 \\(K^\\theta\\)。取 \\(R=8.31\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}\\)。\n\n4. 2000 ℃ 时，\\(N_2(g)+O_2(g)\\rightleftharpoons 2NO(g)\\) 的 \\(K_p^\\theta=9.8\\times10^{-2}\\)。若 \\(p_{NO}=1.00\\ \\mathrm{kPa}\\)，\\(p_{N_2}=82.1\\ \\mathrm{kPa}\\)，\\(p_{O_2}=82.1\\ \\mathrm{kPa}\\)，\\(p^\\theta=100\\ \\mathrm{kPa}\\)，求 \\(Q_p\\)，并判断反应方向。\n\n5. 在 823 K 时，反应（1）\\(CO_2(g)+H_2(g)\\rightleftharpoons CO(g)+H_2O(g)\\)，\\(K_{p1}=0.14\\)；反应（2）\\(CoO(s)+H_2(g)\\rightleftharpoons Co(s)+H_2O(g)\\)，\\(K_{p2}=67\\)。求反应（3）\\(CoO(s)+CO(g)\\rightleftharpoons Co(s)+CO_2(g)\\) 的 \\(K_{p3}\\)。\n\n## 三、判断题\n\n1. 化学平衡时，正反应和逆反应都停止。  \n2. 在一定温度下，平衡常数 \\(K\\) 与反应物起始浓度无关。  \n3. \\(K_p=K_c(RT)^{\\Delta n_g}\\) 中的 \\(\\Delta n_g\\) 要统计所有反应物和生成物。  \n4. 纯固体和纯液体通常不写入平衡常数表达式。  \n5. 当 \\(Q=K^\\theta\\) 时，\\(\\Delta G_T=0\\)，体系处于平衡。  \n6. 对任意反应，升高温度都会使 \\(K^\\theta\\) 增大。  \n7. 反应式相加得到总反应时，总反应的平衡常数等于各反应平衡常数之和。  \n8. 对 \\(H_2(g)+I_2(g)\\rightleftharpoons 2HI(g)\\)，改变总压对平衡位置影响很小，因为反应前后气体计量数相同。\n\n## 四、综合题\n\n1. 某温度下反应 \\(N_2O_4(g)\\rightleftharpoons 2NO_2(g)\\) 已达到平衡。请分别分析：  \n   （1）增大总压时平衡如何移动；  \n   （2）若保持温度不变，\\(K^\\theta\\) 是否改变；  \n   （3）如果升高温度后 \\(K^\\theta\\) 增大，说明该反应正向是吸热还是放热。\n\n2. 对反应 \\(MnO_2(s)+4H^+(aq)+2Cl^-(aq)\\rightleftharpoons Mn^{2+}(aq)+Cl_2(g)+2H_2O(l)\\)，材料给出标态下 298 K 时 \\(\\Delta G_{298}^\\theta=25.4\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，但使用 \\(12.0\\ \\mathrm{mol\\cdot dm^{-3}}\\) 的 HCl 时反应可自发。请说明为什么标态和浓盐酸条件下方向不同，并写出判断思路。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 相等。平衡是动态平衡，正逆反应速率相等，但反应并未停止。\n\n2. B。生成物浓度按计量系数作幂写在分子，反应物写在分母。\n\n3. 100。材料中 \\(p^\\theta=100\\ \\mathrm{kPa}=1\\ \\mathrm{bar}\\)。\n\n4. C。纯固体 \\(Fe(s)\\) 的活度视为常数，不写入平衡常数表达式。\n\n5. \\(K^\\theta\\)。非标准态方向由 \\(Q/K^\\theta\\) 或 \\(\\Delta G_T=2.30RT\\lg(Q/K^\\theta)\\) 判断。\n\n6. A。\\(Q/K^\\theta\u003c1\\) 时 \\(\\Delta G_T\u003c0\\)，正向自发。\n\n7. 倒数。反应倒写时，生成物和反应物互换，平衡常数变为 \\(1/K\\)。\n\n8. A。吸热反应升温时，平衡向吸热方向移动，\\(K^\\theta\\) 增大。\n\n## 二、公式计算题答案\n\n1. 解题思路：直接用 \\(K_c=[HI]^2/([H_2][I_2])\\)。  \n   使用公式：\n   \\[\n   K_c=\\frac{[HI]^2}{[H_2][I_2]}\n   \\]\n   已知量：\\([HI]=0.0180\\)，\\([H_2]=0.00300\\)，\\([I_2]=0.00200\\)，单位均为 \\(\\mathrm{mol\\cdot dm^{-3}}\\)。  \n   代入：\n   \\[\n   K_c=\\frac{(0.0180)^2}{(0.00300)(0.00200)}=54.0\n   \\]\n   最终答案：\\(K_c=54.0\\)。  \n   易错提醒：必须用平衡浓度；该反应 \\(\\Delta n_g=0\\)，因此在理想气体条件下 \\(K_p=K_c\\)。\n\n2. 解题思路：先求 \\(\\Delta n_g\\)，再用 \\(K_p=K_c(RT)^{\\Delta n_g}\\)。  \n   使用公式：\n   \\[\n   K_p=K_c(RT)^{\\Delta n_g}\n   \\]\n   已知量：\\(K_c=2.00\\times10^2\\)，\\(T=500\\ \\mathrm{K}\\)，\\(R=8.31\\ \\mathrm{kPa\\cdot dm^3\\cdot mol^{-1}\\cdot K^{-1}}\\)。  \n   代入：\\(\\Delta n_g=2-(1+3)=-2\\)，\\(RT=8.31\\times500=4155\\)。  \n   \\[\n   K_p=2.00\\times10^2(4155)^{-2}=1.16\\times10^{-5}\n   \\]\n   最终答案：\\(K_p\\approx1.16\\times10^{-5}\\)。  \n   易错提醒：\\(\\Delta n_g\\) 只统计气体，且这里指数为 \\(-2\\)。\n\n3. 解题思路：用 \\(\\Delta G^\\theta=-2.30RT\\lg K^\\theta\\)。  \n   使用公式：\n   \\[\n   \\lg K^\\theta=-\\frac{\\Delta G^\\theta}{2.30RT}\n   \\]\n   已知量：\\(\\Delta G^\\theta=40.0\\ \\mathrm{kJ\\cdot mol^{-1}}=4.00\\times10^4\\ \\mathrm{J\\cdot mol^{-1}}\\)，\\(T=298\\ \\mathrm{K}\\)。  \n   代入：\n   \\[\n   \\lg K^\\theta=-\\frac{4.00\\times10^4}{2.30\\times8.31\\times298}=-7.02\n   \\]\n   \\[\n   K^\\theta=10^{-7.02}=9.5\\times10^{-8}\n   \\]\n   最终答案：\\(K^\\theta\\approx9.5\\times10^{-8}\\)。  \n   易错提醒：\\(\\Delta G\\) 与 \\(R\\) 单位必须统一。\n\n4. 解题思路：先用相对分压写 \\(Q_p\\)，再比较 \\(Q_p\\) 与 \\(K_p^\\theta\\)。  \n   使用公式：\n   \\[\n   Q_p=\\frac{(p_{NO}/p^\\theta)^2}{(p_{N_2}/p^\\theta)(p_{O_2}/p^\\theta)}\n   \\]\n   已知量：\\(p_{NO}/p^\\theta=1.00/100=0.0100\\)，\\(p_{N_2}/p^\\theta=p_{O_2}/p^\\theta=82.1/100=0.821\\)。  \n   代入：\n   \\[\n   Q_p=\\frac{(0.0100)^2}{(0.821)(0.821)}=1.48\\times10^{-4}\n   \\]\n   比较：\n   \\[\n   \\frac{Q_p}{K_p^\\theta}=\\frac{1.48\\times10^{-4}}{9.8\\times10^{-2}}\u003c1\n   \\]\n   最终答案：\\(Q_p=1.48\\times10^{-4}\\)，反应正向自发。  \n   易错提醒：必须先除以 \\(p^\\theta\\)，用相对分压写 \\(Q_p\\)。\n\n5. 解题思路：先判断反应组合关系。反应（3）=反应（2）-反应（1）。  \n   使用公式：\n   \\[\n   K_{p3}=\\frac{K_{p2}}{K_{p1}}\n   \\]\n   已知量：\\(K_{p1}=0.14\\)，\\(K_{p2}=67\\)。  \n   代入：\n   \\[\n   K_{p3}=\\frac{67}{0.14}=4.8\\times10^2\n   \\]\n   最终答案：\\(K_{p3}=4.8\\times10^2\\)。  \n   易错提醒：反应式相减对应平衡常数相除，不是相减。\n\n## 三、判断题答案\n\n1. 错误。平衡是动态平衡，正逆反应仍在进行，只是速率相等。\n\n2. 正确。一定温度下 \\(K\\) 由反应本性和温度决定，与起始浓度无关。\n\n3. 错误。\\(\\Delta n_g\\) 只统计气体计量数，固体和液体不统计。\n\n4. 正确。纯固体和纯液体的活度可视为常数，不写入表达式。\n\n5. 正确。\\(Q=K^\\theta\\) 时 \\(\\Delta G_T=2.30RT\\lg1=0\\)，体系处于平衡。\n\n6. 错误。吸热反应升温 \\(K^\\theta\\) 增大，放热反应升温 \\(K^\\theta\\) 减小。\n\n7. 错误。反应式相加时，平衡常数相乘，不是相加。\n\n8. 正确。该反应前后气体计量数均为 2，改变总压对平衡无明显影响。\n\n## 四、综合题答案\n\n1. 解析：  \n   （1）\\(N_2O_4(g)\\rightleftharpoons2NO_2(g)\\) 左侧 1 mol 气体，右侧 2 mol 气体。增大总压时，平衡向气体计量数减小的方向移动，即向左移动，\\(N_2O_4\\) 增多，\\(NO_2\\) 减少。  \n   （2）若温度不变，\\(K^\\theta\\) 不改变。压力改变改变的是 \\(Q\\) 和平衡组成，不改变平衡常数。  \n   （3）如果升高温度后 \\(K^\\theta\\) 增大，说明升温有利于正向反应，因此正向为吸热反应。  \n   结论：增压左移；温度不变 \\(K^\\theta\\) 不变；升温使 \\(K^\\theta\\) 增大说明正向吸热。\n\n2. 解析：  \n   标态下 \\(\\Delta G_{298}^\\theta=25.4\\ \\mathrm{kJ\\cdot mol^{-1}}\u003e0\\)，因此在标准态下正向非自发。  \n   但非标准态不能只看 \\(\\Delta G^\\theta\\)，应使用：\n   \\[\n   \\Delta G_T=\\Delta G_T^\\theta+2.30RT\\lg Q\n   \\]\n   该反应的 \\(Q\\) 可写为：\n   \\[\n   Q=\\frac{(p_{Cl_2}/p^\\theta)([Mn^{2+}]/c^\\theta)}\n   {([H^+]/c^\\theta)^4([Cl^-]/c^\\theta)^2}\n   \\]\n   使用 \\(12.0\\ \\mathrm{mol\\cdot dm^{-3}}\\) 的 HCl 时，\\([H^+]\\) 和 \\([Cl^-]\\) 很大，出现在 \\(Q\\) 的分母中，使 \\(Q\\) 显著减小。材料中计算得到 \\(Q=3.35\\times10^{-7}\\)，从而 \\(2.30RT\\lg Q\\) 为较大的负值，最终 \\(\\Delta G_T=-11.5\\ \\mathrm{kJ\\cdot mol^{-1}}\u003c0\\)。  \n   结论：标态下正向非自发；浓盐酸条件下由于 \\(Q\\) 大幅减小，使非标准态 \\(\\Delta G_T\u003c0\\)，反应正向自发。  \n   易错提醒：\\(\\Delta G^\\theta\\) 判断标准态，\\(\\Delta G\\) 才判断实际给定条件。\n",
    "chemistry_quiz/05-quiz.md":  "# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：Brønsted-Lowry 酸碱质子理论认为，酸是质子 \\(\\_\\_\\_\\_\\_\\_\\)，碱是质子 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n2. 选择：下列哪一组不是共轭酸碱对？  \n   A. \\(NH_3/NH_2^-\\)  \n   B. \\(NaOH/Na^+\\)  \n   C. \\(OH^-/O^{2-}\\)  \n   D. \\(H_3O^+/H_2O\\)\n\n3. 填空：298 K 时，水的离子积常数 \\(K_w=[H_3O^+][OH^-]=\\_\\_\\_\\_\\_\\_\\)。\n\n4. 选择：若某水溶液在 298 K 时 \\(pH=11.30\\)，则 \\(pOH\\) 为  \n   A. 2.70  \n   B. 7.00  \n   C. 11.30  \n   D. 14.00\n\n5. 填空：弱酸简化计算 \\([H_3O^+]\\approx\\sqrt{K_ac}\\) 的常用条件是 \\(\\alpha\\le\\_\\_\\_\\_\\_\\_\\%\\) 或 \\(c/K_a\\ge\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：向 \\(HAc\\) 溶液中加入 \\(NaAc\\)，\\(HAc\\) 的电离度会  \n   A. 增大  \n   B. 降低  \n   C. 不变  \n   D. 先增大后降低\n\n7. 填空：酸碱指示剂的变色范围通常约为 \\(pH=pK_{HIn}\\pm\\_\\_\\_\\_\\_\\_\\)。\n\n8. 选择：配制 \\(pH=4.75\\) 左右的缓冲溶液，较合适的体系是  \n   A. \\(HAc/NaAc\\)，\\(pK_a\\approx4.75\\)  \n   B. \\(HCl/NaCl\\)  \n   C. \\(NaOH/NaCl\\)  \n   D. 纯水\n\n## 二、公式计算题\n\n1. 乳酸 \\(CH_3CHOHCOOH\\) 的 \\(K_a=1.37\\times10^{-4}\\)。计算 \\(0.10\\ \\mathrm{mol\\cdot dm^{-3}}\\) 乳酸溶液的 pH 和电离度。\n\n2. 将 \\(2.45\\ \\mathrm{g}\\) 固体 \\(NaCN\\) 配成 \\(500\\ \\mathrm{cm^3}\\) 溶液。已知 \\(M(NaCN)=49\\ \\mathrm{g\\cdot mol^{-1}}\\)，\\(K_a(HCN)=4.93\\times10^{-10}\\)，求溶液 pH。\n\n3. 向 \\(1.0\\ \\mathrm{dm^3}\\) 的 \\(0.10\\ \\mathrm{mol\\cdot dm^{-3}}\\) \\(HAc\\) 溶液中加入固体 \\(NaAc\\)，使 \\([Ac^-]=1.0\\ \\mathrm{mol\\cdot dm^{-3}}\\)。取 \\(K_a(HAc)=1.8\\times10^{-5}\\)，求 \\([H_3O^+]\\)、pH 和 \\(HAc\\) 电离度。\n\n4. 已知 \\(H_3PO_4\\) 的 \\(K_{a1}=7.52\\times10^{-3}\\)，\\(K_{a2}=6.23\\times10^{-8}\\)。按材料近似公式计算 \\(NaH_2PO_4\\) 溶液的 pH。\n\n5. 欲配制 \\(pH=9.20\\)、\\([NH_3\\cdot H_2O]=1.0\\ \\mathrm{mol\\cdot dm^{-3}}\\) 的缓冲溶液 \\(500\\ \\mathrm{cm^3}\\)。已知 \\(K_b(NH_3)=1.8\\times10^{-5}\\)，浓氨水浓度为 \\(15\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\(M(NH_4Cl)=53.5\\ \\mathrm{g\\cdot mol^{-1}}\\)。求需 \\(NH_4Cl\\) 质量和浓氨水体积。\n\n## 三、判断题\n\n1. Arrhenius 理论可以很好解释所有非水溶剂中的酸碱反应。  \n2. 酸给出质子后形成其共轭碱。  \n3. \\(K_a\\) 越大，弱酸越弱。  \n4. 酸溶液中也存在 \\(OH^-\\)，碱溶液中也存在 \\(H_3O^+\\)。  \n5. 弱酸稀释时电离度会改变，但 \\(K_a\\) 在一定温度下不变。  \n6. 对多元弱酸，计算酸度时通常第一步电离贡献最大。  \n7. 同离子效应会降低弱电解质电离度，并改变其电离常数。  \n8. 缓冲溶液的缓冲能力有限，共轭酸碱对浓度比接近 1 时通常较强。\n\n## 四、综合题\n\n1. 要配制 \\(pH=3.20\\) 的缓冲溶液，可选 \\(HCO_2H/HCO_2Na\\) 或 \\(CH_3CO_2H/CH_3CO_2Na\\)。已知 \\(K_a(HCO_2H)=1.77\\times10^{-4}\\)，\\(pK_a=3.75\\)；\\(K_a(HAc)=1.76\\times10^{-5}\\)，\\(pK_a=4.75\\)。应选哪一对？说明理由。\n\n2. 某学生认为：“强酸与强碱等量中和后 pH=7，所以所有酸碱等量中和后 pH 都等于 7。”请结合本章酸碱中和反应类型分析这个说法是否正确，并说明强酸弱碱、弱酸强碱、弱酸弱碱中和后 pH 应如何判断。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 给体；受体。酸给出质子，碱接受质子，这是 Brønsted-Lowry 理论的核心。\n\n2. B。共轭酸碱对必须只相差一个质子，\\(NaOH\\) 与 \\(Na^+\\) 不符合。\n\n3. \\(1.0\\times10^{-14}\\)。这是材料中 298 K 常用的水的离子积常数。\n\n4. A。298 K 下 \\(pH+pOH=14.00\\)，所以 \\(pOH=14.00-11.30=2.70\\)。\n\n5. 5；400。这是使用弱酸弱碱平方根简化公式的常用条件。\n\n6. B。加入 \\(Ac^-\\) 产生同离子效应，使 \\(HAc\\) 电离平衡左移，电离度降低。\n\n7. 1。人眼可分辨的酸色和碱色比例大约对应 \\(pK_{HIn}\\pm1\\)。\n\n8. A。缓冲体系应选择 \\(pK_a\\) 接近目标 pH 的共轭酸碱对，\\(HAc/Ac^-\\) 适合 \\(pH\\approx4.75\\)。\n\n## 二、公式计算题答案\n\n1. 解题思路：先检查简化条件，再用一元弱酸公式。  \n   使用公式：\n   \\[\n   [H_3O^+]\\approx\\sqrt{K_ac}\n   \\]\n   已知量：\\(K_a=1.37\\times10^{-4}\\)，\\(c=0.10\\ \\mathrm{mol\\cdot dm^{-3}}\\)。  \n   单位换算：浓度单位已统一。  \n   简化条件：\n   \\[\n   \\frac{c}{K_a}=\\frac{0.10}{1.37\\times10^{-4}}=730\u003e400\n   \\]\n   可用简化公式。  \n   代入：\n   \\[\n   [H_3O^+]=\\sqrt{(1.37\\times10^{-4})(0.10)}=3.7\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\[\n   pH=-\\lg(3.7\\times10^{-3})=2.43\n   \\]\n   \\[\n   \\alpha=\\frac{[H_3O^+]}{c}=\\frac{3.7\\times10^{-3}}{0.10}=3.7\\%\n   \\]\n   最终答案：\\(pH=2.43\\)，\\(\\alpha=3.7\\%\\)。  \n   易错提醒：先检查 \\(c/K_a\\)，不要直接套公式。\n\n2. 解题思路：\\(CN^-\\) 是 \\(HCN\\) 的共轭碱，先求 \\(K_b=K_w/K_a\\)，再按弱碱计算。  \n   使用公式：\n   \\[\n   K_b(CN^-)=\\frac{K_w}{K_a(HCN)}\n   \\]\n   \\[\n   [OH^-]\\approx\\sqrt{K_bc}\n   \\]\n   已知量：\\(m=2.45\\ \\mathrm{g}\\)，\\(M=49\\ \\mathrm{g\\cdot mol^{-1}}\\)，\\(V=0.500\\ \\mathrm{dm^3}\\)。  \n   单位换算：\n   \\[\n   c=\\frac{2.45/49}{0.500}=0.10\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\[\n   K_b=\\frac{1.0\\times10^{-14}}{4.93\\times10^{-10}}=2.0\\times10^{-5}\n   \\]\n   代入：\n   \\[\n   [OH^-]=\\sqrt{(2.0\\times10^{-5})(0.10)}=1.4\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\[\n   pOH=-\\lg(1.4\\times10^{-3})=2.85\n   \\]\n   \\[\n   pH=14.00-2.85=11.15\n   \\]\n   最终答案：\\(pH=11.15\\)。  \n   易错提醒：\\(Na^+\\) 不参与酸碱平衡，决定碱性的是 \\(CN^-\\)。\n\n3. 解题思路：这是 \\(HAc/Ac^-\\) 共轭酸碱体系，用同离子效应公式。  \n   使用公式：\n   \\[\n   [H_3O^+]=K_a\\frac{c_{\\text{弱酸}}}{c_{\\text{共轭碱}}}\n   \\]\n   已知量：\\(K_a=1.8\\times10^{-5}\\)，\\([HAc]\\approx0.10\\)，\\([Ac^-]=1.0\\)。  \n   代入：\n   \\[\n   [H_3O^+]=1.8\\times10^{-5}\\times\\frac{0.10}{1.0}=1.8\\times10^{-6}\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\[\n   pH=-\\lg(1.8\\times10^{-6})=5.74\n   \\]\n   \\[\n   \\alpha=\\frac{1.8\\times10^{-6}}{0.10}=1.8\\times10^{-5}=0.0018\\%\n   \\]\n   最终答案：\\([H_3O^+]=1.8\\times10^{-6}\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\(pH=5.74\\)，\\(\\alpha=0.0018\\%\\)。  \n   易错提醒：加入 \\(Ac^-\\) 后不能再用纯弱酸的 \\(\\sqrt{K_ac}\\) 公式。\n\n4. 解题思路：\\(H_2PO_4^-\\) 是两性离子，材料给出近似 \\([H_3O^+]\\approx\\sqrt{K_{a1}K_{a2}}\\)。  \n   使用公式：\n   \\[\n   [H_3O^+]\\approx\\sqrt{K_{a1}K_{a2}}\n   \\]\n   已知量：\\(K_{a1}=7.52\\times10^{-3}\\)，\\(K_{a2}=6.23\\times10^{-8}\\)。  \n   代入：\n   \\[\n   [H_3O^+]=\\sqrt{(7.52\\times10^{-3})(6.23\\times10^{-8})}=2.16\\times10^{-5}\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\[\n   pH=-\\lg(2.16\\times10^{-5})=4.67\n   \\]\n   最终答案：\\(pH\\approx4.68\\)。  \n   易错提醒：两性离子不能简单当作普通一元弱酸处理。\n\n5. 解题思路：先由目标 pH 求 pOH 和 \\([OH^-]\\)，再用缓冲公式求 \\([NH_4^+]\\)。  \n   使用公式：\n   \\[\n   [OH^-]=K_b\\frac{[NH_3\\cdot H_2O]}{[NH_4^+]}\n   \\]\n   已知量：\\(pH=9.20\\)，\\(pOH=14.00-9.20=4.80\\)，\\([NH_3\\cdot H_2O]=1.0\\)，\\(K_b=1.8\\times10^{-5}\\)。  \n   代入：\n   \\[\n   [OH^-]=10^{-4.80}=1.6\\times10^{-5}\n   \\]\n   \\[\n   [NH_4^+]=K_b\\frac{[NH_3\\cdot H_2O]}{[OH^-]}\n   =\\frac{1.8\\times10^{-5}\\times1.0}{1.6\\times10^{-5}}\\approx1.1\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\(500\\ \\mathrm{cm^3}=0.500\\ \\mathrm{dm^3}\\)，所需 \\(NH_4Cl\\)：\n   \\[\n   m=0.500\\times1.1\\times53.5\\approx29\\ \\mathrm{g}\n   \\]\n   浓氨水体积：\n   \\[\n   V=\\frac{1.0\\times0.500}{15}=0.033\\ \\mathrm{dm^3}=33\\ \\mathrm{cm^3}\n   \\]\n   最终答案：称取约 \\(29\\ \\mathrm{g}\\) \\(NH_4Cl\\)，取约 \\(33\\ \\mathrm{cm^3}\\) 浓氨水，加水定容至 \\(500\\ \\mathrm{cm^3}\\)。  \n   易错提醒：弱碱缓冲液先求 pOH，不要把 pH 直接代入 \\([OH^-]\\)。\n\n## 三、判断题答案\n\n1. 错误。Arrhenius 理论主要限于水溶液，非水体系需要溶剂理论或质子理论等解释。\n\n2. 正确。酸失去一个质子后形成对应的共轭碱。\n\n3. 错误。\\(K_a\\) 越大，酸越容易给出质子，酸越强。\n\n4. 正确。水溶液中 \\(H_3O^+\\) 和 \\(OH^-\\) 总是同时存在，由 \\(K_w\\) 联系。\n\n5. 正确。电离度与浓度有关，电离常数在一定温度下不随浓度改变。\n\n6. 正确。多元弱酸通常 \\(K_{a1}\\gg K_{a2}\\)，第一步电离决定主要酸度。\n\n7. 错误。同离子效应降低电离度，但定温下 \\(K_a\\) 或 \\(K_b\\) 不变。\n\n8. 正确。缓冲能力有限；总浓度较大且酸碱比接近 1 时缓冲能力较强。\n\n## 四、综合题答案\n\n1. 解析：  \n   目标 \\(pH=3.20\\)，选缓冲体系时应使 \\(pK_a\\) 尽量接近目标 pH，并让共轭酸碱浓度比接近 1。  \n   对 \\(HCO_2H/HCO_2^-\\)：\n   \\[\n   \\frac{[HCO_2H]}{[HCO_2^-]}=\\frac{[H_3O^+]}{K_a}\n   =\\frac{6.3\\times10^{-4}}{1.77\\times10^{-4}}\\approx3.6\n   \\]\n   比值为约 \\(3.6:1\\)，仍较接近 1。  \n   对 \\(HAc/Ac^-\\)：\n   \\[\n   \\frac{[HAc]}{[Ac^-]}=\\frac{6.3\\times10^{-4}}{1.76\\times10^{-5}}\\approx36\n   \\]\n   比值约 \\(36:1\\)，远离 1，缓冲能力较差。  \n   结论：应选 \\(HCO_2H/HCO_2Na\\)，因为其 \\(pK_a=3.75\\) 更接近 3.20，所需酸碱比更接近 1。\n\n2. 解析：  \n   该说法错误。强酸强碱等量中和时，主要反应为：\n   \\[\n   H_3O^+ + OH^- \\rightarrow 2H_2O\n   \\]\n   反应很完全，生成的盐通常不水解，因此 298 K 下溶液近似中性。  \n   但强酸弱碱等量反应后，弱碱转化为其共轭酸，溶液酸度由该弱酸电离决定，通常 \\(pH\u003c7\\)。  \n   弱酸强碱等量反应后，弱酸转化为其共轭碱，溶液碱度由该弱碱水解决定，通常 \\(pH\u003e7\\)。  \n   弱酸弱碱等量反应后，溶液 pH 更复杂，要比较生成的共轭酸和共轭碱的强弱，或用相应 \\(K_a,K_b\\) 分析。  \n   结论：只有强酸强碱等量中和常近似 \\(pH=7\\)，其他类型不能直接套用。\n",
    "chemistry_quiz/07-quiz.md":  "# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：氧化数升高的过程称为 \\(\\_\\_\\_\\_\\_\\_\\)，氧化数降低的过程称为 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n2. 选择：原电池中负极发生的反应是  \n   A. 还原反应  \n   B. 氧化反应  \n   C. 中和反应  \n   D. 沉淀反应\n\n3. 填空：电池电动势计算公式为 \\(E_{\\text{池}}=\\_\\_\\_\\_\\_\\_\\)。\n\n4. 选择：标准氢电极的标准电极电势规定为  \n   A. \\(-1.0000\\ \\mathrm{V}\\)  \n   B. \\(0.0000\\ \\mathrm{V}\\)  \n   C. \\(0.3400\\ \\mathrm{V}\\)  \n   D. \\(1.0000\\ \\mathrm{V}\\)\n\n5. 填空：标准态下 \\(\\Delta G_T^\\theta\\) 与电池电动势的关系为 \\(\\Delta G_T^\\theta=\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：电极反应整体乘以 2 后，其标准电极电势 \\(E^\\theta\\)  \n   A. 变为原来的 2 倍  \n   B. 变为原来的一半  \n   C. 不变  \n   D. 变号\n\n7. 填空：298 K 下，标准电动势和平衡常数关系为 \\(E_{\\text{池}}^\\theta=\\_\\_\\_\\_\\_\\_\\lg K^\\theta\\)。\n\n8. 选择：电对 \\(E^\\theta\\) 越大，通常说明  \n   A. 氧化型氧化能力越强  \n   B. 还原型还原能力越强  \n   C. 反应速率一定越快  \n   D. 该物质一定不能被还原\n\n## 二、公式计算题\n\n1. 已知 \\(E^\\theta(Fe^{3+}/Fe^{2+})=0.771\\ \\mathrm{V}\\)，\\(E^\\theta(Sn^{4+}/Sn^{2+})=0.151\\ \\mathrm{V}\\)。求反应 \\(2Fe^{3+}+Sn^{2+}\\rightarrow 2Fe^{2+}+Sn^{4+}\\) 的 \\(E^\\theta_{\\text{池}}\\) 和 \\(K^\\theta\\)。\n\n2. 在标准状态下，酸性溶液中 \\(O_2\\) 氧化 \\(Fe^{2+}\\) 为 \\(Fe^{3+}\\)：\\(O_2+4H^+ +4Fe^{2+}\\rightarrow 2H_2O+4Fe^{3+}\\)。已知 \\(E^\\theta(O_2/H_2O)=1.23\\ \\mathrm{V}\\)，\\(E^\\theta(Fe^{3+}/Fe^{2+})=0.77\\ \\mathrm{V}\\)。求 \\(E^\\theta_{\\text{池}}\\) 和 \\(K^\\theta\\)。\n\n3. 计算电池 \\((-)\\ Pt|Fe^{2+}(0.10\\ M),Fe^{3+}(0.20\\ M)||Ag^+(1.0\\ M)|Ag(+)\\) 的电动势。已知 \\(E^\\theta(Ag^+/Ag)=0.7996\\ \\mathrm{V}\\)，\\(E^\\theta(Fe^{3+}/Fe^{2+})=0.771\\ \\mathrm{V}\\)，电池反应为 \\(Fe^{2+}+Ag^+\\rightarrow Fe^{3+}+Ag\\)。\n\n4. 已知 \\(ClO_3^-+6H^+ +6e^-\\rightarrow Cl^-+3H_2O\\)，\\(E_1^\\theta=1.45\\ \\mathrm{V}\\)；\\(0.5Cl_2+e^-\\rightarrow Cl^-\\)，\\(E_2^\\theta=1.36\\ \\mathrm{V}\\)。求 \\(ClO_3^-+6H^+ +5e^-\\rightarrow 0.5Cl_2+3H_2O\\) 的 \\(E_3^\\theta\\)。\n\n5. 已知 \\(Cr_2O_7^{2-}+14H^+ +6e^-\\rightarrow 2Cr^{3+}+7H_2O\\)，\\(E^\\theta=1.23\\ \\mathrm{V}\\)。当 \\([Cr^{3+}]=1\\)、\\([Cr_2O_7^{2-}]=1\\)、\\([H^+]=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}}\\) 时，求 \\(E\\)。\n\n## 三、判断题\n\n1. 氧化剂在反应中得到电子，本身被还原。  \n2. 单质中元素的氧化数一定为 0。  \n3. 酸性介质配平氧化还原方程时可以保留 \\(OH^-\\)。  \n4. 原电池中电子从负极经外电路流向正极。  \n5. 标准电极电势越大，还原型的还原能力越强。  \n6. \\(E_{\\text{池}}\u003e0\\) 时，对应 \\(\\Delta G\u003c0\\)，反应正向自发。  \n7. Nernst 方程中，纯固体和电子都应写入反应商。  \n8. \\(E^\\theta_{\\text{池}}\u003e0\\) 只能说明热力学上自发，不保证反应速率一定快。\n\n## 四、综合题\n\n1. 某反应在标准态下由 \\(Br_2/Br^-\\) 和 \\(I_2/I^-\\) 两个电对构成。已知 \\(E^\\theta(Br_2/Br^-)=1.066\\ \\mathrm{V}\\)，\\(E^\\theta(I_2/I^-)=0.536\\ \\mathrm{V}\\)。判断 \\(Br_2+2I^-\\rightarrow 2Br^-+I_2\\) 是否自发，并说明氧化剂、还原剂、正负极及电子流向。\n\n2. 结合 Nernst 方程说明：为什么生成沉淀、弱电解质、配合物或改变酸度都可能显著改变氧化还原反应方向？请至少举两个材料中的例子。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 氧化；还原。氧化数升高表示失电子，被氧化；氧化数降低表示得电子，被还原。\n\n2. B。原电池中负极发生氧化反应，正极发生还原反应。\n\n3. \\(E_{\\text{正}}-E_{\\text{负}}\\)。电池电动势是正极电势减负极电势。\n\n4. B。标准氢电极的 \\(E^\\theta\\) 被规定为 \\(0.0000\\ \\mathrm{V}\\)。\n\n5. \\(-nFE_{\\text{池}}^\\theta\\)。标准态下 \\(\\Delta G_T^\\theta=-nFE_{\\text{池}}^\\theta\\)。\n\n6. C。电极电势是强度量，半反应乘系数时 \\(E^\\theta\\) 不变。\n\n7. \\(\\frac{0.0592}{n}\\)。298 K 时 \\(E_{\\text{池}}^\\theta=\\frac{0.0592}{n}\\lg K^\\theta\\)。\n\n8. A。\\(E^\\theta\\) 越大，氧化型越容易得电子，氧化能力越强。\n\n## 二、公式计算题答案\n\n1. 解题思路：先判断正负极，再用 \\(E^\\theta_{\\text{池}}=E^\\theta_{\\text{正}}-E^\\theta_{\\text{负}}\\)，再求 \\(K^\\theta\\)。  \n   使用公式：\n   \\[\n   E^\\theta_{\\text{池}}=E^\\theta_{\\text{正}}-E^\\theta_{\\text{负}}\n   \\]\n   \\[\n   \\lg K^\\theta=\\frac{nE^\\theta_{\\text{池}}}{0.0592}\n   \\]\n   已知量：正极 \\(Fe^{3+}/Fe^{2+}\\)，\\(E^\\theta=0.771\\ \\mathrm{V}\\)；负极对应 \\(Sn^{4+}/Sn^{2+}\\)，\\(E^\\theta=0.151\\ \\mathrm{V}\\)；\\(n=2\\)。  \n   代入：\n   \\[\n   E^\\theta_{\\text{池}}=0.771-0.151=0.620\\ \\mathrm{V}\n   \\]\n   \\[\n   \\lg K^\\theta=\\frac{2\\times0.620}{0.0592}=20.95\n   \\]\n   \\[\n   K^\\theta=8.8\\times10^{20}\n   \\]\n   最终答案：\\(E^\\theta_{\\text{池}}=0.620\\ \\mathrm{V}\\)，\\(K^\\theta=8.8\\times10^{20}\\)。  \n   易错提醒：该反应式中 \\(n=2\\)，如果反应式减半，\\(K\\) 会改变。\n\n2. 解题思路：\\(O_2/H_2O\\) 作正极，\\(Fe^{3+}/Fe^{2+}\\) 作负极，\\(n=4\\)。  \n   使用公式：\n   \\[\n   E^\\theta_{\\text{池}}=E^\\theta_{\\text{正}}-E^\\theta_{\\text{负}}\n   \\]\n   \\[\n   \\lg K^\\theta=\\frac{nE^\\theta_{\\text{池}}}{0.0592}\n   \\]\n   代入：\n   \\[\n   E^\\theta_{\\text{池}}=1.23-0.77=0.46\\ \\mathrm{V}\n   \\]\n   \\[\n   \\lg K^\\theta=\\frac{4\\times0.46}{0.0592}=31.1\n   \\]\n   \\[\n   K^\\theta\\approx1.2\\times10^{31}\n   \\]\n   最终答案：\\(E^\\theta_{\\text{池}}=0.46\\ \\mathrm{V}\\)，\\(K^\\theta\\approx1.2\\times10^{31}\\)。  \n   易错提醒：\\(n\\) 是配平电池反应的电子转移数，这里是 4。\n\n3. 解题思路：先求标准电动势，再用 Nernst 方程。  \n   使用公式：\n   \\[\n   E_{\\text{池}}=E^\\theta_{\\text{池}}-\\frac{0.0592}{n}\\lg Q\n   \\]\n   已知量：\\(E^\\theta_{\\text{池}}=0.7996-0.771=0.0286\\ \\mathrm{V}\\)，\\(n=1\\)。  \n   反应商：\n   \\[\n   Q=\\frac{[Fe^{3+}]}{[Fe^{2+}][Ag^+]}=\\frac{0.20}{0.10\\times1.0}=2.0\n   \\]\n   代入：\n   \\[\n   E_{\\text{池}}=0.0286-0.0592\\lg2.0=0.0286-0.0178=0.0108\\ \\mathrm{V}\n   \\]\n   最终答案：\\(E_{\\text{池}}\\approx0.011\\ \\mathrm{V}\\)。  \n   易错提醒：固体 \\(Ag\\) 不写入 \\(Q\\)。\n\n4. 解题思路：目标半反应 = 反应 1 - 反应 2，必须用 \\(nE\\) 加权。  \n   使用公式：\n   \\[\n   5E_3^\\theta=6E_1^\\theta-1E_2^\\theta\n   \\]\n   代入：\n   \\[\n   E_3^\\theta=\\frac{6\\times1.45-1\\times1.36}{5}=1.47\\ \\mathrm{V}\n   \\]\n   最终答案：\\(E_3^\\theta=1.47\\ \\mathrm{V}\\)。  \n   易错提醒：不能直接算 \\(1.45-1.36\\)。\n\n5. 解题思路：该电极反应含 \\(H^+\\)，酸度要进入 Nernst 方程。  \n   使用公式：\n   \\[\n   E=E^\\theta-\\frac{0.0592}{6}\\lg\\frac{[Cr^{3+}]^2}{[Cr_2O_7^{2-}][H^+]^{14}}\n   \\]\n   已知量：\\([Cr^{3+}]=1\\)，\\([Cr_2O_7^{2-}]=1\\)，\\([H^+]=10^{-3}\\)。  \n   代入：\n   \\[\n   Q=\\frac{1}{1\\times(10^{-3})^{14}}=10^{42}\n   \\]\n   \\[\n   E=1.23-\\frac{0.0592}{6}\\lg10^{42}=1.23-0.414=0.82\\ \\mathrm{V}\n   \\]\n   最终答案：\\(E\\approx0.82\\ \\mathrm{V}\\)。  \n   易错提醒：\\([H^+]\\) 的指数是 14，酸度影响非常大。\n\n## 三、判断题答案\n\n1. 正确。氧化剂得电子，氧化数降低，本身被还原。\n\n2. 正确。单质中电子没有整体转移或偏移，元素氧化数为 0。\n\n3. 错误。酸性介质中不能出现 \\(OH^-\\)，应通过 \\(H^+\\) 和 \\(H_2O\\) 配平。\n\n4. 正确。原电池电子从发生氧化的负极流向发生还原的正极。\n\n5. 错误。标准电极电势越大，氧化型氧化能力越强；还原型还原能力越弱。\n\n6. 正确。由 \\(\\Delta G=-nFE\\) 可知，\\(E\u003e0\\) 时 \\(\\Delta G\u003c0\\)，正向自发。\n\n7. 错误。Nernst 方程中纯固体、纯液体和电子不写入反应商。\n\n8. 正确。热力学自发不等于速率快，材料中过二硫酸盐氧化 \\(Mn^{2+}\\) 需要催化剂才明显进行。\n\n## 四、综合题答案\n\n1. 解析：  \n   \\(E^\\theta(Br_2/Br^-)=1.066\\ \\mathrm{V}\\)，大于 \\(E^\\theta(I_2/I^-)=0.536\\ \\mathrm{V}\\)，因此 \\(Br_2\\) 的氧化能力强于 \\(I_2\\)，而 \\(I^-\\) 的还原能力强于 \\(Br^-\\)。  \n   对反应：\n   \\[\n   Br_2+2I^-\\rightarrow 2Br^-+I_2\n   \\]\n   正极为 \\(Br_2+2e^-\\rightarrow2Br^-\\)，负极为 \\(2I^-\\rightarrow I_2+2e^-\\)。  \n   \\[\n   E^\\theta_{\\text{池}}=1.066-0.536=0.530\\ \\mathrm{V}\u003e0\n   \\]\n   所以反应标准态下正向自发。氧化剂是 \\(Br_2\\)，还原剂是 \\(I^-\\)。电子从负极 \\(I^-/I_2\\) 电极经外电路流向正极 \\(Br_2/Br^-\\) 电极。\n\n2. 解析：  \n   Nernst 方程表明电极电势与氧化型、还原型浓度或分压有关：\n   \\[\n   E=E^\\theta+\\frac{0.0592}{n}\\lg\\frac{Ox}{Red}\n   \\]\n   因此任何能明显改变氧化型或还原型有效浓度的过程，都可能改变电极电势，甚至改变反应方向。  \n   例 1：\\(Cu^+ + I^-\\rightarrow CuI(s)\\) 生成沉淀，使 \\([Cu^+]\\) 大幅降低，从而使 \\(Cu^{2+}/Cu^+\\) 电极电势升高，原本标准态下 \\(Cu^{2+}\\) 不能氧化 \\(I^-\\)，但生成 \\(CuI\\) 后反应可发生。  \n   例 2：向氢电极体系中加入 \\(NaAc\\) 形成 \\(HAc/Ac^-\\) 缓冲体系，使 \\([H^+]\\) 降低，\\(E(H^+/H_2)\\) 降低，导致 \\(Pb+2H^+\\rightarrow Pb^{2+}+H_2\\) 不再正向自发。  \n   例 3：\\(Cu^{2+}\\) 与 \\(NH_3\\) 形成 \\(Cu(NH_3)_4^{2+}\\)，降低游离 \\([Cu^{2+}]\\)，使 \\(Cu^{2+}/Cu\\) 电极电势下降。  \n   例 4：\\(Cr_2O_7^{2-}/Cr^{3+}\\) 半反应含 \\(14H^+\\)，酸度升高会显著增大电极电势，使其氧化性增强。\n",
    "chemistry_quiz/08-quiz.md":  "# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：化学动力学主要研究化学反应的 \\(\\_\\_\\_\\_\\_\\_\\)、影响因素和反应机理。\n\n2. 选择：对反应 \\(2Fe^{3+}+Sn^{2+}\\rightarrow2Fe^{2+}+Sn^{4+}\\)，若 \\(\\Delta[Fe^{2+}]/\\Delta t=5.0\\times10^{-5}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)，则按 IUPAC 定义的反应速率为  \n   A. \\(5.0\\times10^{-5}\\)  \n   B. \\(2.5\\times10^{-5}\\)  \n   C. \\(1.0\\times10^{-4}\\)  \n   D. \\(-5.0\\times10^{-5}\\)\n\n3. 填空：基元反应的速率方程可按 \\(\\_\\_\\_\\_\\_\\_\\) 定律直接写出。\n\n4. 选择：非基元反应的速率方程通常应  \n   A. 直接按总方程式计量数写出  \n   B. 由实验测定  \n   C. 总是零级  \n   D. 总是一级\n\n5. 填空：一级反应的半衰期公式为 \\(t_{1/2}=\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：零级反应的特征是  \n   A. 速率与浓度无关  \n   B. \\(\\ln[A]\\) 对 \\(t\\) 成直线  \n   C. \\(1/[A]\\) 对 \\(t\\) 成直线  \n   D. 半衰期与初始浓度无关\n\n7. 填空：Arrhenius 公式中 \\(\\ln k=-E_a/(RT)+C\\)，其中 \\(E_a\\) 称为 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n8. 选择：催化剂改变反应速率的主要原因是  \n   A. 改变反应物总能量  \n   B. 改变平衡常数  \n   C. 改变反应路径并降低活化能  \n   D. 只改变生成物浓度\n\n## 二、公式计算题\n\n1. 对基元反应 \\(A+2B\\rightarrow3C\\)，若 \\(-d[A]/dt=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)，求 \\(+d[C]/dt\\) 和反应速率 \\(v\\)。\n\n2. 已知某一级反应速率常数 \\(k=2.2\\times10^{-5}\\ \\mathrm{s^{-1}}\\)。求其半衰期。\n\n3. 某一级反应初始质量为 \\(2.00\\ \\mathrm{g}\\)，\\(k=2.2\\times10^{-5}\\ \\mathrm{s^{-1}}\\)。反应 \\(2.00\\ \\mathrm{h}\\) 后剩余多少？假设质量与浓度成正比。\n\n4. 某二级反应 \\(A\\rightarrow P\\)，\\([A]_0=1.00\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\(k=0.50\\ \\mathrm{mol^{-1}\\cdot dm^3\\cdot h^{-1}}\\)。求 \\(t=4.0\\ \\mathrm{h}\\) 时 \\([A]\\)。\n\n5. 已知基元反应 \\(A\\rightarrow B\\) 的 \\(\\Delta H=67\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，正反应 \\(E_a=90\\ \\mathrm{kJ\\cdot mol^{-1}}\\)。求逆反应活化能。若 \\(0^\\circ C\\) 时 \\(k_1=1.1\\times10^{-5}\\ \\mathrm{min^{-1}}\\)，求 \\(45^\\circ C\\) 时 \\(k_2\\)。取 \\(R=8.314\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}\\)。\n\n## 三、判断题\n\n1. 热力学上自发的反应一定具有很快的反应速率。  \n2. 反应速率按 IUPAC 定义通常取正值。  \n3. 速率常数 \\(k\\) 在给定温度和条件下与反应物浓度无关。  \n4. 对所有反应，都可直接由总反应方程式写出速率方程。  \n5. 一级反应的 \\(\\lg[A]\\) 对 \\(t\\) 作图为直线。  \n6. 二级反应的半衰期与初始浓度无关。  \n7. 催化剂能改变反应路径，但不改变平衡位置。  \n8. 中间体和催化剂完全相同，二者没有区别。\n\n## 四、综合题\n\n1. 某反应的总方程式很简单，但实验发现速率方程与计量数不一致。请从“基元反应、非基元反应、反应机理、决速步”的角度解释为什么不能直接由总方程式写速率方程。\n\n2. 请结合 Arrhenius 公式和催化剂作用原理说明：升高温度和加入催化剂都能加快反应速率，但二者本质上有什么不同？催化剂为什么不改变平衡常数？\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 速率。化学动力学研究反应速率、影响因素和反应机理。\n\n2. B。反应速率 \\(v=\\frac{1}{2}\\Delta[Fe^{2+}]/\\Delta t=2.5\\times10^{-5}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)。\n\n3. 质量作用。质量作用定律只可直接用于基元反应。\n\n4. B。非基元反应路径复杂，速率方程必须由实验测定。\n\n5. \\(0.693/k\\)。一级反应半衰期与初始浓度无关。\n\n6. A。零级反应 \\(v=k\\)，速率与浓度无关。\n\n7. 活化能。复杂反应实验得到的 \\(E_a\\) 常称表观活化能。\n\n8. C。催化剂提供新的反应路径，降低活化能，使更多分子能越过能垒。\n\n## 二、公式计算题答案\n\n1. 解题思路：用计量数关系换算各物质浓度变化率。  \n   使用公式：\n   \\[\n   v=-\\frac{d[A]}{dt}=\\frac{1}{3}\\frac{d[C]}{dt}\n   \\]\n   已知量：\\(-d[A]/dt=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)。  \n   代入：\n   \\[\n   v=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\n   \\]\n   \\[\n   \\frac{d[C]}{dt}=3v=3.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\n   \\]\n   最终答案：\\(+d[C]/dt=3.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)，\\(v=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)。  \n   易错提醒：\\(B\\) 的计量数不影响由 \\(A\\) 与 \\(C\\) 的换算，但写 \\(v\\) 时必须除以对应计量数。\n\n2. 解题思路：一级反应直接用半衰期公式。  \n   使用公式：\n   \\[\n   t_{1/2}=\\frac{0.693}{k}\n   \\]\n   已知量：\\(k=2.2\\times10^{-5}\\ \\mathrm{s^{-1}}\\)。  \n   代入：\n   \\[\n   t_{1/2}=\\frac{0.693}{2.2\\times10^{-5}}=3.15\\times10^4\\ \\mathrm{s}\n   \\]\n   \\[\n   3.15\\times10^4\\ \\mathrm{s}=8.75\\ \\mathrm{h}\n   \\]\n   最终答案：\\(t_{1/2}=3.15\\times10^4\\ \\mathrm{s}\\approx8.75\\ \\mathrm{h}\\)。  \n   易错提醒：一级反应半衰期与初始量无关。\n\n3. 解题思路：一级反应剩余量满足 \\(m=m_0e^{-kt}\\)。  \n   使用公式：\n   \\[\n   \\ln\\frac{[A]}{[A]_0}=-kt\n   \\]\n   已知量：\\(m_0=2.00\\ \\mathrm{g}\\)，\\(k=2.2\\times10^{-5}\\ \\mathrm{s^{-1}}\\)，\\(t=2.00\\ \\mathrm{h}=7200\\ \\mathrm{s}\\)。  \n   代入：\n   \\[\n   \\frac{m}{m_0}=e^{-kt}=e^{-(2.2\\times10^{-5})(7200)}=e^{-0.1584}=0.853\n   \\]\n   \\[\n   m=2.00\\times0.853=1.71\\ \\mathrm{g}\n   \\]\n   最终答案：剩余约 \\(1.71\\ \\mathrm{g}\\)。  \n   易错提醒：时间单位必须与 \\(k\\) 的单位一致。\n\n4. 解题思路：二级反应用 \\(1/[A]\\) 与 \\(t\\) 的关系。  \n   使用公式：\n   \\[\n   \\frac{1}{[A]}=\\frac{1}{[A]_0}+kt\n   \\]\n   已知量：\\([A]_0=1.00\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\(k=0.50\\ \\mathrm{mol^{-1}\\cdot dm^3\\cdot h^{-1}}\\)，\\(t=4.0\\ \\mathrm{h}\\)。  \n   代入：\n   \\[\n   \\frac{1}{[A]}=1.00+0.50\\times4.0=3.00\n   \\]\n   \\[\n   [A]=0.333\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   最终答案：\\([A]=0.333\\ \\mathrm{mol\\cdot dm^{-3}}\\)。  \n   易错提醒：二级反应不是 \\(\\ln[A]\\) 对 \\(t\\) 线性。\n\n5. 解题思路：先由 \\(\\Delta H=E_{a,\\text{正}}-E_{a,\\text{逆}}\\) 求逆反应活化能，再用 Arrhenius 两温度式。  \n   使用公式：\n   \\[\n   E_{a,\\text{逆}}=E_{a,\\text{正}}-\\Delta H\n   \\]\n   \\[\n   \\ln\\frac{k_2}{k_1}=\\frac{E_a}{R}\\left(\\frac{1}{T_1}-\\frac{1}{T_2}\\right)\n   \\]\n   已知量：\\(\\Delta H=67\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，\\(E_{a,\\text{正}}=90\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，\\(T_1=273.15\\ \\mathrm{K}\\)，\\(T_2=318.15\\ \\mathrm{K}\\)，\\(k_1=1.1\\times10^{-5}\\ \\mathrm{min^{-1}}\\)。  \n   代入：\n   \\[\n   E_{a,\\text{逆}}=90-67=23\\ \\mathrm{kJ\\cdot mol^{-1}}\n   \\]\n   \\[\n   \\ln\\frac{k_2}{k_1}=\\frac{90000}{8.314}\\left(\\frac{1}{273.15}-\\frac{1}{318.15}\\right)=5.61\n   \\]\n   \\[\n   k_2=k_1e^{5.61}=1.1\\times10^{-5}\\times273=3.0\\times10^{-3}\\ \\mathrm{min^{-1}}\n   \\]\n   最终答案：逆反应活化能 \\(23\\ \\mathrm{kJ\\cdot mol^{-1}}\\)；\\(k_2\\approx3.0\\times10^{-3}\\ \\mathrm{min^{-1}}\\)。  \n   易错提醒：温度必须用 K，活化能要与 \\(R\\) 单位统一。\n\n## 三、判断题答案\n\n1. 错误。热力学自发不代表速率快，合成氨和汽车尾气反应都体现了这一点。\n\n2. 正确。反应物项前加负号，生成物项为正，最终反应速率取正值。\n\n3. 正确。给定温度和条件下，\\(k\\) 与浓度无关；浓度改变的是速率 \\(v\\)。\n\n4. 错误。只有基元反应可直接按质量作用定律写速率式；非基元反应要实验测定。\n\n5. 正确。一级反应满足 \\(\\lg[A]=\\lg[A]_0-kt/2.30\\)。\n\n6. 错误。二级反应 \\(t_{1/2}=1/(k[A]_0)\\)，与初始浓度有关。\n\n7. 正确。催化剂改变反应路径和活化能，不改变平衡位置。\n\n8. 错误。中间体先生成后消耗；催化剂先参与后再生，反应前后总量不变。\n\n## 四、综合题答案\n\n1. 解析：  \n   总反应方程式只表示始态和终态的化学计量关系，不一定表示反应真实路径。若反应一步完成，才称为基元反应，此时可按质量作用定律写速率方程。多数反应是非基元反应，需经历多个基元步骤，速率由反应机理决定。复杂反应中最慢的一步常称决速步，可能控制总反应速率。因此即使总方程式很简单，速率方程中的浓度指数也可能与计量数不一致，必须由实验测定或由机理推导。\n\n2. 解析：  \n   升高温度主要通过 Arrhenius 公式影响速率常数：\n   \\[\n   k=Ae^{-E_a/RT}\n   \\]\n   当 \\(T\\) 升高时，更多分子具有足够能量越过能垒，通常 \\(k\\) 增大。催化剂则是提供新的反应路径，降低活化能 \\(E_a\\)，使反应在同一温度下也能更快进行。二者都能增大速率，但升温改变的是分子能量分布，催化剂改变的是反应路径。催化剂同时并同等程度影响正逆反应速率，因此不改变平衡常数和平衡位置，只改变达到平衡的时间。\n",
    "chemistry_quiz/09-quiz.md":  "# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：Planck 能量量子化公式为 \\(E=\\_\\_\\_\\_\\_\\_\\)。\n\n2. 选择：Bohr 模型中氢原子第 \\(n\\) 能级能量为  \n   A. \\(E_n=-13.6n^2\\ \\mathrm{eV}\\)  \n   B. \\(E_n=-13.6/n^2\\ \\mathrm{eV}\\)  \n   C. \\(E_n=13.6/n\\ \\mathrm{eV}\\)  \n   D. \\(E_n=0\\)\n\n3. 填空：de Broglie 关系式为 \\(\\lambda=\\_\\_\\_\\_\\_\\_\\)。\n\n4. 选择：下列量子数组合正确的是  \n   A. \\(n=2,l=2,m=0\\)  \n   B. \\(n=3,l=1,m=-1\\)  \n   C. \\(n=2,l=0,m=1\\)  \n   D. \\(n=1,l=1,m=0\\)\n\n5. 填空：\\(l=0,1,2,3\\) 分别对应的亚层符号为 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：一个 \\(d\\) 亚层最多容纳的电子数为  \n   A. 2  \n   B. 6  \n   C. 10  \n   D. 14\n\n7. 填空：Pauli 不相容原理可表述为同一原子中没有 ______ 个量子数完全相同的电子。\n\n8. 选择：同周期主族元素从左到右，一般原子半径  \n   A. 增大  \n   B. 减小  \n   C. 不变  \n   D. 无规律且不能比较\n\n## 二、公式计算题\n\n1. 计算氢原子从 \\(n=1\\) 到 \\(n=\\infty\\) 的电离能，先求单个原子所需能量，再求 \\(1\\ \\mathrm{mol}\\) 氢原子的电离能。已知 \\(1\\ \\mathrm{eV}=1.602\\times10^{-19}\\ \\mathrm{J}\\)，\\(N_A=6.02\\times10^{23}\\ \\mathrm{mol^{-1}}\\)。\n\n2. 计算氢原子 \\(n=3\\rightarrow n=2\\) 跃迁发射光子的波长。用 \\(E_n=-13.6/n^2\\ \\mathrm{eV}\\)，\\(hc=1240\\ \\mathrm{eV\\cdot nm}\\)。\n\n3. 计算速度为 \\(5.9\\times10^5\\ \\mathrm{m\\cdot s^{-1}}\\) 的电子的 de Broglie 波长。已知 \\(h=6.626\\times10^{-34}\\ \\mathrm{J\\cdot s}\\)，\\(m_e=9.11\\times10^{-31}\\ \\mathrm{kg}\\)。\n\n4. 判断 \\(\\varphi(3,2,1)\\) 代表哪个亚层轨道，并说明该亚层有多少个轨道、最多容纳多少电子。\n\n5. 用 Slater 规则材料中给出的 Na 价电子结果：\\(Z^*=2.20\\)，估算 Na 的 \\(3s\\) 电子能量。用 \\(E=-13.6(Z^*)^2/n^2\\ \\mathrm{eV}\\)，\\(n=3\\)。\n\n## 三、判断题\n\n1. Bohr 模型可以很好解释所有多电子原子的光谱。  \n2. 电子具有波粒二象性，因此不能用经典确定轨道描述。  \n3. \\(|\\varphi|^2\\) 表示电子在空间某点附近的概率密度。  \n4. \\(p\\) 亚层有 6 个轨道，最多容纳 6 个电子。  \n5. 同一原子轨道最多容纳两个自旋相反的电子。  \n6. 氢原子中 \\(3s,3p,3d\\) 轨道能量相同。  \n7. 同周期元素从左到右第一电离能总是严格递增，没有例外。  \n8. 催化剂会改变原子的电子排布原则。\n\n## 四、综合题\n\n1. 请用四个量子数解释为什么第 3 电子层最多可容纳 18 个电子，并列出第 3 层包含哪些亚层。\n\n2. 结合屏蔽效应、钻穿效应和电子排布原则，说明为什么多电子原子中轨道能级会发生分裂和交错，并解释电子排布为什么不能只机械照搬近似能级图。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. \\(h\\nu\\)。每个光量子的能量与频率成正比。\n\n2. B。氢原子 Bohr 能级为 \\(E_n=-13.6/n^2\\ \\mathrm{eV}\\)。\n\n3. \\(h/p=h/(mv)\\)。de Broglie 关系把粒子动量和波长联系起来。\n\n4. B。\\(n=3\\) 时 \\(l\\) 可取 0、1、2；\\(l=1\\) 时 \\(m\\) 可取 \\(-1,0,+1\\)，所以 B 合法。\n\n5. \\(s,p,d,f\\)。\\(l=0,1,2,3\\) 分别对应 \\(s,p,d,f\\) 亚层。\n\n6. C。\\(d\\) 亚层有 5 个轨道，每个轨道最多 2 个电子，共 10 个。\n\n7. 四。同一原子中没有四个量子数完全相同的电子。\n\n8. B。同周期从左到右有效核电荷一般增大，原子半径一般减小。\n\n## 二、公式计算题答案\n\n1. 解题思路：氢原子基态能量为 \\(-13.6\\ \\mathrm{eV}\\)，电离到 \\(n=\\infty\\) 时能量为 0。  \n   使用公式：\n   \\[\n   E_n=-\\frac{13.6}{n^2}\\ \\mathrm{eV}\n   \\]\n   已知量：\\(E_1=-13.6\\ \\mathrm{eV}\\)，\\(E_\\infty=0\\)。  \n   单个原子：\n   \\[\n   \\Delta E=0-(-13.6)=13.6\\ \\mathrm{eV}\n   \\]\n   单位换算：\n   \\[\n   13.6\\ \\mathrm{eV}=13.6\\times1.602\\times10^{-19}=2.18\\times10^{-18}\\ \\mathrm{J}\n   \\]\n   \\(1\\ \\mathrm{mol}\\)：\n   \\[\n   2.18\\times10^{-18}\\times6.02\\times10^{23}=1.31\\times10^6\\ \\mathrm{J\\cdot mol^{-1}}\n   \\]\n   \\[\n   =1310\\ \\mathrm{kJ\\cdot mol^{-1}}\n   \\]\n   最终答案：单个氢原子约 \\(2.18\\times10^{-18}\\ \\mathrm{J}\\)，\\(1\\ \\mathrm{mol}\\) 约 \\(1310\\ \\mathrm{kJ\\cdot mol^{-1}}\\)。  \n   易错提醒：能级是负值，电离能是吸收能量，取正值。\n\n2. 解题思路：先求两能级能量差，再用 \\(\\Delta E=hc/\\lambda\\)。  \n   使用公式：\n   \\[\n   E_n=-\\frac{13.6}{n^2}\\ \\mathrm{eV}\n   \\]\n   已知量：\\(n_i=3\\)，\\(n_f=2\\)。  \n   代入：\n   \\[\n   E_3=-\\frac{13.6}{9}=-1.51\\ \\mathrm{eV}\n   \\]\n   \\[\n   E_2=-\\frac{13.6}{4}=-3.40\\ \\mathrm{eV}\n   \\]\n   \\[\n   \\Delta E=|-3.40-(-1.51)|=1.89\\ \\mathrm{eV}\n   \\]\n   \\[\n   \\lambda=\\frac{1240}{1.89}=656\\ \\mathrm{nm}\n   \\]\n   最终答案：\\(\\lambda\\approx656\\ \\mathrm{nm}\\)，对应 Balmer 红线。  \n   易错提醒：发射光子能量取能级差的绝对值。\n\n3. 解题思路：直接用 de Broglie 关系。  \n   使用公式：\n   \\[\n   \\lambda=\\frac{h}{mv}\n   \\]\n   已知量：\\(h=6.626\\times10^{-34}\\ \\mathrm{J\\cdot s}\\)，\\(m=9.11\\times10^{-31}\\ \\mathrm{kg}\\)，\\(v=5.9\\times10^5\\ \\mathrm{m\\cdot s^{-1}}\\)。  \n   代入：\n   \\[\n   \\lambda=\\frac{6.626\\times10^{-34}}{(9.11\\times10^{-31})(5.9\\times10^5)}\n   =1.23\\times10^{-9}\\ \\mathrm{m}\n   \\]\n   最终答案：\\(\\lambda\\approx1.2\\times10^{-9}\\ \\mathrm{m}=12\\ \\mathrm{\\AA}\\)。  \n   易错提醒：\\(\\mathrm{J\\cdot s}= \\mathrm{kg\\cdot m^2\\cdot s^{-1}}\\)，单位可约成 m。\n\n4. 解题思路：由 \\(n,l,m\\) 判断亚层和轨道取向。  \n   \\(\\varphi(3,2,1)\\) 中 \\(n=3\\)，\\(l=2\\)，所以属于 \\(3d\\) 亚层；\\(m=1\\) 是 \\(d\\) 亚层 5 个取向中的一个。  \n   \\(d\\) 亚层轨道数：\n   \\[\n   2l+1=2\\times2+1=5\n   \\]\n   最多电子数：\n   \\[\n   5\\times2=10\n   \\]\n   最终答案：\\(3d\\) 亚层中的一个轨道；该亚层有 5 个轨道，最多容纳 10 个电子。  \n   易错提醒：\\(l=2\\) 对应 \\(d\\)，不是 \\(p\\)。\n\n5. 解题思路：用有效核电荷近似能量公式。  \n   使用公式：\n   \\[\n   E=-13.6\\frac{(Z^*)^2}{n^2}\\ \\mathrm{eV}\n   \\]\n   已知量：\\(Z^*=2.20\\)，\\(n=3\\)。  \n   代入：\n   \\[\n   E=-13.6\\frac{(2.20)^2}{3^2}\n   =-13.6\\times\\frac{4.84}{9}\n   =-7.3\\ \\mathrm{eV}\n   \\]\n   最终答案：\\(E\\approx-7.3\\ \\mathrm{eV}\\)。  \n   易错提醒：能量为负表示电子处于束缚态。\n\n## 三、判断题答案\n\n1. 错误。Bohr 模型主要适用于氢原子和类氢离子，不能解释多电子原子光谱。\n\n2. 正确。电子具有波动性和测不准关系，不能用经典确定轨道描述。\n\n3. 正确。\\(|\\varphi|^2\\) 是电子概率密度的物理意义。\n\n4. 错误。\\(p\\) 亚层有 3 个轨道，最多容纳 6 个电子。\n\n5. 正确。这是 Pauli 不相容原理的常见表述。\n\n6. 正确。氢原子能量只由 \\(n\\) 决定，因此 \\(3s,3p,3d\\) 简并。\n\n7. 错误。同周期第一电离能总体增大，但 Be、N、Mg、P 等有稳定构型导致异常。\n\n8. 错误。催化剂影响化学反应速率，不改变原子核外电子排布基本原则。\n\n## 四、综合题答案\n\n1. 解析：  \n   第 3 电子层 \\(n=3\\)，角量子数可取：\n   \\[\n   l=0,1,2\n   \\]\n   分别对应 \\(3s,3p,3d\\) 亚层。  \n   当 \\(l=0\\) 时，\\(m=0\\)，有 1 个 \\(3s\\) 轨道，可容纳 2 个电子。  \n   当 \\(l=1\\) 时，\\(m=-1,0,+1\\)，有 3 个 \\(3p\\) 轨道，可容纳 6 个电子。  \n   当 \\(l=2\\) 时，\\(m=-2,-1,0,+1,+2\\)，有 5 个 \\(3d\\) 轨道，可容纳 10 个电子。  \n   总轨道数：\n   \\[\n   1+3+5=9=n^2\n   \\]\n   总电子数：\n   \\[\n   9\\times2=18=2n^2\n   \\]\n   所以第 3 层最多容纳 18 个电子。\n\n2. 解析：  \n   氢原子只有一个电子，不存在电子间排斥，因此同一 \\(n\\) 下不同 \\(l\\) 的轨道能量相同。多电子原子中，一个电子既受原子核吸引，又受其他电子排斥。其他电子会屏蔽部分核电荷，使该电子感受到的有效核电荷 \\(Z^*=Z-\\sigma\\) 降低，这就是屏蔽效应。  \n   同时，不同轨道的电子云径向分布不同，钻入内层、靠近原子核的能力不同。一般 \\(s\\) 电子钻穿能力强，受到屏蔽较小，能量较低；\\(p,d,f\\) 依次钻穿能力减弱，因此同一 \\(n\\) 层发生能级分裂。随着原子序数增加，屏蔽和钻穿的综合作用还会造成能级交错，如 \\(4s\\) 与 \\(3d\\)。  \n   电子排布要满足 Pauli 不相容原理、最低能量原理和 Hund 规则，并且实际基态构型以光谱实验事实为准。过渡元素常有半充满、全充满或其他稳定性导致的例外，因此不能只机械照搬近似能级图。\n",
    "chemistry_quiz/10-quiz.md":  "# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：离子键的本质是正、负离子之间的 ______，其特点是没有 ______ 和 ______。\n\n2. 选择：下列说法正确的是  \n   A. NaCl 表示一个独立的 NaCl 分子  \n   B. 离子键具有严格方向性  \n   C. NaCl 表示晶体中 \\(Na^+\\) 与 \\(Cl^-\\) 的比例为 \\(1:1\\)  \n   D. 离子晶体中配位数只由电荷数决定\n\n3. 填空：Lewis 结构中，通常用小黑点表示 ______，用短线表示 ______。\n\n4. 选择：下列关于 \\(\\sigma\\) 键和 \\(\\pi\\) 键的说法错误的是  \n   A. \\(\\sigma\\) 键通常由轨道沿键轴头碰头重叠形成  \n   B. \\(\\pi\\) 键通常由轨道肩并肩平行重叠形成  \n   C. 单键通常含一个 \\(\\sigma\\) 键  \n   D. 双键通常含两个 \\(\\sigma\\) 键\n\n5. 填空：VSEPR 中孤对电子和成键电子对的排斥强度顺序为 ______。\n\n6. 选择：\\(NH_3\\) 的中心原子周围有 4 对价层电子，其中 1 对为孤对电子，因此其分子构型为  \n   A. 正四面体  \n   B. 平面三角形  \n   C. 三角锥形  \n   D. 直线形\n\n7. 填空：分子偶极矩公式为 \\(\\mu=______\\)，\\(1\\ \\mathrm{D}=______\\ \\mathrm{C\\cdot m}\\)。\n\n8. 选择：下列分子中，含极性键但整体为非极性分子的是  \n   A. \\(HCl\\)  \n   B. \\(H_2O\\)  \n   C. \\(CO_2\\)  \n   D. \\(NH_3\\)\n\n## 二、公式计算题\n\n1. 已知某离子晶体中相邻正、负离子核间距 \\(r_0=282\\ \\mathrm{pm}\\)，若 \\(r_-=181\\ \\mathrm{pm}\\)，求 \\(r_+\\)。\n\n2. 按 Lande 模型，某晶体中 \\(r_0=260\\ \\mathrm{pm}\\)，且满足正负离子接触、负负离子也接触。求 \\(r_-\\) 和 \\(r_+\\)。\n\n3. 预测某 AB 型离子晶体结构：已知 \\(r_+=95\\ \\mathrm{pm}\\)，\\(r_-=181\\ \\mathrm{pm}\\)，求 \\(r_+/r_-\\)，并判断更可能属于 CsCl 型、NaCl 型还是 ZnS 型。\n\n4. 用 VSEPR 判断 \\(XeF_4\\) 的分子构型。已知 Xe 价电子数为 8，每个 F 提供 1 个电子。\n\n5. 某极性分子的偶极电荷量 \\(q=1.60\\times10^{-20}\\ \\mathrm{C}\\)，偶极长 \\(d=1.20\\times10^{-10}\\ \\mathrm{m}\\)。求偶极矩 \\(\\mu\\)，并换算为 Debye。已知 \\(1\\ \\mathrm{D}=3.336\\times10^{-30}\\ \\mathrm{C\\cdot m}\\)。\n\n## 三、判断题\n\n1. 离子键没有方向性和饱和性，因此离子晶体中异号离子的配位数主要受空间和半径比限制。\n\n2. 同一元素不同价态的正离子，电荷越高半径越大。\n\n3. Lewis 八隅体规则可以严格解释所有主族元素化合物。\n\n4. 价键理论认为共价键形成的关键包括轨道重叠、自旋相反电子配对和体系能量降低。\n\n5. 在 VSEPR 中，\\(H_2O\\) 的电子对几何构型和分子构型都叫正四面体。\n\n6. \\(CO_2\\) 含极性键，但因线形对称，键偶极抵消，所以分子偶极矩为 0。\n\n7. 氢键的强度一般弱于化学键，但强于普通范德华力，并具有方向性和饱和性。\n\n8. 离子极化越强，离子键的共价成分通常越小。\n\n## 四、综合题\n\n1. 结合价键理论、杂化轨道理论和 VSEPR，说明为什么 \\(CH_4\\)、\\(NH_3\\)、\\(H_2O\\) 中心原子周围都可看作 4 对电子，但分子构型和键角不同。\n\n2. 结合半径比规则和离子极化，解释为什么 AB 型离子晶体可出现 CsCl 型、NaCl 型、ZnS 型等不同结构，并说明 \\(AgF\\rightarrow AgI\\) 为什么会出现键型和晶型变化。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 静电吸引；方向性；饱和性。离子键本质是库仑静电作用，所以只要空间许可，一个离子可吸引多个异号离子。\n\n2. C。NaCl 表示晶体中 \\(Na^+\\) 与 \\(Cl^-\\) 的比例，不表示独立分子；离子键没有方向性，配位数不只由电荷数决定。\n\n3. 价电子；共享电子对。Lewis 结构用点表示价电子，用短线表示成键电子对。\n\n4. D。双键通常由一个 \\(\\sigma\\) 键和一个 \\(\\pi\\) 键组成，不是两个 \\(\\sigma\\) 键。\n\n5. \\(lp-lp \u003e lp-bp \u003e bp-bp\\)。孤对电子只受一个原子核束缚，电子云更分散，对邻近电子对排斥更强。\n\n6. C。\\(NH_3\\) 电子对几何构型为四面体，但分子构型不包括孤对电子，所以为三角锥形。\n\n7. \\(q\\cdot d\\)；\\(3.336\\times10^{-30}\\)。偶极矩等于偶极电荷量与偶极长乘积。\n\n8. C。\\(CO_2\\) 的 \\(C=O\\) 键有极性，但分子为线形对称，键偶极抵消。\n\n## 二、公式计算题答案\n\n1. 解题思路：正负离子接触时 \\(r_0=r_+ + r_-\\)。  \n   详细步骤：\n   \\[\n   r_+=r_0-r_-=282-181=101\\ \\mathrm{pm}\n   \\]\n   最终答案：\\(r_+=101\\ \\mathrm{pm}\\)。  \n   易错提醒：\\(r_0\\) 是核间距，不是正离子半径。\n\n2. 解题思路：Lande 模型中 \\(r_-=r_0/\\sqrt{2}\\)，再用 \\(r_+=r_0-r_-\\)。  \n   详细步骤：\n   \\[\n   r_-=\\frac{260}{\\sqrt{2}}=184\\ \\mathrm{pm}\n   \\]\n   \\[\n   r_+=260-184=76\\ \\mathrm{pm}\n   \\]\n   最终答案：\\(r_-\\approx184\\ \\mathrm{pm}\\)，\\(r_+\\approx76\\ \\mathrm{pm}\\)。  \n   易错提醒：是除以 \\(\\sqrt{2}\\)，不是除以 2。\n\n3. 解题思路：先算半径比，再与 AB 型离子晶体半径比范围比较。  \n   详细步骤：\n   \\[\n   \\frac{r_+}{r_-}=\\frac{95}{181}=0.525\n   \\]\n   \\(0.414\u003c0.525\u003c0.732\\)，对应 NaCl 型，配位数 \\(6:6\\)。  \n   最终答案：\\(r_+/r_-=0.525\\)，更可能为 NaCl 型。  \n   易错提醒：半径比规则是近似规则，离子极化可能造成例外。\n\n4. 解题思路：计算中心原子价层电子对总数和孤对数。  \n   详细步骤：\n   \\[\n   \\text{价层电子对数}=\\frac{8+4\\times1}{2}=6\n   \\]\n   其中 4 对为 Xe-F 成键电子对，孤对数为 \\(6-4=2\\)。6 对电子的理想电子对几何构型为正八面体，两对孤对电子取相对位置以减少排斥，分子构型为平面正方形。  \n   最终答案：\\(XeF_4\\) 为平面正方形。  \n   易错提醒：电子对几何构型是正八面体，分子构型才是平面正方形。\n\n5. 解题思路：先用 \\(\\mu=q d\\) 求 SI 单位，再除以 \\(1\\ \\mathrm{D}\\)。  \n   详细步骤：\n   \\[\n   \\mu=(1.60\\times10^{-20})(1.20\\times10^{-10})\n   =1.92\\times10^{-30}\\ \\mathrm{C\\cdot m}\n   \\]\n   \\[\n   \\mu=\\frac{1.92\\times10^{-30}}{3.336\\times10^{-30}}=0.576\\ \\mathrm{D}\n   \\]\n   最终答案：\\(\\mu=1.92\\times10^{-30}\\ \\mathrm{C\\cdot m}\\approx0.576\\ \\mathrm{D}\\)。  \n   易错提醒：键长不一定等于偶极长；本题已直接给出 \\(d\\)。\n\n## 三、判断题答案\n\n1. 正确。离子键是静电作用，不限定固定方向和固定成键数，配位数主要受半径比与堆积空间限制。\n\n2. 错误。同一元素不同价态正离子，电荷越高，对电子吸引越强，半径越小；如 \\(Fe^{3+}\u003cFe^{2+}\\)。\n\n3. 错误。八隅体规则有许多例外，如 \\(PCl_5\\)、\\(SF_6\\)、\\(BeF_2\\)、\\(BF_3\\)、\\(NO\\)、\\(NO_2\\)。\n\n4. 正确。这正是价键理论对共价键本质的描述。\n\n5. 错误。\\(H_2O\\) 中 O 周围电子对几何构型为四面体，但分子构型为角形。\n\n6. 正确。\\(CO_2\\) 为线形，两个 \\(C=O\\) 键偶极大小相等、方向相反，合偶极矩为 0。\n\n7. 正确。氢键通常 \\(10\\sim40\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，比普通范德华力强，但弱于化学键，并且具有方向性、饱和性。\n\n8. 错误。离子极化越强，正负离子间电子云越偏向核间区域，共价成分通常增加。\n\n## 四、综合题答案\n\n1. 解析：价键理论认为共价键由轨道重叠和自旋相反电子配对形成。对 \\(CH_4\\) 来说，C 原子形成 4 个等性 \\(sp^3\\) 杂化轨道，与 4 个 H 成键，中心原子周围 4 对成键电子对互相排斥，按 VSEPR 采取四面体构型，键角约 \\(109.5^\\circ\\)。\\(NH_3\\) 中 N 周围也可看作 \\(sp^3\\) 电子对分布，但其中 1 对为孤对电子，分子构型不画孤对，所以为三角锥形；由于 \\(lp-bp\\) 排斥强于 \\(bp-bp\\)，\\(H-N-H\\) 键角压缩到约 \\(107.3^\\circ\\)。\\(H_2O\\) 中 O 周围有 2 对成键电子对和 2 对孤对电子，电子对几何构型仍近似四面体，但分子构型为角形；两个孤对电子排斥更强，使 \\(H-O-H\\) 键角进一步减小到约 \\(104.5^\\circ\\)。因此三者“电子对总数相同”，但孤对电子数不同，导致实际分子构型和键角不同。\n\n2. 解析：AB 型离子晶体中，离子键没有方向性和饱和性，稳定结构倾向于让正、负离子尽可能接触并提高配位数，但这受到 \\(r_+/r_-\\) 的限制。若 \\(r_+/r_-\u003e0.732\\)，正离子较大，可稳定占据立方体空隙，常见 CsCl 型，配位数 \\(8:8\\)；若 \\(0.414\\le r_+/r_-\\le0.732\\)，适合八面体空隙，常见 NaCl 型，配位数 \\(6:6\\)；若 \\(0.225\\le r_+/r_-\u003c0.414\\)，正离子较小，常见 ZnS 型，配位数 \\(4:4\\)。但半径比规则是硬球近似，离子极化会改变键型和结构。\\(Ag^+\\) 为 \\(d^{10}\\) 构型，极化能力和变形性都较强；从 \\(AgF\\) 到 \\(AgI\\)，卤离子半径和变形性增大，正负离子间极化增强，键的共价成分增加，实际核间距越来越短于离子半径和，并可使晶体由 NaCl 型向 ZnS 型转变。\n",
    "chemistry_quiz/13-quiz.md":  "# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：构造异构是由于化合物具有不同的 ______ 而产生的同分异构现象。\n\n2. 选择：下列说法正确的是  \n   A. 季碳上可以连一个季氢  \n   B. 只含一个手性碳原子的分子一定是手性分子  \n   C. 顺反异构属于对映异构  \n   D. 重叠构象通常比交叉构象能量低\n\n3. 填空：\\(S_N2\\) 反应中亲核体从离去基团的 ______ 进攻，产物构型发生 ______。\n\n4. 选择：极性非质子性溶剂通常更有利于  \n   A. \\(S_N2\\)  \n   B. \\(S_N1\\)  \n   C. 形成外消旋体  \n   D. 碳正离子长期稳定存在\n\n5. 填空：烯烃与氢卤酸加成时，按马氏规则，H 原子通常加到含氢较 ______ 的双键碳上。\n\n6. 选择：下列关于缩聚反应的说法正确的是  \n   A. 一定没有小分子副产物  \n   B. 链节组成总与单体完全相同  \n   C. 通常是逐步聚合反应  \n   D. 典型产物一定是碳链聚合物\n\n7. 填空：高分子分子量分布指数公式为 \\(D=______\\)，\\(D\\) 越接近 1，分子量分布越 ______。\n\n8. 选择：非晶态高分子在 \\(T_g\\) 以下通常处于  \n   A. 玻璃态  \n   B. 高弹态  \n   C. 粘流态  \n   D. 熔融晶态\n\n## 二、公式计算题\n\n1. 某开链单烯烃含 6 个碳原子，求其分子式。\n\n2. 某汽油抗爆性相当于 92 mL 异辛烷与 8 mL 正庚烷组成的标准混合物，求其辛烷值。\n\n3. 乙烷完全重叠构象中有 3 对 \\(C-H\\) 重叠相互作用，每对约贡献 \\(4\\ \\mathrm{kJ\\cdot mol^{-1}}\\) 扭转能。估算该构象相对交叉构象升高的能量。\n\n4. 某聚氯乙烯样品平均分子量为 \\(1.25\\times10^5\\ \\mathrm{g\\cdot mol^{-1}}\\)，链节相对分子质量为 62.5，求平均聚合度。\n\n5. 某聚合物样品中，分子量 \\(1.0\\times10^4\\) 的分子有 2 mol，分子量 \\(1.0\\times10^5\\) 的分子有 5 mol，分子量 \\(1.0\\times10^6\\) 的分子有 3 mol。求 \\(M_n\\)、\\(M_w\\) 和 \\(D\\)。\n\n## 三、判断题\n\n1. 构象异构通常由单键旋转产生，不需要改变原子的连接顺序。\n\n2. 分子有一个手性碳时一定不具有旋光性。\n\n3. 芳香化合物通常易进行亲电取代反应，不易进行加成反应和氧化反应。\n\n4. \\(S_N1\\) 反应的决速步骤是亲核体和底物同时发生碰撞并形成过渡态。\n\n5. 位阻越大，\\(S_N2\\) 反应通常越慢。\n\n6. 加聚反应通常无小分子副产物，所得聚合物链节与单体具有完全一致的化学成分与结构。\n\n7. 自由基聚合可概括为慢引发、快增长、速终止。\n\n8. 线型高分子一般可溶可熔，深度交联体型高分子通常不溶不熔。\n\n## 四、综合题\n\n1. 从底物结构、碳正离子稳定性、位阻和溶剂角度，比较 \\(S_N1\\) 与 \\(S_N2\\) 的机理差异，并说明它们的立体化学结果为什么不同。\n\n2. 比较缩聚反应和加聚反应，并结合高分子链结构说明为什么线型聚合物通常具有热塑性，而深度交联的体型聚合物具有热固性。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 原子连接顺序。构造异构也叫结构异构，关键是键连方式不同。\n\n2. B。季碳连 4 个碳，没有季氢；顺反异构属于非对映异构；交叉构象通常能量低于重叠构象。\n\n3. 背面；翻转。\\(S_N2\\) 背面进攻导致 Walden 反转。\n\n4. A。极性非质子性溶剂不容易紧密包裹亲核体，有利于 \\(S_N2\\)。\n\n5. 多。马氏规则常用口诀是“氢多加氢”，即 H 加到原来 H 较多的双键碳上。\n\n6. C。缩聚反应通常伴随小分子副产物生成，是典型逐步聚合反应，所得聚合物多为杂链聚合物。\n\n7. \\(M_w/M_n\\)；窄。\\(D\\ge1\\)，越接近 1 说明分子量越均一。\n\n8. A。非晶态高分子在 \\(T_g\\) 以下链段运动受限，表现为硬而脆的玻璃态。\n\n## 二、公式计算题答案\n\n1. 解题思路：开链单烯烃通式为 \\(C_nH_{2n}\\)。  \n   详细步骤：\n   \\[\n   n=6,\\quad H=2n=12\n   \\]\n   最终答案：\\(C_6H_{12}\\)。  \n   易错提醒：若是开链烷烃才用 \\(C_nH_{2n+2}\\)。\n\n2. 解题思路：辛烷值等于异辛烷体积分数乘以 100。  \n   详细步骤：\n   \\[\n   \\text{辛烷值}=\\frac{92}{92+8}\\times100=92\n   \\]\n   最终答案：辛烷值为 92。  \n   易错提醒：正庚烷辛烷值为 0，不是把两者体积直接相加后再乘别的系数。\n\n3. 解题思路：总扭转能为各重叠相互作用贡献之和。  \n   详细步骤：\n   \\[\n   E=3\\times4=12\\ \\mathrm{kJ\\cdot mol^{-1}}\n   \\]\n   最终答案：约 \\(12\\ \\mathrm{kJ\\cdot mol^{-1}}\\)。  \n   易错提醒：重叠构象能量高，交叉构象能量低。\n\n4. 解题思路：使用 \\(n=M/M_0\\)。  \n   详细步骤：\n   \\[\n   n=\\frac{1.25\\times10^5}{62.5}=2000\n   \\]\n   最终答案：平均聚合度 \\(n=2000\\)。  \n   易错提醒：单位保持一致；这里 \\(M\\) 和 \\(M_0\\) 都按 \\(\\mathrm{g\\cdot mol^{-1}}\\) 理解。\n\n5. 解题思路：先按分子数求 \\(M_n\\)，再按质量权重求 \\(M_w\\)，最后求 \\(D\\)。  \n   详细步骤：\n   \\[\n   M_n=\\frac{2(10^4)+5(10^5)+3(10^6)}{2+5+3}\n   =\\frac{3.52\\times10^6}{10}=3.52\\times10^5\n   \\]\n   \\[\n   M_w=\\frac{2(10^4)^2+5(10^5)^2+3(10^6)^2}{2(10^4)+5(10^5)+3(10^6)}\n   \\]\n   \\[\n   M_w=\\frac{3.0502\\times10^{12}}{3.52\\times10^6}=8.67\\times10^5\n   \\]\n   \\[\n   D=\\frac{M_w}{M_n}=\\frac{8.67\\times10^5}{3.52\\times10^5}=2.46\n   \\]\n   最终答案：\\(M_n=3.52\\times10^5\\ \\mathrm{g\\cdot mol^{-1}}\\)，\\(M_w\\approx8.67\\times10^5\\ \\mathrm{g\\cdot mol^{-1}}\\)，\\(D\\approx2.46\\)。  \n   易错提醒：\\(M_w\\) 不是简单平均，要用 \\(N_iM_i^2\\) 作分子。\n\n## 三、判断题答案\n\n1. 正确。构象异构来自单键旋转，原子连接顺序不变。\n\n2. 错误。材料强调只含一个手性碳原子的分子一定是手性分子，通常具有旋光性。\n\n3. 正确。芳香性体系稳定，典型反应倾向为亲电取代而不是加成。\n\n4. 错误。这是 \\(S_N2\\) 的特点；\\(S_N1\\) 的决速步骤是离去基团先离去形成碳正离子。\n\n5. 正确。位阻越大，亲核体背面进攻越困难，\\(S_N2\\) 反应速率越慢。\n\n6. 正确。加聚通常是双键或三键打开后链式聚合，无小分子副产物，链节组成与单体一致。\n\n7. 正确。自由基聚合包括链引发、链增长、链终止，机理特征为慢引发、快增长、速终止。\n\n8. 正确。线型高分子链可相对运动，常可溶可熔；深度交联体型高分子形成网状结构，通常不溶不熔。\n\n## 四、综合题答案\n\n1. 解析：\\(S_N2\\) 是双分子亲核取代，决速步骤中亲核体和底物同时参与。亲核体从离去基团背面进攻，成键和断键同时发生，因此手性中心发生构型翻转。小位阻底物、强亲核体、极性非质子性溶剂有利于 \\(S_N2\\)。\\(S_N1\\) 是单分子亲核取代，第一步离去基团先离去形成碳正离子，这是慢步骤。碳正离子为平面 \\(sp^2\\) 结构，亲核体可以从平面两侧进攻，因此常得到两个对映体近似 \\(1:1\\) 的外消旋产物。能形成稳定碳正离子的底物、极性质子性溶剂有利于 \\(S_N1\\)。所以，二者最核心差异是：\\(S_N2\\) 一步协同、背面进攻、构型翻转；\\(S_N1\\) 分步进行、碳正离子中间体、常外消旋。\n\n2. 解析：缩聚反应通常由含两个或两个以上官能团的单体逐步反应形成聚合物，并放出水、醇、胺等小分子副产物。其链节组成通常与单体不完全相同，常形成杂链聚合物；分子量在高转化率时才显著增大。加聚反应则多由含 \\(C=C\\) 或 \\(C\\equiv C\\) 的单体通过 \\(\\pi\\) 键断裂加成聚合，无小分子副产物，链节组成通常与单体一致，常为连锁聚合。高分子性能还取决于链结构：线型或支链型高分子分子链之间没有永久化学交联，受热时链段和分子链可运动，通常可溶可熔，表现热塑性；深度交联体型高分子由化学键连接成三维网状结构，分子链不能自由滑移，受热不熔而分解，通常不溶不熔，表现热固性。\n",
    "chemistry_example/01_markdown.md":  "# 例题\n\n## Section 1 *气体*\n\n### E1\n某气体在 $293\\ \\mathrm{K}$ 和 $9.97\\times10^4\\ \\mathrm{Pa}$ 时占有体积\n$0.19\\ \\mathrm{dm^3}$，质量为 $0.132\\ \\mathrm{g}$。试求该气体的摩尔质量，并指出它可能是何种气体。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n由理想气体状态方程：\n\n$$\nn=\\frac{pV}{RT}\n=\\frac{(9.97\\times10^4\\ \\mathrm{Pa})(0.19\\times10^{-3}\\ \\mathrm{m^3})}\n{(8.314\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}})(293\\ \\mathrm{K})}\n=7.78\\times10^{-3}\\ \\mathrm{mol}\n$$\n\n$$\nM=\\frac{m}{n}\n=\\frac{0.132\\ \\mathrm{g}}{7.78\\times10^{-3}\\ \\mathrm{mol}}\n=17.0\\ \\mathrm{g\\cdot mol^{-1}}\n$$\n\n该气体可能为 $\\mathrm{NH_3}$。\n\n\u003c/details\u003e\n\n### E2\n在 $25.0^\\circ\\mathrm{C}$、$748\\ \\mathrm{mmHg}$ 下，要产生\n$75.0\\ \\mathrm{L}$ 的 $\\mathrm{N_2}$，计算需要叠氮化钠的质量。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n反应方程式：\n\n$$\n2\\mathrm{NaN_3(s)}\\rightarrow 2\\mathrm{Na(s)}+3\\mathrm{N_2(g)}\n$$\n\n$$\nn(\\mathrm{N_2})=\\frac{pV}{RT}\n=\\frac{(748/760\\ \\mathrm{atm})(75.0\\ \\mathrm{L})}\n{(0.08206\\ \\mathrm{L\\cdot atm\\cdot mol^{-1}\\cdot K^{-1}})(298.15\\ \\mathrm{K})}\n=3.02\\ \\mathrm{mol}\n$$\n\n$$\nn(\\mathrm{NaN_3})=\\frac{2}{3}n(\\mathrm{N_2})=2.01\\ \\mathrm{mol}\n$$\n\n$$\nm(\\mathrm{NaN_3})=2.01\\ \\mathrm{mol}\\times65.0\\ \\mathrm{g\\cdot mol^{-1}}\n=1.31\\times10^2\\ \\mathrm{g}\n$$\n\n需要 $\\mathrm{NaN_3}$ 约 $131\\ \\mathrm{g}$。\n\n\u003c/details\u003e\n\n### E3\n$\\mathrm{A}$、$\\mathrm{B}$ 两种气体在一定温度下，在同一容器中混合。混合后，下面表达式是否正确？\n\n1. $p_A V_A=n_A RT$\n2. $p_{\\text{总}}V=n_A RT$\n3. $p_{\\text{总}}V_A=n_A RT$\n4. $p_A V=n_A RT$\n5. $p_A(V_A+V_B)=n_A RT$\n6. $(p_A+p_B)V_A=n_A RT$\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n对理想气体混合物：\n\n$$\np_A V=n_A RT,\\qquad p_{\\text{总}}V_A=n_A RT\n$$\n\n若 $V_A$、$V_B$ 为分体积，则 $V=V_A+V_B$，且\n$p_{\\text{总}}=p_A+p_B$。\n\n因此：\n\n1. 不正确\n2. 不正确\n3. 正确\n4. 正确\n5. 正确\n6. 正确\n\n\u003c/details\u003e\n\n### E4\n在深海潜水时，如以氧气 $2\\%$、氮气 $8\\%$、氦气 $90\\%$ 的混合气体在\n$90\\ \\mathrm{m}$ 的深度呼吸时，总压为 $10\\ \\mathrm{atm}$，求各气体的分压。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n由道尔顿分压定律：\n\n$$\np_i=x_i p_{\\text{总}}\n$$\n\n$$\np(\\mathrm{O_2})=0.02\\times10\\ \\mathrm{atm}=0.20\\ \\mathrm{atm}\n$$\n\n$$\np(\\mathrm{N_2})=0.08\\times10\\ \\mathrm{atm}=0.80\\ \\mathrm{atm}\n$$\n\n$$\np(\\mathrm{He})=0.90\\times10\\ \\mathrm{atm}=9.0\\ \\mathrm{atm}\n$$\n\n\u003c/details\u003e\n",
    "chemistry_example/02_markdown.md":  "# 例题\n\n## Section 1 *浓度*\n\n### E1\n$10.0\\ \\mathrm{g}$ $\\mathrm{NaCl}$ 溶于 $100.0\\ \\mathrm{g}$ 水中，求溶质的质量分数。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n$$\n\\omega(\\mathrm{NaCl})\n=\\frac{10.0\\ \\mathrm{g}}{10.0\\ \\mathrm{g}+100.0\\ \\mathrm{g}}\\times100\\%\n=9.1\\%\n$$\n\n\u003c/details\u003e\n\n### E2\n$10.0\\ \\mathrm{g}$ $\\mathrm{NaCl}$ 溶于 $100.0\\ \\mathrm{g}$ 水中，求 $\\mathrm{NaCl}$ 和\n$\\mathrm{H_2O}$ 的摩尔分数。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n$$\nn(\\mathrm{NaCl})=\\frac{10.0\\ \\mathrm{g}}{58.4\\ \\mathrm{g\\cdot mol^{-1}}}\n=0.171\\ \\mathrm{mol}\n$$\n\n$$\nn(\\mathrm{H_2O})=\\frac{100.0\\ \\mathrm{g}}{18.0\\ \\mathrm{g\\cdot mol^{-1}}}\n=5.56\\ \\mathrm{mol}\n$$\n\n$$\nx(\\mathrm{NaCl})\n=\\frac{0.171}{0.171+5.56}\n=0.0298=2.98\\%\n$$\n\n$$\nx(\\mathrm{H_2O})\n=\\frac{5.56}{0.171+5.56}\n=0.970=97.0\\%\n$$\n\n\u003c/details\u003e\n\n### E3\n$10.0\\ \\mathrm{g}$ $\\mathrm{NaCl}$ 溶于 $100.0\\ \\mathrm{g}$ 水中，求质量摩尔浓度。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n$$\nn(\\mathrm{NaCl})=\\frac{10.0\\ \\mathrm{g}}{58.4\\ \\mathrm{g\\cdot mol^{-1}}}\n=0.171\\ \\mathrm{mol}\n$$\n\n$$\nm(\\mathrm{NaCl})\n=\\frac{0.171\\ \\mathrm{mol}}{100.0\\times10^{-3}\\ \\mathrm{kg}}\n=1.71\\ \\mathrm{mol\\cdot kg^{-1}}\n$$\n\n\u003c/details\u003e\n\n### E4\n$10.0\\ \\mathrm{mL}$ $\\mathrm{C_2H_5OH}$ 溶于 $100.0\\ \\mathrm{mL}$ 水中，求乙醇的体积分数。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n$$\n\\varphi(\\mathrm{C_2H_5OH})\n=\\frac{10.0\\ \\mathrm{mL}}{10.0\\ \\mathrm{mL}+100.0\\ \\mathrm{mL}}\n=0.091=9.1\\%\n$$\n\n\u003c/details\u003e\n\n### E5\n$10.0\\ \\mathrm{g}$ $\\mathrm{NaCl}$ 溶于 $100.0\\ \\mathrm{g}$ 水中，求 $\\mathrm{NaCl}$ 的物质的量。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n$$\nn(\\mathrm{NaCl})\n=\\frac{10.0\\ \\mathrm{g}}{58.4\\ \\mathrm{g\\cdot mol^{-1}}}\n=0.171\\ \\mathrm{mol}\n$$\n\n\u003c/details\u003e\n\n## Section 2 *依数性*\n\n### E6\n已知 $20.0^\\circ\\mathrm{C}$ 时水的饱和蒸气压为 $2.34\\ \\mathrm{kPa}$。将\n$17.1\\ \\mathrm{g}$ 蔗糖 $(M_w=342)$ 与 $3.00\\ \\mathrm{g}$ 尿素 $(M_w=60.0)$\n分别溶于 $100\\ \\mathrm{g}$ 水中，计算这两种溶液的蒸气压。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n两种溶质的物质的量均为：\n\n$$\nn=\\frac{17.1\\ \\mathrm{g}}{342\\ \\mathrm{g\\cdot mol^{-1}}}\n=\\frac{3.00\\ \\mathrm{g}}{60.0\\ \\mathrm{g\\cdot mol^{-1}}}\n=0.0500\\ \\mathrm{mol}\n$$\n\n$$\nn(\\mathrm{H_2O})=\\frac{100\\ \\mathrm{g}}{18.0\\ \\mathrm{g\\cdot mol^{-1}}}\n=5.56\\ \\mathrm{mol}\n$$\n\n$$\nx(\\mathrm{H_2O})=\\frac{5.56}{5.56+0.0500}=0.991\n$$\n\n$$\np=x(\\mathrm{H_2O})p^\\ast=0.991\\times2.34\\ \\mathrm{kPa}\n=2.32\\ \\mathrm{kPa}\n$$\n\n两种溶液的蒸气压均约为 $2.32\\ \\mathrm{kPa}$。\n\n\u003c/details\u003e\n\n### E7\n已知 $20.0^\\circ\\mathrm{C}$ 时苯的蒸气压为 $9.99\\ \\mathrm{kPa}$。现称取\n$1.07\\ \\mathrm{g}$ 苯甲酸乙酯溶于 $10.0\\ \\mathrm{g}$ 苯中，测得溶液蒸气压为\n$9.49\\ \\mathrm{kPa}$，试求苯甲酸乙酯的摩尔质量。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n$$\nx(\\text{苯})=\\frac{p}{p^\\ast}\n=\\frac{9.49}{9.99}=0.950\n$$\n\n$$\nn(\\text{苯})=\\frac{10.0\\ \\mathrm{g}}{78.1\\ \\mathrm{g\\cdot mol^{-1}}}\n=0.128\\ \\mathrm{mol}\n$$\n\n由\n\n$$\nx(\\text{苯})=\\frac{n(\\text{苯})}{n(\\text{苯})+n(\\text{溶质})}\n$$\n\n可得：\n\n$$\nn(\\text{溶质})\n=n(\\text{苯})\\left(\\frac{1}{x(\\text{苯})}-1\\right)\n=6.76\\times10^{-3}\\ \\mathrm{mol}\n$$\n\n$$\nM=\\frac{1.07\\ \\mathrm{g}}{6.76\\times10^{-3}\\ \\mathrm{mol}}\n=1.58\\times10^2\\ \\mathrm{g\\cdot mol^{-1}}\n$$\n\n\u003c/details\u003e\n\n### E8\n烟草中有害成分尼古丁的最简化学式为 $\\mathrm{C_5H_7N}$。今将\n$496\\ \\mathrm{mg}$ 尼古丁溶于 $10.0\\ \\mathrm{g}$ 水，所得溶液在\n$101\\ \\mathrm{kPa}$ 下的沸点是 $100.17^\\circ\\mathrm{C}$。求尼古丁的分子式。\n已知水的摩尔沸点升高常数为\n$0.513\\ \\mathrm{K\\cdot kg\\cdot mol^{-1}}$。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n根据沸点升高公式：\n\n$$\n\\Delta T_b=K_b m\n$$\n\n$$\n100.17-100.00\n=0.513\\times\n\\frac{496\\times10^{-3}\\ \\mathrm{g}/M}{10.0\\times10^{-3}\\ \\mathrm{kg}}\n$$\n\n$$\nM\\approx150\\ \\mathrm{g\\cdot mol^{-1}}\n$$\n\n最简式 $\\mathrm{C_5H_7N}$ 的式量为：\n\n$$\n5\\times12+7\\times1+14=81\n$$\n\n按最简式倍数取整数，尼古丁分子式为：\n\n$$\n\\mathrm{C_{10}H_{14}N_2}\n$$\n\n\u003c/details\u003e\n\n### E9\n将 $2.50\\ \\mathrm{g}$ 蔗糖 $(\\mathrm{C_{12}H_{22}O_{11}})$ 溶解在\n$253.0\\ \\mathrm{g}$ 水中；将 $5.20\\ \\mathrm{g}$ 未知物溶解在\n$1000\\ \\mathrm{g}$ 水中。两溶液在同一温度结冰，求未知物的摩尔质量。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n根据凝固点降低公式：\n\n$$\n\\Delta T_f=K_f m\n$$\n\n两溶液在同一温度结冰，说明两种溶液的质量摩尔浓度相同。设未知物摩尔质量为 $M$：\n\n$$\n\\frac{2.50\\ \\mathrm{g}/342\\ \\mathrm{g\\cdot mol^{-1}}}\n{253.0\\times10^{-3}\\ \\mathrm{kg}}\n=\n\\frac{5.20\\ \\mathrm{g}/M}\n{1000\\times10^{-3}\\ \\mathrm{kg}}\n$$\n\n$$\nM=180\\ \\mathrm{g\\cdot mol^{-1}}\n$$\n\n\u003c/details\u003e\n\n### E10\n人类血浆的凝固点为 $272.59\\ \\mathrm{K}$。问 $310\\ \\mathrm{K}$ 时血浆的渗透压为多少？\n与血浆等渗的葡萄糖和生理盐水的摩尔浓度各为多少？\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n$$\nK_f=1.86\\ \\mathrm{K\\cdot kg\\cdot mol^{-1}}\n$$\n\n$$\n\\Delta T_f=(273.15-272.59)\\ \\mathrm{K}=0.56\\ \\mathrm{K}\n$$\n\n$$\nm=\\frac{\\Delta T_f}{K_f}\n=\\frac{0.56}{1.86}\n=0.301\\ \\mathrm{mol\\cdot kg^{-1}}\n$$\n\n稀水溶液中可近似取 $c\\approx0.301\\ \\mathrm{mol\\cdot L^{-1}}$：\n\n$$\n\\pi=cRT\n=0.301\\times8.314\\times310\n=7.76\\times10^2\\ \\mathrm{kPa}\n$$\n\n与血浆等渗时：\n\n$$\nc(\\text{葡萄糖})\\approx0.301\\ \\mathrm{mol\\cdot L^{-1}}\n$$\n\n若按 $\\mathrm{NaCl}$ 完全电离近似，$i\\approx2$：\n\n$$\nc(\\mathrm{NaCl})\\approx\\frac{0.301}{2}\n=0.151\\ \\mathrm{mol\\cdot L^{-1}}\n$$\n\n\u003c/details\u003e\n",
    "chemistry_example/03_markdown.md":  "# 例题\n\n## Section 1 *热力学概念*\n\n### E1\n设有一电炉丝浸于水中，接上电源，通以电流一段时间。如果按以下几种情况作为系统，试问\n$Q$、$W$、$\\Delta U$ 为正、为负还是为零？\n\n1. 以水为系统；\n2. 以电炉丝和水为系统；\n3. 以电炉丝、水、电源以及其他一切有影响的部分为系统。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n1. $Q\u003e0,\\ W=0,\\ \\Delta U\u003e0$\n2. $Q=0,\\ W\u003e0,\\ \\Delta U\u003e0$\n3. $Q=0,\\ W=0,\\ \\Delta U=0$\n\n\u003c/details\u003e\n\n### E2\n一体系由 $A$ 态变化到 $B$ 态，沿途径 I 放热 $100\\ \\mathrm{J}$，对体系做功\n$50\\ \\mathrm{J}$。\n\n1. 由 $A$ 态沿途径 II 到 $B$ 态，体系做功 $80\\ \\mathrm{J}$，则过程 $Q$ 值为多少？\n2. 如果体系再由 $B$ 态沿途径 III 回到 $A$ 态，得到 $50\\ \\mathrm{J}$ 的功，体系是吸热还是放热，$Q$ 值是多少？\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n途径 I：\n\n$$\nQ=-100\\ \\mathrm{J},\\qquad W=50\\ \\mathrm{J}\n$$\n\n$$\n\\Delta U_{A\\rightarrow B}=Q+W=-100+50=-50\\ \\mathrm{J}\n$$\n\n1. 体系做功 $80\\ \\mathrm{J}$，即 $W=-80\\ \\mathrm{J}$：\n\n$$\nQ=\\Delta U-W=-50-(-80)=30\\ \\mathrm{J}\n$$\n\n2. 返回过程：\n\n$$\n\\Delta U_{B\\rightarrow A}=50\\ \\mathrm{J}\n$$\n\n体系得到 $50\\ \\mathrm{J}$ 的功，即 $W=50\\ \\mathrm{J}$：\n\n$$\nQ=\\Delta U-W=50-50=0\n$$\n\n\u003c/details\u003e\n\n### E3\n在 $101.3\\ \\mathrm{kPa}$ 和 $100^\\circ\\mathrm{C}$ 条件下，反应：\n\n$$\n\\mathrm{H_2(g)}+\\frac{1}{2}\\mathrm{O_2(g)}=\\mathrm{H_2O(g)}\n$$\n\n的 $\\Delta H=-241.8\\ \\mathrm{kJ\\cdot mol^{-1}}$，求 $\\Delta U$。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n恒温、恒压过程中：\n\n$$\n\\Delta H=\\Delta U+p\\Delta V\n$$\n\n对理想气体：\n\n$$\np\\Delta V=\\Delta n_gRT\n$$\n\n$$\n\\Delta n_g=1-\\left(1+\\frac{1}{2}\\right)=-0.5\n$$\n\n$$\n\\Delta U=\\Delta H-\\Delta n_gRT\n$$\n\n$$\n\\Delta U\n=-241.8-\\left[(-0.5)(8.314\\times10^{-3})(373)\\right]\n=-240.3\\ \\mathrm{kJ\\cdot mol^{-1}}\n$$\n\n\u003c/details\u003e\n\n### E4\n$1\\ \\mathrm{mol}$ 柠檬酸（固体）在 $298\\ \\mathrm{K}$ 恒容燃烧放热\n$1989.7\\ \\mathrm{kJ}$。计算 $10\\ \\mathrm{g}$ 固体柠檬酸在\n$298\\ \\mathrm{K}$ 恒压下燃烧时放出的热。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n柠檬酸燃烧反应式为：\n\n$$\n\\mathrm{C_6H_8O_7(s)}+\\frac{9}{2}\\mathrm{O_2(g)}\n=6\\mathrm{CO_2(g)}+4\\mathrm{H_2O(l)}\n$$\n\n$$\n\\Delta n_g=6-\\frac{9}{2}=1.5\n$$\n\n恒容燃烧热：\n\n$$\n\\Delta U=-1989.7\\ \\mathrm{kJ\\cdot mol^{-1}}\n$$\n\n恒压燃烧热：\n\n$$\n\\Delta H=\\Delta U+\\Delta n_gRT\n$$\n\n$$\n\\Delta H\n=-1989.7+1.5\\times(8.314\\times10^{-3})\\times298\n=-1986.0\\ \\mathrm{kJ\\cdot mol^{-1}}\n$$\n\n柠檬酸摩尔质量 $M=192\\ \\mathrm{g\\cdot mol^{-1}}$：\n\n$$\nq_p=\\frac{10\\ \\mathrm{g}}{192\\ \\mathrm{g\\cdot mol^{-1}}}\n\\times(-1986.0\\ \\mathrm{kJ\\cdot mol^{-1}})\n=-103.4\\ \\mathrm{kJ}\n$$\n\n即放出热量 $103.4\\ \\mathrm{kJ}$。\n\n\u003c/details\u003e\n\n### E5\n1. $1.00\\ \\mathrm{mol}$ 水在 $373\\ \\mathrm{K}$、$p=101325\\ \\mathrm{Pa}$ 下蒸发为理想气体，吸热 $2259\\ \\mathrm{J\\cdot g^{-1}}$。问此过程的 $Q_1$、$W_1$，以及水的 $\\Delta U_1$ 和 $\\Delta H_1$。\n2. 始态同 1，当外界压力恒定为 $0.5p$ 时，将水蒸发，然后将此 $0.5p$、$373\\ \\mathrm{K}$ 的水气恒温可逆压缩为 $p$、$373\\ \\mathrm{K}$ 的水气，求此过程的 $Q_2$、$W_2$，以及水的 $\\Delta U_2$ 和 $\\Delta H_2$。\n3. 将 $1.00\\ \\mathrm{mol}$ 水在 $373\\ \\mathrm{K}$、$p$ 下突然放在 $373\\ \\mathrm{K}$ 的真空箱中，水气立即充满整个真空箱（水全部汽化），测其压力为 $p$，求该过程的 $Q_3$、$W_3$，以及水的 $\\Delta U_3$ 和 $\\Delta H_3$。\n4. 比较 1、2、3 的结果，可总结出哪些结论？\n\n已知 $M(\\mathrm{H_2O})=18.01\\ \\mathrm{g\\cdot mol^{-1}}$。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n#### 1\n\n正常相变温度、压力下为可逆相变：\n\n$$\nQ_1=2259\\ \\mathrm{J\\cdot g^{-1}}\\times1.00\\ \\mathrm{mol}\\times18.01\\ \\mathrm{g\\cdot mol^{-1}}\n=40.7\\ \\mathrm{kJ}\n$$\n\n$$\nW_1=-p_{\\text{外}}(V_g-V_l)\\approx-pV_g=-nRT\n$$\n\n$$\nW_1=-1.00\\times8.314\\times373\n=-3.10\\ \\mathrm{kJ}\n$$\n\n$$\n\\Delta U_1=Q_1+W_1=40.7-3.10=37.6\\ \\mathrm{kJ}\n$$\n\n恒压过程：\n\n$$\n\\Delta H_1=Q_p=Q_1=40.7\\ \\mathrm{kJ}\n$$\n\n#### 2\n\n该过程终态与过程 1 相同，因此：\n\n$$\n\\Delta U_2=\\Delta U_1=37.6\\ \\mathrm{kJ},\\qquad\n\\Delta H_2=\\Delta H_1=40.7\\ \\mathrm{kJ}\n$$\n\n第一步对抗外压 $0.5p$ 汽化：\n\n$$\nW_a\\approx-0.5pV_1=-nRT=-3.10\\ \\mathrm{kJ}\n$$\n\n第二步从 $0.5p$ 恒温可逆压缩至 $p$，且 $V_2/V_1=1/2$：\n\n$$\nW_b=-nRT\\ln\\frac{V_2}{V_1}\n=nRT\\ln2=2.15\\ \\mathrm{kJ}\n$$\n\n$$\nW_2=W_a+W_b=-3.10+2.15=-0.95\\ \\mathrm{kJ}\n$$\n\n$$\nQ_2=\\Delta U_2-W_2\n=37.6-(-0.95)=38.6\\ \\mathrm{kJ}\n$$\n\n#### 3\n\n向真空汽化：\n\n$$\nW_3=0\n$$\n\n由于终态与过程 1 相同：\n\n$$\n\\Delta U_3=\\Delta U_1=37.6\\ \\mathrm{kJ}\n$$\n\n$$\nQ_3=\\Delta U_3-W_3=37.6\\ \\mathrm{kJ}\n$$\n\n$$\n\\Delta H_3=\\Delta H_1=40.7\\ \\mathrm{kJ}\n$$\n\n#### 4\n\n在始态和终态相同的条件下，$\\Delta U$ 和 $\\Delta H$ 只与状态有关，与路径无关；$Q$ 和 $W$ 与路径有关。\n\n\u003c/details\u003e\n",
    "chemistry_example/04_markdown.md":  "# 例题\n\n## Section 1 *Gibbs*\n\n### E1\n分别计算在 $298\\ \\mathrm{K}$ 和 $673\\ \\mathrm{K}$ 时，反应\n\n$$\n\\mathrm{N_2(g)}+3\\mathrm{H_2(g)}\\rightleftharpoons2\\mathrm{NH_3(g)}\n$$\n\n的平衡常数。\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n#### 298 K\n\n$$\n\\Delta G_{298}^{\\theta}\n=2\\Delta G_f^{\\theta}(\\mathrm{NH_3(g)})\n-\\Delta G_f^{\\theta}(\\mathrm{N_2(g)})\n-3\\Delta G_f^{\\theta}(\\mathrm{H_2(g)})\n$$\n\n$$\n\\Delta G_{298}^{\\theta}\n=2\\times(-16.5)-0-0\n=-33.0\\ \\mathrm{kJ\\cdot mol^{-1}}\n$$\n\n$$\n\\Delta G^{\\theta}=-2.303RT\\lg K_p^{\\theta}\n$$\n\n$$\n\\lg K_p^{\\theta}\n=-\\frac{\\Delta G_{298}^{\\theta}}{2.303RT}\n=5.786\n$$\n\n$$\nK_p^{\\theta}=6.11\\times10^5\n$$\n\n#### 673 K\n\n$$\n\\Delta G_T^{\\theta}\n=\\Delta H_{298}^{\\theta}-T\\Delta S_{298}^{\\theta}\n=41.3\\ \\mathrm{kJ\\cdot mol^{-1}}\n$$\n\n$$\n\\lg K_p^{\\theta}\n=-\\frac{\\Delta G_{673}^{\\theta}}{2.303RT}\n=-3.211\n$$\n\n$$\nK_p^{\\theta}=6.15\\times10^{-4}\n$$\n\n\u003c/details\u003e\n\n### E2\n由 $\\mathrm{MnO_2(s)}$ 和 $\\mathrm{HCl}$ 制备 $\\mathrm{Cl_2(g)}$ 的反应为：\n\n$$\n\\mathrm{MnO_2(s)}+4\\mathrm{H^+(aq)}+2\\mathrm{Cl^-(aq)}\n\\rightleftharpoons\n\\mathrm{Mn^{2+}(aq)}+\\mathrm{Cl_2(g)}+2\\mathrm{H_2O(l)}\n$$\n\n各物质的 $\\Delta G_f^\\theta\\ (\\mathrm{kJ\\cdot mol^{-1}})$ 分别为：\n\n| 物质 | $\\mathrm{MnO_2(s)}$ | $\\mathrm{H^+(aq)}$ | $\\mathrm{Cl^-(aq)}$ | $\\mathrm{Mn^{2+}(aq)}$ | $\\mathrm{Cl_2(g)}$ | $\\mathrm{H_2O(l)}$ |\n| --- | ---: | ---: | ---: | ---: | ---: | ---: |\n| $\\Delta G_f^\\theta$ | $-465.2$ | $0$ | $-131.3$ | $-228.0$ | $0$ | $-237.2$ |\n\n1. 标态下，$298\\ \\mathrm{K}$ 时，反应能否自发？\n2. 若用 $12.0\\ \\mathrm{mol\\cdot dm^{-3}}$ 的 $\\mathrm{HCl}$，其他物质仍为标态，$298\\ \\mathrm{K}$ 时，反应能否自发？\n\n\u003cdetails\u003e\n\u003csummary\u003eAnswer\u003c/summary\u003e\n\n#### 1\n\n$$\n\\Delta G_{298}^{\\theta}\n=\\left[-228.0+0+2(-237.2)\\right]\n-\\left[(-465.2)+4(0)+2(-131.3)\\right]\n$$\n\n$$\n\\Delta G_{298}^{\\theta}\n=25.4\\ \\mathrm{kJ\\cdot mol^{-1}}\u003e0\n$$\n\n因此，标态下反应不能自发进行。\n\n#### 2\n\n反应商为：\n\n$$\nQ=\n\\frac{\n(p_{\\mathrm{Cl_2}}/p^\\theta)(c_{\\mathrm{Mn^{2+}}}/c^\\theta)\n}{\n(c_{\\mathrm{H^+}}/c^\\theta)^4(c_{\\mathrm{Cl^-}}/c^\\theta)^2\n}\n$$\n\n代入 $c_{\\mathrm{H^+}}=c_{\\mathrm{Cl^-}}=12.0\\ \\mathrm{mol\\cdot dm^{-3}}$：\n\n$$\nQ=\\frac{1\\times1}{12.0^4\\times12.0^2}\n=3.35\\times10^{-7}\n$$\n\n$$\n\\Delta G_T\n=\\Delta G^{\\theta}+2.303RT\\lg Q\n$$\n\n$$\n\\Delta G_T\n=25.4+2.303\\times(8.314\\times10^{-3})\\times298\\times\\lg(3.35\\times10^{-7})\n=-11.5\\ \\mathrm{kJ\\cdot mol^{-1}}\n$$\n\n因此，在该浓度条件下反应能自发进行。\n\n\u003c/details\u003e\n",
    "chemistry_example/05_markdown.md":  "# 例题\n\n## Section 1 *弱酸弱碱*\n\n### E1\n乳酸 $\\mathrm{CH_3CHOHCOOH}$ 的 $K_a=1.37\\times10^{-4}$。计算\n$0.10\\ \\mathrm{mol\\cdot dm^{-3}}$ 乳酸溶液的 pH 和电离度。\n\n<details>\n<summary>Answer</summary>\n\n先检查弱酸近似条件：\n\n$$\n\\frac{c}{K_a}=\\frac{0.10}{1.37\\times10^{-4}}=730>400\n$$\n\n可用一元弱酸近似：\n\n$$\n[H_3O^+]\\approx\\sqrt{K_ac}\n=\\sqrt{(1.37\\times10^{-4})(0.10)}\n=3.7\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}}\n$$\n\n$$\npH=-\\lg(3.7\\times10^{-3})=2.43\n$$\n\n$$\n\\alpha=\\frac{[H_3O^+]}{c}\n=\\frac{3.7\\times10^{-3}}{0.10}\n=3.7\\%\n$$\n\n</details>\n\n### E2\n将 $2.45\\ \\mathrm{g}$ 固体 $\\mathrm{NaCN}$ 配成 $500\\ \\mathrm{cm^3}$ 溶液。\n已知 $M(\\mathrm{NaCN})=49\\ \\mathrm{g\\cdot mol^{-1}}$，\n$K_a(\\mathrm{HCN})=4.93\\times10^{-10}$，求溶液 pH。\n\n<details>\n<summary>Answer</summary>\n\n$$\nc(\\mathrm{CN^-})\n=\\frac{2.45/49}{0.500}\n=0.10\\ \\mathrm{mol\\cdot dm^{-3}}\n$$\n\n$\\mathrm{CN^-}$ 是 $\\mathrm{HCN}$ 的共轭碱：\n\n$$\nK_b(\\mathrm{CN^-})\n=\\frac{K_w}{K_a(\\mathrm{HCN})}\n=\\frac{1.0\\times10^{-14}}{4.93\\times10^{-10}}\n=2.0\\times10^{-5}\n$$\n\n$$\n[OH^-]\\approx\\sqrt{K_bc}\n=\\sqrt{(2.0\\times10^{-5})(0.10)}\n=1.4\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}}\n$$\n\n$$\npOH=-\\lg(1.4\\times10^{-3})=2.85\n$$\n\n$$\npH=14.00-2.85=11.15\n$$\n\n</details>\n\n## Section 2 *同离子效应与缓冲*\n\n### E3\n向 $1.0\\ \\mathrm{dm^3}$ 的 $0.10\\ \\mathrm{mol\\cdot dm^{-3}}$ $\\mathrm{HAc}$\n溶液中加入固体 $\\mathrm{NaAc}$，使 $[Ac^-]=1.0\\ \\mathrm{mol\\cdot dm^{-3}}$。\n取 $K_a(\\mathrm{HAc})=1.8\\times10^{-5}$，求 $[H_3O^+]$、pH 和\n$\\mathrm{HAc}$ 的电离度。\n\n<details>\n<summary>Answer</summary>\n\n这是 $\\mathrm{HAc}/\\mathrm{Ac^-}$ 共轭酸碱体系：\n\n$$\n[H_3O^+]=K_a\\frac{c_{\\mathrm{HAc}}}{c_{\\mathrm{Ac^-}}}\n$$\n\n$$\n[H_3O^+]\n=1.8\\times10^{-5}\\times\\frac{0.10}{1.0}\n=1.8\\times10^{-6}\\ \\mathrm{mol\\cdot dm^{-3}}\n$$\n\n$$\npH=-\\lg(1.8\\times10^{-6})=5.74\n$$\n\n$$\n\\alpha=\\frac{1.8\\times10^{-6}}{0.10}\n=1.8\\times10^{-5}=0.0018\\%\n$$\n\n加入同离子 $\\mathrm{Ac^-}$ 后，$\\mathrm{HAc}$ 电离被明显抑制。\n\n</details>\n\n### E4\n已知 $\\mathrm{H_3PO_4}$ 的 $K_{a1}=7.52\\times10^{-3}$，\n$K_{a2}=6.23\\times10^{-8}$。按两性离子近似公式计算\n$\\mathrm{NaH_2PO_4}$ 溶液的 pH。\n\n<details>\n<summary>Answer</summary>\n\n$\\mathrm{H_2PO_4^-}$ 是两性离子，可用近似：\n\n$$\n[H_3O^+]\\approx\\sqrt{K_{a1}K_{a2}}\n$$\n\n$$\n[H_3O^+]\n=\\sqrt{(7.52\\times10^{-3})(6.23\\times10^{-8})}\n=2.16\\times10^{-5}\\ \\mathrm{mol\\cdot dm^{-3}}\n$$\n\n$$\npH=-\\lg(2.16\\times10^{-5})=4.67\n$$\n\n因此 $pH\\approx4.68$。\n\n</details>\n\n### E5\n欲配制 $pH=9.20$、$[NH_3\\cdot H_2O]=1.0\\ \\mathrm{mol\\cdot dm^{-3}}$\n的缓冲溶液 $500\\ \\mathrm{cm^3}$。已知\n$K_b(\\mathrm{NH_3})=1.8\\times10^{-5}$，浓氨水浓度为\n$15\\ \\mathrm{mol\\cdot dm^{-3}}$，$M(\\mathrm{NH_4Cl})=53.5\\ \\mathrm{g\\cdot mol^{-1}}$。\n求需 $\\mathrm{NH_4Cl}$ 质量和浓氨水体积。\n\n<details>\n<summary>Answer</summary>\n\n$$\npOH=14.00-9.20=4.80\n$$\n\n$$\n[OH^-]=10^{-4.80}=1.6\\times10^{-5}\\ \\mathrm{mol\\cdot dm^{-3}}\n$$\n\n弱碱缓冲体系满足：\n\n$$\n[OH^-]=K_b\\frac{[NH_3\\cdot H_2O]}{[NH_4^+]}\n$$\n\n$$\n[NH_4^+]\n=\\frac{K_b[NH_3\\cdot H_2O]}{[OH^-]}\n=\\frac{(1.8\\times10^{-5})(1.0)}{1.6\\times10^{-5}}\n\\approx1.1\\ \\mathrm{mol\\cdot dm^{-3}}\n$$\n\n$$\nm(\\mathrm{NH_4Cl})\n=0.500\\times1.1\\times53.5\n\\approx29\\ \\mathrm{g}\n$$\n\n$$\nV(\\text{浓氨水})\n=\\frac{1.0\\times0.500}{15}\n=0.033\\ \\mathrm{dm^3}\n=33\\ \\mathrm{cm^3}\n$$\n\n需称取约 $29\\ \\mathrm{g}$ $\\mathrm{NH_4Cl}$，取约\n$33\\ \\mathrm{cm^3}$ 浓氨水，加水定容至 $500\\ \\mathrm{cm^3}$。\n\n</details>\n",
    "chemistry_example/07_markdown.md":  "# 例题\n\n## Section 1 *电极电势*\n\n### E1\n已知 $E^\\theta(\\mathrm{Fe^{3+}/Fe^{2+}})=0.771\\ \\mathrm{V}$，\n$E^\\theta(\\mathrm{Sn^{4+}/Sn^{2+}})=0.151\\ \\mathrm{V}$。求反应\n\n$$\n2\\mathrm{Fe^{3+}}+\\mathrm{Sn^{2+}}\n\\rightarrow2\\mathrm{Fe^{2+}}+\\mathrm{Sn^{4+}}\n$$\n\n的 $E^\\theta_{\\text{池}}$ 和 $K^\\theta$。\n\n<details>\n<summary>Answer</summary>\n\n正极为 $\\mathrm{Fe^{3+}/Fe^{2+}}$，负极为\n$\\mathrm{Sn^{4+}/Sn^{2+}}$：\n\n$$\nE^\\theta_{\\text{池}}=0.771-0.151=0.620\\ \\mathrm{V}\n$$\n\n该反应转移电子数 $n=2$。298 K 下：\n\n$$\n\\lg K^\\theta=\\frac{nE^\\theta_{\\text{池}}}{0.0592}\n=\\frac{2\\times0.620}{0.0592}=20.95\n$$\n\n$$\nK^\\theta=8.8\\times10^{20}\n$$\n\n</details>\n\n### E2\n在标准状态下，酸性溶液中 $\\mathrm{O_2}$ 氧化 $\\mathrm{Fe^{2+}}$：\n\n$$\n\\mathrm{O_2}+4\\mathrm{H^+}+4\\mathrm{Fe^{2+}}\n\\rightarrow2\\mathrm{H_2O}+4\\mathrm{Fe^{3+}}\n$$\n\n已知 $E^\\theta(\\mathrm{O_2/H_2O})=1.23\\ \\mathrm{V}$，\n$E^\\theta(\\mathrm{Fe^{3+}/Fe^{2+}})=0.77\\ \\mathrm{V}$。求\n$E^\\theta_{\\text{池}}$ 和 $K^\\theta$。\n\n<details>\n<summary>Answer</summary>\n\n$$\nE^\\theta_{\\text{池}}=E^\\theta_{\\text{正}}-E^\\theta_{\\text{负}}\n=1.23-0.77=0.46\\ \\mathrm{V}\n$$\n\n该反应转移 $n=4$ 个电子：\n\n$$\n\\lg K^\\theta=\\frac{4\\times0.46}{0.0592}=31.1\n$$\n\n$$\nK^\\theta\\approx1.2\\times10^{31}\n$$\n\n</details>\n\n## Section 2 *Nernst 方程*\n\n### E3\n计算电池\n\n$$\n(-)\\ \\mathrm{Pt|Fe^{2+}(0.10\\ M),Fe^{3+}(0.20\\ M)||Ag^+(1.0\\ M)|Ag}\\ (+)\n$$\n\n的电动势。已知\n$E^\\theta(\\mathrm{Ag^+/Ag})=0.7996\\ \\mathrm{V}$，\n$E^\\theta(\\mathrm{Fe^{3+}/Fe^{2+}})=0.771\\ \\mathrm{V}$，电池反应为\n\n$$\n\\mathrm{Fe^{2+}}+\\mathrm{Ag^+}\\rightarrow\\mathrm{Fe^{3+}}+\\mathrm{Ag}\n$$\n\n<details>\n<summary>Answer</summary>\n\n$$\nE^\\theta_{\\text{池}}=0.7996-0.771=0.0286\\ \\mathrm{V}\n$$\n\n反应商为：\n\n$$\nQ=\\frac{[\\mathrm{Fe^{3+}}]}{[\\mathrm{Fe^{2+}}][\\mathrm{Ag^+}]}\n=\\frac{0.20}{0.10\\times1.0}=2.0\n$$\n\n该反应 $n=1$：\n\n$$\nE_{\\text{池}}=E^\\theta_{\\text{池}}-\\frac{0.0592}{n}\\lg Q\n$$\n\n$$\nE_{\\text{池}}=0.0286-0.0592\\lg2.0\n=0.0108\\ \\mathrm{V}\n$$\n\n</details>\n\n### E4\n已知\n\n$$\n\\mathrm{ClO_3^-}+6\\mathrm{H^+}+6e^-\\rightarrow\\mathrm{Cl^-}+3\\mathrm{H_2O}\n\\qquad E_1^\\theta=1.45\\ \\mathrm{V}\n$$\n\n$$\n\\frac12\\mathrm{Cl_2}+e^-\\rightarrow\\mathrm{Cl^-}\n\\qquad E_2^\\theta=1.36\\ \\mathrm{V}\n$$\n\n求\n\n$$\n\\mathrm{ClO_3^-}+6\\mathrm{H^+}+5e^-\\rightarrow\n\\frac12\\mathrm{Cl_2}+3\\mathrm{H_2O}\n$$\n\n的 $E_3^\\theta$。\n\n<details>\n<summary>Answer</summary>\n\n目标半反应等于反应 1 减反应 2。电极电势不能直接相减，应先转化为\n$\\Delta G^\\theta=-nFE^\\theta$：\n\n$$\n5E_3^\\theta=6E_1^\\theta-1E_2^\\theta\n$$\n\n$$\nE_3^\\theta=\\frac{6\\times1.45-1\\times1.36}{5}\n=1.47\\ \\mathrm{V}\n$$\n\n</details>\n\n### E5\n已知\n\n$$\n\\mathrm{Cr_2O_7^{2-}}+14\\mathrm{H^+}+6e^-\n\\rightarrow2\\mathrm{Cr^{3+}}+7\\mathrm{H_2O}\n\\qquad E^\\theta=1.23\\ \\mathrm{V}\n$$\n\n当 $[\\mathrm{Cr^{3+}}]=1$、$[\\mathrm{Cr_2O_7^{2-}}]=1$、\n$[H^+]=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}}$ 时，求 $E$。\n\n<details>\n<summary>Answer</summary>\n\n$$\nE=E^\\theta-\\frac{0.0592}{6}\n\\lg\\frac{[\\mathrm{Cr^{3+}}]^2}\n{[\\mathrm{Cr_2O_7^{2-}}][H^+]^{14}}\n$$\n\n$$\nQ=\\frac{1}{1\\times(10^{-3})^{14}}=10^{42}\n$$\n\n$$\nE=1.23-\\frac{0.0592}{6}\\lg10^{42}\n=1.23-0.414\n=0.82\\ \\mathrm{V}\n$$\n\n酸度进入 $14$ 次方，因此对该电极电势影响很大。\n\n</details>\n",
    "chemistry_example/08_markdown.md":  "# 例题\n\n## Section 1 *反应速率*\n\n### E1\n对基元反应\n\n$$\n\\mathrm{A}+2\\mathrm{B}\\rightarrow3\\mathrm{C}\n$$\n\n若 $-\\mathrm{d}[A]/\\mathrm{d}t=1.0\\times10^{-3}\\\n\\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}$，求\n$+\\mathrm{d}[C]/\\mathrm{d}t$ 和反应速率 $v$。\n\n<details>\n<summary>Answer</summary>\n\n按化学计量数归一化：\n\n$$\nv=-\\frac{\\mathrm{d}[A]}{\\mathrm{d}t}\n=\\frac{1}{3}\\frac{\\mathrm{d}[C]}{\\mathrm{d}t}\n$$\n\n$$\nv=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\n$$\n\n$$\n\\frac{\\mathrm{d}[C]}{\\mathrm{d}t}=3v\n=3.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\n$$\n\n</details>\n\n## Section 2 *积分速率方程*\n\n### E2\n已知某一级反应速率常数\n$k=2.2\\times10^{-5}\\ \\mathrm{s^{-1}}$。求其半衰期。\n\n<details>\n<summary>Answer</summary>\n\n一级反应：\n\n$$\nt_{1/2}=\\frac{0.693}{k}\n$$\n\n$$\nt_{1/2}=\\frac{0.693}{2.2\\times10^{-5}}\n=3.15\\times10^4\\ \\mathrm{s}\n$$\n\n$$\n3.15\\times10^4\\ \\mathrm{s}=8.75\\ \\mathrm{h}\n$$\n\n</details>\n\n### E3\n某一级反应初始质量为 $2.00\\ \\mathrm{g}$，\n$k=2.2\\times10^{-5}\\ \\mathrm{s^{-1}}$。反应 $2.00\\ \\mathrm{h}$ 后剩余多少？\n假设质量与浓度成正比。\n\n<details>\n<summary>Answer</summary>\n\n一级反应满足：\n\n$$\n\\ln\\frac{[A]}{[A]_0}=-kt\n$$\n\n时间换算：\n\n$$\nt=2.00\\ \\mathrm{h}=7200\\ \\mathrm{s}\n$$\n\n$$\n\\frac{m}{m_0}=e^{-kt}\n=e^{-(2.2\\times10^{-5})(7200)}\n=e^{-0.1584}=0.853\n$$\n\n$$\nm=2.00\\times0.853=1.71\\ \\mathrm{g}\n$$\n\n</details>\n\n### E4\n某二级反应 $\\mathrm{A}\\rightarrow\\mathrm{P}$，\n$[A]_0=1.00\\ \\mathrm{mol\\cdot dm^{-3}}$，\n$k=0.50\\ \\mathrm{mol^{-1}\\cdot dm^3\\cdot h^{-1}}$。求\n$t=4.0\\ \\mathrm{h}$ 时 $[A]$。\n\n<details>\n<summary>Answer</summary>\n\n二级反应积分式：\n\n$$\n\\frac{1}{[A]}=\\frac{1}{[A]_0}+kt\n$$\n\n$$\n\\frac{1}{[A]}=\\frac{1}{1.00}+0.50\\times4.0\n=3.00\n$$\n\n$$\n[A]=0.333\\ \\mathrm{mol\\cdot dm^{-3}}\n$$\n\n</details>\n\n## Section 3 *活化能*\n\n### E5\n已知基元反应 $\\mathrm{A}\\rightarrow\\mathrm{B}$ 的\n$\\Delta H=67\\ \\mathrm{kJ\\cdot mol^{-1}}$，正反应\n$E_a=90\\ \\mathrm{kJ\\cdot mol^{-1}}$。求逆反应活化能。若\n$0^\\circ\\mathrm{C}$ 时 $k_1=1.1\\times10^{-5}\\ \\mathrm{min^{-1}}$，\n求 $45^\\circ\\mathrm{C}$ 时 $k_2$。取\n$R=8.314\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}$。\n\n<details>\n<summary>Answer</summary>\n\n能量图关系：\n\n$$\n\\Delta H=E_{a,\\text{正}}-E_{a,\\text{逆}}\n$$\n\n$$\nE_{a,\\text{逆}}=90-67=23\\ \\mathrm{kJ\\cdot mol^{-1}}\n$$\n\nArrhenius 两温度式：\n\n$$\n\\ln\\frac{k_2}{k_1}\n=\\frac{E_a}{R}\\left(\\frac{1}{T_1}-\\frac{1}{T_2}\\right)\n$$\n\n$$\nT_1=273.15\\ \\mathrm{K},\\qquad T_2=318.15\\ \\mathrm{K}\n$$\n\n$$\n\\ln\\frac{k_2}{k_1}\n=\\frac{90000}{8.314}\n\\left(\\frac{1}{273.15}-\\frac{1}{318.15}\\right)\n=5.61\n$$\n\n$$\nk_2=k_1e^{5.61}\n=1.1\\times10^{-5}\\times273\n=3.0\\times10^{-3}\\ \\mathrm{min^{-1}}\n$$\n\n</details>\n",
    "chemistry_example/09_markdown.md":  "# 例题\n\n## Section 1 *氢原子能级*\n\n### E1\n计算氢原子从 $n=1$ 到 $n=\\infty$ 的电离能，先求单个原子所需能量，\n再求 $1\\ \\mathrm{mol}$ 氢原子的电离能。已知\n$1\\ \\mathrm{eV}=1.602\\times10^{-19}\\ \\mathrm{J}$，\n$N_A=6.02\\times10^{23}\\ \\mathrm{mol^{-1}}$。\n\n<details>\n<summary>Answer</summary>\n\n氢原子能级：\n\n$$\nE_n=-\\frac{13.6}{n^2}\\ \\mathrm{eV}\n$$\n\n$$\nE_1=-13.6\\ \\mathrm{eV},\\qquad E_\\infty=0\n$$\n\n单个原子电离能：\n\n$$\n\\Delta E=0-(-13.6)=13.6\\ \\mathrm{eV}\n$$\n\n$$\n13.6\\ \\mathrm{eV}\n=13.6\\times1.602\\times10^{-19}\n=2.18\\times10^{-18}\\ \\mathrm{J}\n$$\n\n每摩尔：\n\n$$\n2.18\\times10^{-18}\\times6.02\\times10^{23}\n=1.31\\times10^6\\ \\mathrm{J\\cdot mol^{-1}}\n=1310\\ \\mathrm{kJ\\cdot mol^{-1}}\n$$\n\n</details>\n\n### E2\n计算氢原子 $n=3\\rightarrow n=2$ 跃迁发射光子的波长。用\n$E_n=-13.6/n^2\\ \\mathrm{eV}$，$hc=1240\\ \\mathrm{eV\\cdot nm}$。\n\n<details>\n<summary>Answer</summary>\n\n$$\nE_3=-\\frac{13.6}{9}=-1.51\\ \\mathrm{eV}\n$$\n\n$$\nE_2=-\\frac{13.6}{4}=-3.40\\ \\mathrm{eV}\n$$\n\n发射光子能量为能级差的绝对值：\n\n$$\n\\Delta E=|-3.40-(-1.51)|=1.89\\ \\mathrm{eV}\n$$\n\n$$\n\\lambda=\\frac{hc}{\\Delta E}\n=\\frac{1240}{1.89}\n=656\\ \\mathrm{nm}\n$$\n\n这是 Balmer 线系中的红线。\n\n</details>\n\n## Section 2 *物质波与量子数*\n\n### E3\n计算速度为 $5.9\\times10^5\\ \\mathrm{m\\cdot s^{-1}}$ 的电子的 de Broglie 波长。\n已知 $h=6.626\\times10^{-34}\\ \\mathrm{J\\cdot s}$，\n$m_e=9.11\\times10^{-31}\\ \\mathrm{kg}$。\n\n<details>\n<summary>Answer</summary>\n\n$$\n\\lambda=\\frac{h}{mv}\n$$\n\n$$\n\\lambda\n=\\frac{6.626\\times10^{-34}}\n{(9.11\\times10^{-31})(5.9\\times10^5)}\n=1.23\\times10^{-9}\\ \\mathrm{m}\n$$\n\n即：\n\n$$\n\\lambda\\approx1.2\\times10^{-9}\\ \\mathrm{m}=12\\ \\mathrm{\\AA}\n$$\n\n</details>\n\n### E4\n判断 $\\varphi(3,2,1)$ 代表哪个亚层轨道，并说明该亚层有多少个轨道、\n最多容纳多少电子。\n\n<details>\n<summary>Answer</summary>\n\n$\\varphi(3,2,1)$ 中：\n\n$$\nn=3,\\qquad l=2,\\qquad m=1\n$$\n\n$l=2$ 对应 $d$ 亚层，因此它代表 $3d$ 亚层中的一个取向轨道。\n\n亚层轨道数：\n\n$$\n2l+1=2\\times2+1=5\n$$\n\n每个轨道最多容纳 2 个自旋相反电子：\n\n$$\n5\\times2=10\n$$\n\n所以 $3d$ 亚层有 5 个轨道，最多容纳 10 个电子。\n\n</details>\n\n## Section 3 *有效核电荷*\n\n### E5\n用 Slater 规则材料中给出的 Na 价电子结果 $Z^*=2.20$，估算 Na 的\n$3s$ 电子能量。用\n\n$$\nE=-13.6\\frac{(Z^*)^2}{n^2}\\ \\mathrm{eV}\n$$\n\n其中 $n=3$。\n\n<details>\n<summary>Answer</summary>\n\n$$\nE=-13.6\\frac{(2.20)^2}{3^2}\n$$\n\n$$\nE=-13.6\\times\\frac{4.84}{9}\n=-7.3\\ \\mathrm{eV}\n$$\n\n能量为负，表示该电子处于受原子核束缚的状态。\n\n</details>\n",
    "chemistry_example/10_markdown.md":  "# 例题\n\n## Section 1 *离子晶体*\n\n### E1\n已知某离子晶体中相邻正、负离子核间距\n$r_0=282\\ \\mathrm{pm}$，若 $r_-=181\\ \\mathrm{pm}$，求 $r_+$。\n\n<details>\n<summary>Answer</summary>\n\n正负离子接触时：\n\n$$\nr_0=r_+ + r_-\n$$\n\n$$\nr_+=r_0-r_-=282-181=101\\ \\mathrm{pm}\n$$\n\n</details>\n\n### E2\n按 Lande 模型，某晶体中 $r_0=260\\ \\mathrm{pm}$，且满足正负离子接触、\n负负离子也接触。求 $r_-$ 和 $r_+$。\n\n<details>\n<summary>Answer</summary>\n\nLande 模型关系：\n\n$$\nr_-=\\frac{r_0}{\\sqrt{2}}\n$$\n\n$$\nr_-=\\frac{260}{\\sqrt{2}}=184\\ \\mathrm{pm}\n$$\n\n$$\nr_+=r_0-r_-=260-184=76\\ \\mathrm{pm}\n$$\n\n</details>\n\n### E3\n预测某 AB 型离子晶体结构：已知 $r_+=95\\ \\mathrm{pm}$，\n$r_-=181\\ \\mathrm{pm}$，求 $r_+/r_-$，并判断更可能属于\nCsCl 型、NaCl 型还是 ZnS 型。\n\n<details>\n<summary>Answer</summary>\n\n$$\n\\frac{r_+}{r_-}=\\frac{95}{181}=0.525\n$$\n\n半径比规则：\n\n$$\n0.414\\le\\frac{r_+}{r_-}\\le0.732\n\\Rightarrow \\text{NaCl 型}\n$$\n\n因此该晶体更可能为 NaCl 型，配位数约为 $6:6$。\n\n</details>\n\n## Section 2 *分子构型与极性*\n\n### E4\n用 VSEPR 判断 $\\mathrm{XeF_4}$ 的分子构型。已知 Xe 价电子数为 8，\n每个 F 提供 1 个电子。\n\n<details>\n<summary>Answer</summary>\n\n中心 Xe 周围价层电子对数：\n\n$$\n\\frac{8+4\\times1}{2}=6\n$$\n\n其中 4 对为 Xe-F 成键电子对，孤对电子数：\n\n$$\n6-4=2\n$$\n\n6 对电子的电子对几何构型为正八面体。两对孤对电子取相对位置以减少排斥，\n剩下 4 个 F 位于同一平面。\n\n因此 $\\mathrm{XeF_4}$ 的分子构型为平面正方形。\n\n</details>\n\n### E5\n某极性分子的偶极电荷量\n$q=1.60\\times10^{-20}\\ \\mathrm{C}$，偶极长\n$d=1.20\\times10^{-10}\\ \\mathrm{m}$。求偶极矩 $\\mu$，并换算为 Debye。\n已知 $1\\ \\mathrm{D}=3.336\\times10^{-30}\\ \\mathrm{C\\cdot m}$。\n\n<details>\n<summary>Answer</summary>\n\n$$\n\\mu=q d\n$$\n\n$$\n\\mu=(1.60\\times10^{-20})(1.20\\times10^{-10})\n=1.92\\times10^{-30}\\ \\mathrm{C\\cdot m}\n$$\n\n换算为 Debye：\n\n$$\n\\mu=\\frac{1.92\\times10^{-30}}{3.336\\times10^{-30}}\n=0.576\\ \\mathrm{D}\n$$\n\n</details>\n",
    "chemistry_example/13_markdown.md":  "# 例题\n\n## Section 1 *有机结构*\n\n### E1\n某开链单烯烃含 6 个碳原子，求其分子式。\n\n<details>\n<summary>Answer</summary>\n\n开链单烯烃通式为：\n\n$$\nC_nH_{2n}\n$$\n\n当 $n=6$ 时：\n\n$$\nH=2n=12\n$$\n\n所以分子式为：\n\n$$\nC_6H_{12}\n$$\n\n</details>\n\n### E2\n某汽油抗爆性相当于 $92\\ \\mathrm{mL}$ 异辛烷与\n$8\\ \\mathrm{mL}$ 正庚烷组成的标准混合物，求其辛烷值。\n\n<details>\n<summary>Answer</summary>\n\n异辛烷辛烷值为 100，正庚烷辛烷值为 0：\n\n$$\n\\text{辛烷值}\n=\\frac{V_{\\text{异辛烷}}}\n{V_{\\text{异辛烷}}+V_{\\text{正庚烷}}}\\times100\n$$\n\n$$\n\\text{辛烷值}=\\frac{92}{92+8}\\times100=92\n$$\n\n</details>\n\n### E3\n乙烷完全重叠构象中有 3 对 $C-H$ 重叠相互作用，每对约贡献\n$4\\ \\mathrm{kJ\\cdot mol^{-1}}$ 扭转能。估算该构象相对交叉构象升高的能量。\n\n<details>\n<summary>Answer</summary>\n\n总扭转能近似为各重叠相互作用贡献之和：\n\n$$\nE=3\\times4=12\\ \\mathrm{kJ\\cdot mol^{-1}}\n$$\n\n因此乙烷完全重叠构象相对交叉构象约升高\n$12\\ \\mathrm{kJ\\cdot mol^{-1}}$。\n\n</details>\n\n## Section 2 *高分子*\n\n### E4\n某聚氯乙烯样品平均分子量为\n$1.25\\times10^5\\ \\mathrm{g\\cdot mol^{-1}}$，链节相对分子质量为 62.5，\n求平均聚合度。\n\n<details>\n<summary>Answer</summary>\n\n$$\nM=nM_0\n$$\n\n$$\nn=\\frac{M}{M_0}\n=\\frac{1.25\\times10^5}{62.5}\n=2000\n$$\n\n平均聚合度为 $n=2000$。\n\n</details>\n\n### E5\n某聚合物样品中，分子量 $1.0\\times10^4$ 的分子有 2 mol，\n分子量 $1.0\\times10^5$ 的分子有 5 mol，\n分子量 $1.0\\times10^6$ 的分子有 3 mol。求 $M_n$、$M_w$ 和 $D$。\n\n<details>\n<summary>Answer</summary>\n\n数均分子量：\n\n$$\nM_n=\\frac{\\sum N_iM_i}{\\sum N_i}\n$$\n\n$$\nM_n=\\frac{2(10^4)+5(10^5)+3(10^6)}{2+5+3}\n=3.52\\times10^5\\ \\mathrm{g\\cdot mol^{-1}}\n$$\n\n重均分子量：\n\n$$\nM_w=\\frac{\\sum N_iM_i^2}{\\sum N_iM_i}\n$$\n\n$$\nM_w=\n\\frac{2(10^4)^2+5(10^5)^2+3(10^6)^2}\n{2(10^4)+5(10^5)+3(10^6)}\n$$\n\n$$\nM_w=\\frac{3.0502\\times10^{12}}{3.52\\times10^6}\n=8.67\\times10^5\\ \\mathrm{g\\cdot mol^{-1}}\n$$\n\n分散系数：\n\n$$\nD=\\frac{M_w}{M_n}\n=\\frac{8.67\\times10^5}{3.52\\times10^5}\n=2.46\n$$\n\n</details>\n"
};

    const nav = document.getElementById("fileNav");
    const filePath = document.getElementById("filePath");
    const content = document.getElementById("content");
    const searchInput = document.getElementById("searchInput");
    const progress = document.getElementById("progress");
    let activeBlankPath = "";
    let blankCounter = 0;

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("\"", "&quot;");
    }

    function blankStorageKey(path, id) {
      return `chemistry-blank:${path}:${id}`;
    }

    function renderBlankInput() {
      const id = `inline-${blankCounter}`;
      blankCounter += 1;
      return `<input class="blank-input" type="text" data-blank-id="${escapeAttribute(id)}" aria-label="填空输入框" autocomplete="off">`;
    }

    function renderInline(value) {
      return escapeHtml(value)
        .replace(/_{6,}/g, () => renderBlankInput())
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*]+)\*/g, "<em>$1</em>")
        .replace(/&lt;(\/?details)&gt;/g, "<$1>")
        .replace(/&lt;summary&gt;([^<]+)&lt;\/summary&gt;/g, "<summary>$1</summary>");
    }

    function splitTableRow(row) {
      const trimmed = row.trim().replace(/^\|/, "").replace(/\|$/, "");
