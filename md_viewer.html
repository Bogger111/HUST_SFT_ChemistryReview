到为正 | 正负号题 |\n| 功符号 | 环境对体系做功 \\(W\u003e0\\)，体系对环境做功 \\(W\u003c0\\) | 体系得到为正 | 膨胀功符号 |\n| 第一类永动机 | 不可能制成 | 违反能量守恒 | 概念判断 |\n| 等容热 | \\(Q_V=\\Delta U\\) | 体积不变不做体积功 | 量热计题 |\n| 等压热 | \\(Q_p=\\Delta H\\) | 恒压热等焓变 | 热化学题 |\n| \\(Q_p,Q_V\\) 关系 | \\(Q_p=Q_V+\\Delta n_gRT\\) | 只数气体摩尔数变化 | 气体反应热 |\n| 热化学方程式 | 标状态、物态、晶型、系数对应焓变 | 方程式怎么写，热也怎么变 | 改写方程式 |\n| 盖斯定律 | 焓变只由始末态决定 | 路径相加，焓变相加 | 间接求反应热 |\n| 稳定态单质 | 标准生成焓和标准生成自由能为 0 | 稳定态才为零 | 数据计算 |\n| 键焓 | 断开气态物质 1 mol 键所需焓变，均为正值 | 断键吸热 | 估算气相反应热 |\n| 熵规律 | 同物质 \\(S(s)\u003cS(l)\u003cS(g)\\) | 固液气，乱度升 | 判断熵大小 |\n| 熵与温度 | 温度升高，熵值升高 | 热运动增强 | 趋势题 |\n| 气体压力与熵 | 气体压力升高，熵降低 | 压缩更有序 | 趋势题 |\n| 气体计量数与熵变 | 气体增多通常 \\(\\Delta S\u003e0\\)，气体减少通常 \\(\\Delta S\u003c0\\) | 看气体 mol 数 | 判断 \\(\\Delta S\\) |\n| 熵增原理 | 孤立体系 \\(\\Delta S_{\\text{孤}}\u003e0\\) 自发 | 只适用于孤立体系 | 自发性判断 |\n| Gibbs 判据 | \\(\\Delta G\u003c0\\) 正向自发，\\(\\Delta G=0\\) 平衡 | G 负自发 | 方向判断 |\n| 温度影响 | \\(\\Delta G=\\Delta H-T\\Delta S\\) | H、S 联合判断 | 高低温自发性 |\n| \\((- ,+)\\) 型 | \\(\\Delta H\u003c0,\\Delta S\u003e0\\)，任何温度自发 | 两项都帮忙 | 判断全温自发 |\n| \\((+,-)\\) 型 | \\(\\Delta H\u003e0,\\Delta S\u003c0\\)，任何温度非自发 | 两项都不利 | 判断全温非自发 |\n| \\((-,-)\\) 型 | 低温自发，高温非自发 | 低温靠放热 | 合成氨 |\n| \\((+,+)\\) 型 | 低温非自发，高温自发 | 高温靠熵增 | NO 生成 |\n| \\(\\Delta G\\) 物理意义 | 等温等压可逆过程最大非体积功 | 自由能可做功 | 燃料电池、电解 |\n| 热力学与动力学 | 热力学判断可能性，动力学决定速率 | 可能不等于快 | 催化剂题 |\n\n## 五、易错点总结\n\n1. 错误理解：封闭体系不能与环境交换能量。  \n   正确理解：封闭体系不能交换物质，但可以交换能量。  \n   如何避免：敞开看“物质+能量”，封闭看“只有能量”，孤立看“都没有”。\n\n2. 错误理解：\\(Q,W\\) 是状态函数。  \n   正确理解：\\(Q,W\\) 是过程量，与途径有关；\\(\\Delta U,\\Delta H,\\Delta S,\\Delta G\\) 与始末态有关。  \n   如何避免：记“热功走路径，状态函数看两端”。\n\n3. 错误理解：体系膨胀做功 \\(W\u003e0\\)。  \n   正确理解：本章符号约定中，环境对体系做功为正；体系对外膨胀做功 \\(W\u003c0\\)。  \n   如何避免：先判断能量是否进入体系。\n\n4. 错误理解：恒压热、恒容热都等于 \\(\\Delta H\\)。  \n   正确理解：恒容且无其他功时 \\(Q_V=\\Delta U\\)；恒压且只做体积功时 \\(Q_p=\\Delta H\\)。  \n   如何避免：看到恒容想 \\(U\\)，看到恒压想 \\(H\\)。\n\n5. 错误理解：\\(Q_p=Q_V+\\Delta nRT\\) 中 \\(\\Delta n\\) 统计所有物质。  \n   正确理解：只统计气体物质的量变化 \\(\\Delta n_g\\)。  \n   如何避免：固体、液体不计入。\n\n6. 错误理解：热化学方程式的 \\(\\Delta H\\) 与方程式系数无关。  \n   正确理解：反应式乘几倍，焓变也乘几倍；反应逆写，焓变变号。  \n   如何避免：把 \\(\\Delta H\\) 当作方程式的一部分一起变换。\n\n7. 错误理解：标准生成焓为零适用于所有单质。  \n   正确理解：只有稳定态单质标准生成焓为零。  \n   如何避免：注意石墨与金刚石、白磷与红磷等稳定态指定。\n\n8. 错误理解：键焓公式与生成焓公式方向一样。  \n   正确理解：键焓计算是反应物键焓总和减生成物键焓总和。  \n   如何避免：记“断旧键吸热，成新键放热”。\n\n9. 错误理解：放热反应一定自发。  \n   正确理解：自发性由 \\(\\Delta G=\\Delta H-T\\Delta S\\) 决定；存在吸热自发反应，也存在放热不自发条件。  \n   如何避免：方向判断优先看 \\(\\Delta G\\)。\n\n10. 错误理解：熵增原理可直接用于任意封闭体系。  \n    正确理解：\\(\\Delta S_{\\text{孤}}\u003e0\\) 是孤立体系自发判据；封闭体系还要考虑环境熵或用 \\(\\Delta G\\)。  \n    如何避免：看到“孤立”才直接用熵增原理。\n\n11. 错误理解：\\(\\Delta S\\) 单位可直接和 \\(\\Delta H\\) 相减。  \n    正确理解：\\(\\Delta H\\) 常为 kJ·mol\\(^{-1}\\)，\\(\\Delta S\\) 常为 J·mol\\(^{-1}\\)·K\\(^{-1}\\)，需统一单位。  \n    如何避免：计算 \\(\\Delta G\\) 前先把 \\(\\Delta S\\) 换成 kJ·mol\\(^{-1}\\)·K\\(^{-1}\\)。\n\n12. 错误理解：\\(\\Delta G^\\theta\u003c0\\) 说明任何条件下都自发。  \n    正确理解：\\(\\Delta G^\\theta\\) 说明标准状态下自发性；非标准状态需用实际 \\(\\Delta G\\)。  \n    如何避免：看到 \\(\\theta\\) 就限定为标准状态。\n\n13. 错误理解：催化剂能改变热力学自发性。  \n    正确理解：催化剂改变速率，不改变 \\(\\Delta G\\) 判据。  \n    如何避免：热力学管方向，动力学管快慢。\n\n14. 错误理解：\\(T_{\\text{转}}=\\Delta H/\\Delta S\\) 可直接用摄氏度。  \n    正确理解：温度必须用 K，且 \\(\\Delta H,\\Delta S\\) 单位一致。  \n    如何避免：先统一单位，再求 K。\n\n# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：本章符号约定中，体系吸热 \\(Q\\) 为 \\(\\_\\_\\_\\_\\_\\_\\)，体系放热 \\(Q\\) 为 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n2. 选择：下列属于状态函数的是  \n   A. \\(Q\\)  \n   B. \\(W\\)  \n   C. \\(H\\)  \n   D. 途径\n\n3. 填空：封闭体系与环境之间可以交换 \\(\\_\\_\\_\\_\\_\\_\\)，但不交换 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n4. 选择：恒压且只做体积功时，体系吸收的热量等于  \n   A. \\(\\Delta U\\)  \n   B. \\(\\Delta H\\)  \n   C. \\(\\Delta S\\)  \n   D. \\(\\Delta G\\)\n\n5. 填空：稳定态单质的标准生成焓为 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：气体分子数增加的反应，一般 \\(\\Delta S\\)  \n   A. 大于 0  \n   B. 小于 0  \n   C. 等于 0  \n   D. 无法判断且没有规律\n\n7. 填空：等温过程 Gibbs-Helmholtz 方程为 \\(\\Delta G=\\_\\_\\_\\_\\_\\_\\)。\n\n8. 选择：当 \\(\\Delta G\u003c0\\) 时，反应在该条件下  \n   A. 正向自发  \n   B. 正向非自发  \n   C. 平衡  \n   D. 一定瞬间完成\n\n## 二、公式计算题\n\n1. 某体系由 A 态到 B 态，沿途径 I 放热 \\(100\\text{ J}\\)，环境对体系做功 \\(50\\text{ J}\\)。求 \\(\\Delta U\\)。\n\n2. 反应 \\(\\mathrm{H_2(g)+0.5O_2(g)=H_2O(g)}\\) 在 \\(373\\text{ K}\\) 下 \\(\\Delta H=-241.8\\text{ kJ·mol}^{-1}\\)。求 \\(\\Delta U\\)。取 \\(R=8.31\\times10^{-3}\\text{ kJ·mol}^{-1}\\text{·K}^{-1}\\)。\n\n3. 已知：\n\\[\n\\mathrm{C(石墨)+O_2(g)=CO_2(g)}\\quad \\Delta H=-393.5\\text{ kJ·mol}^{-1}\n\\]\n\\[\n\\mathrm{CO(g)+0.5O_2(g)=CO_2(g)}\\quad \\Delta H=-283.0\\text{ kJ·mol}^{-1}\n\\]\n求：\n\\[\n\\mathrm{C(石墨)+0.5O_2(g)=CO(g)}\n\\]\n的 \\(\\Delta H\\)。\n\n4. 已知反应：\n\\[\n\\mathrm{CaCO_3(s)=CaO(s)+CO_2(g)}\n\\]\n且 \\(S^\\theta(\\mathrm{CaCO_3})=91.7\\)，\\(S^\\theta(\\mathrm{CaO})=38.1\\)，\\(S^\\theta(\\mathrm{CO_2})=213.8\\)，单位均为 J·mol\\(^{-1}\\)·K\\(^{-1}\\)。求 \\(\\Delta S^\\theta\\)。\n\n5. 某反应 \\(\\Delta H^\\theta=+182.6\\text{ kJ·mol}^{-1}\\)，\\(\\Delta S^\\theta=+0.0248\\text{ kJ·mol}^{-1}\\text{·K}^{-1}\\)。求转变温度 \\(T_{\\text{转}}\\)，并判断低温、高温下自发性。\n\n## 三、判断题\n\n1. 热和功只存在于变化过程中，不是状态函数。\n\n2. 孤立体系既不与环境交换物质，也不与环境交换能量。\n\n3. 可逆过程是真实过程，很容易在实验中完全实现。\n\n4. 恒容且无其他功时，\\(Q_V=\\Delta U\\)。\n\n5. 反应式反过来写时，\\(\\Delta H\\) 的数值和符号都不变。\n\n6. 键焓越大，断开该键所需吸收的热量越多。\n\n7. 熵增原理可直接写作：封闭体系 \\(\\Delta S_{\\text{体系}}\u003e0\\) 必自发。\n\n8. \\(\\Delta H\u003c0,\\Delta S\u003e0\\) 的反应在任何温度下 \\(\\Delta G\u003c0\\)。\n\n## 四、综合题\n\n1. 比较 \\(\\Delta U\\)、\\(\\Delta H\\)、\\(Q\\)、\\(W\\) 的区别：哪些是状态函数，哪些与途径有关？在恒容和恒压条件下分别如何联系反应热？\n\n2. 结合 \\(\\Delta G=\\Delta H-T\\Delta S\\)，总结四种 \\(\\Delta H\\)、\\(\\Delta S\\) 符号组合对反应自发性的影响，并各说明一个典型含义。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 正；负。本章规定体系得到能量为正，吸热为正，放热为负。\n\n2. C。\\(H\\) 是状态函数，\\(Q,W\\) 是过程量。\n\n3. 能量；物质。封闭体系没有物质交换，但可以有热或功等能量交换。\n\n4. B。恒压、无非体积功时 \\(Q_p=\\Delta H\\)。\n\n5. 0。稳定态单质标准生成焓为零。\n\n6. A。气体分子数增加通常意味着混乱度增大，\\(\\Delta S\u003e0\\)。\n\n7. \\(\\Delta H-T\\Delta S\\)。\n\n8. A。\\(\\Delta G\u003c0\\) 表示该条件下正向自发，但不代表反应一定很快。\n\n## 二、公式计算题答案\n\n1. 解题思路：用热力学第一定律 \\(\\Delta U=Q+W\\)。  \n   详细步骤：放热 \\(100\\text{ J}\\)，所以 \\(Q=-100\\text{ J}\\)；环境对体系做功 \\(50\\text{ J}\\)，所以 \\(W=+50\\text{ J}\\)。\n   \\[\n   \\Delta U=-100+50=-50\\text{ J}\n   \\]\n   最终答案：\\(-50\\text{ J}\\)。  \n   易错提醒：放热 \\(Q\u003c0\\)，环境对体系做功 \\(W\u003e0\\)。\n\n2. 解题思路：用 \\(\\Delta H=\\Delta U+\\Delta n_gRT\\)。  \n   详细步骤：\n   \\[\n   \\Delta n_g=1-(1+0.5)=-0.5\n   \\]\n   \\[\n   \\Delta U=\\Delta H-\\Delta n_gRT\n   \\]\n   \\[\n   \\Delta U=-241.8-[(-0.5)(8.31\\times10^{-3})(373)]\n   \\]\n   \\[\n   \\Delta U=-241.8-(-1.55)\\approx-240.3\\text{ kJ·mol}^{-1}\n   \\]\n   最终答案：约 \\(-240\\text{ kJ·mol}^{-1}\\)。  \n   易错提醒：\\(\\Delta n_g\\) 只统计气体；\\(R\\) 要用 kJ 单位。\n\n3. 解题思路：用盖斯定律。目标反应 = 反应 1 - 反应 2。  \n   详细步骤：\n   \\[\n   \\Delta H_3=\\Delta H_1-\\Delta H_2\n   \\]\n   \\[\n   \\Delta H_3=-393.5-(-283.0)=-110.5\\text{ kJ·mol}^{-1}\n   \\]\n   最终答案：\\(-110.5\\text{ kJ·mol}^{-1}\\)。  \n   易错提醒：减去一个反应等价于加上它的逆反应，焓变要变号。\n\n4. 解题思路：熵变等于生成物标准熵总和减反应物标准熵总和。  \n   详细步骤：\n   \\[\n   \\Delta S^\\theta=[S^\\theta(\\mathrm{CaO})+S^\\theta(\\mathrm{CO_2})]-S^\\theta(\\mathrm{CaCO_3})\n   \\]\n   \\[\n   \\Delta S^\\theta=(38.1+213.8)-91.7=160.2\n   \\]\n   最终答案：\\(160.2\\text{ J·mol}^{-1}\\text{·K}^{-1}\\)。  \n   易错提醒：熵单位通常是 J·mol\\(^{-1}\\)·K\\(^{-1}\\)，计算 \\(\\Delta G\\) 时要注意换成 kJ。\n\n5. 解题思路：令 \\(\\Delta G^\\theta=0\\)，则 \\(T_{\\text{转}}=\\Delta H^\\theta/\\Delta S^\\theta\\)。  \n   详细步骤：\n   \\[\n   T_{\\text{转}}=\\frac{182.6}{0.0248}=7363\\text{ K}\n   \\]\n   \\(\\Delta H\u003e0,\\Delta S\u003e0\\)，所以低温时 \\(\\Delta G\u003e0\\)，正向非自发；高温时 \\(T\\Delta S\\) 项占优，\\(\\Delta G\u003c0\\)，正向自发。  \n   最终答案：\\(T_{\\text{转}}\\approx7.36\\times10^3\\text{ K}\\)；低温非自发，高温自发。  \n   易错提醒：\\(\\Delta H\\) 和 \\(\\Delta S\\) 单位必须一致。\n\n## 三、判断题答案\n\n1. 正确。\\(Q,W\\) 与途径有关，只在过程中发生。\n\n2. 正确。这是孤立体系的定义。\n\n3. 错误。可逆过程是理想化极限过程，真实过程只能近似。\n\n4. 正确。恒容时 \\(\\Delta V=0\\)，无其他功则 \\(W=0\\)，所以 \\(Q_V=\\Delta U\\)。\n\n5. 错误。反应逆写时，\\(\\Delta H\\) 符号改变。\n\n6. 正确。键焓越大，键越强，断键越需要吸热。\n\n7. 错误。熵增原理直接适用于孤立体系；封闭体系不能只看体系熵。\n\n8. 正确。因为 \\(\\Delta G=\\Delta H-T\\Delta S\\)，当 \\(\\Delta H\u003c0,\\Delta S\u003e0\\) 时，两项都使 \\(\\Delta G\\) 为负。\n\n## 四、综合题答案\n\n1. 解析：  \n   \\(\\Delta U\\) 和 \\(\\Delta H\\) 是状态函数的变化，只与始末态有关；\\(Q\\) 和 \\(W\\) 是过程量，与途径有关。  \n   恒容、无其他功时，体系不做体积功：\n   \\[\n   Q_V=\\Delta U\n   \\]\n   恒压、只做体积功时：\n   \\[\n   Q_p=\\Delta H\n   \\]\n   对理想气体反应：\n   \\[\n   Q_p=Q_V+\\Delta n_gRT\n   \\]\n   因此反应热不总是状态函数，但在恒压或恒容等特定条件下可分别等于状态函数变化。\n\n2. 解析：  \n   由\n   \\[\n   \\Delta G=\\Delta H-T\\Delta S\n   \\]\n   可知：  \n   (1) \\(\\Delta H\u003c0,\\Delta S\u003e0\\)：放热且熵增，任意温度 \\(\\Delta G\u003c0\\)，正向自发。  \n   (2) \\(\\Delta H\u003e0,\\Delta S\u003c0\\)：吸热且熵减，任意温度 \\(\\Delta G\u003e0\\)，正向非自发。  \n   (3) \\(\\Delta H\u003c0,\\Delta S\u003c0\\)：低温时 \\(\\Delta H\\) 有利，正向自发；高温时 \\(-T\\Delta S\\) 为正且占优，正向非自发，如合成氨在标态下低温有利。  \n   (4) \\(\\Delta H\u003e0,\\Delta S\u003e0\\)：低温非自发，高温时熵增项占优，正向自发，如 \\(\\mathrm{N_2+O_2\\to2NO}\\) 需高温条件。\n\n## 材料完整性说明\n\n- PDF 文字层可识别，93 页内容已覆盖公式、例题和小结。\n- 第 57 页提取文字几乎为空，可能是空白页或纯图片页；材料中没有可识别文字信息。如该页有重要图示，请补充截图。\n- 部分功的积分式在课件提取中排版不完整，本整理保留其核心结论和可考试公式。\n",
    "chemistry_review/04-chemistry_review.md":  "# 本章复习提纲\n\n## 一、本章知识框架\n\n### 1. 本章主线：从“能否自发”到“能进行到什么程度”\n\n上一章用 \\(\\Delta G\\) 判断反应方向，本章进一步回答：即使 \\(\\Delta G\u003c0\\)，反应也不一定完全进行，而是可能达到化学平衡。核心逻辑是：\n\n1. 可逆反应会达到动态平衡。\n2. 平衡状态可用平衡常数 \\(K\\) 定量描述。\n3. \\(K\\)、\\(Q\\)、\\(\\Delta G\\) 共同判断反应方向和限度。\n4. 外界条件改变时，平衡会移动，但温度才会改变平衡常数。\n\n### 2. 化学平衡及其特点\n\n1. 可逆反应\n   - 正、逆反应同时存在。\n   - 反应物不一定完全转化为生成物。\n\n2. 动态平衡\n   - 达到平衡时，正反应速率等于逆反应速率。\n   - 各组分浓度或分压保持不变，但微观反应仍在进行。\n\n3. 平衡常数\n   - 描述平衡时反应物和生成物浓度或分压之间的定量关系。\n   - 同一反应在一定温度下 \\(K\\) 为定值。\n\n### 3. 平衡常数与反应限度\n\n1. 实验/经验平衡常数\n   - 溶液反应用浓度平衡常数 \\(K_c\\)。\n   - 气体反应用压力平衡常数 \\(K_p\\)。\n   - 理想气体反应中 \\(K_p=K_c(RT)^{\\Delta n_g}\\)。\n\n2. 标准平衡常数\n   - 用相对浓度或相对分压写表达式。\n   - \\(K^\\theta\\) 无量纲，是热力学平衡常数。\n   - 本章后续讨论的 \\(K\\) 多指 \\(K^\\theta\\)。\n\n3. 平衡常数与 Gibbs 自由能\n   - \\(\\Delta G_T^\\theta=-2.30RT\\lg K^\\theta\\)。\n   - 非标准态用 Van\u0027t Hoff 等温式：\n     \\[\n     \\Delta G_T=\\Delta G_T^\\theta+2.30RT\\lg Q=2.30RT\\lg\\frac{Q}{K^\\theta}\n     \\]\n\n4. 多重平衡\n   - 反应方程式相加，平衡常数相乘。\n   - 反应方程式相减，平衡常数相除。\n   - 反应式反向，平衡常数取倒数。\n\n### 4. 化学平衡的移动\n\n1. 浓度影响\n   - 温度不变时 \\(K^\\theta\\) 不变。\n   - 改变浓度会改变 \\(Q\\)，再由 \\(Q/K^\\theta\\) 判断移动方向。\n\n2. 压力影响\n   - 固相、液相受压力影响可忽略。\n   - 改变气体分压类似改变浓度。\n   - 改变气体总压时，只有气体计量系数变化的反应会明显移动。\n\n3. 温度影响\n   - 温度改变会改变 \\(K^\\theta\\)。\n   - Van\u0027t Hoff 方程：\n  \n     \\[\n     \\lg\\frac{K_2^\\theta}{K_1^\\theta}\n     =\n     \\frac{\\Delta H^\\theta}{2.30R}\n     \\left(\\frac{1}{T_1}-\\frac{1}{T_2}\\right)\n     =\n     \\frac{\\Delta H^\\theta}{2.30R}\n     \\left(\\frac{T_2-T_1}{T_1T_2}\\right)\n     \\]\n\n4. Le Chatelier 原理\n   - 改变外界条件时，平衡向削弱该改变的方向移动。\n\n## 二、重点概念整理\n\n### 1. 化学平衡\n\n定义：可逆反应中，正反应速率与逆反应速率相等，各组分浓度或分压保持不变的状态。\n\n需要记忆的点：\n\n- 平衡是动态的，不是反应停止。\n- 平衡时 \\(v_\\text{正}=v_\\text{逆}\\)。\n- 平衡状态与温度、反应本性有关。\n\n容易混淆的地方：\n\n- “浓度不变”不等于“反应停止”。\n- “\\(\\Delta G\u003c0\\)”表示正向自发趋势，不表示反应一定完全进行。\n\n可能怎么考：\n\n- 判断动态平衡特征。\n- 判断可逆反应是否能完全转化。\n- 给出浓度变化，判断是否已达到平衡。\n\n### 2. 平衡常数 \\(K\\)\n\n定义：一定温度下，反应达到平衡时，生成物浓度或分压按计量系数幂次相乘后除以反应物对应项所得的常数。\n\n需要记忆的点：\n\n- \\(K\\) 反映给定温度下反应的限度。\n- \\(K\\) 大，生成物占优；\\(K\\) 小，反应物占优。\n- \\(K\\) 与温度和反应本性有关，与起始浓度无关。\n\n容易混淆的地方：\n\n- 方程式写法不同，\\(K\\) 数值不同。\n- 纯固体和纯液体不写入平衡常数表达式。\n- 实验 \\(K_p,K_c\\) 可能有单位；标准平衡常数 \\(K^\\theta\\) 用相对量，通常视为无量纲。\n\n可能怎么考：\n\n- 写平衡常数表达式。\n- 由平衡浓度或分压计算 \\(K\\)。\n- 由反应式变换推算新反应的 \\(K\\)。\n\n### 3. 标准平衡常数 \\(K^\\theta\\)\n\n定义：将平衡浓度除以标准浓度 \\(c^\\theta\\)，或将平衡分压除以标准压力 \\(p^\\theta\\)，再代入平衡常数表达式得到的平衡常数。\n\n需要记忆的点：\n\n- \\(p^\\theta=100\\ \\mathrm{kPa}=1\\ \\mathrm{bar}\\)。\n- \\(c^\\theta\\) 为标准浓度，常用 \\(1\\ \\mathrm{mol\\cdot dm^{-3}}\\)。\n- 热力学公式中使用的是标准平衡常数 \\(K^\\theta\\)。\n\n容易混淆的地方：\n\n- 不能把 \\(K_p\\) 的数值直接当作 \\(K_p^\\theta\\)，尤其当反应前后气体计量系数不同时。\n- 标准平衡常数表达式中写的是 \\(p_i/p^\\theta\\) 或 \\(c_i/c^\\theta\\)，不是单独的 \\(p_i\\) 或 \\(c_i\\)。\n\n可能怎么考：\n\n- 给出平衡分压，计算 \\(K_p^\\theta\\)。\n- 区分 \\(K_p\\) 与 \\(K_p^\\theta\\)。\n\n### 4. 反应商 \\(Q\\)\n\n定义：按平衡常数的形式，用任意时刻或起始状态的浓度、分压写出的比值。\n\n需要记忆的点：\n\n- \\(Q\\) 不是常数，会随组成改变而改变。\n- \\(K\\) 是平衡时的 \\(Q\\)。\n- 用 \\(Q/K^\\theta\\) 判断非标准态下反应方向。\n\n容易混淆的地方：\n\n- \\(K\\) 用平衡浓度或分压；\\(Q\\) 用任意态或起始态浓度或分压。\n- 纯固体、纯液体同样不写入 \\(Q\\)。\n\n可能怎么考：\n\n- 给出起始分压，计算 \\(Q_p\\)。\n- 比较 \\(Q\\) 与 \\(K\\)，判断正向、逆向或平衡。\n\n### 5. Gibbs 自由能与反应限度\n\n定义：\\(\\Delta G\\) 是判断指定条件下反应方向的热力学量；平衡时 \\(\\Delta G=0\\)。\n\n需要记忆的点：\n\n- 标准态：\n  \\[\n  \\Delta G_T^\\theta=-2.30RT\\lg K^\\theta\n  \\]\n- 非标准态：\n  \\[\n  \\Delta G_T=2.30RT\\lg\\frac{Q}{K^\\theta}\n  \\]\n- \\(Q\u003cK^\\theta\\)：正向自发；\\(Q\u003eK^\\theta\\)：正向非自发；\\(Q=K^\\theta\\)：平衡。\n\n容易混淆的地方：\n\n- \\(\\Delta G_T^\\theta\\) 只能直接判断标准态；非标准态要用 \\(\\Delta G_T\\)。\n- \\(\\Delta G\u003c0\\) 只表示热力学方向，不表示反应速率快。\n\n可能怎么考：\n\n- 由 \\(\\Delta G^\\theta\\) 计算 \\(K^\\theta\\)。\n- 由 \\(Q/K^\\theta\\) 判断反应方向。\n- 判断改变条件是否足以使反应方向改变。\n\n### 6. 多重平衡\n\n定义：同一体系中若干平衡同时存在，一种物质可以同时参与多个平衡。\n\n需要记忆的点：\n\n- 方程式相加：\\(K_\\text{总}=K_1K_2\\)。\n- 方程式相减：\\(K_\\text{总}=K_1/K_2\\)。\n- 方程式乘以 \\(n\\)：\\(K_\\text{新}=K^n\\)。\n\n容易混淆的地方：\n\n- 反应式倒写时不是 \\(K\\) 变号，而是取倒数。\n- 反应式乘系数时 \\(K\\) 要乘幂。\n\n可能怎么考：\n\n- 给出两个反应的 \\(K\\)，求组合反应的 \\(K\\)。\n- 判断哪种还原剂热力学上更有利。\n\n### 7. 化学平衡移动\n\n定义：外界条件改变后，体系从原平衡状态转变到新平衡状态的过程。\n\n需要记忆的点：\n\n- 浓度改变：本质是改变 \\(Q\\)。\n- 压力改变：只对气体反应明显，且要看气体计量系数。\n- 温度改变：会改变 \\(K\\)。\n- Le Chatelier 原理：平衡向削弱外界改变的方向移动。\n\n容易混淆的地方：\n\n- 浓度和压力改变通常改变 \\(Q\\)，不改变 \\(K\\)。\n- 温度改变才改变 \\(K\\)。\n- 对 \\(\\Delta n_g=0\\) 的气体反应，改变总压不影响平衡。\n\n可能怎么考：\n\n- 判断增压、升温、加反应物后的平衡移动方向。\n- 结合 \\(Q/K\\) 定量判断移动方向。\n- 用 Van\u0027t Hoff 方程计算温度改变后的 \\(K\\)。\n\n## 三、重要公式整理\n\n### 1. 浓度平衡常数\n\n公式：\n\n\\[\nK_c=\\frac{[C]^c[D]^d}{[A]^a[B]^b}\n\\]\n\n符号说明：\n\n- \\(aA+bB\\rightleftharpoons cC+dD\\)：可逆反应通式。\n- \\([A],[B],[C],[D]\\)：平衡浓度，常用 \\(\\mathrm{mol\\cdot dm^{-3}}\\)。\n- \\(a,b,c,d\\)：化学计量数。\n\n适用条件：\n\n- 溶液反应，或用浓度表示的反应体系。\n- 必须使用平衡浓度。\n\n解题步骤：\n\n1. 写配平反应方程式。\n2. 判断哪些物质写入表达式。\n3. 把生成物写在分子、反应物写在分母。\n4. 指数等于方程式计量数。\n\n易错点：\n\n- 纯固体、纯液体不写入表达式。\n- 不能用起始浓度直接代替平衡浓度。\n\n例题方向：\n\n- 根据平衡浓度计算 \\(K_c\\)。\n- 根据 \\(K_c\\) 和初始量计算平衡组成。\n\n### 2. 压力平衡常数\n\n公式：\n\n\\[\nK_p=\\frac{p_C^c p_D^d}{p_A^a p_B^b}\n\\]\n\n符号说明：\n\n- \\(p_A,p_B,p_C,p_D\\)：平衡分压，常用 \\(\\mathrm{kPa}\\)。\n- 指数为对应气体的化学计量数。\n\n适用条件：\n\n- 气体反应。\n- 使用平衡分压。\n\n解题步骤：\n\n1. 只写气态物质。\n2. 用平衡分压代入。\n3. 按计量数写幂次。\n\n易错点：\n\n- 分压不是总压，必要时用 \\(p_i=y_i p_\\text{总}\\)。\n- 固体、液体不写入。\n\n例题方向：\n\n- 由平衡分压求 \\(K_p\\)。\n- 由总压和摩尔分数求 \\(K_p\\)。\n\n### 3. \\(K_p\\) 与 \\(K_c\\) 的关系\n\n公式：\n\n\\[\nK_p=K_c(RT)^{\\Delta n_g}\n\\]\n\n符号说明：\n\n- \\(\\Delta n_g=\\sum\\nu_\\text{气态生成物}-\\sum\\nu_\\text{气态反应物}\\)。\n- \\(R\\)：气体常数。\n- \\(T\\)：热力学温度，单位 \\(\\mathrm{K}\\)。\n\n适用条件：\n\n- 理想气体反应。\n- \\(K_p\\) 与 \\(K_c\\) 均按实验/经验形式书写。\n\n解题步骤：\n\n1. 配平方程式。\n2. 只统计气体计量数，求 \\(\\Delta n_g\\)。\n3. 代入 \\(K_p=K_c(RT)^{\\Delta n_g}\\)。\n\n常见变形：\n\n\\[\nK_c=K_p(RT)^{-\\Delta n_g}\n\\]\n\n易错点：\n\n- \\(\\Delta n_g=0\\) 时 \\(K_p=K_c\\)。\n- 固体和液体不计入 \\(\\Delta n_g\\)。\n\n例题方向：\n\n- \\(H_2+I_2\\rightleftharpoons 2HI\\)，\\(\\Delta n_g=0\\)，所以 \\(K_p=K_c\\)。\n- \\(N_2+3H_2\\rightleftharpoons 2NH_3\\)，\\(\\Delta n_g=-2\\)，所以 \\(K_p=K_c(RT)^{-2}\\)。\n\n### 4. 标准平衡常数\n\n公式：\n\n\\[\nK_p^\\theta=\n\\frac{(p_C/p^\\theta)^c(p_D/p^\\theta)^d}\n{(p_A/p^\\theta)^a(p_B/p^\\theta)^b}\n\\]\n\n\\[\nK_c^\\theta=\n\\frac{([C]/c^\\theta)^c([D]/c^\\theta)^d}\n{([A]/c^\\theta)^a([B]/c^\\theta)^b}\n\\]\n\n符号说明：\n\n- \\(p^\\theta=100\\ \\mathrm{kPa}=1\\ \\mathrm{bar}\\)。\n- \\(c^\\theta\\)：标准浓度，通常为 \\(1\\ \\mathrm{mol\\cdot dm^{-3}}\\)。\n- 括号内为相对分压或相对浓度。\n\n适用条件：\n\n- 热力学计算。\n- 标准态相关的平衡常数。\n\n解题步骤：\n\n1. 写出平衡常数表达式。\n2. 将每个平衡分压除以 \\(p^\\theta\\)，或将浓度除以 \\(c^\\theta\\)。\n3. 按计量数代入。\n\n易错点：\n\n- 标准平衡常数不是简单地把 \\(K_p\\) 或 \\(K_c\\) 改个符号。\n- 使用热力学公式时应使用 \\(K^\\theta\\)。\n\n例题方向：\n\n- 给出 \\(N_2+3H_2\\rightleftharpoons 2NH_3\\) 的平衡分压，求 \\(K_p^\\theta\\)。\n\n### 5. 标准 Gibbs 自由能与平衡常数\n\n公式：\n\n\\[\n\\Delta G_T^\\theta=-2.30RT\\lg K^\\theta\n\\]\n\n常见变形：\n\n\\[\n\\lg K^\\theta=-\\frac{\\Delta G_T^\\theta}{2.30RT}\n\\]\n\n\\[\nK^\\theta=10^{-\\Delta G_T^\\theta/(2.30RT)}\n\\]\n\n符号说明：\n\n- \\(\\Delta G_T^\\theta\\)：温度 \\(T\\) 下标准 Gibbs 自由能变。\n- \\(R=8.31\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}\\)。\n- \\(T\\)：热力学温度，单位 \\(\\mathrm{K}\\)。\n- \\(K^\\theta\\)：标准平衡常数。\n\n适用条件：\n\n- 标准态。\n- 温度为 \\(T\\)。\n\n解题步骤：\n\n1. 先计算或查得 \\(\\Delta G_T^\\theta\\)。\n2. 注意单位：若 \\(\\Delta G\\) 为 \\(\\mathrm{kJ\\cdot mol^{-1}}\\)，要换算为 \\(\\mathrm{J\\cdot mol^{-1}}\\)，或把 \\(R\\) 改为 \\(\\mathrm{kJ}\\) 单位。\n3. 代入公式求 \\(\\lg K^\\theta\\)。\n4. 取 10 的幂得到 \\(K^\\theta\\)。\n\n易错点：\n\n- 公式中是 \\(\\lg\\)，不是 \\(\\ln\\)。\n- \\(\\Delta G^\\theta\u003c0\\) 时 \\(K^\\theta\u003e1\\)；\\(\\Delta G^\\theta\u003e0\\) 时 \\(K^\\theta\u003c1\\)。\n\n例题方向：\n\n- 由 \\(\\Delta G_f^\\theta\\) 计算反应 \\(\\Delta G^\\theta\\)，再求 \\(K^\\theta\\)。\n\n### 6. 任意温度下标准 Gibbs 自由能近似计算\n\n公式：\n\n\\[\n\\Delta G_T^\\theta=\\Delta H_{298}^\\theta-T\\Delta S_{298}^\\theta\n\\]\n\n符号说明：\n\n- \\(\\Delta H_{298}^\\theta\\)：298 K 标准焓变。\n- \\(\\Delta S_{298}^\\theta\\)：298 K 标准熵变。\n- \\(T\\)：指定温度，单位 \\(\\mathrm{K}\\)。\n\n适用条件：\n\n- 课件中用于估算指定温度下的 \\(\\Delta G_T^\\theta\\)。\n- 默认 \\(\\Delta H^\\theta,\\Delta S^\\theta\\) 随温度变化不大。\n\n解题步骤：\n\n1. 用生成焓求 \\(\\Delta H_{298}^\\theta\\)。\n2. 用标准熵求 \\(\\Delta S_{298}^\\theta\\)。\n3. 单位统一后代入 \\(\\Delta G_T^\\theta=\\Delta H_{298}^\\theta-T\\Delta S_{298}^\\theta\\)。\n4. 再用 \\(\\Delta G_T^\\theta=-2.30RT\\lg K^\\theta\\) 求 \\(K^\\theta\\)。\n\n易错点：\n\n- \\(\\Delta S\\) 常为 \\(\\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}\\)，与 \\(\\Delta H\\) 的 \\(\\mathrm{kJ}\\) 要统一。\n\n例题方向：\n\n- 合成氨在 298 K 与 673 K 下 \\(K_p^\\theta\\) 的比较。\n\n### 7. Van\u0027t Hoff 等温式\n\n公式：\n\n\\[\n\\Delta G_T=\\Delta G_T^\\theta+2.30RT\\lg Q\n\\]\n\n\\[\n\\Delta G_T=2.30RT\\lg\\frac{Q}{K^\\theta}\n\\]\n\n符号说明：\n\n- \\(Q\\)：反应商，可为 \\(Q_p\\) 或 \\(Q_c\\)。\n- \\(K^\\theta\\)：同温度下标准平衡常数。\n- \\(\\Delta G_T\\)：非标准态下 Gibbs 自由能变。\n\n适用条件：\n\n- 非标准态。\n- 判断指定条件下反应方向。\n\n解题步骤：\n\n1. 写出 \\(Q\\) 表达式。\n2. 用起始浓度或分压求 \\(Q\\)。\n3. 比较 \\(Q\\) 与 \\(K^\\theta\\)，或代入 \\(\\Delta G_T=2.30RT\\lg(Q/K^\\theta)\\)。\n4. 根据 \\(\\Delta G_T\\) 符号判断方向。\n\n易错点：\n\n- \\(Q\\) 与 \\(K\\) 的表达式形式相同，但代入状态不同。\n- 不要用 \\(\\Delta G_T^\\theta\\) 直接判断非标准态。\n\n例题方向：\n\n- \\(N_2+O_2\\rightleftharpoons 2NO\\) 在给定分压下方向判断。\n- 浓盐酸还原 \\(MnO_2\\) 制 \\(Cl_2\\) 的非标准态自发性判断。\n\n### 8. \\(Q/K^\\theta\\) 判据\n\n公式：\n\n\\[\n\\frac{Q}{K^\\theta}\u003c1 \\Rightarrow \\Delta G_T\u003c0\n\\]\n\n\\[\n\\frac{Q}{K^\\theta}=1 \\Rightarrow \\Delta G_T=0\n\\]\n\n\\[\n\\frac{Q}{K^\\theta}\u003e1 \\Rightarrow \\Delta G_T\u003e0\n\\]\n\n适用条件：\n\n- 非标准态。\n- \\(Q\\) 与 \\(K^\\theta\\) 必须对应同一反应式、同一温度、同一标准状态。\n\n解题步骤：\n\n1. 计算 \\(Q\\)。\n2. 查得或计算 \\(K^\\theta\\)。\n3. 比较 \\(Q/K^\\theta\\)。\n\n易错点：\n\n- 反应式反向后，\\(Q\\) 和 \\(K\\) 都要随之改变。\n\n例题方向：\n\n- 给出三组分压，判断反应正向、逆向还是平衡。\n\n### 9. 反应限度的半定量判断\n\n公式/规律：\n\n\\[\nK^\\theta \\ge 10^7\n\\]\n\n反应自发、较彻底。\n\n\\[\nK^\\theta \\le 10^{-7}\n\\]\n\n反应几乎不发生。\n\n\\[\n10^{-7}\u003cK^\\theta\u003c10^7\n\\]\n\n反应一定程度进行，可通过改变条件促进。\n\n等价地：\n\n\\[\n\\Delta G_T^\\theta \\le -40\\ \\mathrm{kJ\\cdot mol^{-1}}\n\\]\n\n通常反应自发、完全；\n\n\\[\n\\Delta G_T^\\theta \\ge +40\\ \\mathrm{kJ\\cdot mol^{-1}}\n\\]\n\n通常反应正向非自发。\n\n适用条件：\n\n- 课件给出的经验性、半定量判断。\n- 具体边界与反应类型有关。\n\n易错点：\n\n- \\(\\pm 40\\ \\mathrm{kJ\\cdot mol^{-1}}\\) 不是绝对规则，是经验判断。\n- 中间区间不能只看 \\(\\Delta G_T^\\theta\\)，应结合 \\(Q\\) 或条件变化。\n\n### 10. 多重平衡常数\n\n公式：\n\n若\n\n\\[\n\\text{反应 }3=\\text{反应 }1+\\text{反应 }2\n\\]\n\n则\n\n\\[\nK_3^\\theta=K_1^\\theta K_2^\\theta\n\\]\n\n若\n\n\\[\n\\text{反应 }3=\\text{反应 }2-\\text{反应 }1\n\\]\n\n则\n\n\\[\nK_3^\\theta=\\frac{K_2^\\theta}{K_1^\\theta}\n\\]\n\n适用条件：\n\n- 多个反应在同一温度下组合。\n- 反应方程式必须严格对应。\n\n易错点：\n\n- 不能只看物质种类，要看反应方向和计量数。\n\n例题方向：\n\n- 用 \\(CO_2+H_2\\rightleftharpoons CO+H_2O\\) 和 \\(CoO+H_2\\rightleftharpoons Co+H_2O\\) 求 \\(CoO+CO\\rightleftharpoons Co+CO_2\\) 的 \\(K\\)。\n\n### 11. Van\u0027t Hoff 方程\n\n公式：\n\n\\[\n\\lg\\frac{K_2^\\theta}{K_1^\\theta}\n=\n\\frac{\\Delta H^\\theta}{2.30R}\n\\left(\\frac{1}{T_1}-\\frac{1}{T_2}\\right)\n\\]\n\n等价形式：\n\n\\[\n\\lg\\frac{K_2^\\theta}{K_1^\\theta}\n=\n\\frac{\\Delta H^\\theta}{2.30R}\n\\left(\\frac{T_2-T_1}{T_1T_2}\\right)\n\\]\n\n符号说明：\n\n- \\(K_1^\\theta,K_2^\\theta\\)：温度 \\(T_1,T_2\\) 下的标准平衡常数。\n- \\(\\Delta H^\\theta\\)：标准反应焓变。\n- \\(R=8.31\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}\\)。\n\n适用条件：\n\n- 研究温度对平衡常数的影响。\n- 近似认为 \\(\\Delta H^\\theta\\) 在温度范围内不变。\n\n解题步骤：\n\n1. 明确 \\(T_1,K_1^\\theta,T_2\\)。\n2. 判断 \\(\\Delta H^\\theta\\) 正负。\n3. 单位统一后代入。\n4. 求 \\(\\lg(K_2/K_1)\\)，再求 \\(K_2\\)。\n\n易错点：\n\n- 温度必须用 \\(\\mathrm{K}\\)。\n- 放热反应升温 \\(K\\) 减小，吸热反应升温 \\(K\\) 增大。\n\n例题方向：\n\n- 已知 \\(\\Delta H^\\theta\\)、\\(K_1\\)、\\(T_1,T_2\\)，求 \\(K_2\\)。\n- 已知两个温度下 \\(K\\)，求 \\(\\Delta H^\\theta\\)。\n\n### 12. 转化率\n\n公式：\n\n\\[\n\\alpha=\\frac{\\text{反应掉的量}}{\\text{起始量}}\\times 100\\%\n\\]\n\n符号说明：\n\n- \\(\\alpha\\)：转化率或分解率。\n- “反应掉的量”与“起始量”必须针对同一物质。\n\n适用条件：\n\n- 平衡组成计算。\n- 如 \\(N_2O_4(g)\\rightleftharpoons 2NO_2(g)\\) 的摩尔分解率计算。\n\n易错点：\n\n- 不同物质转化率可能不同。\n- 不能把生成物量直接除以反应物起始量，必须按化学计量关系换算。\n\n## 四、需要记忆的性质和规律\n\n| 知识点 | 具体内容 | 记忆方法 | 常见考法 |\n|---|---|---|---|\n| 动态平衡 | 平衡时 \\(v_\\text{正}=v_\\text{逆}\\)，组成不再随时间变化 | “宏观不变，微观不停” | 判断平衡是否表示反应停止 |\n| \\(K\\) 的意义 | \\(K\\) 反映给定温度下反应限度 | \\(K\\) 大偏生成物，\\(K\\) 小偏反应物 | 根据 \\(K\\) 判断反应进行程度 |\n| \\(K\\) 与温度 | 浓度、压力改变不改变 \\(K\\)；温度改变 \\(K\\) | “只有温度改常数” | 判断加压、加反应物是否改变 \\(K\\) |\n| \\(K_p\\) 与 \\(K_c\\) | \\(K_p=K_c(RT)^{\\Delta n_g}\\) | 气体数变多少，指数就是多少 | 由 \\(K_c\\) 求 \\(K_p\\) |\n| 标准平衡常数 | 用 \\(p_i/p^\\theta\\)、\\(c_i/c^\\theta\\) 写表达式 | “先除标准，再代公式” | 区分 \\(K_p\\) 与 \\(K_p^\\theta\\) |\n| 纯固体、纯液体 | 不写入 \\(K\\) 和 \\(Q\\) 表达式 | 活度近似为 1 | 写平衡常数表达式 |\n| 方程式写法 | 反向取倒数，乘系数则 \\(K\\) 乘幂 | “式变，K 也变” | 多重平衡、反应式变换 |\n| \\(Q/K\\) 判据 | \\(Q\u003cK\\) 正向；\\(Q\u003eK\\) 逆向；\\(Q=K\\) 平衡 | “缺产物就正向，产物太多就逆向” | 给定初始分压判断方向 |\n| \\(\\Delta G\\) 判据 | \\(\\Delta G\u003c0\\) 正向自发，\\(\\Delta G=0\\) 平衡，\\(\\Delta G\u003e0\\) 正向非自发 | 与上一章方向判据相连 | 非标准态方向判断 |\n| 限度经验判断 | \\(K\\ge10^7\\) 较彻底，\\(K\\le10^{-7}\\) 几乎不发生 | 对应 \\(\\Delta G^\\theta\\approx \\mp40\\ \\mathrm{kJ\\cdot mol^{-1}}\\) | 快速判断是否需要改变条件 |\n| 多重平衡 | 方程式相加 \\(K\\) 相乘，相减 \\(K\\) 相除 | 因为 \\(\\Delta G^\\theta\\) 可加 | 组合反应求 \\(K\\) |\n| 浓度影响 | 改变浓度改变 \\(Q\\)，平衡向使 \\(Q\\to K\\) 的方向移动 | “让 Q 回到 K” | 加反应物或产物判断移动 |\n| 压力影响 | 改变总压只对气体计量系数不同的反应有明显影响 | 增压向气体数少方向移动 | \\(N_2O_4\\rightleftharpoons2NO_2\\) 增压分析 |\n| 温度影响 | 升温向吸热方向移动；降温向放热方向移动 | 把热量看成反应物或生成物 | 判断升温后 \\(K\\) 变大或变小 |\n| Le Chatelier 原理 | 平衡向削弱外界改变的方向移动 | “抵抗改变” | 浓度、压力、温度综合判断 |\n| 转化率 | \\(\\alpha=(反应掉的量/起始量)\\times100\\%\\) | 分子分母必须同一种物质 | 平衡组成与分解率计算 |\n\n补充常考点：催化剂能改变反应速率、缩短达到平衡的时间，但材料中没有详细讨论催化剂；按常规化学平衡知识，催化剂不改变 \\(K\\)，也不改变平衡组成。\n\n## 五、易错点总结\n\n### 1. 把“平衡”理解为“反应停止”\n\n- 错误理解：达到平衡后正反应和逆反应都停止。\n- 正确理解：平衡是动态平衡，\\(v_\\text{正}=v_\\text{逆}\\)，宏观组成不变。\n- 如何避免：看到“平衡”先想到“速率相等”，不要想到“速率为零”。\n\n### 2. 用起始浓度直接计算 \\(K\\)\n\n- 错误理解：把题目给的起始浓度代入平衡常数表达式。\n- 正确理解：\\(K\\) 必须用平衡浓度或平衡分压；起始态应计算 \\(Q\\)。\n- 如何避免：题目问 \\(K\\) 看是否给的是“平衡”；题目问方向才常用“起始”算 \\(Q\\)。\n\n### 3. 忘记纯固体、纯液体不写入表达式\n\n- 错误理解：所有反应物和生成物都写进 \\(K\\)。\n- 正确理解：纯固体和纯液体的活度视为常数，不写入 \\(K\\) 和 \\(Q\\)。\n- 如何避免：写表达式前先标注状态符号。\n\n### 4. 混淆 \\(K_p\\)、\\(K_c\\)、\\(K^\\theta\\)\n\n- 错误理解：\\(K_p\\)、\\(K_c\\)、\\(K^\\theta\\) 数值总是一样。\n- 正确理解：\\(K_p=K_c(RT)^{\\Delta n_g}\\) 只适用于理想气体；标准平衡常数使用相对分压或相对浓度，数值可能不同。\n- 如何避免：看题目要求是压力、浓度还是标准平衡常数。\n\n### 5. 忽视反应式写法对 \\(K\\) 的影响\n\n- 错误理解：同一物质体系的 \\(K\\) 固定不变。\n- 正确理解：反应倒写 \\(K\\) 取倒数；反应乘以 \\(n\\)，\\(K\\) 变为 \\(K^n\\)。\n- 如何避免：先把目标反应式与已知反应式严格对齐。\n\n### 6. 用 \\(\\Delta G_T^\\theta\\) 判断非标准态\n\n- 错误理解：只要 \\(\\Delta G^\\theta\u003e0\\)，任何条件下正向都不能自发。\n- 正确理解：非标准态应使用 \\(\\Delta G_T=\\Delta G_T^\\theta+2.30RT\\lg Q\\)。\n- 如何避免：只要浓度或分压不是标准态，就必须考虑 \\(Q\\)。\n\n### 7. 认为浓度或压力改变会改变 \\(K\\)\n\n- 错误理解：加入反应物后 \\(K\\) 变大，所以生成物增多。\n- 正确理解：温度不变时 \\(K\\) 不变；加入反应物改变 \\(Q\\)，使平衡移动。\n- 如何避免：记住“移动的是平衡位置，不是平衡常数”。\n\n### 8. 压力影响不看气体计量系数\n\n- 错误理解：所有气体反应增压都向生成物方向移动。\n- 正确理解：改变总压时，平衡向气体计量系数减小的方向移动；若 \\(\\Delta n_g=0\\)，总压影响不明显。\n- 如何避免：先算反应前后气体计量数。\n\n### 9. 温度影响只背 Le Chatelier，不会判断 \\(K\\)\n\n- 错误理解：升温一定使 \\(K\\) 增大。\n- 正确理解：吸热反应升温 \\(K\\) 增大；放热反应升温 \\(K\\) 减小。\n- 如何避免：判断 \\(\\Delta H^\\theta\\) 正负，再用 Van\u0027t Hoff 方程或“升温向吸热方向”判断。\n\n### 10. \\(\\Delta n_g\\) 把固体、液体也算进去\n\n- 错误理解：所有物质计量数都参与 \\(\\Delta n_g\\)。\n- 正确理解：\\(\\Delta n_g\\) 只统计气体。\n- 如何避免：计算前圈出所有 \\((g)\\)。\n\n### 11. 单位不统一导致 \\(\\Delta G\\)、\\(K\\) 计算错误\n\n- 错误理解：\\(\\Delta G\\) 用 \\(\\mathrm{kJ}\\)，\\(R\\) 用 \\(\\mathrm{J}\\) 也直接代入。\n- 正确理解：单位必须统一。\n- 如何避免：若 \\(R=8.31\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}\\)，\\(\\Delta G\\) 用 \\(\\mathrm{J\\cdot mol^{-1}}\\)；若 \\(R=8.31\\times10^{-3}\\ \\mathrm{kJ\\cdot mol^{-1}\\cdot K^{-1}}\\)，\\(\\Delta G\\) 用 \\(\\mathrm{kJ\\cdot mol^{-1}}\\)。\n\n# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：化学平衡是指可逆反应中 \\(v_\\text{正}\\) 与 \\(v_\\text{逆}\\) ______，各组分浓度或分压保持不变的状态。\n\n2. 选择：对反应 \\(aA+bB\\rightleftharpoons cC+dD\\)，浓度平衡常数 \\(K_c\\) 的正确形式是  \n   A. \\(\\frac{[A]^a[B]^b}{[C]^c[D]^d}\\)  \n   B. \\(\\frac{[C]^c[D]^d}{[A]^a[B]^b}\\)  \n   C. \\(\\frac{[C][D]}{[A][B]}\\)  \n   D. \\(\\frac{[A]+[B]}{[C]+[D]}\\)\n\n3. 填空：标准压力 \\(p^\\theta\\) 在本章中取 ______ kPa，也等于 1 bar。\n\n4. 选择：下列物质在写平衡常数表达式时通常不写入的是  \n   A. \\(CO(g)\\)  \n   B. \\(H^+(aq)\\)  \n   C. \\(Fe(s)\\)  \n   D. \\(NO_2(g)\\)\n\n5. 填空：非标准态下判断反应方向时，用反应商 \\(Q\\) 与 ______ 比较。\n\n6. 选择：若 \\(Q/K^\\theta\u003c1\\)，则该条件下反应  \n   A. 正向自发  \n   B. 正向非自发  \n   C. 已达到平衡  \n   D. 无法判断\n\n7. 填空：若某反应式反向书写，则新反应的平衡常数等于原平衡常数的 ______。\n\n8. 选择：温度升高时，吸热反应的标准平衡常数通常  \n   A. 增大  \n   B. 减小  \n   C. 不变  \n   D. 一定等于 1\n\n## 二、公式计算题\n\n1. 已知 \\(H_2(g)+I_2(g)\\rightleftharpoons 2HI(g)\\) 在某温度下平衡浓度为 \\([H_2]=0.00300\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\([I_2]=0.00200\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\([HI]=0.0180\\ \\mathrm{mol\\cdot dm^{-3}}\\)。求 \\(K_c\\)。\n\n2. 对理想气体反应 \\(N_2(g)+3H_2(g)\\rightleftharpoons 2NH_3(g)\\)，若 \\(K_c=2.00\\times10^2\\)，\\(T=500\\ \\mathrm{K}\\)，取 \\(R=8.31\\ \\mathrm{kPa\\cdot dm^3\\cdot mol^{-1}\\cdot K^{-1}}\\)，求 \\(K_p\\)。\n\n3. 某反应在 298 K 时 \\(\\Delta G_{298}^\\theta=40.0\\ \\mathrm{kJ\\cdot mol^{-1}}\\)。求 \\(K^\\theta\\)。取 \\(R=8.31\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}\\)。\n\n4. 2000 ℃ 时，\\(N_2(g)+O_2(g)\\rightleftharpoons 2NO(g)\\) 的 \\(K_p^\\theta=9.8\\times10^{-2}\\)。若 \\(p_{NO}=1.00\\ \\mathrm{kPa}\\)，\\(p_{N_2}=82.1\\ \\mathrm{kPa}\\)，\\(p_{O_2}=82.1\\ \\mathrm{kPa}\\)，\\(p^\\theta=100\\ \\mathrm{kPa}\\)，求 \\(Q_p\\)，并判断反应方向。\n\n5. 在 823 K 时，反应（1）\\(CO_2(g)+H_2(g)\\rightleftharpoons CO(g)+H_2O(g)\\)，\\(K_{p1}=0.14\\)；反应（2）\\(CoO(s)+H_2(g)\\rightleftharpoons Co(s)+H_2O(g)\\)，\\(K_{p2}=67\\)。求反应（3）\\(CoO(s)+CO(g)\\rightleftharpoons Co(s)+CO_2(g)\\) 的 \\(K_{p3}\\)。\n\n## 三、判断题\n\n1. 化学平衡时，正反应和逆反应都停止。  \n2. 在一定温度下，平衡常数 \\(K\\) 与反应物起始浓度无关。  \n3. \\(K_p=K_c(RT)^{\\Delta n_g}\\) 中的 \\(\\Delta n_g\\) 要统计所有反应物和生成物。  \n4. 纯固体和纯液体通常不写入平衡常数表达式。  \n5. 当 \\(Q=K^\\theta\\) 时，\\(\\Delta G_T=0\\)，体系处于平衡。  \n6. 对任意反应，升高温度都会使 \\(K^\\theta\\) 增大。  \n7. 反应式相加得到总反应时，总反应的平衡常数等于各反应平衡常数之和。  \n8. 对 \\(H_2(g)+I_2(g)\\rightleftharpoons 2HI(g)\\)，改变总压对平衡位置影响很小，因为反应前后气体计量数相同。\n\n## 四、综合题\n\n1. 某温度下反应 \\(N_2O_4(g)\\rightleftharpoons 2NO_2(g)\\) 已达到平衡。请分别分析：  \n   （1）增大总压时平衡如何移动；  \n   （2）若保持温度不变，\\(K^\\theta\\) 是否改变；  \n   （3）如果升高温度后 \\(K^\\theta\\) 增大，说明该反应正向是吸热还是放热。\n\n2. 对反应 \\(MnO_2(s)+4H^+(aq)+2Cl^-(aq)\\rightleftharpoons Mn^{2+}(aq)+Cl_2(g)+2H_2O(l)\\)，材料给出标态下 298 K 时 \\(\\Delta G_{298}^\\theta=25.4\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，但使用 \\(12.0\\ \\mathrm{mol\\cdot dm^{-3}}\\) 的 HCl 时反应可自发。请说明为什么标态和浓盐酸条件下方向不同，并写出判断思路。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 相等。平衡是动态平衡，正逆反应速率相等，但反应并未停止。\n\n2. B。生成物浓度按计量系数作幂写在分子，反应物写在分母。\n\n3. 100。材料中 \\(p^\\theta=100\\ \\mathrm{kPa}=1\\ \\mathrm{bar}\\)。\n\n4. C。纯固体 \\(Fe(s)\\) 的活度视为常数，不写入平衡常数表达式。\n\n5. \\(K^\\theta\\)。非标准态方向由 \\(Q/K^\\theta\\) 或 \\(\\Delta G_T=2.30RT\\lg(Q/K^\\theta)\\) 判断。\n\n6. A。\\(Q/K^\\theta\u003c1\\) 时 \\(\\Delta G_T\u003c0\\)，正向自发。\n\n7. 倒数。反应倒写时，生成物和反应物互换，平衡常数变为 \\(1/K\\)。\n\n8. A。吸热反应升温时，平衡向吸热方向移动，\\(K^\\theta\\) 增大。\n\n## 二、公式计算题答案\n\n1. 解题思路：直接用 \\(K_c=[HI]^2/([H_2][I_2])\\)。  \n   使用公式：\n   \\[\n   K_c=\\frac{[HI]^2}{[H_2][I_2]}\n   \\]\n   已知量：\\([HI]=0.0180\\)，\\([H_2]=0.00300\\)，\\([I_2]=0.00200\\)，单位均为 \\(\\mathrm{mol\\cdot dm^{-3}}\\)。  \n   代入：\n   \\[\n   K_c=\\frac{(0.0180)^2}{(0.00300)(0.00200)}=54.0\n   \\]\n   最终答案：\\(K_c=54.0\\)。  \n   易错提醒：必须用平衡浓度；该反应 \\(\\Delta n_g=0\\)，因此在理想气体条件下 \\(K_p=K_c\\)。\n\n2. 解题思路：先求 \\(\\Delta n_g\\)，再用 \\(K_p=K_c(RT)^{\\Delta n_g}\\)。  \n   使用公式：\n   \\[\n   K_p=K_c(RT)^{\\Delta n_g}\n   \\]\n   已知量：\\(K_c=2.00\\times10^2\\)，\\(T=500\\ \\mathrm{K}\\)，\\(R=8.31\\ \\mathrm{kPa\\cdot dm^3\\cdot mol^{-1}\\cdot K^{-1}}\\)。  \n   代入：\\(\\Delta n_g=2-(1+3)=-2\\)，\\(RT=8.31\\times500=4155\\)。  \n   \\[\n   K_p=2.00\\times10^2(4155)^{-2}=1.16\\times10^{-5}\n   \\]\n   最终答案：\\(K_p\\approx1.16\\times10^{-5}\\)。  \n   易错提醒：\\(\\Delta n_g\\) 只统计气体，且这里指数为 \\(-2\\)。\n\n3. 解题思路：用 \\(\\Delta G^\\theta=-2.30RT\\lg K^\\theta\\)。  \n   使用公式：\n   \\[\n   \\lg K^\\theta=-\\frac{\\Delta G^\\theta}{2.30RT}\n   \\]\n   已知量：\\(\\Delta G^\\theta=40.0\\ \\mathrm{kJ\\cdot mol^{-1}}=4.00\\times10^4\\ \\mathrm{J\\cdot mol^{-1}}\\)，\\(T=298\\ \\mathrm{K}\\)。  \n   代入：\n   \\[\n   \\lg K^\\theta=-\\frac{4.00\\times10^4}{2.30\\times8.31\\times298}=-7.02\n   \\]\n   \\[\n   K^\\theta=10^{-7.02}=9.5\\times10^{-8}\n   \\]\n   最终答案：\\(K^\\theta\\approx9.5\\times10^{-8}\\)。  \n   易错提醒：\\(\\Delta G\\) 与 \\(R\\) 单位必须统一。\n\n4. 解题思路：先用相对分压写 \\(Q_p\\)，再比较 \\(Q_p\\) 与 \\(K_p^\\theta\\)。  \n   使用公式：\n   \\[\n   Q_p=\\frac{(p_{NO}/p^\\theta)^2}{(p_{N_2}/p^\\theta)(p_{O_2}/p^\\theta)}\n   \\]\n   已知量：\\(p_{NO}/p^\\theta=1.00/100=0.0100\\)，\\(p_{N_2}/p^\\theta=p_{O_2}/p^\\theta=82.1/100=0.821\\)。  \n   代入：\n   \\[\n   Q_p=\\frac{(0.0100)^2}{(0.821)(0.821)}=1.48\\times10^{-4}\n   \\]\n   比较：\n   \\[\n   \\frac{Q_p}{K_p^\\theta}=\\frac{1.48\\times10^{-4}}{9.8\\times10^{-2}}\u003c1\n   \\]\n   最终答案：\\(Q_p=1.48\\times10^{-4}\\)，反应正向自发。  \n   易错提醒：必须先除以 \\(p^\\theta\\)，用相对分压写 \\(Q_p\\)。\n\n5. 解题思路：先判断反应组合关系。反应（3）=反应（2）-反应（1）。  \n   使用公式：\n   \\[\n   K_{p3}=\\frac{K_{p2}}{K_{p1}}\n   \\]\n   已知量：\\(K_{p1}=0.14\\)，\\(K_{p2}=67\\)。  \n   代入：\n   \\[\n   K_{p3}=\\frac{67}{0.14}=4.8\\times10^2\n   \\]\n   最终答案：\\(K_{p3}=4.8\\times10^2\\)。  \n   易错提醒：反应式相减对应平衡常数相除，不是相减。\n\n## 三、判断题答案\n\n1. 错误。平衡是动态平衡，正逆反应仍在进行，只是速率相等。\n\n2. 正确。一定温度下 \\(K\\) 由反应本性和温度决定，与起始浓度无关。\n\n3. 错误。\\(\\Delta n_g\\) 只统计气体计量数，固体和液体不统计。\n\n4. 正确。纯固体和纯液体的活度可视为常数，不写入表达式。\n\n5. 正确。\\(Q=K^\\theta\\) 时 \\(\\Delta G_T=2.30RT\\lg1=0\\)，体系处于平衡。\n\n6. 错误。吸热反应升温 \\(K^\\theta\\) 增大，放热反应升温 \\(K^\\theta\\) 减小。\n\n7. 错误。反应式相加时，平衡常数相乘，不是相加。\n\n8. 正确。该反应前后气体计量数均为 2，改变总压对平衡无明显影响。\n\n## 四、综合题答案\n\n1. 解析：  \n   （1）\\(N_2O_4(g)\\rightleftharpoons2NO_2(g)\\) 左侧 1 mol 气体，右侧 2 mol 气体。增大总压时，平衡向气体计量数减小的方向移动，即向左移动，\\(N_2O_4\\) 增多，\\(NO_2\\) 减少。  \n   （2）若温度不变，\\(K^\\theta\\) 不改变。压力改变改变的是 \\(Q\\) 和平衡组成，不改变平衡常数。  \n   （3）如果升高温度后 \\(K^\\theta\\) 增大，说明升温有利于正向反应，因此正向为吸热反应。  \n   结论：增压左移；温度不变 \\(K^\\theta\\) 不变；升温使 \\(K^\\theta\\) 增大说明正向吸热。\n\n2. 解析：  \n   标态下 \\(\\Delta G_{298}^\\theta=25.4\\ \\mathrm{kJ\\cdot mol^{-1}}\u003e0\\)，因此在标准态下正向非自发。  \n   但非标准态不能只看 \\(\\Delta G^\\theta\\)，应使用：\n   \\[\n   \\Delta G_T=\\Delta G_T^\\theta+2.30RT\\lg Q\n   \\]\n   该反应的 \\(Q\\) 可写为：\n   \\[\n   Q=\\frac{(p_{Cl_2}/p^\\theta)([Mn^{2+}]/c^\\theta)}\n   {([H^+]/c^\\theta)^4([Cl^-]/c^\\theta)^2}\n   \\]\n   使用 \\(12.0\\ \\mathrm{mol\\cdot dm^{-3}}\\) 的 HCl 时，\\([H^+]\\) 和 \\([Cl^-]\\) 很大，出现在 \\(Q\\) 的分母中，使 \\(Q\\) 显著减小。材料中计算得到 \\(Q=3.35\\times10^{-7}\\)，从而 \\(2.30RT\\lg Q\\) 为较大的负值，最终 \\(\\Delta G_T=-11.5\\ \\mathrm{kJ\\cdot mol^{-1}}\u003c0\\)。  \n   结论：标态下正向非自发；浓盐酸条件下由于 \\(Q\\) 大幅减小，使非标准态 \\(\\Delta G_T\u003c0\\)，反应正向自发。  \n   易错提醒：\\(\\Delta G^\\theta\\) 判断标准态，\\(\\Delta G\\) 才判断实际给定条件。\n",
    "chemistry_review/05-chemistry_review.md":  "# 本章复习提纲\n\n## 一、本章知识框架\n\n### 1. 本章主线\n\n本章围绕“酸碱在水溶液中的质子转移和平衡”展开。逻辑关系可以概括为：\n\n1. 先建立酸碱概念：Arrhenius、Franklin、Brønsted-Lowry、Lewis、Pearson 软硬酸碱理论。\n2. 再研究水本身的酸碱平衡：水的自耦电离、\\(K_w\\)、pH 与 pOH。\n3. 接着计算弱酸弱碱电离平衡：一元、多元、两性物。\n4. 然后研究平衡移动：同离子效应、指示剂变色。\n5. 最后应用到缓冲溶液和酸碱中和反应。\n\n### 2. 酸碱理论\n\n1. Arrhenius 酸碱电离理论\n   - 酸：水溶液中能电离产生 \\(H^+\\) 的物质。\n   - 碱：水溶液中能电离产生 \\(OH^-\\) 的物质。\n   - 局限：只适用于水溶液，不能解释 \\(NH_4Cl\\)、\\(Na_3PO_4\\) 等盐溶液的酸碱性，也不能处理非水体系。\n\n2. Franklin 酸碱溶剂理论\n   - 酸：在某溶剂中产生该溶剂特征阳离子的溶质。\n   - 碱：在某溶剂中产生该溶剂特征阴离子的溶质。\n   - 例如液氨中：\n     \\[\n     2NH_3 \\rightleftharpoons NH_4^+ + NH_2^-\n     \\]\n\n3. Brønsted-Lowry 酸碱质子理论\n   - 酸：质子给体。\n   - 碱：质子受体。\n   - 酸给出质子后形成共轭碱，碱接受质子后形成共轭酸。\n\n4. Lewis 酸碱电子理论\n   - 酸：电子对受体。\n   - 碱：电子对给体。\n   - 扩大了酸的范围，如 \\(Cu^{2+}\\)、\\(BF_3\\) 可作为 Lewis 酸。\n\n5. Pearson 软硬酸碱理论\n   - 硬酸优先与硬碱结合，软酸优先与软碱结合。\n   - 常见规律：“硬亲硬，软亲软”。\n\n### 3. 水的自耦电离与 pH\n\n水分子之间可发生质子传递：\n\n\\[\nH_2O(l)+H_2O(l)\\rightleftharpoons H_3O^+(aq)+OH^-(aq)\n\\]\n\n298 K 时：\n\n\\[\nK_w=[H_3O^+][OH^-]=1.0\\times10^{-14}\n\\]\n\n常用酸碱度表示：\n\n\\[\npH=-\\lg[H_3O^+]\n\\]\n\n\\[\npOH=-\\lg[OH^-]\n\\]\n\n\\[\npH+pOH=pK_w=14\n\\]\n\n注意：酸溶液中也有 \\(OH^-\\)，碱溶液中也有 \\(H_3O^+\\)，二者由 \\(K_w\\) 联系。\n\n### 4. 弱酸、弱碱电离平衡\n\n一元弱酸：\n\n\\[\nHA+H_2O\\rightleftharpoons H_3O^+ + A^-\n\\]\n\n\\[\nK_a=\\frac{[H_3O^+][A^-]}{[HA]}\n\\]\n\n当 \\(\\alpha\\le 5\\%\\) 或 \\(c/K_a\\ge 400\\) 时：\n\n\\[\n[H_3O^+]\\approx \\sqrt{K_a c}\n\\]\n\n\\[\n\\alpha\\approx \\sqrt{\\frac{K_a}{c}}\n\\]\n\n一元弱碱：\n\n\\[\n[OH^-]\\approx \\sqrt{K_b c}\n\\]\n\n若不满足简化条件，要解一元二次方程。\n\n### 5. 多元弱酸、弱碱与两性物\n\n多元弱酸逐级电离：\n\n\\[\nH_2S+H_2O\\rightleftharpoons H_3O^+ + HS^-\n\\]\n\n\\[\nHS^-+H_2O\\rightleftharpoons H_3O^+ + S^{2-}\n\\]\n\n通常：\n\n\\[\nK_{a1}\\gg K_{a2}\\gg K_{a3}\n\\]\n\n所以计算多元弱酸的 \\([H_3O^+]\\) 时，通常只考虑第一步电离。对二元弱酸 \\(H_2A\\)，常有：\n\n\\[\n[A^{2-}]\\approx K_{a2}\n\\]\n\n两性物既能给出质子也能接受质子，其酸碱性由作为酸和碱时的强弱决定。对于常见两性离子 \\(HA^-\\)，若水的电离可忽略、浓度不太低：\n\n\\[\n[H_3O^+]\\approx \\sqrt{K_{a1}K_{a2}}\n\\]\n\n材料中用 \\(NaH_2PO_4\\) 和 \\(NH_4Ac\\) 说明了这一类计算。\n\n### 6. 同离子效应、指示剂与缓冲溶液\n\n同离子效应：向弱电解质溶液中加入含有共同离子的强电解质，使电离平衡向左移动，降低弱电解质电离度。\n\n弱酸-共轭碱体系：\n\n\\[\n[H_3O^+]=K_a\\frac{c_{\\text{弱酸}}}{c_{\\text{共轭碱}}}\n\\]\n\n\\[\npH=pK_a+\\lg\\frac{c_{\\text{共轭碱}}}{c_{\\text{弱酸}}}\n\\]\n\n弱碱-共轭酸体系：\n\n\\[\n[OH^-]=K_b\\frac{c_{\\text{弱碱}}}{c_{\\text{共轭酸}}}\n\\]\n\n\\[\npOH=pK_b+\\lg\\frac{c_{\\text{共轭酸}}}{c_{\\text{弱碱}}}\n\\]\n\n酸碱指示剂是有机弱酸或弱碱，酸式和碱式颜色不同。人眼能分辨的变色范围大致为：\n\n\\[\npH=pK_{HIn}\\pm 1\n\\]\n\n缓冲溶液含共轭酸碱对，可抵抗少量外加酸、碱或稀释对 pH 的影响。有效缓冲范围：\n\n\\[\npH=pK_a\\pm 1\n\\]\n\n配制缓冲溶液时通常要求：\n\n1. \\(pH\\approx pK_a\\)。\n2. 共轭酸碱浓度比在 \\(1/10\\sim 10/1\\)。\n3. 总浓度常在 \\(0.1\\sim 1.0\\ \\mathrm{mol\\cdot dm^{-3}}\\)。\n\n### 7. 酸碱中和反应\n\n中和反应本质上是酸碱之间的质子传递，常可看成电离平衡的逆反应。\n\n1. 强酸强碱：\n   \\[\n   H_3O^+ + OH^- \\rightleftharpoons 2H_2O\n   \\]\n   \\[\n   K=\\frac{1}{K_w}=1.0\\times10^{14}\n   \\]\n\n2. 强酸与弱碱：\n   \\[\n   H_3O^+ + Ac^- \\rightleftharpoons HAc+H_2O\n   \\]\n   \\[\n   K=\\frac{1}{K_a(HAc)}\n   \\]\n\n3. 强碱与弱酸：\n   \\[\n   OH^-+HAc\\rightleftharpoons Ac^-+H_2O\n   \\]\n   \\[\n   K=\\frac{K_a(HAc)}{K_w}=\\frac{1}{K_b(Ac^-)}\n   \\]\n\n4. 弱酸弱碱：\n   \\[\n   S^{2-}+HAc\\rightleftharpoons Ac^-+HS^-\n   \\]\n   \\[\n   K=\\frac{K_a(HAc)}{K_a(HS^-)}\n   \\]\n\n材料中强调：较强的共轭酸能与较强的共轭碱自发生成较弱的酸和较弱的碱，酸碱强弱差距越大，反应越彻底。\n\n## 二、重点概念整理\n\n### 1. Arrhenius 酸碱电离理论\n\n定义：水溶液中能电离产生 \\(H^+\\) 的物质是酸，能电离产生 \\(OH^-\\) 的物质是碱。\n\n需要记忆的点：适用于水溶液；典型例子为 \\(HCl\\)、\\(HAc\\)、\\(NaOH\\)、\\(Ca(OH)_2\\)。\n\n容易混淆的地方：不能解释所有酸碱性，如 \\(NH_4Cl\\) 溶液呈酸性、\\(Na_3PO_4\\) 溶液呈碱性。\n\n可能怎么考：给出物质，判断 Arrhenius 理论能否解释其酸碱性。\n\n### 2. Brønsted-Lowry 酸碱质子理论\n\n定义：酸是质子给体，碱是质子受体。\n\n需要记忆的点：\n\n- 酸碱反应是质子传递反应。\n- 酸与碱通过共轭关系相互依存。\n- 同一物质在不同体系中可表现不同酸碱性。\n\n容易混淆的地方：\n\n- \\(HCO_3^-\\)、\\(HS^-\\)、\\(H_2PO_4^-\\) 等既可作酸也可作碱。\n- 酸不能单独“放出质子”，必须同时有碱接受质子。\n\n可能怎么考：判断共轭酸碱对、写出某离子的共轭酸或共轭碱。\n\n### 3. 共轭酸碱对\n\n定义：相差一个质子的酸和碱构成共轭酸碱对。\n\n需要记忆的点：\n\n- \\(HAc/Ac^-\\)、\\(NH_4^+/NH_3\\)、\\(H_3O^+/H_2O\\)、\\(H_2PO_4^-/HPO_4^{2-}\\) 是共轭酸碱对。\n- 酸越强，其共轭碱越弱；碱越强，其共轭酸越弱。\n\n容易混淆的地方：\\(NaOH/Na^+\\) 不是共轭酸碱对，因为二者不只差一个质子。\n\n可能怎么考：选择“不是共轭酸碱对”的一组。\n\n### 4. 电离常数 \\(K_a,K_b\\)\n\n定义：弱酸或弱碱电离平衡的标准平衡常数，反映弱酸或弱碱强弱。\n\n需要记忆的点：\n\n- \\(K_a\\) 越大，酸越强。\n- \\(K_b\\) 越大，碱越强。\n- 共轭酸碱满足 \\(K_aK_b=K_w\\)。\n\n容易混淆的地方：电离度 \\(\\alpha\\) 随浓度改变，而电离常数在一定温度下与浓度无关。\n\n可能怎么考：由 \\(K_a\\) 判断酸强弱；由 \\(K_a\\) 求共轭碱 \\(K_b\\)。\n\n### 5. 电离度 \\(\\alpha\\)\n\n定义：\n\n\\[\n\\alpha=\\frac{n_{\\text{已电离的电解质}}}{n_{\\text{总}}}\n\\]\n\n需要记忆的点：弱酸简化计算时 \\(\\alpha\\approx \\sqrt{K_a/c}\\)。\n\n容易混淆的地方：稀释会增大电离度，但不改变 \\(K_a\\)。\n\n可能怎么考：计算弱酸 pH 后求电离度。\n\n### 6. 水的离子积 \\(K_w\\)\n\n定义：\n\n\\[\nK_w=[H_3O^+][OH^-]\n\\]\n\n需要记忆的点：298 K 常取 \\(K_w=1.0\\times10^{-14}\\)，但 \\(K_w\\) 随温度变化。\n\n容易混淆的地方：纯水中 \\(pH=7\\) 只严格对应 298 K 附近的常用取值；材料中一般采用 \\(K_w=1.0\\times10^{-14}\\)。\n\n可能怎么考：已知 \\([H_3O^+]\\) 求 \\([OH^-]\\)，或由 pH 求 pOH。\n\n### 7. pH 与 pOH\n\n定义：\n\n\\[\npH=-\\lg[H_3O^+],\\quad pOH=-\\lg[OH^-]\n\\]\n\n需要记忆的点：298 K 下 \\(pH+pOH=14\\)。\n\n容易混淆的地方：pH 表示酸度，不等于酸的分析浓度；弱酸中 \\([H_3O^+]\\) 小于酸的总浓度。\n\n可能怎么考：强酸、强碱、弱酸、弱碱溶液 pH 计算。\n\n### 8. 同离子效应\n\n定义：向弱电解质溶液中加入具有共同离子的强电解质，使弱电解质电离平衡向左移动、电离度降低的现象。\n\n需要记忆的点：\n\n- 加 \\(NaAc\\) 抑制 \\(HAc\\) 电离。\n- 加 \\(NH_4Cl\\) 抑制 \\(NH_3\\cdot H_2O\\) 电离。\n\n容易混淆的地方：同离子效应降低电离度，但不改变 \\(K_a\\) 或 \\(K_b\\)。\n\n可能怎么考：解释加入 \\(NaAc\\) 后 \\(HAc\\) 溶液 pH 增大的原因。\n\n### 9. 缓冲溶液\n\n定义：含共轭酸碱对、能抵抗少量外加酸碱或稀释影响，使 pH 不显著变化的溶液。\n\n需要记忆的点：\n\n- 常见缓冲对：\\(HAc/Ac^-\\)、\\(NH_3\\cdot H_2O/NH_4^+\\)。\n- 缓冲能力有限。\n- \\(c_{\\text{共轭碱}}/c_{\\text{弱酸}}\\) 接近 1 时缓冲能力较大。\n\n容易混淆的地方：不是任意酸碱混合物都是缓冲溶液；必须同时存在可消耗少量酸和少量碱的共轭酸碱对。\n\n可能怎么考：选择合适缓冲体系，计算缓冲溶液 pH，配制缓冲溶液。\n\n### 10. 酸碱指示剂\n\n定义：酸式和碱式颜色不同的有机弱酸或弱碱。\n\n需要记忆的点：\n\n- 变色范围通常约为 \\(pK_{HIn}\\pm1\\)。\n- 酚酞：无色、粉红、红，变色范围 8.2-10.0。\n- 甲基橙：红、橙、黄，变色范围 3.1-4.4。\n\n容易混淆的地方：指示剂用量应少，因为指示剂本身也是弱酸或弱碱。\n\n可能怎么考：根据滴定终点 pH 选择指示剂。\n\n### 11. 酸碱中和反应\n\n定义：酸与碱通过质子传递生成较弱酸和较弱碱的反应。\n\n需要记忆的点：中和反应可看作电离平衡的逆反应或组合反应。\n\n容易混淆的地方：等物质的量强酸和弱碱反应后溶液不一定中性，通常由生成的弱酸或弱碱继续电离决定。\n\n可能怎么考：判断中和反应是否彻底、计算中和后溶液 pH。\n\n## 三、重要公式整理\n\n### 1. 酸常数\n\n公式：\n\n\\[\nK_a=\\frac{[H_3O^+][A^-]}{[HA]}\n\\]\n\n符号说明：\n\n- \\(HA\\)：一元弱酸。\n- \\([H_3O^+]\\)：水合氢离子浓度，单位 \\(\\mathrm{mol\\cdot dm^{-3}}\\)。\n- \\([A^-]\\)：共轭碱浓度。\n- \\([HA]\\)：未电离弱酸浓度。\n\n适用条件：弱酸在水溶液中的电离平衡。\n\n解题步骤：\n\n1. 写出电离方程式。\n2. 建立初始、变化、平衡浓度关系。\n3. 代入 \\(K_a\\) 表达式。\n4. 判断是否可用简化公式。\n\n易错点：平衡浓度不是起始浓度；纯水不写入表达式。\n\n例题方向：已知 \\(K_a,c\\) 求 pH 和电离度。\n\n### 2. 碱常数\n\n公式：\n\n\\[\nK_b=\\frac{[B^+][OH^-]}{[BOH]}\n\\]\n\n或对 \\(B\\) 型弱碱：\n\n\\[\nB+H_2O\\rightleftharpoons BH^+ + OH^-\n\\]\n\n\\[\nK_b=\\frac{[BH^+][OH^-]}{[B]}\n\\]\n\n适用条件：弱碱在水溶液中的电离平衡。\n\n易错点：弱碱 pH 计算通常先求 \\([OH^-]\\)，再由 \\(pOH\\) 转 pH。\n\n例题方向：已知弱碱 pH 反求 \\(K_b\\)。\n\n### 3. 共轭酸碱常数关系\n\n公式：\n\n\\[\nK_aK_b=K_w\n\\]\n\n常见变形：\n\n\\[\nK_b(A^-)=\\frac{K_w}{K_a(HA)}\n\\]\n\n\\[\nK_a(BH^+)=\\frac{K_w}{K_b(B)}\n\\]\n\n适用条件：同一共轭酸碱对，在同一温度下。\n\n易错点：必须是一对共轭酸碱，不能随便把任意酸碱的常数相乘。\n\n例题方向：由 \\(K_a(HCN)\\) 求 \\(K_b(CN^-)\\)。\n\n### 4. 水的离子积\n\n公式：\n\n\\[\nK_w=[H_3O^+][OH^-]\n\\]\n\n符号说明：298 K 常取 \\(K_w=1.0\\times10^{-14}\\)。\n\n适用条件：水溶液；酸、碱、盐溶液中均成立。\n\n解题步骤：\n\n1. 已知 \\([H_3O^+]\\) 可求 \\([OH^-]=K_w/[H_3O^+]\\)。\n2. 已知 \\([OH^-]\\) 可求 \\([H_3O^+]=K_w/[OH^-]\\)。\n\n易错点：酸溶液中并非没有 \\(OH^-\\)，只是浓度很小。\n\n### 5. pH、pOH 与 pKw\n\n公式：\n\n\\[\npH=-\\lg[H_3O^+]\n\\]\n\n\\[\npOH=-\\lg[OH^-]\n\\]\n\n\\[\npH+pOH=pK_w\n\\]\n\n298 K：\n\n\\[\npH+pOH=14\n\\]\n\n适用条件：水溶液，常用范围约为 0-14。\n\n易错点：超出 0-14 时，材料指出用物质的量浓度表示酸度和碱度更方便。\n\n### 6. 一元弱酸简化计算\n\n公式：\n\n\\[\n[H_3O^+]\\approx \\sqrt{K_a c}\n\\]\n\n\\[\n\\alpha\\approx \\sqrt{\\frac{K_a}{c}}\n\\]\n\n符号说明：\n\n- \\(c\\)：弱酸初始浓度。\n- \\(\\alpha\\)：电离度。\n\n适用条件：\n\n\\[\n\\alpha\\le 5\\%\n\\]\n\n或\n\n\\[\n\\frac{c}{K_a}\\ge 400\n\\]\n\n解题步骤：\n\n1. 检查 \\(c/K_a\\) 是否大于 400。\n2. 若符合，用 \\([H_3O^+]=\\sqrt{K_ac}\\)。\n3. 再求 \\(pH=-\\lg[H_3O^+]\\)。\n4. 求 \\(\\alpha=[H_3O^+]/c\\)。\n\n易错点：不满足条件时必须解二次方程。\n\n### 7. 一元弱碱简化计算\n\n公式：\n\n\\[\n[OH^-]\\approx \\sqrt{K_b c}\n\\]\n\n\\[\n\\alpha\\approx \\sqrt{\\frac{K_b}{c}}\n\\]\n\n适用条件：\\(\\alpha\\le 5\\%\\) 或 \\(c/K_b\\ge 400\\)。\n\n易错点：求出 \\([OH^-]\\) 后先算 pOH，再换算 pH。\n\n### 8. 弱酸或弱碱不满足简化条件时的二次方程\n\n弱酸：\n\n\\[\nK_a=\\frac{x^2}{c-x}\n\\]\n\n整理：\n\n\\[\nx^2+K_ax-K_ac=0\n\\]\n\n其中 \\(x=[H_3O^+]\\)。\n\n弱碱：\n\n\\[\nK_b=\\frac{x^2}{c-x}\n\\]\n\n其中 \\(x=[OH^-]\\)。\n\n适用条件：较强弱酸/弱碱或溶液较稀，不能忽略 \\(x\\)。\n\n例题方向：\\(Na_2S\\) 溶液中 \\(S^{2-}\\) 水解，因 \\(c/K_b\u003c400\\)，需要解二次方程。\n\n### 9. 多元弱酸近似\n\n公式：\n\n\\[\n[H_3O^+]\\approx \\sqrt{K_{a1}c}\n\\]\n\n对二元弱酸 \\(H_2A\\)：\n\n\\[\n[A^{2-}]\\approx K_{a2}\n\\]\n\n适用条件：\\(K_{a1}\\gg K_{a2}\\)，且第一步电离符合简化条件。\n\n易错点：\\([A^{2-}]\\approx K_{a2}\\) 是特定近似结论，不是所有酸根浓度都等于 \\(K_a\\)。\n\n### 10. 两性物 pH 近似\n\n公式：\n\n\\[\n[H_3O^+]\\approx \\sqrt{K_{a1}K_{a2}}\n\\]\n\n或：\n\n\\[\npH\\approx \\frac{1}{2}(pK_{a1}+pK_{a2})\n\\]\n\n符号说明：对 \\(HA^-\\) 型两性离子，\\(K_{a1}\\) 是其共轭酸 \\(H_2A\\) 的第一步酸常数，\\(K_{a2}\\) 是 \\(HA^-\\) 自身作为酸的酸常数。\n\n适用条件：水自身酸碱性可忽略，两性物浓度不太低。\n\n易错点：不能直接用一元弱酸公式；两性物既能给质子又能受质子。\n\n### 11. 同离子效应与缓冲公式\n\n弱酸-共轭碱：\n\n\\[\n[H_3O^+]=K_a\\frac{c_{\\text{弱酸}}}{c_{\\text{共轭碱}}}\n\\]\n\n\\[\npH=pK_a+\\lg\\frac{c_{\\text{共轭碱}}}{c_{\\text{弱酸}}}\n\\]\n\n弱碱-共轭酸：\n\n\\[\n[OH^-]=K_b\\frac{c_{\\text{弱碱}}}{c_{\\text{共轭酸}}}\n\\]\n\n\\[\npOH=pK_b+\\lg\\frac{c_{\\text{共轭酸}}}{c_{\\text{弱碱}}}\n\\]\n\n适用条件：共轭酸碱对浓度远大于电离产生的 \\(H_3O^+\\) 或 \\(OH^-\\)。\n\n易错点：Henderson-Hasselbalch 形式中酸在分母、共轭碱在分子：\n\n\\[\npH=pK_a+\\lg\\frac{\\text{碱}}{\\text{酸}}\n\\]\n\n### 12. 指示剂变色范围\n\n公式：\n\n\\[\nK_{HIn}=\\frac{[H_3O^+][In^-]}{[HIn]}\n\\]\n\n\\[\n\\frac{[In^-]}{[HIn]}=\\frac{K_{HIn}}{[H_3O^+]}\n\\]\n\n变色范围：\n\n\\[\npH=pK_{HIn}\\pm1\n\\]\n\n适用条件：指示剂浓度很小，不显著改变溶液酸度。\n\n易错点：指示剂不是越多越好；理论上越少越不影响体系，但太少肉眼看不清。\n\n### 13. 中和反应平衡常数\n\n强酸强碱：\n\n\\[\nK=\\frac{1}{K_w}\n\\]\n\n强酸与弱碱：\n\n\\[\nK=\\frac{1}{K_a(\\text{弱碱的共轭酸})}\n\\]\n\n强碱与弱酸：\n\n\\[\nK=\\frac{K_a(\\text{弱酸})}{K_w}\n\\]\n\n弱酸与弱碱：\n\n\\[\nK=\\frac{K_a(\\text{反应物酸})}{K_a(\\text{生成物酸})}\n\\]\n\n适用条件：酸碱质子转移反应。\n\n易错点：等计量中和后 pH 由生成物继续电离或水解决定，不一定等于 7。\n\n## 四、需要记忆的性质和规律\n\n| 知识点 | 具体内容 | 记忆方法 | 常见考法 |\n|---|---|---|---|\n| Arrhenius 理论 | 酸产 \\(H^+\\)，碱产 \\(OH^-\\)，限于水溶液 | “水中产氢为酸，产氢氧为碱” | 判断理论适用范围 |\n| Brønsted 理论 | 酸给质子，碱受质子 | “酸给，碱收” | 判断共轭酸碱对 |\n| Lewis 理论 | 酸受电子对，碱给电子对 | “酸收电子，碱给电子” | 判断 \\(BF_3\\)、金属离子酸性 |\n| 软硬酸碱 | 硬亲硬，软亲软 | \\(Ag^+\\) 软酸更易与 \\(I^-\\) 软碱结合 | 判断结合倾向 |\n| 水合氢离子 | 水溶液中 \\(H^+\\) 通常写作 \\(H_3O^+\\) | 裸质子不能稳定存在 | 写酸电离方程式 |\n| \\(K_w\\) | 298 K 常取 \\(1.0\\times10^{-14}\\) | \\(H^+\\) 与 \\(OH^-\\) 相乘固定 | pH/pOH 换算 |\n| pH/pOH | 298 K 下 \\(pH+pOH=14\\) | “酸碱合十四” | 强酸强碱 pH 计算 |\n| 弱酸简化条件 | \\(\\alpha\\le5\\%\\) 或 \\(c/K_a\\ge400\\) | “小于 5，大于 400” | 判断是否可用平方根公式 |\n| 电离常数与电离度 | \\(K\\) 定温不随浓度变，\\(\\alpha\\) 随浓度变 | “常数不随浓度，比例会随浓度” | 稀释对弱电解质影响 |\n| 多元弱酸 | \\(K_{a1}\\gg K_{a2}\\gg K_{a3}\\) | “第一步决定酸度” | 多元酸 pH 近似 |\n| 二元弱酸酸根 | \\(H_2A\\) 中 \\([A^{2-}]\\approx K_{a2}\\) | 第二步很弱，酸根约等于第二常数 | 求 \\(S^{2-}\\) |\n| 两性物 | 酸碱性取决于给质子和受质子的相对能力 | “会给也会收，看谁更强” | \\(NaH_2PO_4\\)、\\(NH_4Ac\\) pH |\n| 同离子效应 | 加共同离子使弱电解质电离度降低 | “同来压电离” | 加 \\(NaAc\\) 后 HAc pH 变化 |\n| 指示剂 | 变色范围约 \\(pK_{HIn}\\pm1\\) | 酸色和碱色比例 1:10 到 10:1 | 选指示剂 |\n| 缓冲溶液 | 共轭酸碱对抵抗少量酸碱和稀释 | “有酸抗碱，有碱抗酸” | 计算和配制缓冲液 |\n| 缓冲能力 | 浓度较大、酸碱比接近 1 时较强 | “浓一点，比例近一点” | 判断哪种缓冲液更好 |\n| 缓冲范围 | \\(pH=pK_a\\pm1\\) | 选 \\(pK_a\\) 接近目标 pH | 选择缓冲体系 |\n| 中和反应 | 较强酸碱生成较弱酸碱 | “强制弱” | 判断反应方向和完全程度 |\n\n补充常考点：材料提到酸碱滴定法，但未展开滴定曲线和终点误差；考试若涉及滴定，通常还会考“强酸强碱、弱酸强碱、强酸弱碱滴定终点 pH 与指示剂选择”，这部分需要结合老师后续材料或习题补充。\n\n材料识别提醒：第 16 页主要是酸性、碱性强弱方向示意图，文字提取不完整；我已根据第 12-15 页和第 69 页的酸碱强弱规律整理，若老师强调该图，请补充截图以便精确还原。\n\n## 五、易错点总结\n\n### 1. 把 \\(H^+\\) 当作水溶液中的真实裸质子\n\n- 错误理解：酸电离后溶液中存在自由 \\(H^+\\)。\n- 正确理解：质子在水中通常以 \\(H_3O^+\\) 或更复杂水合形式存在，本章常用 \\(H_3O^+\\) 表示。\n- 如何避免：写水溶液酸电离时优先写 \\(H_3O^+\\)。\n\n### 2. 混淆酸碱理论的适用范围\n\n- 错误理解：所有酸碱现象都能用 Arrhenius 理论解释。\n- 正确理解：Arrhenius 理论限于水溶液；Brønsted 理论关注质子转移；Lewis 理论关注电子对。\n- 如何避免：看题目体系是水溶液、非水溶剂、质子转移还是配位成键。\n\n### 3. 判断共轭酸碱对时只看“同类物质”\n\n- 错误理解：\\(NaOH/Na^+\\) 是共轭酸碱对。\n- 正确理解：共轭酸碱对必须只相差一个质子。\n- 如何避免：逐个比较是否相差 \\(H^+\\)。\n\n### 4. 把 pH 当作酸的总浓度\n\n- 错误理解：0.10 mol/L 弱酸的 \\([H_3O^+]\\) 就是 0.10 mol/L。\n- 正确理解：弱酸只部分电离，\\([H_3O^+]\\) 要由 \\(K_a\\) 计算。\n- 如何避免：强酸可近似完全电离，弱酸必须列平衡。\n\n### 5. 忘记检查弱酸弱碱简化条件\n\n- 错误理解：所有弱酸都能直接用 \\([H_3O^+]=\\sqrt{K_ac}\\)。\n- 正确理解：只有 \\(\\alpha\\le5\\%\\) 或 \\(c/K_a\\ge400\\) 时才可用。\n- 如何避免：计算前先算 \\(c/K_a\\) 或事后检查 \\(\\alpha\\)。\n\n### 6. 弱碱 pH 计算少一步\n\n- 错误理解：求出 \\([OH^-]\\) 后直接取负对数当 pH。\n- 正确理解：\\(-\\lg[OH^-]\\) 是 pOH，298 K 下 \\(pH=14-pOH\\)。\n- 如何避免：弱碱题写清“先 pOH 后 pH”。\n\n### 7. 认为多元弱酸每一步贡献相同\n\n- 错误理解：多元弱酸每步电离都要同等计算。\n- 正确理解：通常 \\(K_{a1}\\gg K_{a2}\\gg K_{a3}\\)，酸度主要由第一步决定。\n- 如何避免：先比较 \\(K_a\\) 大小。\n\n### 8. 把同离子效应理解为改变 \\(K_a\\)\n\n- 错误理解：加入 \\(NaAc\\) 后 \\(HAc\\) 的 \\(K_a\\) 变小。\n- 正确理解：同离子效应改变平衡位置和电离度，不改变定温下的 \\(K_a\\)。\n- 如何避免：区分“平衡常数”和“平衡组成”。\n\n### 9. 缓冲公式中酸碱比写反\n\n- 错误理解：\\(pH=pK_a+\\lg(c_{\\text{酸}}/c_{\\text{碱}})\\)。\n- 正确理解：\n  \\[\n  pH=pK_a+\\lg\\frac{c_{\\text{共轭碱}}}{c_{\\text{弱酸}}}\n  \\]\n- 如何避免：由 \\([H_3O^+]=K_a c_{\\text{酸}}/c_{\\text{碱}}\\) 推导一次。\n\n### 10. 认为缓冲溶液无限抗酸碱\n\n- 错误理解：缓冲溶液加入任意量酸碱都 pH 不变。\n- 正确理解：缓冲能力有限，只能抵抗少量酸碱；浓度更高、酸碱比接近 1 时能力较强。\n- 如何避免：看到“大量加入”时不要套用“pH 不变”。\n\n### 11. 等计量中和后都认为 pH=7\n\n- 错误理解：酸碱等物质的量反应后一定中性。\n- 正确理解：强酸强碱等量近似中性；强酸弱碱生成弱酸，溶液偏酸；弱酸强碱生成弱碱，溶液偏碱。\n- 如何避免：中和后先判断剩余物和生成盐的水解。\n\n# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：Brønsted-Lowry 酸碱质子理论认为，酸是质子 ______，碱是质子 ______。\n\n2. 选择：下列哪一组不是共轭酸碱对？  \n   A. \\(NH_3/NH_2^-\\)  \n   B. \\(NaOH/Na^+\\)  \n   C. \\(OH^-/O^{2-}\\)  \n   D. \\(H_3O^+/H_2O\\)\n\n3. 填空：298 K 时，水的离子积常数 \\(K_w=[H_3O^+][OH^-]=\\_\\_\\_\\_\\_\\_\\)。\n\n4. 选择：若某水溶液在 298 K 时 \\(pH=11.30\\)，则 \\(pOH\\) 为  \n   A. 2.70  \n   B. 7.00  \n   C. 11.30  \n   D. 14.00\n\n5. 填空：弱酸简化计算 \\([H_3O^+]\\approx\\sqrt{K_ac}\\) 的常用条件是 \\(\\alpha\\le\\_\\_\\_\\_\\_\\_\\%\\) 或 \\(c/K_a\\ge\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：向 \\(HAc\\) 溶液中加入 \\(NaAc\\)，\\(HAc\\) 的电离度会  \n   A. 增大  \n   B. 降低  \n   C. 不变  \n   D. 先增大后降低\n\n7. 填空：酸碱指示剂的变色范围通常约为 \\(pH=pK_{HIn}\\pm\\_\\_\\_\\_\\_\\_\\)。\n\n8. 选择：配制 \\(pH=4.75\\) 左右的缓冲溶液，较合适的体系是  \n   A. \\(HAc/NaAc\\)，\\(pK_a\\approx4.75\\)  \n   B. \\(HCl/NaCl\\)  \n   C. \\(NaOH/NaCl\\)  \n   D. 纯水\n\n## 二、公式计算题\n\n1. 乳酸 \\(CH_3CHOHCOOH\\) 的 \\(K_a=1.37\\times10^{-4}\\)。计算 \\(0.10\\ \\mathrm{mol\\cdot dm^{-3}}\\) 乳酸溶液的 pH 和电离度。\n\n2. 将 \\(2.45\\ \\mathrm{g}\\) 固体 \\(NaCN\\) 配成 \\(500\\ \\mathrm{cm^3}\\) 溶液。已知 \\(M(NaCN)=49\\ \\mathrm{g\\cdot mol^{-1}}\\)，\\(K_a(HCN)=4.93\\times10^{-10}\\)，求溶液 pH。\n\n3. 向 \\(1.0\\ \\mathrm{dm^3}\\) 的 \\(0.10\\ \\mathrm{mol\\cdot dm^{-3}}\\) \\(HAc\\) 溶液中加入固体 \\(NaAc\\)，使 \\([Ac^-]=1.0\\ \\mathrm{mol\\cdot dm^{-3}}\\)。取 \\(K_a(HAc)=1.8\\times10^{-5}\\)，求 \\([H_3O^+]\\)、pH 和 \\(HAc\\) 电离度。\n\n4. 已知 \\(H_3PO_4\\) 的 \\(K_{a1}=7.52\\times10^{-3}\\)，\\(K_{a2}=6.23\\times10^{-8}\\)。按材料近似公式计算 \\(NaH_2PO_4\\) 溶液的 pH。\n\n5. 欲配制 \\(pH=9.20\\)、\\([NH_3\\cdot H_2O]=1.0\\ \\mathrm{mol\\cdot dm^{-3}}\\) 的缓冲溶液 \\(500\\ \\mathrm{cm^3}\\)。已知 \\(K_b(NH_3)=1.8\\times10^{-5}\\)，浓氨水浓度为 \\(15\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\(M(NH_4Cl)=53.5\\ \\mathrm{g\\cdot mol^{-1}}\\)。求需 \\(NH_4Cl\\) 质量和浓氨水体积。\n\n## 三、判断题\n\n1. Arrhenius 理论可以很好解释所有非水溶剂中的酸碱反应。  \n2. 酸给出质子后形成其共轭碱。  \n3. \\(K_a\\) 越大，弱酸越弱。  \n4. 酸溶液中也存在 \\(OH^-\\)，碱溶液中也存在 \\(H_3O^+\\)。  \n5. 弱酸稀释时电离度会改变，但 \\(K_a\\) 在一定温度下不变。  \n6. 对多元弱酸，计算酸度时通常第一步电离贡献最大。  \n7. 同离子效应会降低弱电解质电离度，并改变其电离常数。  \n8. 缓冲溶液的缓冲能力有限，共轭酸碱对浓度比接近 1 时通常较强。\n\n## 四、综合题\n\n1. 要配制 \\(pH=3.20\\) 的缓冲溶液，可选 \\(HCO_2H/HCO_2Na\\) 或 \\(CH_3CO_2H/CH_3CO_2Na\\)。已知 \\(K_a(HCO_2H)=1.77\\times10^{-4}\\)，\\(pK_a=3.75\\)；\\(K_a(HAc)=1.76\\times10^{-5}\\)，\\(pK_a=4.75\\)。应选哪一对？说明理由。\n\n2. 某学生认为：“强酸与强碱等量中和后 pH=7，所以所有酸碱等量中和后 pH 都等于 7。”请结合本章酸碱中和反应类型分析这个说法是否正确，并说明强酸弱碱、弱酸强碱、弱酸弱碱中和后 pH 应如何判断。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 给体；受体。酸给出质子，碱接受质子，这是 Brønsted-Lowry 理论的核心。\n\n2. B。共轭酸碱对必须只相差一个质子，\\(NaOH\\) 与 \\(Na^+\\) 不符合。\n\n3. \\(1.0\\times10^{-14}\\)。这是材料中 298 K 常用的水的离子积常数。\n\n4. A。298 K 下 \\(pH+pOH=14.00\\)，所以 \\(pOH=14.00-11.30=2.70\\)。\n\n5. 5；400。这是使用弱酸弱碱平方根简化公式的常用条件。\n\n6. B。加入 \\(Ac^-\\) 产生同离子效应，使 \\(HAc\\) 电离平衡左移，电离度降低。\n\n7. 1。人眼可分辨的酸色和碱色比例大约对应 \\(pK_{HIn}\\pm1\\)。\n\n8. A。缓冲体系应选择 \\(pK_a\\) 接近目标 pH 的共轭酸碱对，\\(HAc/Ac^-\\) 适合 \\(pH\\approx4.75\\)。\n\n## 二、公式计算题答案\n\n1. 解题思路：先检查简化条件，再用一元弱酸公式。  \n   使用公式：\n   \\[\n   [H_3O^+]\\approx\\sqrt{K_ac}\n   \\]\n   已知量：\\(K_a=1.37\\times10^{-4}\\)，\\(c=0.10\\ \\mathrm{mol\\cdot dm^{-3}}\\)。  \n   单位换算：浓度单位已统一。  \n   简化条件：\n   \\[\n   \\frac{c}{K_a}=\\frac{0.10}{1.37\\times10^{-4}}=730\u003e400\n   \\]\n   可用简化公式。  \n   代入：\n   \\[\n   [H_3O^+]=\\sqrt{(1.37\\times10^{-4})(0.10)}=3.7\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\[\n   pH=-\\lg(3.7\\times10^{-3})=2.43\n   \\]\n   \\[\n   \\alpha=\\frac{[H_3O^+]}{c}=\\frac{3.7\\times10^{-3}}{0.10}=3.7\\%\n   \\]\n   最终答案：\\(pH=2.43\\)，\\(\\alpha=3.7\\%\\)。  \n   易错提醒：先检查 \\(c/K_a\\)，不要直接套公式。\n\n2. 解题思路：\\(CN^-\\) 是 \\(HCN\\) 的共轭碱，先求 \\(K_b=K_w/K_a\\)，再按弱碱计算。  \n   使用公式：\n   \\[\n   K_b(CN^-)=\\frac{K_w}{K_a(HCN)}\n   \\]\n   \\[\n   [OH^-]\\approx\\sqrt{K_bc}\n   \\]\n   已知量：\\(m=2.45\\ \\mathrm{g}\\)，\\(M=49\\ \\mathrm{g\\cdot mol^{-1}}\\)，\\(V=0.500\\ \\mathrm{dm^3}\\)。  \n   单位换算：\n   \\[\n   c=\\frac{2.45/49}{0.500}=0.10\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\[\n   K_b=\\frac{1.0\\times10^{-14}}{4.93\\times10^{-10}}=2.0\\times10^{-5}\n   \\]\n   代入：\n   \\[\n   [OH^-]=\\sqrt{(2.0\\times10^{-5})(0.10)}=1.4\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\[\n   pOH=-\\lg(1.4\\times10^{-3})=2.85\n   \\]\n   \\[\n   pH=14.00-2.85=11.15\n   \\]\n   最终答案：\\(pH=11.15\\)。  \n   易错提醒：\\(Na^+\\) 不参与酸碱平衡，决定碱性的是 \\(CN^-\\)。\n\n3. 解题思路：这是 \\(HAc/Ac^-\\) 共轭酸碱体系，用同离子效应公式。  \n   使用公式：\n   \\[\n   [H_3O^+]=K_a\\frac{c_{\\text{弱酸}}}{c_{\\text{共轭碱}}}\n   \\]\n   已知量：\\(K_a=1.8\\times10^{-5}\\)，\\([HAc]\\approx0.10\\)，\\([Ac^-]=1.0\\)。  \n   代入：\n   \\[\n   [H_3O^+]=1.8\\times10^{-5}\\times\\frac{0.10}{1.0}=1.8\\times10^{-6}\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\[\n   pH=-\\lg(1.8\\times10^{-6})=5.74\n   \\]\n   \\[\n   \\alpha=\\frac{1.8\\times10^{-6}}{0.10}=1.8\\times10^{-5}=0.0018\\%\n   \\]\n   最终答案：\\([H_3O^+]=1.8\\times10^{-6}\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\(pH=5.74\\)，\\(\\alpha=0.0018\\%\\)。  \n   易错提醒：加入 \\(Ac^-\\) 后不能再用纯弱酸的 \\(\\sqrt{K_ac}\\) 公式。\n\n4. 解题思路：\\(H_2PO_4^-\\) 是两性离子，材料给出近似 \\([H_3O^+]\\approx\\sqrt{K_{a1}K_{a2}}\\)。  \n   使用公式：\n   \\[\n   [H_3O^+]\\approx\\sqrt{K_{a1}K_{a2}}\n   \\]\n   已知量：\\(K_{a1}=7.52\\times10^{-3}\\)，\\(K_{a2}=6.23\\times10^{-8}\\)。  \n   代入：\n   \\[\n   [H_3O^+]=\\sqrt{(7.52\\times10^{-3})(6.23\\times10^{-8})}=2.16\\times10^{-5}\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\[\n   pH=-\\lg(2.16\\times10^{-5})=4.67\n   \\]\n   最终答案：\\(pH\\approx4.68\\)。  \n   易错提醒：两性离子不能简单当作普通一元弱酸处理。\n\n5. 解题思路：先由目标 pH 求 pOH 和 \\([OH^-]\\)，再用缓冲公式求 \\([NH_4^+]\\)。  \n   使用公式：\n   \\[\n   [OH^-]=K_b\\frac{[NH_3\\cdot H_2O]}{[NH_4^+]}\n   \\]\n   已知量：\\(pH=9.20\\)，\\(pOH=14.00-9.20=4.80\\)，\\([NH_3\\cdot H_2O]=1.0\\)，\\(K_b=1.8\\times10^{-5}\\)。  \n   代入：\n   \\[\n   [OH^-]=10^{-4.80}=1.6\\times10^{-5}\n   \\]\n   \\[\n   [NH_4^+]=K_b\\frac{[NH_3\\cdot H_2O]}{[OH^-]}\n   =\\frac{1.8\\times10^{-5}\\times1.0}{1.6\\times10^{-5}}\\approx1.1\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   \\(500\\ \\mathrm{cm^3}=0.500\\ \\mathrm{dm^3}\\)，所需 \\(NH_4Cl\\)：\n   \\[\n   m=0.500\\times1.1\\times53.5\\approx29\\ \\mathrm{g}\n   \\]\n   浓氨水体积：\n   \\[\n   V=\\frac{1.0\\times0.500}{15}=0.033\\ \\mathrm{dm^3}=33\\ \\mathrm{cm^3}\n   \\]\n   最终答案：称取约 \\(29\\ \\mathrm{g}\\) \\(NH_4Cl\\)，取约 \\(33\\ \\mathrm{cm^3}\\) 浓氨水，加水定容至 \\(500\\ \\mathrm{cm^3}\\)。  \n   易错提醒：弱碱缓冲液先求 pOH，不要把 pH 直接代入 \\([OH^-]\\)。\n\n## 三、判断题答案\n\n1. 错误。Arrhenius 理论主要限于水溶液，非水体系需要溶剂理论或质子理论等解释。\n\n2. 正确。酸失去一个质子后形成对应的共轭碱。\n\n3. 错误。\\(K_a\\) 越大，酸越容易给出质子，酸越强。\n\n4. 正确。水溶液中 \\(H_3O^+\\) 和 \\(OH^-\\) 总是同时存在，由 \\(K_w\\) 联系。\n\n5. 正确。电离度与浓度有关，电离常数在一定温度下不随浓度改变。\n\n6. 正确。多元弱酸通常 \\(K_{a1}\\gg K_{a2}\\)，第一步电离决定主要酸度。\n\n7. 错误。同离子效应降低电离度，但定温下 \\(K_a\\) 或 \\(K_b\\) 不变。\n\n8. 正确。缓冲能力有限；总浓度较大且酸碱比接近 1 时缓冲能力较强。\n\n## 四、综合题答案\n\n1. 解析：  \n   目标 \\(pH=3.20\\)，选缓冲体系时应使 \\(pK_a\\) 尽量接近目标 pH，并让共轭酸碱浓度比接近 1。  \n   对 \\(HCO_2H/HCO_2^-\\)：\n   \\[\n   \\frac{[HCO_2H]}{[HCO_2^-]}=\\frac{[H_3O^+]}{K_a}\n   =\\frac{6.3\\times10^{-4}}{1.77\\times10^{-4}}\\approx3.6\n   \\]\n   比值为约 \\(3.6:1\\)，仍较接近 1。  \n   对 \\(HAc/Ac^-\\)：\n   \\[\n   \\frac{[HAc]}{[Ac^-]}=\\frac{6.3\\times10^{-4}}{1.76\\times10^{-5}}\\approx36\n   \\]\n   比值约 \\(36:1\\)，远离 1，缓冲能力较差。  \n   结论：应选 \\(HCO_2H/HCO_2Na\\)，因为其 \\(pK_a=3.75\\) 更接近 3.20，所需酸碱比更接近 1。\n\n2. 解析：  \n   该说法错误。强酸强碱等量中和时，主要反应为：\n   \\[\n   H_3O^+ + OH^- \\rightarrow 2H_2O\n   \\]\n   反应很完全，生成的盐通常不水解，因此 298 K 下溶液近似中性。  \n   但强酸弱碱等量反应后，弱碱转化为其共轭酸，溶液酸度由该弱酸电离决定，通常 \\(pH\u003c7\\)。  \n   弱酸强碱等量反应后，弱酸转化为其共轭碱，溶液碱度由该弱碱水解决定，通常 \\(pH\u003e7\\)。  \n   弱酸弱碱等量反应后，溶液 pH 更复杂，要比较生成的共轭酸和共轭碱的强弱，或用相应 \\(K_a,K_b\\) 分析。  \n   结论：只有强酸强碱等量中和常近似 \\(pH=7\\)，其他类型不能直接套用。\n",
    "chemistry_review/07-chemistry_review.md":  "# 本章复习提纲\n\n## 一、本章知识框架\n\n### 1. 本章主线\n\n本章把“氧化还原反应的电子转移”与“电化学中的电势、电动势和平衡”联系起来。核心逻辑是：\n\n1. 用氧化数判断氧化还原反应。\n2. 用氧化数法或半反应法配平方程式。\n3. 把自发氧化还原反应设计成原电池。\n4. 用电极电势和电池电动势判断氧化还原方向、限度和平衡常数。\n5. 用 Nernst 方程处理非标准状态下浓度、酸度、沉淀、弱电解质、配合物对电势的影响。\n6. 利用电池电动势测定 \\(K_{sp}\\)、\\(K_a\\)、pH、配合物稳定常数等。\n\n### 2. 氧化还原基本概念\n\n1. 氧化数\n   - 反映元素原子在化合物中电子转移或偏移的数目。\n   - 氧化数升高表示被氧化，氧化数降低表示被还原。\n\n2. 氧化剂和还原剂\n   - 氧化剂：得电子，本身被还原，氧化数降低。\n   - 还原剂：失电子，本身被氧化，氧化数升高。\n\n3. 氧化还原电对\n   - 同一元素的氧化型和还原型组成电对。\n   - 电对符号通常写作“氧化型/还原型”，如 \\(Cu^{2+}/Cu\\)、\\(Fe^{3+}/Fe^{2+}\\)。\n\n### 3. 氧化还原方程式配平\n\n常用两种方法：\n\n1. 氧化数法\n   - 找氧化数变化。\n   - 使氧化数升高总数等于降低总数。\n   - 再用 \\(H^+\\)、\\(OH^-\\)、\\(H_2O\\) 配平其他元素和电荷。\n\n2. 半反应法\n   - 分别写氧化半反应和还原半反应。\n   - 配平原子数和电荷数。\n   - 使得失电子数相等后相加。\n\n配平注意：\n\n- 酸性介质不能出现 \\(OH^-\\)。\n- 碱性介质不能出现 \\(H^+\\)。\n- 难溶物、弱电解质按实验事实写成对应形式。\n- 必要时注明沉淀、气体。\n\n### 4. 原电池和电极\n\n原电池：利用自发氧化还原反应产生电流、实现化学能转化为电能的装置。\n\n组成：\n\n1. 两个半电池或电极。\n2. 外接电路。\n3. 盐桥：补充电荷、维持电中性，使电池反应持续进行。\n\n以锌铜电池为例：\n\n\\[\n(-)\\ Zn|Zn^{2+}(c_1)||Cu^{2+}(c_2)|Cu\\ (+)\n\\]\n\n负极：\n\n\\[\nZn\\rightarrow Zn^{2+}+2e^-\n\\]\n\n正极：\n\n\\[\nCu^{2+}+2e^-\\rightarrow Cu\n\\]\n\n电池反应：\n\n\\[\nZn+Cu^{2+}\\rightarrow Zn^{2+}+Cu\n\\]\n\n### 5. 电极电势和电池电动势\n\n电池电动势：\n\n\\[\nE_{\\text{池}}=E_{\\text{正}}-E_{\\text{负}}\n\\]\n\n电极电势无法直接单独测量，需选标准氢电极作为参比：\n\n\\[\n2H^+(1\\ \\mathrm{mol\\cdot dm^{-3}})+2e^-\\rightleftharpoons H_2(1\\ \\mathrm{bar})\n\\]\n\n\\[\nE^\\theta(H^+/H_2)=0.0000\\ \\mathrm{V}\n\\]\n\n标准电极电势 \\(E^\\theta\\) 的条件：\n\n- 25 ℃。\n- 溶液浓度 \\(1\\ \\mathrm{mol\\cdot dm^{-3}}\\)。\n- 气体分压 \\(100\\ \\mathrm{kPa}\\)。\n- 固体和液体为纯净物。\n\n电极电势意义：\n\n- \\(E^\\theta\\) 越大，氧化型越容易得电子，氧化性越强。\n- \\(E^\\theta\\) 越小，还原型越容易失电子，还原性越强。\n- 电极反应乘以倍数时，\\(E^\\theta\\) 不变，因为电极电势是强度量。\n\n### 6. 电动势、Gibbs 自由能和平衡常数\n\n标准状态下：\n\n\\[\n\\Delta G_T^\\theta=-nFE_{\\text{池}}^\\theta\n\\]\n\n又因为：\n\n\\[\n\\Delta G_T^\\theta=-2.30RT\\lg K^\\theta\n\\]\n\n所以：\n\n\\[\nE_{\\text{池}}^\\theta=\\frac{2.30RT}{nF}\\lg K^\\theta\n\\]\n\n298 K 时：\n\n\\[\nE_{\\text{池}}^\\theta=\\frac{0.0592}{n}\\lg K^\\theta\n\\]\n\n这说明 \\(E_{\\text{池}}^\\theta\u003e0\\)、\\(\\Delta G^\\theta\u003c0\\)、\\(K^\\theta\u003e1\\) 都表示正向自发。\n\n### 7. 标准电极电势的计算\n\n1. 由标准 Gibbs 自由能变计算：\n\n\\[\nE^\\theta=-\\frac{\\Delta G^\\theta}{nF}\n\\]\n\n2. 由已知电对的 \\(E^\\theta\\) 间接计算：\n\n电极电势本身不能直接相加减，必须先转化为 \\(\\Delta G^\\theta=-nFE^\\theta\\)，再利用 \\(\\Delta G^\\theta\\) 的加和性。\n\n例如：\n\n\\[\nE_3^\\theta=\\frac{n_1E_1^\\theta-n_2E_2^\\theta}{n_3}\n\\]\n\n具体符号取决于目标半反应与已知半反应的组合关系。\n\n3. 元素电势图\n   - 同一元素不同氧化态按氧化态从高到低排列。\n   - 横线上标出相邻电对的 \\(E^\\theta\\)。\n   - 可用 \\(nE\\) 加权平均或差值求未知电势。\n\n### 8. Nernst 方程与影响因素\n\n对电池反应：\n\n\\[\na\\,ox_1+b\\,red_2\\rightleftharpoons c\\,red_1+d\\,ox_2\n\\]\n\n非标准态电动势：\n\n\\[\nE_{\\text{池}}=E_{\\text{池}}^\\theta-\\frac{0.0592}{n}\\lg Q\n\\]\n\n对电极反应：\n\n\\[\nm\\,Ox+ne^-\\rightleftharpoons q\\,Red\n\\]\n\n298 K 下：\n\n\\[\nE=E^\\theta+\\frac{0.0592}{n}\\lg\\frac{(Ox)^m}{(Red)^q}\n\\]\n\n或等价写成：\n\n\\[\nE=E^\\theta-\\frac{0.0592}{n}\\lg\\frac{(Red)^q}{(Ox)^m}\n\\]\n\n浓度、沉淀、弱电解质、配合物、酸度都会通过改变氧化型/还原型浓度影响电极电势。\n\n### 9. 酸度对电极电势的影响\n\n凡电极反应中有 \\(H^+\\) 或 \\(OH^-\\) 参与，酸度对电极电势影响很大。\n\n例：\n\n\\[\nCr_2O_7^{2-}+14H^++6e^-\\rightleftharpoons 2Cr^{3+}+7H_2O\n\\]\n\n\\[\nE=E^\\theta-\\frac{0.0592}{6}\\lg\\frac{[Cr^{3+}]^2}{[Cr_2O_7^{2-}][H^+]^{14}}\n\\]\n\n\\([H^+]\\) 越大，\\(E\\) 越大，\\(Cr_2O_7^{2-}\\) 氧化性越强。\n\n水的 E-pH 图中：\n\n- 氢线：\\(E=-0.0592pH\\)。\n- 氧线：\\(E=1.23-0.0592pH\\)。\n\n材料第 58 页图示了水稳定区及 \\(F_2/F^-\\)、\\(Na^+/Na\\)、\\(Cu^{2+}/Cu\\) 等电对与水稳定性的关系。\n\n### 10. 电极电势和电池电动势的应用\n\n电极电势可用于：\n\n1. 比较氧化剂、还原剂强弱。\n2. 选择合适氧化剂。\n3. 判断氧化还原反应方向。\n4. 计算未知电对电极电势。\n\n电池电动势可用于：\n\n1. 测定难溶化合物 \\(K_{sp}\\)。\n2. 测定弱酸 \\(K_a\\)。\n3. 测定溶液 pH。\n4. 测定配位化合物稳定常数 \\(K_{\\text{稳}}\\)。\n\n材料第 42 页为元素电势图“？”示意页，文字提取不完整；本提纲已根据第 39-41 页和第 64 页的计算规则整理，若老师要求还原具体图形，请补充截图。\n\n## 二、重点概念整理\n\n### 1. 氧化数\n\n定义：元素一个原子在形成化合物时所转移或偏移的电子数，也称氧化态。\n\n需要记忆的点：\n\n- 单质中元素氧化数为 0。\n- 氧通常为 \\(-2\\)，过氧化物为 \\(-1\\)，超氧化物可为 \\(-0.5\\)。\n- 氢通常为 \\(+1\\)，金属氢化物中为 \\(-1\\)。\n- 化合物中各元素氧化数代数和为 0。\n\n容易混淆的地方：氧化数可正可负，化合价通常表示成键数目，数值上为正，二者不是同一概念。\n\n可能怎么考：判断元素氧化数，判断反应是否为氧化还原反应。\n\n### 2. 氧化剂和还原剂\n\n定义：\n\n- 氧化剂：得到电子，使其他物质被氧化，本身被还原。\n- 还原剂：失去电子，使其他物质被还原，本身被氧化。\n\n需要记忆的点：\n\n- 得电子：氧化数降低。\n- 失电子：氧化数升高。\n\n容易混淆的地方：氧化剂本身发生还原反应，还原剂本身发生氧化反应。\n\n可能怎么考：给反应方程式，判断氧化剂、还原剂、氧化产物和还原产物。\n\n### 3. 氧化还原电对\n\n定义：同一种元素的氧化型和还原型组成的电对。\n\n需要记忆的点：写作“氧化型/还原型”，如 \\(Fe^{3+}/Fe^{2+}\\)、\\(Cu^{2+}/Cu\\)。\n\n容易混淆的地方：不能把不同元素的物种随意组成电对。\n\n可能怎么考：根据半反应写电对符号。\n\n### 4. 原电池\n\n定义：利用自发氧化还原反应产生电流的装置。\n\n需要记忆的点：\n\n- 负极发生氧化反应。\n- 正极发生还原反应。\n- 电子从负极经外电路流向正极。\n- 盐桥维持电中性。\n\n容易混淆的地方：原电池中负极不是“电势一定高”的意思，而是发生氧化反应的一极。\n\n可能怎么考：写正负极反应、电池反应、电池符号。\n\n### 5. 电池符号\n\n定义：用符号表示原电池组成和物相界面的书写方式。\n\n需要记忆的点：\n\n- 负极写左边，正极写右边。\n- 单竖线 \\(|\\) 表示物相界面。\n- 双竖线 \\(||\\) 表示盐桥。\n- 惰性电极和气体要写出，如 \\(Pt,H_2|H^+\\)。\n\n容易混淆的地方：离子电极、气体电极必须加入惰性电极。\n\n可能怎么考：根据反应写电池符号，或根据电池符号写电极反应。\n\n### 6. 电极电势和标准电极电势\n\n定义：电极与溶液界面形成的电势差；标准状态下的电极电势称为标准电极电势。\n\n需要记忆的点：\n\n- 标准氢电极规定 \\(E^\\theta=0.0000\\ \\mathrm{V}\\)。\n- \\(E^\\theta\\) 越大，氧化型氧化能力越强。\n- \\(E^\\theta\\) 越小，还原型还原能力越强。\n\n容易混淆的地方：电极电势是强度量，半反应乘系数时 \\(E^\\theta\\) 不变。\n\n可能怎么考：比较氧化剂/还原剂强弱，判断反应方向。\n\n### 7. 电池电动势\n\n定义：电池正负极之间的电势差。\n\n公式：\n\n\\[\nE_{\\text{池}}=E_{\\text{正}}-E_{\\text{负}}\n\\]\n\n需要记忆的点：自发原电池 \\(E_{\\text{池}}\u003e0\\)。\n\n容易混淆的地方：不能写成 \\(E_{\\text{负}}-E_{\\text{正}}\\)。\n\n可能怎么考：由两个电极电势求电池电动势。\n\n### 8. Nernst 方程\n\n定义：描述非标准状态下电势与浓度或分压关系的方程。\n\n需要记忆的点：\n\n- 电池：\\(E=E^\\theta-\\frac{0.0592}{n}\\lg Q\\)。\n- 电极：\\(E=E^\\theta+\\frac{0.0592}{n}\\lg\\frac{Ox}{Red}\\) 的相应幂次形式。\n\n容易混淆的地方：固体、纯液体不写入 \\(Q\\)；电子不写入 \\(Q\\)。\n\n可能怎么考：给浓度计算电极电势或电池电动势。\n\n### 9. 元素电势图\n\n定义：将同一元素不同氧化态按氧化数从高到低排列，并在相邻物种之间标出标准电极电势的图。\n\n需要记忆的点：电势图计算要用 \\(nE\\) 加权，不能直接加减 \\(E\\)。\n\n容易混淆的地方：\\(E_3^\\theta\\ne E_1^\\theta-E_2^\\theta\\)。\n\n可能怎么考：由两个已知电势求第三个电势，判断歧化反应。\n\n### 10. 歧化反应\n\n定义：同一物种既作氧化剂又作还原剂，生成该元素较高和较低氧化态物种。\n\n需要记忆的点：在元素电势图中，某物种右边的 \\(E^\\theta\\) 大于左边的 \\(E^\\theta\\) 时，该中间物种易发生歧化。\n\n容易混淆的地方：歧化要求同一元素同一物种同时升高和降低氧化态。\n\n可能怎么考：根据元素电势图判断 \\(MnO_4^{2-}\\)、\\(Mn^{3+}\\) 是否歧化。\n\n## 三、重要公式整理\n\n### 1. 电池电动势\n\n公式：\n\n\\[\nE_{\\text{池}}=E_{\\text{正}}-E_{\\text{负}}\n\\]\n\n符号说明：\n\n- \\(E_{\\text{池}}\\)：电池电动势，单位 \\(\\mathrm{V}\\)。\n- \\(E_{\\text{正}}\\)：正极电势。\n- \\(E_{\\text{负}}\\)：负极电势。\n\n适用条件：原电池或将氧化还原反应设计为电池时。\n\n解题步骤：\n\n1. 判断正极和负极。\n2. 查或计算两极电势。\n3. 用 \\(E_{\\text{正}}-E_{\\text{负}}\\)。\n\n易错点：正极是还原反应，负极是氧化反应。\n\n例题方向：由 \\(Fe^{3+}/Fe^{2+}\\) 和 \\(Sn^{4+}/Sn^{2+}\\) 计算 \\(E^\\theta_{\\text{池}}\\)。\n\n### 2. Gibbs 自由能与电动势\n\n公式：\n\n\\[\n\\Delta G_T=-nFE_{\\text{池}}\n\\]\n\n标准态：\n\n\\[\n\\Delta G_T^\\theta=-nFE_{\\text{池}}^\\theta\n\\]\n\n符号说明：\n\n- \\(n\\)：电池反应转移电子的物质的量系数，单位 \\(\\mathrm{mol\\ e^-}\\)。\n- \\(F=9.65\\times10^4\\ \\mathrm{C\\cdot mol^{-1}}\\)：法拉第常量。\n- \\(E_{\\text{池}}\\)：电池电动势，单位 \\(\\mathrm{V}\\)。\n- \\(\\Delta G\\)：Gibbs 自由能变，单位 \\(\\mathrm{J\\cdot mol^{-1}}\\)。\n\n适用条件：恒温恒压，可逆电池最大非体积功关系。\n\n易错点：自发电池 \\(E\u003e0\\)，对应 \\(\\Delta G\u003c0\\)。\n\n### 3. 标准电动势与平衡常数\n\n公式：\n\n\\[\nE_{\\text{池}}^\\theta=\\frac{2.30RT}{nF}\\lg K^\\theta\n\\]\n\n298 K：\n\n\\[\nE_{\\text{池}}^\\theta=\\frac{0.0592}{n}\\lg K^\\theta\n\\]\n\n常见变形：\n\n\\[\n\\lg K^\\theta=\\frac{nE_{\\text{池}}^\\theta}{0.0592}\n\\]\n\n适用条件：298 K 标准态氧化还原反应。\n\n解题步骤：\n\n1. 写配平电池反应。\n2. 确定转移电子数 \\(n\\)。\n3. 求 \\(E_{\\text{池}}^\\theta\\)。\n4. 代入 \\(\\lg K^\\theta=nE^\\theta/0.0592\\)。\n\n易错点：\\(K\\) 与反应式写法有关，\\(n\\) 也随反应式写法变。\n\n### 4. 由 \\(\\Delta G^\\theta\\) 求电极电势\n\n公式：\n\n\\[\nE^\\theta=-\\frac{\\Delta G^\\theta}{nF}\n\\]\n\n若 \\(\\Delta G^\\theta\\) 用 \\(\\mathrm{kJ\\cdot mol^{-1}}\\)，\\(F\\) 常用 \\(96.5\\ \\mathrm{kJ\\cdot V^{-1}\\cdot mol^{-1}}\\)。\n\n适用条件：已知电极反应的标准 Gibbs 自由能变。\n\n易错点：必须使用该半反应对应的电子数 \\(n\\)。\n\n### 5. 间接计算未知标准电极电势\n\n核心关系：\n\n\\[\n\\Delta G^\\theta=-nFE^\\theta\n\\]\n\n若目标反应为反应 1 减反应 2，则：\n\n\\[\n\\Delta G_3^\\theta=\\Delta G_1^\\theta-\\Delta G_2^\\theta\n\\]\n\n所以常转化为：\n\n\\[\nn_3E_3^\\theta=n_1E_1^\\theta-n_2E_2^\\theta\n\\]\n\n适用条件：由已知电极反应组合出目标电极反应。\n\n易错点：不能直接用 \\(E_3=E_1-E_2\\)，因为电极电势没有加和性。\n\n### 6. Nernst 方程：电池形式\n\n公式：\n\n\\[\nE_{\\text{池}}=E_{\\text{池}}^\\theta-\\frac{0.0592}{n}\\lg Q\n\\]\n\n对：\n\n\\[\na\\,ox_1+b\\,red_2\\rightleftharpoons c\\,red_1+d\\,ox_2\n\\]\n\n\\[\nQ=\\frac{(red_1)^c(ox_2)^d}{(ox_1)^a(red_2)^b}\n\\]\n\n适用条件：298 K，非标准态电池反应。\n\n易错点：\\(Q\\) 按电池总反应写，固体、纯液体不写入。\n\n### 7. Nernst 方程：电极形式\n\n公式：\n\n\\[\nm\\,Ox+ne^-\\rightleftharpoons q\\,Red\n\\]\n\n\\[\nE=E^\\theta+\\frac{0.0592}{n}\\lg\\frac{(Ox)^m}{(Red)^q}\n\\]\n\n适用条件：298 K，电极反应按还原方向书写。\n\n易错点：电子不写入表达式；气体要用相对分压。\n\n### 8. 氢电极与 pH\n\n公式：\n\n\\[\n2H^+ +2e^-\\rightleftharpoons H_2\n\\]\n\n\\[\nE(H^+/H_2)=-0.0592pH\n\\]\n\n条件：\\(p_{H_2}=p^\\theta\\)，298 K。\n\n浓差电池测 pH：\n\n\\[\nE_{\\text{池}}=0.0592pH\n\\]\n\n适用条件：一侧为待测 \\(H^+\\)，另一侧为标准氢电极。\n\n### 9. 氧线\n\n公式：\n\n\\[\nO_2+4H^+ +4e^-\\rightleftharpoons 2H_2O\n\\]\n\n\\[\nE(O_2/H_2O)=1.23-0.0592pH\n\\]\n\n适用条件：\\(p_{O_2}=p^\\theta\\)，298 K。\n\n用途：判断水的稳定区。\n\n### 10. 溶度积测定\n\n以 \\(AgI\\) 为例，若设计浓差电池并测得 \\(E_{\\text{池}}\\)，可求饱和溶液中 \\([Ag^+]\\)，再：\n\n\\[\nK_{sp}=[Ag^+][I^-]\n\\]\n\n对纯 \\(AgI(s)\\) 饱和溶液：\n\n\\[\nK_{sp}=x^2\n\\]\n\n适用条件：难溶盐饱和溶液中离子浓度由电池电动势求得。\n\n## 四、需要记忆的性质和规律\n\n| 知识点 | 具体内容 | 记忆方法 | 常见考法 |\n|---|---|---|---|\n| 氧化数变化 | 升高被氧化，降低被还原 | “升失氧，降得还” | 判断氧化剂还原剂 |\n| 氧化剂 | 得电子，氧化数降低，本身被还原 | “氧化剂被还原” | 标出反应中氧化剂 |\n| 还原剂 | 失电子，氧化数升高，本身被氧化 | “还原剂被氧化” | 标出反应中还原剂 |\n| 配平原则 | 得失电子总数相等 | 电子守恒 | 氧化数法、半反应法 |\n| 介质规则 | 酸性不出现 \\(OH^-\\)，碱性不出现 \\(H^+\\) | 看介质写 \\(H^+\\)/\\(OH^-\\) | 判断配平方程是否合理 |\n| 原电池负极 | 发生氧化反应 | “负氧” | 写电极反应 |\n| 原电池正极 | 发生还原反应 | “正还” | 写电极反应 |\n| 盐桥 | 维持电荷平衡，使反应继续 | 离子补电荷 | 判断盐桥作用 |\n| 电池符号 | 负极左，正极右，\\(|\\) 相界面，\\(||\\) 盐桥 | 从左到右：氧化到还原 | 写电池符号 |\n| 标准氢电极 | \\(E^\\theta=0.0000\\ \\mathrm{V}\\) | 所有电极相对它测 | 标准电势定义 |\n| \\(E^\\theta\\) 大小 | \\(E^\\theta\\) 大，氧化型氧化性强；\\(E^\\theta\\) 小，还原型还原性强 | “高氧强，低还强” | 比较氧化剂、还原剂 |\n| 电势强度量 | 半反应乘系数，\\(E^\\theta\\) 不变 | 电势不是能量 | 判断电势是否变 |\n| 自发判据 | \\(E\u003e0\\)、\\(\\Delta G\u003c0\\)、\\(K\u003e1\\) | 三者等价 | 判断方向 |\n| 反应彻底经验 | \\(E^\\theta\\) 越大，\\(K\\) 越大；常用 \\(0.2\\sim0.4\\ \\mathrm{V}\\) 粗判 | 与 \\(n\\) 有关 | 判断是否较彻底 |\n| Nernst 方程 | 浓度改变会改变电极电势 | 改浓度就是改 \\(Q\\) | 非标准态计算 |\n| 沉淀影响 | 生成沉淀降低某离子浓度，可显著改变电势 | 浓度进 Nernst | \\(CuI\\) 使 \\(Cu^{2+}/Cu^+\\) 电势升高 |\n| 配合物影响 | 形成配合物降低游离金属离子浓度 | 配位改浓度 | \\(Cu(NH_3)_4^{2+}\\) 改变电势 |\n| 酸度影响 | 有 \\(H^+\\)/\\(OH^-\\) 参与时酸度影响显著 | 酸度进 Nernst 幂次 | \\(Cr_2O_7^{2-}\\) 氧化性随酸度增强 |\n| 歧化判断 | 元素电势图中右边 \\(E^\\theta\\) 大于左边 \\(E^\\theta\\)，中间物种易歧化 | “右大歧化” | 判断 \\(MnO_4^{2-}\\)、\\(Mn^{3+}\\) |\n\n补充常考点：材料介绍了化学电源简介的目录，但正文未展开普通干电池、蓄电池、燃料电池的具体结构和反应；若考试涉及电源类型，需要补充老师后续材料或教材对应内容。\n\n## 五、易错点总结\n\n### 1. 把氧化剂和还原剂的变化方向说反\n\n- 错误理解：氧化剂发生氧化，氧化数升高。\n- 正确理解：氧化剂得电子，本身被还原，氧化数降低。\n- 如何避免：记“剂的作用给别人，本身相反变化”。\n\n### 2. 混淆氧化数和化合价\n\n- 错误理解：氧化数就是化合价，所有情况下完全相同。\n- 正确理解：氧化数可正可负，是电子转移或偏移的形式数；化合价表示成键数目，通常为正。\n- 如何避免：判断氧化还原时用氧化数，判断结构成键时才谈化合价。\n\n### 3. 配平时忽略介质\n\n- 错误理解：酸性介质中也可以用 \\(OH^-\\) 配平。\n- 正确理解：酸性介质用 \\(H^+\\)、\\(H_2O\\)，碱性介质用 \\(OH^-\\)、\\(H_2O\\)。\n- 如何避免：配平前先圈出“酸性/碱性/中性”。\n\n### 4. 电池正负极写反\n\n- 错误理解：负极一定是电极电势大的电极。\n- 正确理解：原电池中负极发生氧化，正极发生还原；\\(E_{\\text{池}}=E_{\\text{正}}-E_{\\text{负}}\u003e0\\)。\n- 如何避免：先判断半反应方向，再写正负极。\n\n### 5. 电极电势乘系数也跟着乘\n\n- 错误理解：\\(Fe^{3+}+e^-=Fe^{2+}\\) 乘 2 后，\\(E^\\theta\\) 也乘 2。\n- 正确理解：电极电势是强度量，反应倍增 \\(E^\\theta\\) 不变。\n- 如何避免：只有 \\(\\Delta G^\\theta=-nFE^\\theta\\) 可加和，\\(E^\\theta\\) 不直接加和。\n\n### 6. 由多个电极电势求未知电势时直接相减\n\n- 错误理解：目标反应等于反应 1 减反应 2，所以 \\(E_3=E_1-E_2\\)。\n- 正确理解：必须先乘电子数，按 \\(nE\\) 或 \\(\\Delta G\\) 加和。\n- 如何避免：写出每个半反应的 \\(n\\)，用 \\(n_3E_3=n_1E_1-n_2E_2\\) 类关系。\n\n### 7. Nernst 方程中把固体、纯液体、电子写入 \\(Q\\)\n\n- 错误理解：所有物质都写入浓度商。\n- 正确理解：固体、纯液体、电子不写入；气体用相对分压。\n- 如何避免：写 \\(Q\\) 前标出物态。\n\n### 8. 忽视酸度对含 \\(H^+\\) 电极反应的影响\n\n- 错误理解：标准电极电势表中的数值在任何 pH 下都适用。\n- 正确理解：若半反应中有 \\(H^+\\) 或 \\(OH^-\\)，pH 改变会显著改变 \\(E\\)。\n- 如何避免：看到 \\(H^+\\)、\\(OH^-\\) 立即使用 Nernst 方程。\n\n### 9. 只看 \\(E^\\theta\u003e0\\) 不看反应式方向和 \\(n\\)\n\n- 错误理解：某个电极电势为正就说明整个反应自发。\n- 正确理解：要计算电池电动势 \\(E_{\\text{池}}=E_{\\text{正}}-E_{\\text{负}}\\)，并与配平反应对应。\n- 如何避免：写两个电对，确定哪个作正极、哪个作负极，再求差。\n\n### 10. 忽略热力学与动力学区别\n\n- 错误理解：\\(E^\\theta_{\\text{池}}\u003e0\\) 的反应一定很快发生。\n- 正确理解：\\(E^\\theta_{\\text{池}}\u003e0\\) 只说明热力学自发，速率还受动力学影响；材料中过二硫酸盐氧化 \\(Mn^{2+}\\) 需 \\(Ag^+\\) 催化。\n- 如何避免：题目问“能否自发”看热力学，问“是否明显反应/速率”还要考虑动力学。\n\n# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：氧化数升高的过程称为 ______，氧化数降低的过程称为 ______。\n\n2. 选择：原电池中负极发生的反应是  \n   A. 还原反应  \n   B. 氧化反应  \n   C. 中和反应  \n   D. 沉淀反应\n\n3. 填空：电池电动势计算公式为 \\(E_{\\text{池}}=\\_\\_\\_\\_\\_\\_\\)。\n\n4. 选择：标准氢电极的标准电极电势规定为  \n   A. \\(-1.0000\\ \\mathrm{V}\\)  \n   B. \\(0.0000\\ \\mathrm{V}\\)  \n   C. \\(0.3400\\ \\mathrm{V}\\)  \n   D. \\(1.0000\\ \\mathrm{V}\\)\n\n5. 填空：标准态下 \\(\\Delta G_T^\\theta\\) 与电池电动势的关系为 \\(\\Delta G_T^\\theta=\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：电极反应整体乘以 2 后，其标准电极电势 \\(E^\\theta\\)  \n   A. 变为原来的 2 倍  \n   B. 变为原来的一半  \n   C. 不变  \n   D. 变号\n\n7. 填空：298 K 下，标准电动势和平衡常数关系为 \\(E_{\\text{池}}^\\theta=\\_\\_\\_\\_\\_\\_\\lg K^\\theta\\)。\n\n8. 选择：电对 \\(E^\\theta\\) 越大，通常说明  \n   A. 氧化型氧化能力越强  \n   B. 还原型还原能力越强  \n   C. 反应速率一定越快  \n   D. 该物质一定不能被还原\n\n## 二、公式计算题\n\n1. 已知 \\(E^\\theta(Fe^{3+}/Fe^{2+})=0.771\\ \\mathrm{V}\\)，\\(E^\\theta(Sn^{4+}/Sn^{2+})=0.151\\ \\mathrm{V}\\)。求反应 \\(2Fe^{3+}+Sn^{2+}\\rightarrow 2Fe^{2+}+Sn^{4+}\\) 的 \\(E^\\theta_{\\text{池}}\\) 和 \\(K^\\theta\\)。\n\n2. 在标准状态下，酸性溶液中 \\(O_2\\) 氧化 \\(Fe^{2+}\\) 为 \\(Fe^{3+}\\)：\\(O_2+4H^+ +4Fe^{2+}\\rightarrow 2H_2O+4Fe^{3+}\\)。已知 \\(E^\\theta(O_2/H_2O)=1.23\\ \\mathrm{V}\\)，\\(E^\\theta(Fe^{3+}/Fe^{2+})=0.77\\ \\mathrm{V}\\)。求 \\(E^\\theta_{\\text{池}}\\) 和 \\(K^\\theta\\)。\n\n3. 计算电池 \\((-)\\ Pt|Fe^{2+}(0.10\\ M),Fe^{3+}(0.20\\ M)||Ag^+(1.0\\ M)|Ag(+)\\) 的电动势。已知 \\(E^\\theta(Ag^+/Ag)=0.7996\\ \\mathrm{V}\\)，\\(E^\\theta(Fe^{3+}/Fe^{2+})=0.771\\ \\mathrm{V}\\)，电池反应为 \\(Fe^{2+}+Ag^+\\rightarrow Fe^{3+}+Ag\\)。\n\n4. 已知 \\(ClO_3^-+6H^+ +6e^-\\rightarrow Cl^-+3H_2O\\)，\\(E_1^\\theta=1.45\\ \\mathrm{V}\\)；\\(0.5Cl_2+e^-\\rightarrow Cl^-\\)，\\(E_2^\\theta=1.36\\ \\mathrm{V}\\)。求 \\(ClO_3^-+6H^+ +5e^-\\rightarrow 0.5Cl_2+3H_2O\\) 的 \\(E_3^\\theta\\)。\n\n5. 已知 \\(Cr_2O_7^{2-}+14H^+ +6e^-\\rightarrow 2Cr^{3+}+7H_2O\\)，\\(E^\\theta=1.23\\ \\mathrm{V}\\)。当 \\([Cr^{3+}]=1\\)、\\([Cr_2O_7^{2-}]=1\\)、\\([H^+]=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}}\\) 时，求 \\(E\\)。\n\n## 三、判断题\n\n1. 氧化剂在反应中得到电子，本身被还原。  \n2. 单质中元素的氧化数一定为 0。  \n3. 酸性介质配平氧化还原方程时可以保留 \\(OH^-\\)。  \n4. 原电池中电子从负极经外电路流向正极。  \n5. 标准电极电势越大，还原型的还原能力越强。  \n6. \\(E_{\\text{池}}\u003e0\\) 时，对应 \\(\\Delta G\u003c0\\)，反应正向自发。  \n7. Nernst 方程中，纯固体和电子都应写入反应商。  \n8. \\(E^\\theta_{\\text{池}}\u003e0\\) 只能说明热力学上自发，不保证反应速率一定快。\n\n## 四、综合题\n\n1. 某反应在标准态下由 \\(Br_2/Br^-\\) 和 \\(I_2/I^-\\) 两个电对构成。已知 \\(E^\\theta(Br_2/Br^-)=1.066\\ \\mathrm{V}\\)，\\(E^\\theta(I_2/I^-)=0.536\\ \\mathrm{V}\\)。判断 \\(Br_2+2I^-\\rightarrow 2Br^-+I_2\\) 是否自发，并说明氧化剂、还原剂、正负极及电子流向。\n\n2. 结合 Nernst 方程说明：为什么生成沉淀、弱电解质、配合物或改变酸度都可能显著改变氧化还原反应方向？请至少举两个材料中的例子。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 氧化；还原。氧化数升高表示失电子，被氧化；氧化数降低表示得电子，被还原。\n\n2. B。原电池中负极发生氧化反应，正极发生还原反应。\n\n3. \\(E_{\\text{正}}-E_{\\text{负}}\\)。电池电动势是正极电势减负极电势。\n\n4. B。标准氢电极的 \\(E^\\theta\\) 被规定为 \\(0.0000\\ \\mathrm{V}\\)。\n\n5. \\(-nFE_{\\text{池}}^\\theta\\)。标准态下 \\(\\Delta G_T^\\theta=-nFE_{\\text{池}}^\\theta\\)。\n\n6. C。电极电势是强度量，半反应乘系数时 \\(E^\\theta\\) 不变。\n\n7. \\(\\frac{0.0592}{n}\\)。298 K 时 \\(E_{\\text{池}}^\\theta=\\frac{0.0592}{n}\\lg K^\\theta\\)。\n\n8. A。\\(E^\\theta\\) 越大，氧化型越容易得电子，氧化能力越强。\n\n## 二、公式计算题答案\n\n1. 解题思路：先判断正负极，再用 \\(E^\\theta_{\\text{池}}=E^\\theta_{\\text{正}}-E^\\theta_{\\text{负}}\\)，再求 \\(K^\\theta\\)。  \n   使用公式：\n   \\[\n   E^\\theta_{\\text{池}}=E^\\theta_{\\text{正}}-E^\\theta_{\\text{负}}\n   \\]\n   \\[\n   \\lg K^\\theta=\\frac{nE^\\theta_{\\text{池}}}{0.0592}\n   \\]\n   已知量：正极 \\(Fe^{3+}/Fe^{2+}\\)，\\(E^\\theta=0.771\\ \\mathrm{V}\\)；负极对应 \\(Sn^{4+}/Sn^{2+}\\)，\\(E^\\theta=0.151\\ \\mathrm{V}\\)；\\(n=2\\)。  \n   代入：\n   \\[\n   E^\\theta_{\\text{池}}=0.771-0.151=0.620\\ \\mathrm{V}\n   \\]\n   \\[\n   \\lg K^\\theta=\\frac{2\\times0.620}{0.0592}=20.95\n   \\]\n   \\[\n   K^\\theta=8.8\\times10^{20}\n   \\]\n   最终答案：\\(E^\\theta_{\\text{池}}=0.620\\ \\mathrm{V}\\)，\\(K^\\theta=8.8\\times10^{20}\\)。  \n   易错提醒：该反应式中 \\(n=2\\)，如果反应式减半，\\(K\\) 会改变。\n\n2. 解题思路：\\(O_2/H_2O\\) 作正极，\\(Fe^{3+}/Fe^{2+}\\) 作负极，\\(n=4\\)。  \n   使用公式：\n   \\[\n   E^\\theta_{\\text{池}}=E^\\theta_{\\text{正}}-E^\\theta_{\\text{负}}\n   \\]\n   \\[\n   \\lg K^\\theta=\\frac{nE^\\theta_{\\text{池}}}{0.0592}\n   \\]\n   代入：\n   \\[\n   E^\\theta_{\\text{池}}=1.23-0.77=0.46\\ \\mathrm{V}\n   \\]\n   \\[\n   \\lg K^\\theta=\\frac{4\\times0.46}{0.0592}=31.1\n   \\]\n   \\[\n   K^\\theta\\approx1.2\\times10^{31}\n   \\]\n   最终答案：\\(E^\\theta_{\\text{池}}=0.46\\ \\mathrm{V}\\)，\\(K^\\theta\\approx1.2\\times10^{31}\\)。  \n   易错提醒：\\(n\\) 是配平电池反应的电子转移数，这里是 4。\n\n3. 解题思路：先求标准电动势，再用 Nernst 方程。  \n   使用公式：\n   \\[\n   E_{\\text{池}}=E^\\theta_{\\text{池}}-\\frac{0.0592}{n}\\lg Q\n   \\]\n   已知量：\\(E^\\theta_{\\text{池}}=0.7996-0.771=0.0286\\ \\mathrm{V}\\)，\\(n=1\\)。  \n   反应商：\n   \\[\n   Q=\\frac{[Fe^{3+}]}{[Fe^{2+}][Ag^+]}=\\frac{0.20}{0.10\\times1.0}=2.0\n   \\]\n   代入：\n   \\[\n   E_{\\text{池}}=0.0286-0.0592\\lg2.0=0.0286-0.0178=0.0108\\ \\mathrm{V}\n   \\]\n   最终答案：\\(E_{\\text{池}}\\approx0.011\\ \\mathrm{V}\\)。  \n   易错提醒：固体 \\(Ag\\) 不写入 \\(Q\\)。\n\n4. 解题思路：目标半反应 = 反应 1 - 反应 2，必须用 \\(nE\\) 加权。  \n   使用公式：\n   \\[\n   5E_3^\\theta=6E_1^\\theta-1E_2^\\theta\n   \\]\n   代入：\n   \\[\n   E_3^\\theta=\\frac{6\\times1.45-1\\times1.36}{5}=1.47\\ \\mathrm{V}\n   \\]\n   最终答案：\\(E_3^\\theta=1.47\\ \\mathrm{V}\\)。  \n   易错提醒：不能直接算 \\(1.45-1.36\\)。\n\n5. 解题思路：该电极反应含 \\(H^+\\)，酸度要进入 Nernst 方程。  \n   使用公式：\n   \\[\n   E=E^\\theta-\\frac{0.0592}{6}\\lg\\frac{[Cr^{3+}]^2}{[Cr_2O_7^{2-}][H^+]^{14}}\n   \\]\n   已知量：\\([Cr^{3+}]=1\\)，\\([Cr_2O_7^{2-}]=1\\)，\\([H^+]=10^{-3}\\)。  \n   代入：\n   \\[\n   Q=\\frac{1}{1\\times(10^{-3})^{14}}=10^{42}\n   \\]\n   \\[\n   E=1.23-\\frac{0.0592}{6}\\lg10^{42}=1.23-0.414=0.82\\ \\mathrm{V}\n   \\]\n   最终答案：\\(E\\approx0.82\\ \\mathrm{V}\\)。  \n   易错提醒：\\([H^+]\\) 的指数是 14，酸度影响非常大。\n\n## 三、判断题答案\n\n1. 正确。氧化剂得电子，氧化数降低，本身被还原。\n\n2. 正确。单质中电子没有整体转移或偏移，元素氧化数为 0。\n\n3. 错误。酸性介质中不能出现 \\(OH^-\\)，应通过 \\(H^+\\) 和 \\(H_2O\\) 配平。\n\n4. 正确。原电池电子从发生氧化的负极流向发生还原的正极。\n\n5. 错误。标准电极电势越大，氧化型氧化能力越强；还原型还原能力越弱。\n\n6. 正确。由 \\(\\Delta G=-nFE\\) 可知，\\(E\u003e0\\) 时 \\(\\Delta G\u003c0\\)，正向自发。\n\n7. 错误。Nernst 方程中纯固体、纯液体和电子不写入反应商。\n\n8. 正确。热力学自发不等于速率快，材料中过二硫酸盐氧化 \\(Mn^{2+}\\) 需要催化剂才明显进行。\n\n## 四、综合题答案\n\n1. 解析：  \n   \\(E^\\theta(Br_2/Br^-)=1.066\\ \\mathrm{V}\\)，大于 \\(E^\\theta(I_2/I^-)=0.536\\ \\mathrm{V}\\)，因此 \\(Br_2\\) 的氧化能力强于 \\(I_2\\)，而 \\(I^-\\) 的还原能力强于 \\(Br^-\\)。  \n   对反应：\n   \\[\n   Br_2+2I^-\\rightarrow 2Br^-+I_2\n   \\]\n   正极为 \\(Br_2+2e^-\\rightarrow2Br^-\\)，负极为 \\(2I^-\\rightarrow I_2+2e^-\\)。  \n   \\[\n   E^\\theta_{\\text{池}}=1.066-0.536=0.530\\ \\mathrm{V}\u003e0\n   \\]\n   所以反应标准态下正向自发。氧化剂是 \\(Br_2\\)，还原剂是 \\(I^-\\)。电子从负极 \\(I^-/I_2\\) 电极经外电路流向正极 \\(Br_2/Br^-\\) 电极。\n\n2. 解析：  \n   Nernst 方程表明电极电势与氧化型、还原型浓度或分压有关：\n   \\[\n   E=E^\\theta+\\frac{0.0592}{n}\\lg\\frac{Ox}{Red}\n   \\]\n   因此任何能明显改变氧化型或还原型有效浓度的过程，都可能改变电极电势，甚至改变反应方向。  \n   例 1：\\(Cu^+ + I^-\\rightarrow CuI(s)\\) 生成沉淀，使 \\([Cu^+]\\) 大幅降低，从而使 \\(Cu^{2+}/Cu^+\\) 电极电势升高，原本标准态下 \\(Cu^{2+}\\) 不能氧化 \\(I^-\\)，但生成 \\(CuI\\) 后反应可发生。  \n   例 2：向氢电极体系中加入 \\(NaAc\\) 形成 \\(HAc/Ac^-\\) 缓冲体系，使 \\([H^+]\\) 降低，\\(E(H^+/H_2)\\) 降低，导致 \\(Pb+2H^+\\rightarrow Pb^{2+}+H_2\\) 不再正向自发。  \n   例 3：\\(Cu^{2+}\\) 与 \\(NH_3\\) 形成 \\(Cu(NH_3)_4^{2+}\\)，降低游离 \\([Cu^{2+}]\\)，使 \\(Cu^{2+}/Cu\\) 电极电势下降。  \n   例 4：\\(Cr_2O_7^{2-}/Cr^{3+}\\) 半反应含 \\(14H^+\\)，酸度升高会显著增大电极电势，使其氧化性增强。\n",
    "chemistry_review/08-chemistry_review.md":  "# 本章复习提纲\n\n## 一、本章知识框架\n\n### 1. 本章主线\n\n本章讨论“反应能不能发生”之外的另一个问题：反应发生得有多快、通过什么路径发生、如何改变速率。整体逻辑是：\n\n1. 用反应速率描述浓度随时间变化。\n2. 用速率方程描述浓度对速率的影响。\n3. 用反应级数和积分速率方程处理浓度-时间关系。\n4. 用碰撞理论、过渡态理论和 Arrhenius 公式解释温度对速率的影响。\n5. 用反应机理、决速步、稳态近似解释复杂反应的速率方程来源。\n6. 用催化剂降低活化能、改变反应路径，从而改变速率。\n\n### 2. 化学动力学研究对象\n\n化学动力学研究浓度、温度、介质和催化剂等条件对化学反应速率的影响，同时阐明反应机制以及物质结构与反应性能之间的关系。\n\n热力学回答“反应是否可能、限度多大”，动力学回答“反应多快、经过什么路径”。例如合成氨和汽车尾气中 \\(NO+CO\\) 的反应热力学上有利，但若速率太慢，就没有实际价值。\n\n### 3. 化学反应速率\n\n对一般反应：\n\n\\[\naA+bB\\rightarrow cC+dD\n\\]\n\nIUPAC 建议用化学计量数归一化定义反应速率：\n\n\\[\nv=-\\frac{1}{a}\\frac{\\Delta[A]}{\\Delta t}\n=-\\frac{1}{b}\\frac{\\Delta[B]}{\\Delta t}\n=\\frac{1}{c}\\frac{\\Delta[C]}{\\Delta t}\n=\\frac{1}{d}\\frac{\\Delta[D]}{\\Delta t}\n\\]\n\n瞬时速率：\n\n\\[\nv=-\\frac{1}{a}\\frac{d[A]}{dt}\n=-\\frac{1}{b}\\frac{d[B]}{dt}\n=\\frac{1}{c}\\frac{d[C]}{dt}\n=\\frac{1}{d}\\frac{d[D]}{dt}\n\\]\n\n反应速率单位常为 \\(\\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)。\n\n### 4. 速率方程与反应级数\n\n速率方程描述反应速率与浓度的关系。对基元反应，速率方程可由质量作用定律直接写出：\n\n\\[\nv=k[A]^a[B]^b\n\\]\n\n对非基元反应，速率方程必须由实验测定，不能直接按总反应方程式的计量数写出。\n\n反应级数是速率方程中浓度幂指数之和。例如：\n\n\\[\nv=k[CO][NO_2]\n\\]\n\n对 \\(CO\\) 为一级，对 \\(NO_2\\) 为一级，总反应级数为二级。\n\n### 5. 不同级数反应\n\n一级反应：\n\n\\[\nv=k[A]\n\\]\n\n\\[\n\\ln[A]-\\ln[A]_0=-kt\n\\]\n\n\\[\nt_{1/2}=\\frac{0.693}{k}\n\\]\n\n二级反应：\n\n\\[\nv=k[A]^2\n\\]\n\n\\[\n\\frac{1}{[A]}=\\frac{1}{[A]_0}+kt\n\\]\n\n\\[\nt_{1/2}=\\frac{1}{k[A]_0}\n\\]\n\n三级反应：\n\n\\[\nv=k[A]^3\n\\]\n\n\\[\n\\frac{1}{[A]^2}=\\frac{1}{[A]_0^2}+2kt\n\\]\n\n\\[\nt_{1/2}=\\frac{3}{2k[A]_0^2}\n\\]\n\n零级反应：\n\n\\[\nv=k\n\\]\n\n\\[\n[A]=[A]_0-kt\n\\]\n\n\\[\nt_{1/2}=\\frac{[A]_0}{2k}\n\\]\n\n### 6. 温度与速率：碰撞理论、过渡态理论、Arrhenius 公式\n\n碰撞理论认为反应发生需要：\n\n1. 反应物分子发生碰撞。\n2. 碰撞分子具有足够能量。\n3. 碰撞取向合适。\n\n过渡态理论认为反应物先形成活化配合物，再转化为产物。反应物必须越过能垒，即活化能 \\(E_a\\)。\n\nArrhenius 公式：\n\n\\[\n\\ln k=-\\frac{E_a}{RT}+C\n\\]\n\n或：\n\n\\[\n\\lg k=-\\frac{E_a}{2.30R}\\frac{1}{T}+C\n\\]\n\n两温度形式：\n\n\\[\n\\ln\\frac{k_2}{k_1}\n=\\frac{E_a}{R}\\left(\\frac{1}{T_1}-\\frac{1}{T_2}\\right)\n\\]\n\n一般情况下，温度升高，速率常数 \\(k\\) 增大，但材料也提醒反应速率与温度关系存在多种类型，不能把“升温必然简单线性加快”绝对化。\n\n### 7. 反应机理与稳态近似\n\n反应机理：描述反应经历哪些基元步骤的路径。\n\n复杂反应由多个基元反应组成，其中最慢、控制总速率的步骤称为决速步。\n\n动力学稳态：某中间体浓度在一段时间内近似保持稳定。\n\n稳态近似：假定活泼中间体生成速率等于消耗速率，即：\n\n\\[\n\\frac{d[\\text{中间体}]}{dt}\\approx0\n\\]\n\n材料以 \\(NO\\) 与 \\(O_2\\) 反应为例，得到：\n\n\\[\nv=\\frac{k_1k_3[O_2][NO]^2}{k_2+k_3[O_2]}\n\\]\n\n该式复杂，是因为未对各步速率常数相对大小作进一步近似。\n\n### 8. 催化\n\n催化剂通过改变反应历程、降低活化能来改变反应速率。\n\n催化剂特点：\n\n1. 显著改变反应速率。\n2. 反应前后自身组成和数量保持不变。\n3. 不改变平衡位置，只改变达到平衡所需时间。\n4. 同时并同等程度改变正反应和逆反应速率。\n\n催化类型：\n\n- 正催化剂：加快反应速率。\n- 负催化剂/抑制剂：减慢反应速率。\n- 均相催化：催化剂、反应物、生成物处于同一相。\n- 多相催化：催化剂与反应物不同相。\n- 酶催化：具有高度专一性的生物催化。\n\n材料中光化学反应基础只列出目录，包括光化学基本原理、定律、量子产率等，正文没有详细展开；本章复习和测验不把光化学作为主要考点，若老师后续补充，需要另行整理。\n\n## 二、重点概念整理\n\n### 1. 化学动力学\n\n定义：研究反应速率、影响因素和反应机理的化学分支。\n\n需要记忆的点：动力学与热力学不同；热力学可行不代表速率快。\n\n容易混淆的地方：\\(\\Delta G\u003c0\\) 或 \\(K\\) 很大只能说明反应有自发趋势和限度，不说明反应马上发生。\n\n可能怎么考：解释合成氨、汽车尾气反应为什么热力学可行但仍需催化剂。\n\n### 2. 化学反应速率\n\n定义：单位时间内反应物浓度减少或生成物浓度增加的程度，经计量数归一化后表示为同一个反应速率。\n\n需要记忆的点：\n\n- 反应物浓度变化取负号。\n- 生成物浓度变化取正号。\n- 要除以化学计量数。\n\n容易混淆的地方：直接用某物质浓度变化率时，不同物质数值不同；归一化后才是同一反应速率。\n\n可能怎么考：给出某物质浓度变化率，求反应速率或另一物质变化率。\n\n### 3. 平均速率、瞬时速率、初始速率\n\n定义：\n\n- 平均速率：一段时间内的浓度变化率。\n- 瞬时速率：时间间隔趋近于 0 时的速率。\n- 初始速率：反应刚开始瞬间的瞬时速率。\n\n需要记忆的点：初始速率常用于测定速率方程，因为此时逆反应和副反应影响较小。\n\n容易混淆的地方：平均速率不等于任意时刻瞬时速率。\n\n可能怎么考：判断浓度-时间曲线上某点切线斜率代表瞬时速率。\n\n### 4. 速率常数 \\(k\\)\n\n定义：速率方程中的比例常数，是一定温度下反应的特征常数。\n\n需要记忆的点：\n\n- \\(k\\) 与反应本性、温度、催化剂、介质等有关。\n- 在给定温度和条件下，\\(k\\) 与反应物浓度无关。\n- \\(k\\) 的单位随反应级数变化。\n\n容易混淆的地方：改变浓度会改变速率 \\(v\\)，但不改变同一温度下的 \\(k\\)。\n\n可能怎么考：比较不同初始浓度下速率、速率常数、平衡常数是否改变。\n\n### 5. 基元反应和非基元反应\n\n定义：\n\n- 基元反应：反应物分子一步碰撞转化为生成物的反应步骤。\n- 非基元反应：由多个基元步骤组成的复杂反应。\n\n需要记忆的点：质量作用定律只可直接用于基元反应。\n\n容易混淆的地方：总反应方程式简单，不代表它一定是基元反应。\n\n可能怎么考：判断能否由化学方程式直接写速率方程。\n\n### 6. 质量作用定律\n\n定义：一定温度下，基元反应速率与反应物浓度幂的乘积成正比，幂指数等于基元反应计量数。\n\n需要记忆的点：\n\n\\[\naA+bB\\rightarrow cC\n\\]\n\n若为基元反应：\n\n\\[\nv=k[A]^a[B]^b\n\\]\n\n容易混淆的地方：非基元反应不能直接套用。\n\n可能怎么考：对基元反应 \\(A+2B\\rightarrow3C\\) 写速率方程。\n\n### 7. 反应级数\n\n定义：速率方程中各反应物浓度指数之和。\n\n需要记忆的点：级数由实验测定，可为整数、分数，甚至某些反应无法简单归类。\n\n容易混淆的地方：反应级数不一定等于总反应方程式中反应物计量数之和。\n\n可能怎么考：由初始速率法判断各反应物级数和总级数。\n\n### 8. 半衰期\n\n定义：反应物浓度降为初始浓度一半所需时间。\n\n需要记忆的点：\n\n- 一级反应 \\(t_{1/2}=0.693/k\\)，与初始浓度无关。\n- 二级和零级半衰期与初始浓度有关。\n\n容易混淆的地方：所有反应半衰期都与初始浓度无关是错误的。\n\n可能怎么考：由半衰期求一级反应速率常数，或由 \\(k\\) 求剩余量。\n\n### 9. 活化能 \\(E_a\\)\n\n定义：反应物分子转化为活化状态需要克服的能垒；宏观上为统计平均意义的能量差。\n\n需要记忆的点：\n\n- \\(E_a\\) 越大，温度变化对速率常数影响通常越明显。\n- 复杂反应实验求得的常称表观活化能。\n\n容易混淆的地方：活化能不是反应热；正逆反应活化能之差与反应热有关。\n\n可能怎么考：由 Arrhenius 公式计算 \\(E_a\\)、\\(k_2\\)，或由反应热求逆反应活化能。\n\n### 10. 催化剂\n\n定义：能改变反应速率、反应前后自身组成和数量不变的物质。\n\n需要记忆的点：\n\n- 催化剂降低活化能。\n- 催化剂改变反应路径。\n- 催化剂不改变平衡常数和平衡位置。\n- 催化剂只改变达到平衡的时间。\n\n容易混淆的地方：催化剂不能让热力学上不可能的反应变成可能。\n\n可能怎么考：判断催化剂对 \\(k\\)、\\(K\\)、\\(E_a\\)、平衡组成的影响。\n\n## 三、重要公式整理\n\n### 1. 反应速率定义\n\n公式：\n\n\\[\nv=-\\frac{1}{a}\\frac{\\Delta[A]}{\\Delta t}\n=-\\frac{1}{b}\\frac{\\Delta[B]}{\\Delta t}\n=\\frac{1}{c}\\frac{\\Delta[C]}{\\Delta t}\n=\\frac{1}{d}\\frac{\\Delta[D]}{\\Delta t}\n\\]\n\n瞬时形式：\n\n\\[\nv=-\\frac{1}{a}\\frac{d[A]}{dt}\n=\\frac{1}{c}\\frac{d[C]}{dt}\n\\]\n\n符号说明：\n\n- \\(v\\)：反应速率，常用单位 \\(\\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)。\n- \\([A]\\)：物质 \\(A\\) 的浓度。\n- \\(a,b,c,d\\)：化学计量数。\n- \\(t\\)：时间。\n\n适用条件：描述任意化学反应速率。\n\n解题步骤：\n\n1. 写出配平反应式。\n2. 明确给的是哪种物质浓度变化率。\n3. 按计量数归一化并注意正负号。\n\n易错点：反应速率规定为正值。\n\n例题方向：已知 \\(-d[A]/dt\\)，求 \\(v\\) 或 \\(d[C]/dt\\)。\n\n### 2. 微分速率方程\n\n公式：\n\n\\[\nv=k[A]^m[B]^n\n\\]\n\n符号说明：\n\n- \\(k\\)：速率常数。\n- \\(m,n\\)：对各反应物的反应级数。\n- 总级数为 \\(m+n\\)。\n\n适用条件：描述浓度对速率的影响；非基元反应需由实验确定。\n\n易错点：非基元反应中 \\(m,n\\) 不一定等于化学计量数。\n\n例题方向：初始速率法求 \\(m,n,k\\)。\n\n### 3. 一级反应\n\n微分式：\n\n\\[\nv=-\\frac{d[A]}{dt}=k[A]\n\\]\n\n积分式：\n\n\\[\n\\ln[A]-\\ln[A]_0=-kt\n\\]\n\n\\[\n\\lg[A]=\\lg[A]_0-\\frac{kt}{2.30}\n\\]\n\n半衰期：\n\n\\[\nt_{1/2}=\\frac{0.693}{k}\n\\]\n\n符号说明：\n\n- \\([A]_0\\)：初始浓度。\n- \\([A]\\)：时间 \\(t\\) 时浓度。\n- \\(k\\)：一级反应速率常数，单位 \\(\\mathrm{s^{-1}}\\)。\n\n适用条件：速率与反应物浓度一次方成正比。\n\n解题步骤：\n\n1. 判断是否一级反应。\n2. 用积分式求 \\(k,t\\) 或剩余浓度。\n3. 半衰期题可直接用 \\(0.693/k\\)。\n\n易错点：一级反应半衰期与初始浓度无关。\n\n### 4. 二级反应\n\n对 \\(A\\rightarrow P\\)：\n\n\\[\nv=k[A]^2\n\\]\n\n\\[\n\\frac{1}{[A]}=\\frac{1}{[A]_0}+kt\n\\]\n\n\\[\nt_{1/2}=\\frac{1}{k[A]_0}\n\\]\n\n符号说明：\\(k\\) 单位为 \\(\\mathrm{mol^{-1}\\cdot dm^3\\cdot s^{-1}}\\)。\n\n适用条件：速率与浓度二次方成正比。\n\n易错点：二级反应半衰期与初始浓度成反比。\n\n### 5. 三级反应\n\n公式：\n\n\\[\nv=k[A]^3\n\\]\n\n\\[\n\\frac{1}{[A]^2}=\\frac{1}{[A]_0^2}+2kt\n\\]\n\n\\[\nt_{1/2}=\\frac{3}{2k[A]_0^2}\n\\]\n\n适用条件：反应速率与浓度三次方成正比；材料指出三级反应数量较少。\n\n易错点：作图判据是 \\(1/[A]^2\\) 对 \\(t\\) 成直线，斜率为 \\(2k\\)。\n\n### 6. 零级反应\n\n公式：\n\n\\[\nv=k\n\\]\n\n\\[\n[A]=[A]_0-kt\n\\]\n\n\\[\nt_{1/2}=\\frac{[A]_0}{2k}\n\\]\n\n符号说明：\\(k\\) 单位为 \\(\\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)。\n\n适用条件：速率与反应物浓度无关，常见于表面多相反应。\n\n易错点：零级反应是匀速消耗反应物。\n\n### 7. Arrhenius 公式\n\n公式：\n\n\\[\n\\ln k=-\\frac{E_a}{RT}+C\n\\]\n\n或：\n\n\\[\n\\lg k=-\\frac{E_a}{2.30R}\\frac{1}{T}+C\n\\]\n\n两温度形式：\n\n\\[\n\\ln\\frac{k_2}{k_1}\n=\\frac{E_a}{R}\\left(\\frac{1}{T_1}-\\frac{1}{T_2}\\right)\n\\]\n\n符号说明：\n\n- \\(k\\)：速率常数。\n- \\(E_a\\)：活化能，单位 \\(\\mathrm{J\\cdot mol^{-1}}\\)。\n- \\(R=8.314\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}\\)。\n- \\(T\\)：热力学温度，单位 \\(\\mathrm{K}\\)。\n\n适用条件：符合 Arrhenius 关系的温度范围内。\n\n解题步骤：\n\n1. 温度转化为 K。\n2. 统一 \\(E_a\\) 和 \\(R\\) 的单位。\n3. 用两温度公式求 \\(k_2\\) 或 \\(E_a\\)。\n\n易错点：温度必须用 K，不能用 ℃。\n\n### 8. 正逆反应活化能与反应热\n\n材料中用能量图说明：正反应活化能与逆反应活化能之差为反应热。若按：\n\n\\[\n\\Delta H=E_{a,\\text{正}}-E_{a,\\text{逆}}\n\\]\n\n则：\n\n\\[\nE_{a,\\text{逆}}=E_{a,\\text{正}}-\\Delta H\n\\]\n\n适用条件：同一基元反应正逆方向的能量图分析。\n\n易错点：放热反应 \\(\\Delta H\u003c0\\)，逆反应活化能通常大于正反应活化能。\n\n### 9. 稳态近似\n\n公式思想：\n\n\\[\n\\frac{d[\\text{中间体}]}{dt}\\approx0\n\\]\n\n材料中 \\(NO\\) 与 \\(O_2\\) 反应机理给出：\n\n\\[\nv=\\frac{k_1k_3[O_2][NO]^2}{k_2+k_3[O_2]}\n\\]\n\n适用条件：中间体浓度低且在一段时间内近似稳定。\n\n易错点：中间体不是最终产物，也通常不出现在总反应方程式中。\n\n## 四、需要记忆的性质和规律\n\n| 知识点 | 具体内容 | 记忆方法 | 常见考法 |\n|---|---|---|---|\n| 动力学与热力学 | 热力学看方向和限度，动力学看速率和路径 | “能不能”和“快不快”分开 | 解释合成氨、尾气反应 |\n| 反应速率 | 用计量数归一化后同一反应只有一个速率 | 反应物负号，生成物正号 | 由某物质变化率求 \\(v\\) |\n| 初始速率 |
