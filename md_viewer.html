      return trimmed.split(/(?<!\\)\|/).map(cell => cell.replace(/\\\|/g, "|").trim());
    }

    function parseTableAlignments(row) {
      const cells = splitTableRow(row);
      if (!cells.length) return null;
      const alignments = [];
      for (const cell of cells) {
        if (!/^:?-{3,}:?$/.test(cell)) return null;
        if (cell.startsWith(":") && cell.endsWith(":")) {
          alignments.push("center");
        } else if (cell.endsWith(":")) {
          alignments.push("right");
        } else {
          alignments.push("left");
        }
      }
      return alignments;
    }

    function renderTable(headers, alignments, rows) {
      const alignAttr = align => align && align !== "left" ? ` style="text-align: ${align}"` : "";
      const head = headers.map((cell, index) => {
        return `<th${alignAttr(alignments[index])}>${renderInline(cell)}</th>`;
      }).join("");
      const body = rows.map(row => {
        const cells = headers.map((_, index) => {
          return `<td${alignAttr(alignments[index])}>${renderInline(row[index] || "")}</td>`;
        }).join("");
        return `<tr>${cells}</tr>`;
      }).join("");
      return `<div class="table-wrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function renderMarkdown(markdown) {
      blankCounter = 0;
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let inCode = false;
      let inUl = false;
      let inOl = false;
      let inParagraph = false;

      function closeParagraph() {
        if (inParagraph) {
          html.push("</p>");
          inParagraph = false;
        }
      }

      function closeLists() {
        if (inUl) {
          html.push("</ul>");
          inUl = false;
        }
        if (inOl) {
          html.push("</ol>");
          inOl = false;
        }
      }

      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index];
        if (line.trim().startsWith("```")) {
          closeParagraph();
          closeLists();
          html.push(inCode ? "</code></pre>" : "<pre><code>");
          inCode = !inCode;
          continue;
        }

        if (inCode) {
          html.push(escapeHtml(line) + "\n");
          continue;
        }

        const trimmed = line.trim();
        const nextTrimmed = (lines[index + 1] || "").trim();
        if (!trimmed) {
          closeParagraph();
          closeLists();
          continue;
        }

        const heading = trimmed.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          closeParagraph();
          closeLists();
          const level = heading[1].length;
          html.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
          continue;
        }

        if (/^<\/?details>$/.test(trimmed) || /^<summary>.*<\/summary>$/.test(trimmed)) {
          closeParagraph();
          closeLists();
          html.push(renderInline(trimmed));
          continue;
        }

        const tableAlignments = parseTableAlignments(nextTrimmed);
        if (trimmed.includes("|") && tableAlignments) {
          const headers = splitTableRow(trimmed);
          const rows = [];
          index += 2;
          while (index < lines.length) {
            const row = lines[index].trim();
            if (!row || !row.includes("|")) break;
            rows.push(splitTableRow(row));
            index += 1;
          }
          index -= 1;
          closeParagraph();
          closeLists();
          html.push(renderTable(headers, tableAlignments, rows));
          continue;
        }

        const ul = trimmed.match(/^[-*]\s+(.+)$/);
        if (ul) {
          closeParagraph();
          if (inOl) {
            html.push("</ol>");
            inOl = false;
          }
          if (!inUl) {
            html.push("<ul>");
            inUl = true;
          }
          html.push(`<li>${renderInline(ul[1])}</li>`);
          continue;
        }

        const ol = trimmed.match(/^\d+\.\s+(.+)$/);
        if (ol) {
          closeParagraph();
          if (inUl) {
            html.push("</ul>");
            inUl = false;
          }
          if (!inOl) {
            html.push("<ol>");
            inOl = true;
          }
          html.push(`<li>${renderInline(ol[1])}</li>`);
          continue;
        }

        if (trimmed.startsWith("> ")) {
          closeParagraph();
          closeLists();
          html.push(`<blockquote>${renderInline(trimmed.slice(2))}</blockquote>`);
          continue;
        }

        closeLists();
        if (!inParagraph) {
          html.push("<p>");
          inParagraph = true;
        } else {
          html.push("<br>");
        }
        html.push(renderInline(trimmed));
      }

      closeParagraph();
      closeLists();
      if (inCode) html.push("</code></pre>");
      return html.join("\n");
    }

    function addFormulaAnswerInputs(path) {
      if (!path.endsWith("formula-fill-blanks.md")) return;
      let rowIndex = 0;
      for (const row of content.querySelectorAll(".table-wrap tbody tr")) {
        const cells = row.querySelectorAll("td");
        if (cells.length < 2) continue;
        const id = `formula-${rowIndex}`;
        rowIndex += 1;
        const box = document.createElement("label");
        box.className = "formula-answer-box";
        box.innerHTML = `
          <span>我的答案</span>
          <input class="formula-answer-input" type="text" data-blank-id="${escapeAttribute(id)}" autocomplete="off" aria-label="公式填空答案">
        `;
        cells[1].appendChild(box);
      }
    }

    function setupInteractiveBlanks(path) {
      addFormulaAnswerInputs(path);
      const inputs = Array.from(content.querySelectorAll("input[data-blank-id]"));
      if (!inputs.length) return;

      for (const input of inputs) {
        const key = blankStorageKey(path, input.dataset.blankId);
        try {
          input.value = localStorage.getItem(key) || "";
        } catch (error) {}
        input.addEventListener("input", () => {
          try {
            localStorage.setItem(key, input.value);
          } catch (error) {}
        });
      }

      const toolbar = document.createElement("div");
      toolbar.className = "blank-toolbar";
      toolbar.innerHTML = "<button type=\"button\">清空本页填写</button>";
      toolbar.querySelector("button").addEventListener("click", () => {
        for (const input of inputs) {
          input.value = "";
          try {
            localStorage.removeItem(blankStorageKey(path, input.dataset.blankId));
          } catch (error) {}
        }
      });
      content.prepend(toolbar);
    }

    function setActive(path) {
      for (const button of nav.querySelectorAll("button")) {
        button.classList.toggle("active", button.dataset.path === path);
      }
    }

    async function loadFile(path) {
      activeBlankPath = path;
      setActive(path);
      filePath.textContent = path;
      content.innerHTML = "<p class=\"muted\">正在加载...</p>";
      const params = new URLSearchParams(location.search);
      params.set("file", path);
      history.replaceState(null, "", `${location.pathname}?${params.toString()}`);

      try {
        let markdown = embeddedMarkdown[path];
        if (markdown === undefined) {
          const response = await fetch(encodeURI(path));
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          markdown = await response.text();
        }
        content.innerHTML = renderMarkdown(markdown);
        scrollTo({ top: 0, behavior: "smooth" });
        if (window.MathJax && window.MathJax.typesetPromise) {
          await window.MathJax.typesetPromise([content]);
        }
        setupInteractiveBlanks(path);
      } catch (error) {
        content.innerHTML = `<div class="error">无法读取这个 Markdown 文件：${escapeHtml(error.message)}</div>`;
      }
    }

    function buildNav(filter = "") {
      const keyword = filter.trim().toLowerCase();
      nav.innerHTML = groups.map(group => {
        const files = group.files.filter(([label, path]) => {
          const value = `${group.title} ${label} ${path}`.toLowerCase();
          return !keyword || value.includes(keyword);
        });
        if (!files.length) return "";
        return `
          <section class="group">
            <h2 class="group-title">${group.title}</h2>
            <ul class="file-list">
              ${files.map(([label, path]) => `
                <li><button class="file-button" type="button" data-path="${path}">${label}</button></li>
              `).join("")}
            </ul>
          </section>
        `;
      }).join("") || "<p class=\"muted\">没有匹配的资料</p>";
      setActive(new URLSearchParams(location.search).get("file"));
    }

    nav.addEventListener("click", event => {
      const button = event.target.closest("button[data-path]");
      if (button) loadFile(button.dataset.path);
    });

    searchInput.addEventListener("input", event => buildNav(event.target.value));

    addEventListener("scroll", () => {
      const doc = document.documentElement;
      const scrollable = doc.scrollHeight - innerHeight;
      const percent = scrollable > 0 ? (scrollY / scrollable) * 100 : 0;
      progress.style.width = `${Math.min(100, Math.max(0, percent))}%`;
    }, { passive: true });

    buildNav();
    const allFiles = groups.flatMap(group => group.files.map(file => file[1]));
    const requestedFile = new URLSearchParams(location.search).get("file");
    loadFile(allFiles.includes(requestedFile) ? requestedFile : allFiles[0]);
  </script>
</body>
</html>
