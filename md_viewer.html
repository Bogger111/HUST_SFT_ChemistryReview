 反应刚开始瞬间的速率 | 逆反应影响小 | 初始速率法求级数 |\n| 速率常数 | 定温下与浓度无关，与温度、催化剂、介质有关 | 变浓度改 \\(v\\)，不改 \\(k\\) | 判断 \\(v,k,K\\) 是否变化 |\n| 基元反应 | 一步完成，可直接用质量作用定律 | “一步才可按系数写” | 写基元反应速率式 |\n| 非基元反应 | 多步完成，速率式由实验测定 | 总方程不等于路径 | 判断速率式能否直接写 |\n| 反应级数 | 速率式中浓度指数之和 | 看速率式，不看总方程 | 求总级数 |\n| 一级反应 | \\(\\lg[A]\\) 对 \\(t\\) 直线，\\(t_{1/2}=0.693/k\\) | 半衰期不随浓度 | 放射性衰变、分解反应 |\n| 二级反应 | \\(1/[A]\\) 对 \\(t\\) 直线 | 斜率为 \\(k\\) | 求 \\(k\\)、半衰期 |\n| 零级反应 | \\([A]\\) 对 \\(t\\) 直线，速率与浓度无关 | 匀速消耗 | 表面反应 |\n| 碰撞理论 | 有效碰撞需足够能量和合适取向 | “撞上、够能、方向对” | 判断温度、取向影响 |\n| 过渡态理论 | 反应要经过活化配合物和能垒 | 爬过能垒才反应 | 能量图分析 |\n| Arrhenius 公式 | \\(\\ln k\\) 与 \\(1/T\\) 线性，斜率 \\(-E_a/R\\) | 斜率求活化能 | 由两温度求 \\(E_a\\) 或 \\(k_2\\) |\n| 决速步 | 最慢步骤控制总速率 | “最慢卡全局” | 由机理判断速率式 |\n| 稳态近似 | 中间体生成速率≈消耗速率 | 中间体浓度近似不变 | 推导复杂速率式 |\n| 催化剂 | 改变路径、降低 \\(E_a\\)、改变速率，不改平衡位置 | “改路不改终点” | 判断催化剂对 \\(k,K,E_a\\) 的影响 |\n| 多相催化 | 吸附、扩散/解离、表面反应、脱附 | 表面四步 | 汽车尾气催化 |\n| 酶催化 | 高度专一性，锁-钥模型 | 底物进活性位点 | 判断酶催化特点 |\n\n补充常考点：材料列出光化学反应基础目录，但没有展开正文；若考试涉及光化学定律、量子产率等，应以后续课件或教材为准。\n\n## 五、易错点总结\n\n### 1. 把热力学可行等同于速率快\n\n- 错误理解：\\(\\Delta G\u003c0\\) 或 \\(K\\) 很大，反应就一定很快。\n- 正确理解：热力学只判断方向和限度，速率由动力学决定。\n- 如何避免：看到“能否发生”看热力学，看到“快慢/机理/催化”看动力学。\n\n### 2. 不除以化学计量数就比较反应速率\n\n- 错误理解：直接用 \\(\\Delta[C]/\\Delta t\\) 当作反应速率。\n- 正确理解：反应速率要除以对应计量数。\n- 如何避免：先写 \\(v=(1/\\nu_i)d[i]/dt\\) 的形式。\n\n### 3. 把反应物消耗速率写成负的反应速率\n\n- 错误理解：反应物浓度减少，所以反应速率可以为负。\n- 正确理解：反应速率规定为正值，反应物前加负号。\n- 如何避免：最终 \\(v\\) 应为正。\n\n### 4. 把速率方程直接按总反应方程式写出\n\n- 错误理解：\\(S_2O_8^{2-}+3I^-\\rightarrow...\\) 的速率一定是 \\(k[S_2O_8^{2-}][I^-]^3\\)。\n- 正确理解：非基元反应速率式由实验测定，材料给出该反应为 \\(v=k[S_2O_8^{2-}][I^-]\\)。\n- 如何避免：只有明确“基元反应”才可按计量数写。\n\n### 5. 混淆反应级数和分子数\n\n- 错误理解：反应级数一定等于反应物计量数之和。\n- 正确理解：级数来自实验速率式，可为分数或无法简单归类。\n- 如何避免：先看速率方程，不看总方程式。\n\n### 6. 认为所有半衰期都与初始浓度无关\n\n- 错误理解：\\(t_{1/2}=0.693/k\\) 适用于所有反应。\n- 正确理解：这是一级反应特征；二级、三级、零级半衰期均与 \\([A]_0\\) 有关。\n- 如何避免：先判断反应级数，再选半衰期公式。\n\n### 7. Arrhenius 计算用摄氏温度\n\n- 错误理解：把 \\(25^\\circ C\\) 直接代入 \\(T=25\\)。\n- 正确理解：Arrhenius 公式中温度必须用 K。\n- 如何避免：所有温度先加 273.15。\n\n### 8. 把活化能等同于反应热\n\n- 错误理解：活化能就是 \\(\\Delta H\\)。\n- 正确理解：活化能是跨越能垒所需能量；正逆活化能之差与反应热有关。\n- 如何避免：看能量图，区分“到峰顶”和“始末态差”。\n\n### 9. 认为催化剂改变平衡常数\n\n- 错误理解：催化剂让平衡向生成物方向移动。\n- 正确理解：催化剂同时改变正逆反应速率，不改变平衡位置和平衡常数。\n- 如何避免：记住“催化剂改路不改终点”。\n\n### 10. 把中间体当作催化剂\n\n- 错误理解：反应过程中生成又消耗的物种都是催化剂。\n- 正确理解：中间体先生成后消耗；催化剂先消耗后再生，总体不被消耗。\n- 如何避免：看该物种在机理步骤中是先出现还是先被消耗。\n\n# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：化学动力学主要研究化学反应的 ______、影响因素和反应机理。\n\n2. 选择：对反应 \\(2Fe^{3+}+Sn^{2+}\\rightarrow2Fe^{2+}+Sn^{4+}\\)，若 \\(\\Delta[Fe^{2+}]/\\Delta t=5.0\\times10^{-5}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)，则按 IUPAC 定义的反应速率为  \n   A. \\(5.0\\times10^{-5}\\)  \n   B. \\(2.5\\times10^{-5}\\)  \n   C. \\(1.0\\times10^{-4}\\)  \n   D. \\(-5.0\\times10^{-5}\\)\n\n3. 填空：基元反应的速率方程可按 ______ 定律直接写出。\n\n4. 选择：非基元反应的速率方程通常应  \n   A. 直接按总方程式计量数写出  \n   B. 由实验测定  \n   C. 总是零级  \n   D. 总是一级\n\n5. 填空：一级反应的半衰期公式为 \\(t_{1/2}=\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：零级反应的特征是  \n   A. 速率与浓度无关  \n   B. \\(\\ln[A]\\) 对 \\(t\\) 成直线  \n   C. \\(1/[A]\\) 对 \\(t\\) 成直线  \n   D. 半衰期与初始浓度无关\n\n7. 填空：Arrhenius 公式中 \\(\\ln k=-E_a/(RT)+C\\)，其中 \\(E_a\\) 称为 ______。\n\n8. 选择：催化剂改变反应速率的主要原因是  \n   A. 改变反应物总能量  \n   B. 改变平衡常数  \n   C. 改变反应路径并降低活化能  \n   D. 只改变生成物浓度\n\n## 二、公式计算题\n\n1. 对基元反应 \\(A+2B\\rightarrow3C\\)，若 \\(-d[A]/dt=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)，求 \\(+d[C]/dt\\) 和反应速率 \\(v\\)。\n\n2. 已知某一级反应速率常数 \\(k=2.2\\times10^{-5}\\ \\mathrm{s^{-1}}\\)。求其半衰期。\n\n3. 某一级反应初始质量为 \\(2.00\\ \\mathrm{g}\\)，\\(k=2.2\\times10^{-5}\\ \\mathrm{s^{-1}}\\)。反应 \\(2.00\\ \\mathrm{h}\\) 后剩余多少？假设质量与浓度成正比。\n\n4. 某二级反应 \\(A\\rightarrow P\\)，\\([A]_0=1.00\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\(k=0.50\\ \\mathrm{mol^{-1}\\cdot dm^3\\cdot h^{-1}}\\)。求 \\(t=4.0\\ \\mathrm{h}\\) 时 \\([A]\\)。\n\n5. 已知基元反应 \\(A\\rightarrow B\\) 的 \\(\\Delta H=67\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，正反应 \\(E_a=90\\ \\mathrm{kJ\\cdot mol^{-1}}\\)。求逆反应活化能。若 \\(0^\\circ C\\) 时 \\(k_1=1.1\\times10^{-5}\\ \\mathrm{min^{-1}}\\)，求 \\(45^\\circ C\\) 时 \\(k_2\\)。取 \\(R=8.314\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}\\)。\n\n## 三、判断题\n\n1. 热力学上自发的反应一定具有很快的反应速率。  \n2. 反应速率按 IUPAC 定义通常取正值。  \n3. 速率常数 \\(k\\) 在给定温度和条件下与反应物浓度无关。  \n4. 对所有反应，都可直接由总反应方程式写出速率方程。  \n5. 一级反应的 \\(\\lg[A]\\) 对 \\(t\\) 作图为直线。  \n6. 二级反应的半衰期与初始浓度无关。  \n7. 催化剂能改变反应路径，但不改变平衡位置。  \n8. 中间体和催化剂完全相同，二者没有区别。\n\n## 四、综合题\n\n1. 某反应的总方程式很简单，但实验发现速率方程与计量数不一致。请从“基元反应、非基元反应、反应机理、决速步”的角度解释为什么不能直接由总方程式写速率方程。\n\n2. 请结合 Arrhenius 公式和催化剂作用原理说明：升高温度和加入催化剂都能加快反应速率，但二者本质上有什么不同？催化剂为什么不改变平衡常数？\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 速率。化学动力学研究反应速率、影响因素和反应机理。\n\n2. B。反应速率 \\(v=\\frac{1}{2}\\Delta[Fe^{2+}]/\\Delta t=2.5\\times10^{-5}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)。\n\n3. 质量作用。质量作用定律只可直接用于基元反应。\n\n4. B。非基元反应路径复杂，速率方程必须由实验测定。\n\n5. \\(0.693/k\\)。一级反应半衰期与初始浓度无关。\n\n6. A。零级反应 \\(v=k\\)，速率与浓度无关。\n\n7. 活化能。复杂反应实验得到的 \\(E_a\\) 常称表观活化能。\n\n8. C。催化剂提供新的反应路径，降低活化能，使更多分子能越过能垒。\n\n## 二、公式计算题答案\n\n1. 解题思路：用计量数关系换算各物质浓度变化率。  \n   使用公式：\n   \\[\n   v=-\\frac{d[A]}{dt}=\\frac{1}{3}\\frac{d[C]}{dt}\n   \\]\n   已知量：\\(-d[A]/dt=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)。  \n   代入：\n   \\[\n   v=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\n   \\]\n   \\[\n   \\frac{d[C]}{dt}=3v=3.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\n   \\]\n   最终答案：\\(+d[C]/dt=3.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)，\\(v=1.0\\times10^{-3}\\ \\mathrm{mol\\cdot dm^{-3}\\cdot s^{-1}}\\)。  \n   易错提醒：\\(B\\) 的计量数不影响由 \\(A\\) 与 \\(C\\) 的换算，但写 \\(v\\) 时必须除以对应计量数。\n\n2. 解题思路：一级反应直接用半衰期公式。  \n   使用公式：\n   \\[\n   t_{1/2}=\\frac{0.693}{k}\n   \\]\n   已知量：\\(k=2.2\\times10^{-5}\\ \\mathrm{s^{-1}}\\)。  \n   代入：\n   \\[\n   t_{1/2}=\\frac{0.693}{2.2\\times10^{-5}}=3.15\\times10^4\\ \\mathrm{s}\n   \\]\n   \\[\n   3.15\\times10^4\\ \\mathrm{s}=8.75\\ \\mathrm{h}\n   \\]\n   最终答案：\\(t_{1/2}=3.15\\times10^4\\ \\mathrm{s}\\approx8.75\\ \\mathrm{h}\\)。  \n   易错提醒：一级反应半衰期与初始量无关。\n\n3. 解题思路：一级反应剩余量满足 \\(m=m_0e^{-kt}\\)。  \n   使用公式：\n   \\[\n   \\ln\\frac{[A]}{[A]_0}=-kt\n   \\]\n   已知量：\\(m_0=2.00\\ \\mathrm{g}\\)，\\(k=2.2\\times10^{-5}\\ \\mathrm{s^{-1}}\\)，\\(t=2.00\\ \\mathrm{h}=7200\\ \\mathrm{s}\\)。  \n   代入：\n   \\[\n   \\frac{m}{m_0}=e^{-kt}=e^{-(2.2\\times10^{-5})(7200)}=e^{-0.1584}=0.853\n   \\]\n   \\[\n   m=2.00\\times0.853=1.71\\ \\mathrm{g}\n   \\]\n   最终答案：剩余约 \\(1.71\\ \\mathrm{g}\\)。  \n   易错提醒：时间单位必须与 \\(k\\) 的单位一致。\n\n4. 解题思路：二级反应用 \\(1/[A]\\) 与 \\(t\\) 的关系。  \n   使用公式：\n   \\[\n   \\frac{1}{[A]}=\\frac{1}{[A]_0}+kt\n   \\]\n   已知量：\\([A]_0=1.00\\ \\mathrm{mol\\cdot dm^{-3}}\\)，\\(k=0.50\\ \\mathrm{mol^{-1}\\cdot dm^3\\cdot h^{-1}}\\)，\\(t=4.0\\ \\mathrm{h}\\)。  \n   代入：\n   \\[\n   \\frac{1}{[A]}=1.00+0.50\\times4.0=3.00\n   \\]\n   \\[\n   [A]=0.333\\ \\mathrm{mol\\cdot dm^{-3}}\n   \\]\n   最终答案：\\([A]=0.333\\ \\mathrm{mol\\cdot dm^{-3}}\\)。  \n   易错提醒：二级反应不是 \\(\\ln[A]\\) 对 \\(t\\) 线性。\n\n5. 解题思路：先由 \\(\\Delta H=E_{a,\\text{正}}-E_{a,\\text{逆}}\\) 求逆反应活化能，再用 Arrhenius 两温度式。  \n   使用公式：\n   \\[\n   E_{a,\\text{逆}}=E_{a,\\text{正}}-\\Delta H\n   \\]\n   \\[\n   \\ln\\frac{k_2}{k_1}=\\frac{E_a}{R}\\left(\\frac{1}{T_1}-\\frac{1}{T_2}\\right)\n   \\]\n   已知量：\\(\\Delta H=67\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，\\(E_{a,\\text{正}}=90\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，\\(T_1=273.15\\ \\mathrm{K}\\)，\\(T_2=318.15\\ \\mathrm{K}\\)，\\(k_1=1.1\\times10^{-5}\\ \\mathrm{min^{-1}}\\)。  \n   代入：\n   \\[\n   E_{a,\\text{逆}}=90-67=23\\ \\mathrm{kJ\\cdot mol^{-1}}\n   \\]\n   \\[\n   \\ln\\frac{k_2}{k_1}=\\frac{90000}{8.314}\\left(\\frac{1}{273.15}-\\frac{1}{318.15}\\right)=5.61\n   \\]\n   \\[\n   k_2=k_1e^{5.61}=1.1\\times10^{-5}\\times273=3.0\\times10^{-3}\\ \\mathrm{min^{-1}}\n   \\]\n   最终答案：逆反应活化能 \\(23\\ \\mathrm{kJ\\cdot mol^{-1}}\\)；\\(k_2\\approx3.0\\times10^{-3}\\ \\mathrm{min^{-1}}\\)。  \n   易错提醒：温度必须用 K，活化能要与 \\(R\\) 单位统一。\n\n## 三、判断题答案\n\n1. 错误。热力学自发不代表速率快，合成氨和汽车尾气反应都体现了这一点。\n\n2. 正确。反应物项前加负号，生成物项为正，最终反应速率取正值。\n\n3. 正确。给定温度和条件下，\\(k\\) 与浓度无关；浓度改变的是速率 \\(v\\)。\n\n4. 错误。只有基元反应可直接按质量作用定律写速率式；非基元反应要实验测定。\n\n5. 正确。一级反应满足 \\(\\lg[A]=\\lg[A]_0-kt/2.30\\)。\n\n6. 错误。二级反应 \\(t_{1/2}=1/(k[A]_0)\\)，与初始浓度有关。\n\n7. 正确。催化剂改变反应路径和活化能，不改变平衡位置。\n\n8. 错误。中间体先生成后消耗；催化剂先参与后再生，反应前后总量不变。\n\n## 四、综合题答案\n\n1. 解析：  \n   总反应方程式只表示始态和终态的化学计量关系，不一定表示反应真实路径。若反应一步完成，才称为基元反应，此时可按质量作用定律写速率方程。多数反应是非基元反应，需经历多个基元步骤，速率由反应机理决定。复杂反应中最慢的一步常称决速步，可能控制总反应速率。因此即使总方程式很简单，速率方程中的浓度指数也可能与计量数不一致，必须由实验测定或由机理推导。\n\n2. 解析：  \n   升高温度主要通过 Arrhenius 公式影响速率常数：\n   \\[\n   k=Ae^{-E_a/RT}\n   \\]\n   当 \\(T\\) 升高时，更多分子具有足够能量越过能垒，通常 \\(k\\) 增大。催化剂则是提供新的反应路径，降低活化能 \\(E_a\\)，使反应在同一温度下也能更快进行。二者都能增大速率，但升温改变的是分子能量分布，催化剂改变的是反应路径。催化剂同时并同等程度影响正逆反应速率，因此不改变平衡常数和平衡位置，只改变达到平衡的时间。\n",
    "chemistry_review/09-chemistry_review.md":  "# 本章复习提纲\n\n## 一、本章知识框架\n\n### 1. 本章主线\n\n本章从原子结构模型的发展讲起，最终落到核外电子排布和元素周期律。逻辑关系是：\n\n1. 原子结构实验基础：电子发现、油滴实验、\\(\\alpha\\) 粒子散射实验。\n2. 旧量子论：黑体辐射、光电效应、氢原子光谱、Bohr 模型。\n3. 量子力学基础：波粒二象性、de Broglie 关系、测不准原理、Schrödinger 方程。\n4. 原子轨道描述：波函数、电子云、四个量子数、轨道图像。\n5. 多电子原子：屏蔽效应、钻穿效应、能级分裂和能级交错。\n6. 电子排布：Pauli 不相容原理、最低能量原理、Hund 规则。\n7. 周期性性质：原子半径、电离能、电子亲和能、电负性。\n\n### 2. 原子结构模型的发展\n\n1. Dalton 原子论\n   - 元素由原子组成。\n   - 原子在化学反应中保持基本不变。\n   - 不同元素原子质量和性质不同。\n\n2. 电子的发现\n   - 阴极射线研究发现电子。\n   - Thomson 测得电子荷质比：\n     \\[\n     e/m=1.76\\times10^{11}\\ \\mathrm{C\\cdot kg^{-1}}\n     \\]\n   - Millikan 油滴实验测得电子电量：\n     \\[\n     e=1.6\\times10^{-19}\\ \\mathrm{C}\n     \\]\n   - 电子质量：\n     \\[\n     m=9.11\\times10^{-31}\\ \\mathrm{kg}\n     \\]\n\n3. Rutherford 核型原子模型\n   - 原子中心是带正电的原子核。\n   - 原子核集中了几乎全部质量和全部正电荷。\n   - 电子在核外空间运动。\n   - 原子核半径约为 \\(1\\sim10\\ \\mathrm{fm}\\)，远小于原子半径。\n\n经典理论无法解释原子的稳定性和氢原子线状光谱，因此需要量子理论。\n\n### 3. 旧量子论与 Bohr 氢原子模型\n\nPlanck 能量量子化：\n\n\\[\nE=h\\nu\n\\]\n\n其中 \\(h=6.626\\times10^{-34}\\ \\mathrm{J\\cdot s}\\)。\n\nEinstein 光电效应：\n\n\\[\nE_k=h\\nu-E_0\n\\]\n\n氢原子光谱的 Rydberg 公式：\n\n\\[\n\\bar{\\nu}=\\frac{1}{\\lambda}\n=R_H\\left(\\frac{1}{n_1^2}-\\frac{1}{n_2^2}\\right)\n\\]\n\n其中 \\(n_2\u003en_1\\)，\\(R_H=1.0967758\\times10^7\\ \\mathrm{m^{-1}}\\)。\n\nBohr 模型基本假设：\n\n1. 电子只能在特定半径和能量的定态轨道上运动，不辐射能量。\n2. 角动量量子化：\n   \\[\n   L=mvr=n\\frac{h}{2\\pi}\n   \\]\n3. 电子在不同轨道跃迁时吸收或发射光子：\n   \\[\n   \\Delta E=h\\nu=\\frac{hc}{\\lambda}\n   \\]\n\nBohr 半径：\n\n\\[\nr_n=a_0n^2\n\\]\n\n其中 \\(a_0\\approx53\\ \\mathrm{pm}\\)。\n\n氢原子能级：\n\n\\[\nE_n=-\\frac{13.6}{n^2}\\ \\mathrm{eV}\n\\]\n\nBohr 模型能解释氢原子光谱和电离能，但不能解释多电子原子光谱、精细结构，也仍把电子看成沿固定轨道运动的经典粒子。\n\n### 4. 微观粒子的运动规律\n\n光具有波粒二象性，电子等实物微粒也具有波粒二象性。\n\nde Broglie 关系：\n\n\\[\n\\lambda=\\frac{h}{p}=\\frac{h}{mv}\n\\]\n\n微观粒子的波动性在电子衍射实验中得到证实。宏观物体也有物质波，但波长极小，通常不可察觉。\n\nHeisenberg 测不准原理：\n\n\\[\n\\Delta x\\cdot \\Delta p\\ge \\frac{h}{4\\pi}\n\\]\n\n这说明微观粒子不能同时具有确定的位置和动量，不能用经典轨道描述电子运动。\n\nSchrödinger 方程给出波函数 \\(\\varphi\\)，合理解代表电子的运动状态，习惯称为原子轨道。\n\n波函数的平方：\n\n\\[\n|\\varphi|^2\n\\]\n\n表示电子在空间某点附近单位体积内出现的概率密度。电子云是电子在空间的概率分布。\n\n### 5. 四个量子数\n\n电子的运动状态由四个量子数描述：\n\n| 量子数 | 符号 | 取值 | 含义 |\n|---|---|---|---|\n| 主量子数 | \\(n\\) | \\(1,2,3,\\dots\\) | 电子层、能层、轨道大小和能量 |\n| 角量子数 | \\(l\\) | \\(0,1,\\dots,n-1\\) | 亚层，轨道形状，\\(s,p,d,f\\) |\n| 磁量子数 | \\(m\\) | \\(0,\\pm1,\\pm2,\\dots,\\pm l\\) | 轨道空间取向 |\n| 自旋量子数 | \\(m_s\\) | \\(+\\frac12,-\\frac12\\) | 电子自旋状态 |\n\n常见对应关系：\n\n- \\(l=0\\)：\\(s\\) 亚层，1 个轨道，最多 2 个电子。\n- \\(l=1\\)：\\(p\\) 亚层，3 个轨道，最多 6 个电子。\n- \\(l=2\\)：\\(d\\) 亚层，5 个轨道，最多 10 个电子。\n- \\(l=3\\)：\\(f\\) 亚层，7 个轨道，最多 14 个电子。\n\n每个 \\(n\\) 层共有 \\(n^2\\) 个轨道，最多容纳 \\(2n^2\\) 个电子。\n\n### 6. 波函数和电子云图像\n\n波函数可分解为径向部分和角度部分：\n\n\\[\n\\varphi_{n,l,m}(r,\\theta,\\phi)=R_{n,l}(r)Y_{l,m}(\\theta,\\phi)\n\\]\n\n电子云：\n\n\\[\n\\varphi^2=R_{n,l}^2(r)Y_{l,m}^2(\\theta,\\phi)\n\\]\n\n电子云径向分布函数：\n\n\\[\nD(r)=4\\pi r^2R^2\n\\]\n\n规律：\n\n- \\(D(r)\\) 在 \\(r=0\\) 处为 0。\n- 径向分布极大值个数为 \\(n-l\\)。\n- 径向分布极小值个数为 \\(n-l-1\\)。\n- \\(l\\) 相同时，\\(n\\) 越大，最高峰越远离原子核。\n- 存在渗透现象：高层电子云仍可能在近核处有小峰。\n\n材料第 46、49、50、75 页主要是轨道图像、径向分布和原子半径趋势图，文字提取不完整；本提纲依据相邻文字和图示标题整理规律，若需要精确图像，请补充截图。\n\n### 7. 多电子原子结构\n\n多电子原子中，轨道能量不仅与 \\(n\\) 有关，也与 \\(l\\) 有关。\n\n规律：\n\n1. \\(n\\) 相同时，\\(l\\) 越大，能量通常越高：\n   \\[\n   E_{ns}\u003cE_{np}\u003cE_{nd}\u003cE_{nf}\n   \\]\n2. \\(l\\) 相同时，\\(n\\) 越大，能量越高。\n3. \\(n,l\\) 都不同时，可能出现能级交错，如 \\(4s\\) 和 \\(3d\\)。\n\n屏蔽效应：其他电子抵消部分核电荷吸引，使电子感受到的有效核电荷降低。\n\n\\[\nZ^*=Z-\\sigma\n\\]\n\n类氢近似能量：\n\n\\[\nE=-13.6\\frac{(Z^*)^2}{n^2}\\ \\mathrm{eV}\n\\]\n\n钻穿效应：同一 \\(n\\) 层中，不同 \\(l\\) 的电子云钻入内层、接近原子核的能力不同，使电子受到不同程度屏蔽，从而能量不同。通常 \\(s\\) 钻穿能力最强，能量最低。\n\n### 8. 核外电子排布\n\n基本原则：\n\n1. Pauli 不相容原理\n   - 同一原子中没有四个量子数完全相同的电子。\n   - 一个轨道最多容纳 2 个自旋相反的电子。\n\n2. 最低能量原理\n   - 在不违背 Pauli 原理的前提下，电子排布应使原子能量最低。\n\n3. Hund 规则\n   - 等价轨道上电子尽可能以自旋相同方式分占不同轨道。\n   - 半充满和全充满构型更稳定，如 \\(p^3,d^5,f^7\\) 和 \\(p^6,d^{10},f^{14}\\)。\n\n电子排布存在例外，尤其过渡元素。材料举例：\n\n- \\(Pd\\)：不是 \\([Kr]4d^85s^2\\)，而是 \\([Kr]4d^{10}\\)。\n- \\(Pt\\)：不是 \\([Xe]5d^86s^2\\)，而是 \\([Xe]5d^96s^1\\)。\n\n### 9. 周期律与元素性质\n\n周期和能级组对应：\n\n| 周期 | 能级组 | 容量 |\n|---|---|---|\n| 一 | \\(1s\\) | 2 |\n| 二 | \\(2s,2p\\) | 8 |\n| 三 | \\(3s,3p\\) | 8 |\n| 四 | \\(4s,3d,4p\\) | 18 |\n| 五 | \\(5s,4d,5p\\) | 18 |\n| 六 | \\(6s,4f,5d,6p\\) | 32 |\n| 七 | \\(7s,5f,6d,7p\\) | 32 |\n\n原子半径：\n\n- 同周期从左到右一般减小。\n- 同主族从上到下一般增大。\n- 第 4、5 长周期半径减小幅度较小，因为 \\(d\\) 电子屏蔽作用较强。\n- 镧系收缩使镧系之后第三过渡系与第二过渡系同族元素半径接近、性质相似。\n\n电离能：\n\n- 第一电离能 \\(I_1\\)：气态基态原子失去第一个最外层电子形成气态 \\(+1\\) 价离子所需能量。\n- 一般 \\(I_1\u003cI_2\u003cI_3\\)。\n- 同主族从上到下减小。\n- 同周期从左到右一般增大。\n- 半充满、全充满结构电离能偏大，如 Be、N、Mg、P 等相邻异常。\n\n电子亲和能：\n\n- 气态原子得到电子形成气态负离子时放出的能量。\n- 一般第一电子亲和能为正，第二电子亲和能常为负，因为负离子再得电子需克服电子排斥。\n\n电负性：\n\n- 分子中原子吸引成键电子能力的相对大小。\n- 同周期从左到右一般增大。\n- 同主族从上到下一般降低。\n- 半金属电负性约在 2.0 左右，兼具金属性和非金属性。\n\n## 二、重点概念整理\n\n### 1. 能量量子化\n\n定义：微观体系吸收或放出能量不是连续的，而是按某一基本量或其整数倍进行。\n\n需要记忆的点：\n\n\\[\nE=h\\nu\n\\]\n\n容易混淆的地方：宏观能量变化近似连续，微观粒子能级通常量子化。\n\n可能怎么考：由频率求光子能量，解释线状光谱。\n\n### 2. Bohr 模型\n\n定义：基于核型原子模型和量子化假设建立的氢原子结构模型。\n\n需要记忆的点：\n\n- 定态轨道不辐射能量。\n- 角动量量子化。\n- 跃迁吸收或发射光子。\n- \\(r_n=a_0n^2\\)，\\(E_n=-13.6/n^2\\ \\mathrm{eV}\\)。\n\n容易混淆的地方：Bohr 模型只适合氢原子和类氢离子，不能推广到多电子原子。\n\n可能怎么考：计算氢原子能级、跃迁能量、电离能。\n\n### 3. 波粒二象性\n\n定义：微观粒子既表现粒子性，又表现波动性。\n\n需要记忆的点：\n\n\\[\n\\lambda=\\frac{h}{mv}\n\\]\n\n容易混淆的地方：宏观物体也有德布罗意波长，但极小，通常表现为粒子性。\n\n可能怎么考：计算电子或宏观物体的 de Broglie 波长并比较。\n\n### 4. 测不准原理\n\n定义：微观粒子的位置和动量不能同时被任意精确确定。\n\n公式：\n\n\\[\n\\Delta x\\Delta p\\ge\\frac{h}{4\\pi}\n\\]\n\n需要记忆的点：电子在原子中没有确定经典轨道。\n\n容易混淆的地方：测不准不是仪器不够精密，而是微观粒子运动规律本身。\n\n可能怎么考：解释为什么不能描述电子绕核运动轨迹。\n\n### 5. 波函数、原子轨道与电子云\n\n定义：\n\n- 波函数 \\(\\varphi\\)：描述电子运动状态的数学函数。\n- 原子轨道：波函数的合理解。\n- 电子云：\\(|\\varphi|^2\\) 在空间的概率分布。\n\n需要记忆的点：\\(|\\varphi|^2\\) 表示概率密度，不是电子真实“云状物质”。\n\n容易混淆的地方：原子轨道不是 Bohr 模型中的固定圆形轨道。\n\n可能怎么考：区分波函数、概率密度、电子云。\n\n### 6. 四个量子数\n\n定义：描述原子中电子运动状态的一组量子数。\n\n需要记忆的点：\n\n- \\(n\\)：层。\n- \\(l\\)：亚层和形状。\n- \\(m\\)：轨道取向。\n- \\(m_s\\)：自旋。\n\n容易混淆的地方：\\(l\\) 不能等于或大于 \\(n\\)；\\(m\\) 不能超出 \\(-l\\sim+l\\)。\n\n可能怎么考：判断一组量子数是否合法，判断 \\(\\varphi(3,2,1)\\) 属于哪类轨道。\n\n### 7. 屏蔽效应和钻穿效应\n\n定义：\n\n- 屏蔽效应：其他电子削弱原子核对某电子的吸引。\n- 钻穿效应：电子云钻入内层、靠近核的能力不同，导致屏蔽程度和能量不同。\n\n需要记忆的点：\n\n\\[\nZ^*=Z-\\sigma\n\\]\n\n同一 \\(n\\) 层通常：\n\n\\[\nE_{ns}\u003cE_{np}\u003cE_{nd}\u003cE_{nf}\n\\]\n\n容易混淆的地方：氢原子同 \\(n\\) 不同 \\(l\\) 能量相同，多电子原子发生能级分裂。\n\n可能怎么考：解释 \\(4s\\) 与 \\(3d\\) 能级交错、同层 \\(s,p,d,f\\) 能量差异。\n\n### 8. Pauli 不相容原理\n\n定义：同一原子中没有四个量子数完全相同的电子。\n\n需要记忆的点：同一轨道最多容纳 2 个自旋相反电子。\n\n容易混淆的地方：同一轨道中两个电子的 \\(n,l,m\\) 相同，但 \\(m_s\\) 必须相反。\n\n可能怎么考：判断轨道电子排布是否违反 Pauli 原理。\n\n### 9. Hund 规则\n\n定义：能量相同的轨道上，电子尽可能以自旋相同的方式分占不同轨道。\n\n需要记忆的点：半充满、全充满较稳定。\n\n容易混淆的地方：不能先在同一 \\(p\\) 轨道内配对，再填其他空 \\(p\\) 轨道。\n\n可能怎么考：画 \\(p^3,d^5\\) 轨道电子排布图。\n\n### 10. 电离能、电子亲和能、电负性\n\n定义：\n\n- 电离能：气态原子或离子失去电子所需能量。\n- 电子亲和能：气态原子得电子形成负离子时放出的能量。\n- 电负性：原子在分子中吸引成键电子的能力。\n\n需要记忆的点：三者都体现元素性质周期性。\n\n容易混淆的地方：电子亲和能与电负性相关但不是同一概念；电负性是相对量。\n\n可能怎么考：比较同周期、同族元素的金属性和非金属性趋势。\n\n## 三、重要公式整理\n\n### 1. 光子能量\n\n公式：\n\n\\[\nE=h\\nu\n\\]\n\n符号说明：\n\n- \\(E\\)：光子能量，单位 \\(\\mathrm{J}\\)。\n- \\(h=6.626\\times10^{-34}\\ \\mathrm{J\\cdot s}\\)。\n- \\(\\nu\\)：频率，单位 \\(\\mathrm{s^{-1}}\\)。\n\n适用条件：光量子能量计算。\n\n易错点：频率越高，单个光子能量越大。\n\n### 2. 光电效应\n\n公式：\n\n\\[\nE_k=h\\nu-E_0\n\\]\n\n符号说明：\n\n- \\(E_k\\)：光电子动能。\n- \\(E_0\\)：金属功函或逸出功。\n\n适用条件：入射光子能量超过功函时才产生光电子。\n\n易错点：光强影响光电子数，不决定单个光电子最大动能；频率决定动能。\n\n### 3. Rydberg 公式\n\n公式：\n\n\\[\n\\bar{\\nu}=\\frac{1}{\\lambda}\n=R_H\\left(\\frac{1}{n_1^2}-\\frac{1}{n_2^2}\\right)\n\\]\n\n符号说明：\n\n- \\(\\bar{\\nu}\\)：波数。\n- \\(\\lambda\\)：波长。\n- \\(R_H=1.0967758\\times10^7\\ \\mathrm{m^{-1}}\\)。\n- \\(n_2\u003en_1\\)。\n\n适用条件：氢原子谱线。\n\n常见线系：\n\n- \\(n_1=1\\)：Lyman 线系。\n- \\(n_1=2\\)：Balmer 线系。\n- \\(n_1=3\\)：Paschen 线系。\n\n易错点：\\(n_2\\) 必须大于 \\(n_1\\)。\n\n### 4. Bohr 半径\n\n公式：\n\n\\[\nr_n=a_0n^2\n\\]\n\n符号说明：\n\n- \\(r_n\\)：第 \\(n\\) 个定态轨道半径。\n- \\(a_0\\approx53\\ \\mathrm{pm}\\)：Bohr 半径。\n\n适用条件：氢原子 Bohr 模型。\n\n易错点：只适用于氢原子或类氢离子近似，不是多电子原子半径通式。\n\n### 5. 氢原子能级\n\n公式：\n\n\\[\nE_n=-\\frac{13.6}{n^2}\\ \\mathrm{eV}\n\\]\n\n符号说明：\n\n- \\(n\\)：主量子数。\n- \\(E_n\\)：氢原子第 \\(n\\) 能级能量。\n\n适用条件：氢原子。\n\n解题步骤：\n\n1. 根据初末态 \\(n\\) 求 \\(E_i,E_f\\)。\n2. 用 \\(\\Delta E=|E_f-E_i|\\)。\n3. 需要波长时用 \\(\\Delta E=hc/\\lambda\\)。\n\n易错点：能级为负值，\\(n\\to\\infty\\) 时趋近于 0。\n\n### 6. 跃迁能量\n\n公式：\n\n\\[\n\\Delta E=|E_2-E_1|=h\\nu=\\frac{hc}{\\lambda}\n\\]\n\n适用条件：电子在能级间跃迁吸收或发射光子。\n\n易错点：向低能级跃迁发射光子，向高能级跃迁吸收光子。\n\n### 7. de Broglie 关系\n\n公式：\n\n\\[\n\\lambda=\\frac{h}{p}=\\frac{h}{mv}\n\\]\n\n符号说明：\n\n- \\(\\lambda\\)：物质波波长。\n- \\(p\\)：动量。\n- \\(m\\)：质量。\n- \\(v\\)：速度。\n\n适用条件：实物微粒波动性计算。\n\n易错点：质量越大或速度越大，波长越短。\n\n### 8. 电子经电压加速的速度\n\n公式：\n\n\\[\neV=\\frac12mv^2\n\\]\n\n常用于结合：\n\n\\[\n\\lambda=\\frac{h}{mv}\n\\]\n\n适用条件：电子经电压 \\(V\\) 加速，电势能转化为动能。\n\n易错点：电压单位为 V，能量 \\(eV\\) 是电子电荷与电压乘积。\n\n### 9. 测不准关系\n\n公式：\n\n\\[\n\\Delta x\\cdot\\Delta p\\ge\\frac{h}{4\\pi}\n\\]\n\n适用条件：微观粒子位置和动量不确定性分析。\n\n易错点：不能用经典轨道描述电子。\n\n### 10. 电子云径向分布函数\n\n公式：\n\n\\[\nD(r)=4\\pi r^2R^2\n\\]\n\n符号说明：\n\n- \\(D(r)\\)：径向分布函数。\n- \\(R\\)：波函数径向部分。\n- \\(4\\pi r^2\\)：球壳面积因素。\n\n适用条件：描述电子在半径 \\(r\\) 附近单位厚度球壳内出现的概率。\n\n易错点：\\(R^2\\) 是径向概率密度，不等同于球壳概率分布；\\(D(r)\\) 才考虑球壳面积。\n\n### 11. 有效核电荷\n\n公式：\n\n\\[\nZ^*=Z-\\sigma\n\\]\n\n多电子近似能量：\n\n\\[\nE=-13.6\\frac{(Z^*)^2}{n^2}\\ \\mathrm{eV}\n\\]\n\n符号说明：\n\n- \\(Z\\)：核电荷数。\n- \\(\\sigma\\)：屏蔽常数。\n- \\(Z^*\\)：有效核电荷。\n\n适用条件：用屏蔽效应近似分析多电子原子轨道能量。\n\n易错点：外层电子对内层电子的屏蔽常数为 0；内层电子对外层电子屏蔽较强。\n\n### 12. 轨道数和最大电子数\n\n公式：\n\n\\[\n\\text{某亚层轨道数}=2l+1\n\\]\n\n\\[\n\\text{某层轨道数}=n^2\n\\]\n\n\\[\n\\text{某层最多电子数}=2n^2\n\\]\n\n适用条件：由量子数判断轨道数和电子容量。\n\n易错点：每个轨道最多容纳 2 个自旋相反电子。\n\n## 四、需要记忆的性质和规律\n\n| 知识点 | 具体内容 | 记忆方法 | 常见考法 |\n|---|---|---|---|\n| 电子电量 | \\(e=1.6\\times10^{-19}\\ \\mathrm{C}\\) | Millikan 油滴实验 | 基本常数识记 |\n| Bohr 半径 | \\(a_0\\approx53\\ \\mathrm{pm}\\) | 氢原子第一轨道 | 计算 \\(r_n\\) |\n| 氢原子能级 | \\(E_n=-13.6/n^2\\ \\mathrm{eV}\\) | 越高越接近 0 | 跃迁能量、电离能 |\n| 氢原子光谱 | \\(\\bar\\nu=R_H(1/n_1^2-1/n_2^2)\\) | \\(n_1\\) 定线系 | 判断 Lyman/Balmer |\n| de Broglie 波 | \\(\\lambda=h/mv\\) | 质量速度越大，波长越短 | 计算电子波长 |\n| 测不准原理 | \\(\\Delta x\\Delta p\\ge h/4\\pi\\) | 不能同时准 | 解释电子无轨道 |\n| 波函数 | \\(\\varphi\\) 描述运动状态 | 合理解叫轨道 | 区分轨道与轨迹 |\n| 电子云 | \\(|\\varphi|^2\\) 的空间分布 | 概率云，不是实体云 | 判断物理意义 |\n| 量子数 \\(n\\) | \\(1,2,3,\\dots\\)，决定层和大小 | K,L,M,N | 判断电子层 |\n| 量子数 \\(l\\) | \\(0\\sim n-1\\)，对应 \\(s,p,d,f\\) | 0s 1p 2d 3f | 判断亚层 |\n| 量子数 \\(m\\) | \\(-l\\sim+l\\)，共 \\(2l+1\\) 个 | 决定取向 | 判断轨道数 |\n| 量子数 \\(m_s\\) | \\(\\pm1/2\\) | 两种自旋 | Pauli 原理 |\n| 轨道容量 | \\(s2,p6,d10,f14\\) | 轨道数乘 2 | 写电子排布 |\n| Pauli 原理 | 同轨道最多 2 个自旋相反电子 | 四量子数不全同 | 判断排布错误 |\n| Hund 规则 | 等价轨道先单占且自旋相同 | 先分住，再配对 | 画轨道图 |\n| 半满全满稳定 | \\(p^3,d^5,f^7\\)，\\(p^6,d^{10},f^{14}\\) | 半满、全满稳定 | 解释电离能异常、Cr/Cu 类例外 |\n| 屏蔽效应 | 内层电子削弱核吸引 | \\(Z^*=Z-\\sigma\\) | 比较轨道能量 |\n| 钻穿效应 | \\(s\\) 轨道近核概率较大 | \\(s\u003ep\u003ed\u003ef\\) 钻穿 | 解释能级分裂 |\n| 原子半径 | 同周期左到右减小，同主族上到下增大 | 核吸引与屏蔽竞争 | 比较半径 |\n| 电离能 | 同周期一般增大，同族一般减小 | 越难失电子，电离能越大 | 比较金属性 |\n| 电子亲和能 | 第一亲和能多为正，第二多为负 | 再给负离子加电子要克服排斥 | 判断得电子趋势 |\n| 电负性 | 同周期增大，同族降低 | F 最大，金属性强则低 | 判断键极性、金属性 |\n\n补充常考点：Cr、Cu 等过渡元素电子排布异常常考，但本材料只明确列出 \\(Pd\\)、\\(Pt\\) 例外；若考试涉及 Cr、Cu，应以教材和老师补充为准。\n\n## 五、易错点总结\n\n### 1. 把 Bohr 轨道等同于量子力学原子轨道\n\n- 错误理解：原子轨道就是电子绕核运动的固定圆形轨道。\n- 正确理解：Bohr 模型中的轨道是旧量子论图像；量子力学中的原子轨道是波函数，是概率分布状态。\n- 如何避免：看到“原子轨道”优先理解为波函数，不是经典轨迹。\n\n### 2. 忘记 Bohr 模型的适用范围\n\n- 错误理解：\\(E_n=-13.6/n^2\\) 可直接用于多电子原子。\n- 正确理解：该公式用于氢原子；类氢离子需考虑 \\(Z^2\\)，多电子原子受屏蔽和钻穿影响。\n- 如何避免：题目出现多电子原子时不要直接套氢原子能级公式。\n\n### 3. 量子数取值不合法\n\n- 错误理解：\\(n=2,l=2\\) 或 \\(l=0,m=-1\\) 也可以。\n- 正确理解：\\(l=0,1,\\dots,n-1\\)，\\(m=0,\\pm1,\\dots,\\pm l\\)。\n- 如何避免：先检查 \\(l\u003cn\\)，再检查 \\(|m|\\le l\\)。\n\n### 4. 混淆 \\(p,d,f\\) 亚层轨道数和电子数\n\n- 错误理解：\\(p\\) 亚层有 6 个轨道。\n- 正确理解：\\(p\\) 亚层有 3 个轨道，最多容纳 6 个电子。\n- 如何避免：轨道数 \\(2l+1\\)，电子数再乘 2。\n\n### 5. 把电子云理解为电子真实涂抹成云\n\n- 错误理解：电子云是电子物质本身在空间弥散成云。\n- 正确理解：电子云表示电子出现概率密度分布。\n- 如何避免：记住 \\(|\\varphi|^2\\) 是概率密度。\n\n### 6. 不区分波函数角度分布和电子云角度分布\n\n- 错误理解：二者完全一样，都有正负号。\n- 正确理解：波函数角度分布可有正负，电子云角度分布是平方，没有正负。\n- 如何避免：看到 \\(\\varphi\\) 想正负相位，看到 \\(\\varphi^2\\) 想概率。\n\n### 7. 电子排布只机械按能级图，不考虑稳定性例外\n\n- 错误理解：所有过渡元素都严格按近似能级图填充。\n- 正确理解：实际基态构型以最低能量和光谱实验为准，过渡元素有例外。\n- 如何避免：常见例外单独记忆，材料明确 \\(Pd\\)、\\(Pt\\)。\n\n### 8. 电离能趋势绝对化\n\n- 错误理解：同周期第一电离能一定严格递增。\n- 正确理解：总体递增，但存在半充满、全充满稳定导致的异常，如 Be、N、Mg、P。\n- 如何避免：比较相邻元素时检查是否涉及 \\(s^2\\)、\\(p^3\\) 稳定结构。\n\n### 9. 混淆电子亲和能和电负性\n\n- 错误理解：电子亲和能越大就完全等同于电负性越大。\n- 正确理解：电子亲和能是孤立气态原子得电子能量变化；电负性是分子中吸引成键电子能力的相对量。\n- 如何避免：看题目讨论的是孤立原子得电子，还是成键电子吸引能力。\n\n### 10. 忽视镧系收缩\n\n- 错误理解：同族第五、六周期过渡元素半径应差别很大。\n- 正确理解：镧系收缩使第三过渡系与第二过渡系同族元素半径接近、性质相似。\n- 如何避免：遇到 5d/4d 同族比较时考虑镧系收缩。\n\n# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：Planck 能量量子化公式为 \\(E=\\_\\_\\_\\_\\_\\_\\)。\n\n2. 选择：Bohr 模型中氢原子第 \\(n\\) 能级能量为  \n   A. \\(E_n=-13.6n^2\\ \\mathrm{eV}\\)  \n   B. \\(E_n=-13.6/n^2\\ \\mathrm{eV}\\)  \n   C. \\(E_n=13.6/n\\ \\mathrm{eV}\\)  \n   D. \\(E_n=0\\)\n\n3. 填空：de Broglie 关系式为 \\(\\lambda=\\_\\_\\_\\_\\_\\_\\)。\n\n4. 选择：下列量子数组合正确的是  \n   A. \\(n=2,l=2,m=0\\)  \n   B. \\(n=3,l=1,m=-1\\)  \n   C. \\(n=2,l=0,m=1\\)  \n   D. \\(n=1,l=1,m=0\\)\n\n5. 填空：\\(l=0,1,2,3\\) 分别对应的亚层符号为 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：一个 \\(d\\) 亚层最多容纳的电子数为  \n   A. 2  \n   B. 6  \n   C. 10  \n   D. 14\n\n7. 填空：Pauli 不相容原理可表述为同一原子中没有 ______ 个量子数完全相同的电子。\n\n8. 选择：同周期主族元素从左到右，一般原子半径  \n   A. 增大  \n   B. 减小  \n   C. 不变  \n   D. 无规律且不能比较\n\n## 二、公式计算题\n\n1. 计算氢原子从 \\(n=1\\) 到 \\(n=\\infty\\) 的电离能，先求单个原子所需能量，再求 \\(1\\ \\mathrm{mol}\\) 氢原子的电离能。已知 \\(1\\ \\mathrm{eV}=1.602\\times10^{-19}\\ \\mathrm{J}\\)，\\(N_A=6.02\\times10^{23}\\ \\mathrm{mol^{-1}}\\)。\n\n2. 计算氢原子 \\(n=3\\rightarrow n=2\\) 跃迁发射光子的波长。用 \\(E_n=-13.6/n^2\\ \\mathrm{eV}\\)，\\(hc=1240\\ \\mathrm{eV\\cdot nm}\\)。\n\n3. 计算速度为 \\(5.9\\times10^5\\ \\mathrm{m\\cdot s^{-1}}\\) 的电子的 de Broglie 波长。已知 \\(h=6.626\\times10^{-34}\\ \\mathrm{J\\cdot s}\\)，\\(m_e=9.11\\times10^{-31}\\ \\mathrm{kg}\\)。\n\n4. 判断 \\(\\varphi(3,2,1)\\) 代表哪个亚层轨道，并说明该亚层有多少个轨道、最多容纳多少电子。\n\n5. 用 Slater 规则材料中给出的 Na 价电子结果：\\(Z^*=2.20\\)，估算 Na 的 \\(3s\\) 电子能量。用 \\(E=-13.6(Z^*)^2/n^2\\ \\mathrm{eV}\\)，\\(n=3\\)。\n\n## 三、判断题\n\n1. Bohr 模型可以很好解释所有多电子原子的光谱。  \n2. 电子具有波粒二象性，因此不能用经典确定轨道描述。  \n3. \\(|\\varphi|^2\\) 表示电子在空间某点附近的概率密度。  \n4. \\(p\\) 亚层有 6 个轨道，最多容纳 6 个电子。  \n5. 同一原子轨道最多容纳两个自旋相反的电子。  \n6. 氢原子中 \\(3s,3p,3d\\) 轨道能量相同。  \n7. 同周期元素从左到右第一电离能总是严格递增，没有例外。  \n8. 催化剂会改变原子的电子排布原则。\n\n## 四、综合题\n\n1. 请用四个量子数解释为什么第 3 电子层最多可容纳 18 个电子，并列出第 3 层包含哪些亚层。\n\n2. 结合屏蔽效应、钻穿效应和电子排布原则，说明为什么多电子原子中轨道能级会发生分裂和交错，并解释电子排布为什么不能只机械照搬近似能级图。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. \\(h\\nu\\)。每个光量子的能量与频率成正比。\n\n2. B。氢原子 Bohr 能级为 \\(E_n=-13.6/n^2\\ \\mathrm{eV}\\)。\n\n3. \\(h/p=h/(mv)\\)。de Broglie 关系把粒子动量和波长联系起来。\n\n4. B。\\(n=3\\) 时 \\(l\\) 可取 0、1、2；\\(l=1\\) 时 \\(m\\) 可取 \\(-1,0,+1\\)，所以 B 合法。\n\n5. \\(s,p,d,f\\)。\\(l=0,1,2,3\\) 分别对应 \\(s,p,d,f\\) 亚层。\n\n6. C。\\(d\\) 亚层有 5 个轨道，每个轨道最多 2 个电子，共 10 个。\n\n7. 四。同一原子中没有四个量子数完全相同的电子。\n\n8. B。同周期从左到右有效核电荷一般增大，原子半径一般减小。\n\n## 二、公式计算题答案\n\n1. 解题思路：氢原子基态能量为 \\(-13.6\\ \\mathrm{eV}\\)，电离到 \\(n=\\infty\\) 时能量为 0。  \n   使用公式：\n   \\[\n   E_n=-\\frac{13.6}{n^2}\\ \\mathrm{eV}\n   \\]\n   已知量：\\(E_1=-13.6\\ \\mathrm{eV}\\)，\\(E_\\infty=0\\)。  \n   单个原子：\n   \\[\n   \\Delta E=0-(-13.6)=13.6\\ \\mathrm{eV}\n   \\]\n   单位换算：\n   \\[\n   13.6\\ \\mathrm{eV}=13.6\\times1.602\\times10^{-19}=2.18\\times10^{-18}\\ \\mathrm{J}\n   \\]\n   \\(1\\ \\mathrm{mol}\\)：\n   \\[\n   2.18\\times10^{-18}\\times6.02\\times10^{23}=1.31\\times10^6\\ \\mathrm{J\\cdot mol^{-1}}\n   \\]\n   \\[\n   =1310\\ \\mathrm{kJ\\cdot mol^{-1}}\n   \\]\n   最终答案：单个氢原子约 \\(2.18\\times10^{-18}\\ \\mathrm{J}\\)，\\(1\\ \\mathrm{mol}\\) 约 \\(1310\\ \\mathrm{kJ\\cdot mol^{-1}}\\)。  \n   易错提醒：能级是负值，电离能是吸收能量，取正值。\n\n2. 解题思路：先求两能级能量差，再用 \\(\\Delta E=hc/\\lambda\\)。  \n   使用公式：\n   \\[\n   E_n=-\\frac{13.6}{n^2}\\ \\mathrm{eV}\n   \\]\n   已知量：\\(n_i=3\\)，\\(n_f=2\\)。  \n   代入：\n   \\[\n   E_3=-\\frac{13.6}{9}=-1.51\\ \\mathrm{eV}\n   \\]\n   \\[\n   E_2=-\\frac{13.6}{4}=-3.40\\ \\mathrm{eV}\n   \\]\n   \\[\n   \\Delta E=|-3.40-(-1.51)|=1.89\\ \\mathrm{eV}\n   \\]\n   \\[\n   \\lambda=\\frac{1240}{1.89}=656\\ \\mathrm{nm}\n   \\]\n   最终答案：\\(\\lambda\\approx656\\ \\mathrm{nm}\\)，对应 Balmer 红线。  \n   易错提醒：发射光子能量取能级差的绝对值。\n\n3. 解题思路：直接用 de Broglie 关系。  \n   使用公式：\n   \\[\n   \\lambda=\\frac{h}{mv}\n   \\]\n   已知量：\\(h=6.626\\times10^{-34}\\ \\mathrm{J\\cdot s}\\)，\\(m=9.11\\times10^{-31}\\ \\mathrm{kg}\\)，\\(v=5.9\\times10^5\\ \\mathrm{m\\cdot s^{-1}}\\)。  \n   代入：\n   \\[\n   \\lambda=\\frac{6.626\\times10^{-34}}{(9.11\\times10^{-31})(5.9\\times10^5)}\n   =1.23\\times10^{-9}\\ \\mathrm{m}\n   \\]\n   最终答案：\\(\\lambda\\approx1.2\\times10^{-9}\\ \\mathrm{m}=12\\ \\mathrm{\\AA}\\)。  \n   易错提醒：\\(\\mathrm{J\\cdot s}= \\mathrm{kg\\cdot m^2\\cdot s^{-1}}\\)，单位可约成 m。\n\n4. 解题思路：由 \\(n,l,m\\) 判断亚层和轨道取向。  \n   \\(\\varphi(3,2,1)\\) 中 \\(n=3\\)，\\(l=2\\)，所以属于 \\(3d\\) 亚层；\\(m=1\\) 是 \\(d\\) 亚层 5 个取向中的一个。  \n   \\(d\\) 亚层轨道数：\n   \\[\n   2l+1=2\\times2+1=5\n   \\]\n   最多电子数：\n   \\[\n   5\\times2=10\n   \\]\n   最终答案：\\(3d\\) 亚层中的一个轨道；该亚层有 5 个轨道，最多容纳 10 个电子。  \n   易错提醒：\\(l=2\\) 对应 \\(d\\)，不是 \\(p\\)。\n\n5. 解题思路：用有效核电荷近似能量公式。  \n   使用公式：\n   \\[\n   E=-13.6\\frac{(Z^*)^2}{n^2}\\ \\mathrm{eV}\n   \\]\n   已知量：\\(Z^*=2.20\\)，\\(n=3\\)。  \n   代入：\n   \\[\n   E=-13.6\\frac{(2.20)^2}{3^2}\n   =-13.6\\times\\frac{4.84}{9}\n   =-7.3\\ \\mathrm{eV}\n   \\]\n   最终答案：\\(E\\approx-7.3\\ \\mathrm{eV}\\)。  \n   易错提醒：能量为负表示电子处于束缚态。\n\n## 三、判断题答案\n\n1. 错误。Bohr 模型主要适用于氢原子和类氢离子，不能解释多电子原子光谱。\n\n2. 正确。电子具有波动性和测不准关系，不能用经典确定轨道描述。\n\n3. 正确。\\(|\\varphi|^2\\) 是电子概率密度的物理意义。\n\n4. 错误。\\(p\\) 亚层有 3 个轨道，最多容纳 6 个电子。\n\n5. 正确。这是 Pauli 不相容原理的常见表述。\n\n6. 正确。氢原子能量只由 \\(n\\) 决定，因此 \\(3s,3p,3d\\) 简并。\n\n7. 错误。同周期第一电离能总体增大，但 Be、N、Mg、P 等有稳定构型导致异常。\n\n8. 错误。催化剂影响化学反应速率，不改变原子核外电子排布基本原则。\n\n## 四、综合题答案\n\n1. 解析：  \n   第 3 电子层 \\(n=3\\)，角量子数可取：\n   \\[\n   l=0,1,2\n   \\]\n   分别对应 \\(3s,3p,3d\\) 亚层。  \n   当 \\(l=0\\) 时，\\(m=0\\)，有 1 个 \\(3s\\) 轨道，可容纳 2 个电子。  \n   当 \\(l=1\\) 时，\\(m=-1,0,+1\\)，有 3 个 \\(3p\\) 轨道，可容纳 6 个电子。  \n   当 \\(l=2\\) 时，\\(m=-2,-1,0,+1,+2\\)，有 5 个 \\(3d\\) 轨道，可容纳 10 个电子。  \n   总轨道数：\n   \\[\n   1+3+5=9=n^2\n   \\]\n   总电子数：\n   \\[\n   9\\times2=18=2n^2\n   \\]\n   所以第 3 层最多容纳 18 个电子。\n\n2. 解析：  \n   氢原子只有一个电子，不存在电子间排斥，因此同一 \\(n\\) 下不同 \\(l\\) 的轨道能量相同。多电子原子中，一个电子既受原子核吸引，又受其他电子排斥。其他电子会屏蔽部分核电荷，使该电子感受到的有效核电荷 \\(Z^*=Z-\\sigma\\) 降低，这就是屏蔽效应。  \n   同时，不同轨道的电子云径向分布不同，钻入内层、靠近原子核的能力不同。一般 \\(s\\) 电子钻穿能力强，受到屏蔽较小，能量较低；\\(p,d,f\\) 依次钻穿能力减弱，因此同一 \\(n\\) 层发生能级分裂。随着原子序数增加，屏蔽和钻穿的综合作用还会造成能级交错，如 \\(4s\\) 与 \\(3d\\)。  \n   电子排布要满足 Pauli 不相容原理、最低能量原理和 Hund 规则，并且实际基态构型以光谱实验事实为准。过渡元素常有半充满、全充满或其他稳定性导致的例外，因此不能只机械照搬近似能级图。\n",
    "chemistry_review/10-chemistry_review.md":  "# 本章复习提纲\n\n## 一、本章知识框架\n\n### 1. 本章主线\n\n本章围绕“微观粒子怎样结合成物质”展开，逻辑关系可以概括为：\n\n1. 化学键类型：离子键、共价键、金属键、配位键。\n2. 共价键理论：经典 Lewis 学说解释“共享电子对”，价键理论解释“轨道重叠与电子配对”，分子轨道理论解释“电子属于整个分子”。\n3. 分子构型：杂化轨道理论和价层电子对互斥理论共同用于判断分子的空间形状。\n4. 分子性质：键的极性、分子的极性、偶极矩、分子间作用力和氢键。\n5. 晶体结构：晶胞、晶系、圆球堆积、金属晶体、离子晶体、分子晶体、原子晶体。\n6. 离子极化：解释理想离子键向共价键过渡，以及晶型、键型和性质变化。\n\n### 2. 层级结构\n\n#### 2.1 化学键与离子键\n\n- 电负性用于判断原子对成键电子的吸引能力。\n- 键三角用二元化合物中元素电负性平均值和差值，粗略判断金属键、离子键、共价键成分。\n- 离子键来自正、负离子间的库仑静电吸引。\n- 离子键没有方向性和饱和性，所以离子晶体中配位数主要受正、负离子半径比和空间限制影响。\n- 晶格能衡量离子晶体结合强弱，离子电荷越高、核间距越小，晶格能越大。\n\n#### 2.2 共价键理论\n\n- Lewis 学说：共用电子对、Lewis 结构、八隅体规则。\n- 价键理论：原子轨道重叠，共用自旋相反电子对；解释共价键的方向性和饱和性。\n- 杂化轨道：同一原子中能量相近的原子轨道组合为同数目的杂化轨道，用于解释分子构型。\n- 离域 \\(\\pi\\) 键/共振：真实结构不是某一个经典结构式，而是多个共振式的综合。\n- 分子轨道理论：电子属于整个分子，原子轨道线性组合形成成键和反键分子轨道。\n\n#### 2.3 分子构型与极性\n\n- VSEPR：价层电子对互相排斥，尽量远离，决定电子对几何构型。\n- 分子构型不包括孤对电子；电子对几何构型包括孤对电子。\n- 键的极性由成键原子电负性差异决定；分子的极性还取决于空间构型。\n- 偶极矩 \\(\\mu\\) 可判断分子极性：\\(\\mu=0\\) 通常为结构对称的非极性分子，\\(\\mu\\ne0\\) 为极性分子。\n\n#### 2.4 分子间作用力、氢键和晶体\n\n- 范德华力包括取向力、诱导力和色散力，普遍比化学键弱。\n- 氢键存在于 \\(X-H\\cdots Y\\) 中，常见 \\(X,Y=F,O,N\\)，强于一般范德华力，弱于化学键，具有方向性和饱和性。\n- 晶体具有规则外形、固定熔点、各向异性；非晶体没有固定熔点，通常各向同性。\n- 金属晶体、离子晶体、分子晶体、原子晶体的质点和作用力不同，所以熔点、硬度、导电性差异明显。\n\n#### 2.5 离子极化\n\n- 离子在异电荷离子电场中电子云变形，称为离子极化。\n- 极化增强会使离子键共价成分增加，甚至改变晶体结构。\n- 正离子通常主要表现为极化能力，负离子通常主要表现为变形性。\n\n## 二、重点概念整理\n\n### 1. 电负性\n\n定义：元素原子在分子中吸引成键电子的能力。\n\n需要记忆的点：电负性越大，吸引成键电子能力越强；它综合考虑电离能和电子亲和能。\n\n容易混淆的地方：电负性不是电子亲和能本身，而是相对尺度；不能只用电负性差绝对判断所有键型，还要考虑化合物结构和离子极化。\n\n可能怎么考：根据电负性判断极性键方向，或用键三角思想判断某物质主要键型。\n\n### 2. 离子键\n\n定义：正、负离子之间通过库仑静电吸引形成的化学键。\n\n需要记忆的点：常由电离能较小的金属原子和电子亲和能较大的非金属原子形成；没有方向性和饱和性；离子化合物通常没有独立“分子单元”，只有化学式。\n\n容易混淆的地方：NaCl 不是“一个 NaCl 分子”，而表示晶体中 \\(Na^+\\) 与 \\(Cl^-\\) 的摩尔比为 \\(1:1\\)。\n\n可能怎么考：解释离子晶体配位数为什么取决于半径比；判断离子键与共价键差异。\n\n### 3. 离子半径\n\n定义：离子在晶体中表现出的接触半径。\n\n需要记忆的点：晶体中相邻正、负离子间距近似满足 \\(r_0=r_+ + r_-\\)；负离子通常大于正离子；同族离子半径从上到下增大；同周期正离子半径随电荷增加而减小。\n\n容易混淆的地方：孤立离子电子云没有明确边界，所以离子半径不是绝对几何半径，而是依赖晶体结构和测定方法的有效半径。\n\n可能怎么考：用 \\(r_0\\) 和某一离子半径求另一离子半径；比较 \\(Fe^{2+}\\) 与 \\(Fe^{3+}\\) 半径大小。\n\n### 4. 晶格能\n\n定义：相互远离的气态正、负离子结合成 \\(1\\ \\mathrm{mol}\\) 离子晶体时释放的能量；也可等价看作 \\(1\\ \\mathrm{mol}\\) 离子晶体解离成气态离子所吸收的能量。\n\n需要记忆的点：晶格能越大，离子晶体结合越强，熔点和硬度通常越高；主要受离子电荷和正负离子核间距影响。\n\n容易混淆的地方：晶格能定义有“释放能量”和“吸收能量”两种表述，数值正负号取决于约定；考试多比较大小，通常用绝对值。\n\n可能怎么考：比较 \\(NaF, NaCl, NaBr, NaI\\) 晶格能和熔点趋势；比较 \\(MgO\\) 与 \\(NaCl\\) 晶格能。\n\n### 5. Lewis 结构与八隅体规则\n\n定义：用点表示价电子、短线表示共享电子对的分子或离子电子结构式。\n\n需要记忆的点：价电子是参与化学成键的外层电子；H 通常放在中心原子周围；C 通常位于中心；电负性较低的原子一般作中心原子。\n\n适用条件：八隅体规则较适用于第二周期元素的简单分子或离子。\n\n容易混淆的地方：八隅体规则有例外，如 \\(PCl_5\\)、\\(SF_6\\)、\\(BeF_2\\)、\\(BF_3\\)、\\(NO\\)、\\(NO_2\\) 等。\n\n可能怎么考：画 \\(CO_2\\)、\\(ClO_3^-\\)、\\(CN^-\\) 等 Lewis 结构，判断孤对电子和多重键。\n\n### 6. 价键理论\n\n定义：共价键是原子相互接近时，原子轨道重叠并共用自旋相反电子对，使体系能量降低而形成的化学键。\n\n需要记忆的点：共价键具有饱和性和方向性；只有自旋相反的未成对电子才能有效成键；轨道重叠越充分，成键越稳定。\n\n容易混淆的地方：Lewis 学说只给出电子对共享图像，价键理论进一步说明轨道重叠和自旋配对的量子本质。\n\n可能怎么考：解释 \\(H_2\\) 形成；判断 \\(\\sigma\\) 键和 \\(\\pi\\) 键的形成方式。\n\n### 7. \\(\\sigma\\) 键和 \\(\\pi\\) 键\n\n定义：\\(\\sigma\\) 键是沿键轴“头碰头”重叠形成的键；\\(\\pi\\) 键是轨道“肩并肩”平行重叠形成的键。\n\n需要记忆的点：\\(\\sigma\\) 键电子云对键轴呈圆柱对称；\\(\\pi\\) 键在通过键轴的节面处电子云密度为零。\n\n容易混淆的地方：单键通常是一个 \\(\\sigma\\) 键；双键通常是一个 \\(\\sigma\\) 键加一个 \\(\\pi\\) 键；三键通常是一个 \\(\\sigma\\) 键加两个 \\(\\pi\\) 键。\n\n可能怎么考：判断 \\(N_2\\)、\\(CO_2\\)、乙烯中的 \\(\\sigma\\) 键和 \\(\\pi\\) 键数。\n\n### 8. 杂化轨道\n\n定义：同一原子中能量相近的不同类型原子轨道相互叠加，形成同等数目的能量相同或相近的杂化轨道。\n\n需要记忆的点：只有同一原子内能量相近的轨道才能有效杂化；杂化轨道数等于参与杂化的原子轨道数。\n\n容易混淆的地方：杂化轨道用于解释局部成键方向和构型；VSEPR 主要从电子对排斥角度判断构型。\n\n可能怎么考：判断 \\(sp\\)、\\(sp^2\\)、\\(sp^3\\)、\\(sp^3d\\)、\\(sp^3d^2\\) 对应构型和典型分子。\n\n### 9. 共振体与离域 \\(\\pi\\) 键\n\n定义：某些分子或离子的真实结构不能用单一 Lewis 结构表示，而可看作多个经典结构式的共振综合，电子具有离域性。\n\n需要记忆的点：共振可解释苯、\\(NO_3^-\\)、\\(SO_2\\)、\\(SO_3\\) 等键长平均化。\n\n容易混淆的地方：共振体不是分子在不同结构之间来回跳动，而是实际结构的不同表达式。\n\n可能怎么考：解释 \\(NO_3^-\\) 中三个 \\(N-O\\) 键等长，且键长介于单键和双键之间。\n\n### 10. 分子轨道理论\n\n定义：把分子看作整体，电子在整个分子势场中运动，用分子轨道描述电子状态。\n\n需要记忆的点：原子轨道线性组合形成分子轨道；相加形成成键轨道，能量降低；相减形成反键轨道，能量升高；分子轨道数等于参与组合的原子轨道数。\n\n适用条件：有效组合需满足对称性匹配、能量近似、最大重叠三原则。\n\n容易混淆的地方：价键理论强调定域的原子间共价键；分子轨道理论强调电子属于整个分子。\n\n可能怎么考：解释 \\(H_2^+\\) 稳定、“\\(He_2\\)”不存在、\\(O_2\\) 顺磁性。材料没有详细给出 \\(O_2\\) 分子轨道排布，若考试深入计算需补充能级图。\n\n### 11. VSEPR 理论\n\n定义：中心原子价层电子对之间相互排斥，分子采取使电子对尽可能远离的空间构型。\n\n需要记忆的点：电子对几何构型包括成键电子对和孤对电子；分子构型只看原子位置，不画孤对电子；排斥强度 \\(lp-lp \u003e lp-bp \u003e bp-bp\\)。\n\n适用条件：适用于判断主族元素简单共价分子或离子的空间构型。\n\n容易混淆的地方：双键、三键在 VSEPR 中通常按一个电子域处理，但因电子密度较高，排斥比单键更强。\n\n可能怎么考：判断 \\(OF_2\\)、\\(XeF_4\\)、\\(SO_4^{2-}\\)、\\(NH_3\\)、\\(H_2O\\) 的构型和键角变化。\n\n### 12. 分子极性与偶极矩\n\n定义：分子正、负电荷重心不重合则为极性分子；偶极矩 \\(\\mu=q\\cdot d\\) 表示分子极性大小。\n\n需要记忆的点：键有极性，分子不一定有极性；双原子异核分子一定为极性分子；多原子分子是否有极性取决于键极性和空间构型。\n\n容易混淆的地方：\\(CO_2\\) 有极性键但线形对称，分子非极性；\\(H_2O\\) 有极性键且折线形，分子极性。\n\n可能怎么考：比较 \\(CO_2\\)、\\(SO_2\\)、\\(CH_4\\)、\\(NH_3\\)、\\(HCl\\) 的极性。\n\n### 13. 范德华力\n\n定义：分子间较弱的相互作用力，包括取向力、诱导力和色散力。\n\n需要记忆的点：分子间距增大时迅速减弱，约与距离六次方成反比；范德华力一般 \\(2\\sim20\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，化学键约 \\(100\\sim600\\ \\mathrm{kJ\\cdot mol^{-1}}\\)。\n\n容易混淆的地方：非极性分子之间也有色散力；色散力通常随分子体积和变形性增大而增强。\n\n可能怎么考：解释卤素单质沸点从 \\(F_2\\) 到 \\(I_2\\) 升高；判断极性分子间取向力。\n\n### 14. 氢键\n\n定义：分子中与高电负性原子 \\(X\\) 共价相连的 \\(H\\) 原子，与另一分子或同一分子中的高电负性原子 \\(Y\\) 形成的弱键，表示为 \\(X-H\\cdots Y\\)。\n\n需要记忆的点：常见 \\(X,Y=F,O,N\\)；氢键键能约 \\(10\\sim40\\ \\mathrm{kJ\\cdot mol^{-1}}\\)；具有方向性和饱和性；强度通常强于范德华力而弱于化学键。\n\n容易混淆的地方：不是所有含 H 分子都能形成显著氢键，H 必须与强电负性且半径小的原子相连。\n\n可能怎么考：解释水、HF、\\(NH_3\\) 沸点异常；解释冰密度小于水；比较邻、间、对硝基苯酚沸点。\n\n### 15. 晶体与晶胞\n\n定义：晶体是质点在空间按一定规律周期重复排列形成的长程有序结构；晶胞是晶体结构的基本重复单元。\n\n需要记忆的点：晶胞参数为 \\(a,b,c,\\alpha,\\beta,\\gamma\\)；晶胞内容包括质点种类、数目和位置；七大晶系可按晶胞参数区分。\n\n容易混淆的地方：晶体的“规则外形”来自内部长程有序，不是只看外观是否整齐。\n\n可能怎么考：判断晶体与非晶体差异；判断简单立方、体心立方、面心立方晶胞含原子数。\n\n### 16. 离子极化\n\n定义：离子在周围异电荷离子电场作用下，电子云发生变形而偏离球形分布的现象。\n\n需要记忆的点：极化增强使键的共价成分增加；正离子半径越小、正电荷越高，极化能力越强；负离子半径越大、负价越高，变形性越大。\n\n容易混淆的地方：极化能力和变形性不是一回事；通常重点考虑正离子对负离子的极化。\n\n可能怎么考：解释 \\(AgF\\rightarrow AgCl\\rightarrow AgBr\\rightarrow AgI\\) 中键型由离子键向共价键过渡，晶型由 NaCl 型向 ZnS 型变化。\n\n## 三、重要公式整理\n\n### 1. 离子半径关系\n\n公式：\n\\[\nr_0=r_+ + r_-\n\\]\n\n符号说明：\\(r_0\\) 为晶体中相邻正、负离子核间距，单位常用 \\(\\mathrm{pm}\\)；\\(r_+\\) 为正离子半径；\\(r_-\\) 为负离子半径。\n\n适用条件：把离子近似看作接触小球，且正、负离子彼此接触。\n\n解题步骤：先由题目或晶体结构确定 \\(r_0\\)，再用已知离子半径求未知离子半径。\n\n易错点：不要把 \\(r_0\\) 当成某一个离子的半径；它是正负离子中心距离。\n\n例题方向：已知 \\(NaCl\\) 晶体中 \\(r_0\\) 和 \\(Cl^-\\) 半径，求 \\(Na^+\\) 半径。\n\n### 2. Lande 模型中负离子半径估算\n\n公式：\n\\[\n(2r_-)^2+(2r_-)^2=(2r_0)^2\n\\]\n\\[\nr_-=\\frac{r_0}{\\sqrt{2}},\\qquad r_+=r_0-r_-\n\\]\n\n符号说明：\\(r_0\\) 为正负离子接触距离；\\(r_-\\) 为负离子半径；\\(r_+\\) 为正离子半径；单位常用 \\(\\mathrm{pm}\\)。\n\n适用条件：材料中的 Lande 模型；正、负离子接触，负、负离子也接触的晶体。\n\n解题步骤：先由 \\(r_- = r_0/\\sqrt{2}\\) 求负离子半径，再由 \\(r_+=r_0-r_-\\) 求正离子半径。\n\n易错点：提取文本中“\\(r_0/20.5\\)”应理解为 \\(r_0/2^{0.5}=r_0/\\sqrt{2}\\)，不是除以 20.5。\n\n例题方向：材料中 \\(MgS\\) 的 \\(r_0=260\\ \\mathrm{pm}\\)，得 \\(r_-\\approx184\\ \\mathrm{pm}\\)，\\(r_+\\approx76\\ \\mathrm{pm}\\)。\n\n### 3. Born-Haber 循环能量关系\n\n公式：\n\\[\n\\Delta H_{\\mathrm{overall}}=\\Delta H_1+\\Delta H_2+\\Delta H_3+\\Delta H_4+\\Delta H_5\n\\]\n\n符号说明：各 \\(\\Delta H_i\\) 分别表示升华、解离、电离、电子亲和、晶格形成等步骤焓变；材料只给出了循环总关系，未逐一规范符号。\n\n适用条件：用热化学循环从可测热化学量间接求晶格能。\n\n解题步骤：按“元素标准态 \\(\\rightarrow\\) 气态原子 \\(\\rightarrow\\) 气态离子 \\(\\rightarrow\\) 离子晶体”的路径列焓变，再与标准生成焓相等。\n\n易错点：电子亲和能、晶格能常因“释放能量”带负号，符号约定必须跟题目一致。\n\n例题方向：由 \\(NaCl\\) 的生成焓、升华焓、电离能、解离能、电子亲和能求晶格能。\n\n### 4. Born-Lande 晶格能公式\n\n公式：\n\\[\nU=\\frac{N_A A Z_1Z_2e^2}{4\\pi\\varepsilon_0 r_0}\\left(1-\\frac{1}{n}\\right)\n\\]\n\n符号说明：\\(U\\) 为晶格能，常用 \\(\\mathrm{kJ\\cdot mol^{-1}}\\)；\\(N_A\\) 为 Avogadro 常数；\\(A\\) 为 Madelung 常数；\\(Z_1,Z_2\\) 为正、负离子电荷数；\\(e\\) 为元电荷；\\(\\varepsilon_0\\) 为真空介电常数；\\(r_0\\) 为平衡核间距；\\(n\\) 为 Born 指数。\n\n适用条件：离子晶体的理论晶格能估算，理想离子模型。\n\n解题步骤：判断晶体类型取 \\(A\\)，确定 \\(Z_1,Z_2,r_0,n\\)，代入公式；若只比较大小，重点看 \\(Z_1Z_2/r_0\\)。\n\n常见变形：\n\\[\nU\\propto \\frac{Z_1Z_2}{r_0}\n\\]\n在晶体类型和 Born 指数差别不大时，常用于定性比较。\n\n易错点：电荷数用绝对值；\\(r_0\\) 越小，晶格能越大；二价离子形成的晶体晶格能通常远大于一价离子晶体。\n\n例题方向：比较 \\(NaF,NaCl,NaBr,NaI\\) 或 \\(MgO,CaO,SrO,BaO\\) 的晶格能和熔点。\n\n### 5. VSEPR 价层电子对数\n\n公式：\n\\[\n\\text{价层电子对数}=\n\\frac{\\text{中心原子价电子数}+\\text{配原子提供电子数}}{2}\n\\]\n\n补充公式：\n\\[\n\\text{价层电子对数}\n=\\text{与中心原子成键的原子数}\n+\\frac{\\text{中心原子价电子数}-\\text{配位原子未成对电子数之和}}{2}\n\\]\n\n符号说明：电子数均以中心原子价层为对象；H 和卤素作配原子时通常提供 1 个电子；O 作配原子且按双键考虑时可视作提供 0；N 作配原子且按三键考虑时可视作提供 \\(-1\\)。\n\n适用条件：判断主族共价分子或离子中心原子周围电子域数。\n\n解题步骤：确定中心原子，计算价层电子对总数，计算孤对数，先判断电子对几何构型，再去掉孤对电子得到分子构型。\n\n易错点：双键、三键在 VSEPR 中按一个电子域处理；分子构型不包括孤对电子。\n\n例题方向：\\(OF_2\\) 中 O 周围 4 对电子、2 对孤对，实际为角形；\\(XeF_4\\) 中 6 对电子、2 对孤对，实际为平面正方形。\n\n### 6. 偶极矩\n\n公式：\n\\[\n\\mu=q\\cdot d\n\\]\n\n符号说明：\\(\\mu\\) 为偶极矩；\\(q\\) 为偶极电荷量；\\(d\\) 为正、负电荷重心间距离，又称偶极长。\n\n单位：常用 Debye，记作 \\(\\mathrm{D}\\)；\\[\n1\\ \\mathrm{D}=10^{-18}\\ \\mathrm{cm\\cdot esu}=3.336\\times10^{-30}\\ \\mathrm{C\\cdot m}\n\\]\n\n适用条件：描述极性分子的电荷分布和极性大小。\n\n解题步骤：若题目给 \\(q\\) 和 \\(d\\)，直接相乘；若判断分子极性，先看键极性，再看空间构型中键偶极能否抵消。\n\n易错点：键长 \\(R\\) 不等于偶极长 \\(d\\)；偶极矩是矢量，化学上习惯规定方向由正到负。\n\n例题方向：判断 \\(CO_2\\) 与 \\(H_2O\\) 的偶极矩是否为 0。\n\n### 7. 范德华力与距离关系\n\n公式：\n\\[\nF_{\\mathrm{vdW}}\\propto \\frac{1}{r^6}\n\\]\n\n符号说明：\\(r\\) 为分子间距离；该式表示分子间作用力随距离增大迅速减弱。\n\n适用条件：定性比较范德华力随距离变化的趋势。\n\n解题步骤：看分子是否极性、体积和变形性大小，再判断主要作用力类型。\n\n易错点：色散力存在于所有分子间，但在非极性分子间尤其重要；分子体积越大、越易变形，色散力越强。\n\n例题方向：解释卤素单质沸点 \\(F_2\u003cCl_2\u003cBr_2\u003cI_2\\)。\n\n### 8. 圆球堆积空间利用率\n\n公式：\n\\[\n\\text{空间利用率}=\n\\frac{\\text{晶胞所含圆球数}\\times\\text{单个圆球体积}}{\\text{晶胞体积}}\\times100\\%\n\\]\n\n常见结果：\n\n| 堆积类型 | 配位数 | 晶胞所含原子数 | 空间利用率 |\n|---|---:|---:|---:|\n| 简单立方 | 6 | 1 | 52% |\n| 体心立方 | 8 | 2 | 68% |\n| 面心立方密堆积 | 12 | 4 | 74% |\n| 六方密堆积 | 12 | 6 | 74% |\n\n适用条件：等径圆球堆积模型，多用于金属晶体或近似球形分子晶体。\n\n解题步骤：确定堆积类型，写出晶胞原子数和球半径与晶胞参数关系，再代入空间利用率公式。\n\n易错点：面心立方和六方密堆积堆积顺序不同，但空间利用率和配位数相同。\n\n例题方向：比较简单立方、体心立方、面心立方的配位数和空间利用率。\n\n### 9. 离子晶体半径比规则\n\n公式/范围：\n\\[\n\\frac{r_+}{r_-}\u003e0.732 \\Rightarrow CsCl\\text{ 型，配位数 }8:8\n\\]\n\\[\n0.414\\le \\frac{r_+}{r_-}\\le0.732 \\Rightarrow NaCl\\text{ 型，配位数 }6:6\n\\]\n\\[\n0.225\\le \\frac{r_+}{r_-}\u003c0.414 \\Rightarrow ZnS\\text{ 型，配位数 }4:4\n\\]\n\n符号说明：\\(r_+\\) 为正离子半径，\\(r_-\\) 为负离子半径。\n\n适用条件：AB 型二元离子晶体的理想硬球近似预测。\n\n解题步骤：求 \\(r_+/r_-\\)，与临界范围比较，预测晶体类型和配位数。\n\n易错点：半径比规则有例外，离子极化和外界条件变化可改变晶型。\n\n例题方向：由半径比判断某 AB 型晶体更可能为 NaCl 型、CsCl 型或 ZnS 型。\n\n### 10. 离子势\n\n公式：\n\\[\n\\text{离子势}=\\frac{Z}{r}\n\\]\n\n符号说明：\\(Z\\) 为离子电荷数；\\(r\\) 为离子半径，材料中单位常用 \\(\\mathrm{pm}\\)。\n\n适用条件：定性比较离子的极化能力。\n\n解题步骤：同类电子构型离子中，比较 \\(Z/r\\)，数值越大，极化能力越强。\n\n易错点：离子势主要用于正离子极化能力比较；负离子常重点比较变形性。\n\n例题方向：比较 \\(Li^+\\)、\\(Be^{2+}\\)、\\(Al^{3+}\\) 的极化能力。\n\n### 11. 分子轨道键级\n\n公式：\n\\[\n\\text{键级}=\\frac{N_b-N_a}{2}\n\\]\n\n符号说明：\\(N_b\\) 为成键分子轨道中的电子数；\\(N_a\\) 为反键分子轨道中的电子数。\n\n适用条件：分子轨道理论判断双原子分子或离子的稳定性。\n\n材料说明：材料提到“键级概念”可解释 \\(H_2^+\\) 稳定和 \\(He_2\\) 不存在，但没有给出此公式；这是补充常考点。\n\n易错点：键级大于 0 才有净成键作用；键级越大，键通常越强、键长越短。\n\n例题方向：计算 \\(H_2^+\\)、\\(H_2\\)、\\(He_2\\) 的键级。\n\n## 四、需要记忆的性质和规律\n\n| 知识点 | 具体内容 | 记忆方法 | 常见考法 |\n|---|---|---|---|\n| 离子键特点 | 无方向性、无饱和性 | “静电吸引向四周” | 解释离子晶体配位数高 |\n| 离子化合物表达 | 通常无独立分子单元，只有化学式 | NaCl 表比例不是分子 | 判断“NaCl 分子”说法是否正确 |\n| 正离子电子构型 | 2、8、18、18+2、9-17 电子构型 | 按外层电子分类 | 判断 \\(Ag^+\\)、\\(Zn^{2+}\\)、\\(Fe^{3+}\\) 类型 |\n| 离子半径规律 | 负离子通常大于正离子；同族从上到下增大；同周期正离子电荷越高半径越小 | “层多半径大，正电荷高拉得紧” | 比较 \\(Fe^{2+}\\) 与 \\(Fe^{3+}\\)，\\(F^-\\) 与 \\(Cl^-\\) |\n| 对角线规则 | 周期表中某些元素与右下方元素离子半径相近，如 \\(Li^+\\) 和 \\(Mg^{2+}\\) | “斜着像” | 判断矿物中离子互相置换 |\n| 晶格能趋势 | 电荷越高、核间距越小，晶格能越大 | \\(U\\propto Z_1Z_2/r_0\\) | 比较熔点、硬度 |\n| Lewis 八隅体 | 第二周期简单分子较适用 | “第二周期最守规矩” | 画 Lewis 结构、找例外 |\n| Lewis 局限 | 不能说明共价键本质、八隅体例外、不能解释 \\(O_2\\) 顺磁性等 | “会画但不懂本质” | 判断 Lewis 学说不足 |\n| 价键理论 | 轨道重叠，共用自旋相反电子对 | “重叠+反平行自旋” | 解释 \\(H_2\\) 成键 |\n| 共价键特点 | 饱和性和方向性 | “轨道数量有限，方向重叠最大” | 判断离子键与共价键差别 |\n| \\(\\sigma\\) 键 | 头碰头重叠，沿键轴圆柱对称 | “sigma 顺轴” | 判断单键、多重键组成 |\n| \\(\\pi\\) 键 | 肩并肩重叠，有通过键轴的节面 | “pi 平行” | 判断双键、三键中的 \\(\\pi\\) 键数 |\n| \\(sp^3\\) | 四面体，约 \\(109.5^\\circ\\)，如 \\(CH_4\\) | 1s+3p=4 | 判断 \\(CH_4\\)、\\(NH_3\\)、\\(H_2O\\) |\n| \\(sp^2\\) | 平面三角形，\\(120^\\circ\\)，如 \\(BCl_3\\) | 1s+2p=3 | 判断 \\(BF_3\\)、\\(NO_3^-\\) |\n| \\(sp\\) | 直线形，\\(180^\\circ\\)，如 \\(BeCl_2\\) | 1s+1p=2 | 判断线形分子 |\n| \\(sp^3d\\) | 三角双锥，如 \\(PCl_5\\) | 5 个方向 | 判断 \\(SF_4\\)、\\(IF_3\\)、\\(XeF_2\\) 变形构型 |\n| \\(sp^3d^2\\) | 正八面体，如 \\(SF_6\\) | 6 个方向 | 判断 \\(XeF_4\\)、\\(IF_5\\) |\n| 共振/离域 | 键长平均化，介于单键和双键之间 | “真实结构不是单一式” | 解释 \\(NO_3^-\\)、苯 |\n| 分子轨道有效组合 | 对称性匹配、能量近似、最大重叠 | “对称、近能、重叠大” | 判断能否形成有效分子轨道 |\n| 分子轨道电子排布 | Pauli、最低能量、Hund 规则 | 和原子轨道类似 | 判断简并轨道填充 |\n| VSEPR 基本构型 | 2 直线、3 平面三角、4 四面体、5 三角双锥、6 八面体 | “2线3平4面5双锥6八面” | 判断电子对几何构型 |\n| 孤对电子排斥 | \\(lp-lp \u003e lp-bp \u003e bp-bp\\) | “孤对更胖更排斥” | 比较 \\(CH_4,NH_3,H_2O\\) 键角 |\n| 多重键处理 | VSEPR 中双键、三键按一个电子域处理，但排斥更强 | “算一个，排斥强” | 判断 \\(SO_2\\)、\\(SO_4^{2-}\\) |\n| 键参数 | 键级越高，键越牢固；键长越短，键能越大 | “短强高” | 比较单键、双键、三键 |\n| 键极性与分子极性 | 键有极性，分子不一定有极性 | “看键，还要看形状” | 判断 \\(CO_2\\)、\\(H_2O\\)、\\(CH_4\\) |\n| 偶极矩 | \\(\\mu=0\\) 通常非极性，\\(\\mu\\ne0\\) 极性 | “对称抵消为 0” | 由偶极矩判断构型 |\n| 范德华力分类 | 取向力、诱导力、色散力 | “极-极、极-诱、瞬-瞬” | 判断分子间作用类型 |\n| 范德华力强弱 | 化学键 \\(100\\sim600\\ \\mathrm{kJ/mol}\\)，范德华力 \\(2\\sim20\\ \\mathrm{kJ/mol}\\) | “弱一到两个数量级” | 比较熔沸点 |\n| 氢键条件 | \\(X-H\\cdots Y\\)，常见 \\(F,O,N\\) | “FON 才强” | 判断能否形成氢键 |\n| 氢键特点 | 键能约 \\(10\\sim40\\ \\mathrm{kJ/mol}\\)，方向性、饱和性 | “强于范德华，弱于化学键” | 解释水、HF、\\(NH_3\\) 异常 |\n| 晶体特征 | 规则外形、固定熔点、各向异性 | “形、熔、向” | 区分晶体和非晶体 |\n| 七大晶系 | 立方、三方、四方、六方、正交、单斜、三斜 | 按 \\(a,b,c,\\alpha,\\beta,\\gamma\\) | 判断晶胞参数 |\n| 简单立方 | 配位数 6，晶胞原子数 1，利用率 52% | “简 6-1-52” | 计算空间利用率 |\n| 体心立方 | 配位数 8，晶胞原子数 2，利用率 68% | “体 8-2-68” | 判断碱金属结构 |\n| 面心立方 | 配位数 12，晶胞原子数 4，利用率 74% | “面 12-4-74” | 判断密堆积 |\n| 六方密堆积 | 配位数 12，晶胞原子数 6，利用率 74% | “六 12-6-74” | 与面心立方比较 |\n| AB 型离子晶体 | CsCl 型 8:8，NaCl 型 6:6，ZnS 型 4:4 | 配位数随半径比降低而降低 | 用 \\(r_+/r_-\\) 预测结构 |\n| 四类晶体 | 金属、离子、分子、原子晶体 | “质点和作用力决定性质” | 比较熔点、硬度、导电性 |\n| 离子极化 | 极化增强，共价成分增加 | “电子云被拉歪” | 解释 AgX 键型和晶型变化 |\n\n## 五、易错点总结\n\n1. 错误理解：离子键有固定方向，像共价键一样一个离子只能连有限个异号离子。  \n   正确理解：离子键是静电作用，没有方向性和饱和性，配位数主要由半径比和空间堆积限制。  \n   如何避免：看到“方向性、饱和性”先判断是离子键还是共价键。\n\n2. 错误理解：NaCl 表示一个氯化钠分子。  \n   正确理解：NaCl 表示离子晶体中 \\(Na^+\\) 与 \\(Cl^-\\) 的比例为 \\(1:1\\)。  \n   如何避免：离子晶体通常说“化学式”，不说“分子式”。\n\n3. 错误理解：离子半径是孤立离子的真实边界。  \n   正确理解：离子电子云无确定边界，离子半径是晶体中的有效接触半径。  \n   如何避免：做题时关注题目给出的结构、配位数和半径数据来源。\n\n4. 错误理解：晶格能越大，离子晶体越容易熔化。  \n   正确理解：晶格能越大，离子结合越强，通常熔点越高、硬度越大。  \n   如何避免：把晶格能理解为“拆开晶体要付出的能量”。\n\n5. 错误理解：八隅体规则适用于所有分子。  \n   正确理解：八隅体规则对第二周期简单分子较好，\\(PCl_5\\)、\\(SF_6\\)、\\(BF_3\\)、\\(NO\\) 等是常见例外。  \n   如何避免：中心原子在第三周期及以后时，警惕扩展八隅体；奇电子分子也会例外。\n\n6. 错误理解：共价键就是电子静止在两个原子中间。  \n   正确理解：价键理论中电子是运动的，成键电子在核间区域出现概率较大，并且自旋相反。  \n   如何避免：答“本质”时写“轨道重叠、电子配对、能量降低”。\n\n7. 错误理解：双键在 VSEPR 中算两个方向，三键算三个方向。  \n   正确理解：多重键通常按一个电子域处理，但排斥强于单键。  \n   如何避免：VSEPR 数电子域，不数共享电子对总数。\n\n8. 错误理解：电子对几何构型和分子构型是同一回事。  \n   正确理解：电子对几何构型包括孤对电子，分子构型只看原子位置。  \n   如何避免：例如 \\(NH_3\\) 电子对构型为四面体，分子构型为三角锥。\n\n9. 错误理解：键有极性，分子一定有极性。  \n   正确理解：多原子分子中键偶极可能因对称构型相互抵消，如 \\(CO_2\\)、\\(CH_4\\)。  \n   如何避免：判断分子极性必须同时看键极性和空间构型。\n\n10. 错误理解：所有含 H 的分子都能形成氢键。  \n    正确理解：显著氢键通常需要 H 与 \\(F,O,N\\) 等强电负性小半径原子相连。  \n    如何避免：先看是否有 \\(X-H\\)，再看是否有可接受氢键的 \\(Y\\)。\n\n11. 错误理解：面心立方密堆积和六方密堆积空间利用率不同。  \n    正确理解：二者堆积层顺序不同，但配位数都为 12，空间利用率都为 74%。  \n    如何避免：记住 fcc 为 ABCABC，hcp 为 ABAB，但都是密堆积。\n\n12. 错误理解：半径比规则绝对可靠。  \n    正确理解：半径比规则是硬球近似，离子极化和外界条件会导致例外。  \n    如何避免：如果题目出现 \\(AgX\\)、高极化离子、\\(d^{10}\\) 正离子，要考虑极化。\n\n13. 错误理解：极化能力和变形性是同一个概念。  \n    正确理解：极化能力是使别的离子电子云变形的能力；变形性是自身电子云被拉变形的能力。  \n    如何避免：通常正离子看极化能力，负离子看变形性。\n\n14. 错误理解：目录中的“离子强度”本章一定有公式。  \n    正确理解：本 PDF 目录列出“离子强度与晶格能”，但可提取正文中离子强度的定义和计算公式属于“材料中没有给出”。  \n    如何避免：若老师课堂补充了离子强度公式，应补充到本章材料；本整理不乱编。\n\n# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：离子键的本质是正、负离子之间的 ______，其特点是没有 ______ 和 ______。\n\n2. 选择：下列说法正确的是  \n   A. NaCl 表示一个独立的 NaCl 分子  \n   B. 离子键具有严格方向性  \n   C. NaCl 表示晶体中 \\(Na^+\\) 与 \\(Cl^-\\) 的比例为 \\(1:1\\)  \n   D. 离子晶体中配位数只由电荷数决定\n\n3. 填空：Lewis 结构中，通常用小黑点表示 ______，用短线表示 ______。\n\n4. 选择：下列关于 \\(\\sigma\\) 键和 \\(\\pi\\) 键的说法错误的是  \n   A. \\(\\sigma\\) 键通常由轨道沿键轴头碰头重叠形成  \n   B. \\(\\pi\\) 键通常由轨道肩并肩平行重叠形成  \n   C. 单键通常含一个 \\(\\sigma\\) 键  \n   D. 双键通常含两个 \\(\\sigma\\) 键\n\n5. 填空：VSEPR 中孤对电子和成键电子对的排斥强度顺序为 ______。\n\n6. 选择：\\(NH_3\\) 的中心原子周围有 4 对价层电子，其中 1 对为孤对电子，因此其分子构型为  \n   A. 正四面体  \n   B. 平面三角形  \n   C. 三角锥形  \n   D. 直线形\n\n7. 填空：分子偶极矩公式为 \\(\\mu=______\\)，\\(1\\ \\mathrm{D}=______\\ \\mathrm{C\\cdot m}\\)。\n\n8. 选择：下列分子中，含极性键但整体为非极性分子的是  \n   A. \\(HCl\\)  \n   B. \\(H_2O\\)  \n   C. \\(CO_2\\)  \n   D. \\(NH_3\\)\n\n## 二、公式计算题\n\n1. 已知某离子晶体中相邻正、负离子核间距 \\(r_0=282\\ \\mathrm{pm}\\)，若 \\(r_-=181\\ \\mathrm{pm}\\)，求 \\(r_+\\)。\n\n2. 按 Lande 模型，某晶体中 \\(r_0=260\\ \\mathrm{pm}\\)，且满足正负离子接触、负负离子也接触。求 \\(r_-\\) 和 \\(r_+\\)。\n\n3. 预测某 AB 型离子晶体结构：已知 \\(r_+=95\\ \\mathrm{pm}\\)，\\(r_-=181\\ \\mathrm{pm}\\)，求 \\(r_+/r_-\\)，并判断更可能属于 CsCl 型、NaCl 型还是 ZnS 型。\n\n4. 用 VSEPR 判断 \\(XeF_4\\) 的分子构型。已知 Xe 价电子数为 8，每个 F 提供 1 个电子。\n\n5. 某极性分子的偶极电荷量 \\(q=1.60\\times10^{-20}\\ \\mathrm{C}\\)，偶极长 \\(d=1.20\\times10^{-10}\\ \\mathrm{m}\\)。求偶极矩 \\(\\mu\\)，并换算为 Debye。已知 \\(1\\ \\mathrm{D}=3.336\\times10^{-30}\\ \\mathrm{C\\cdot m}\\)。\n\n## 三、判断题\n\n1. 离子键没有方向性和饱和性，因此离子晶体中异号离子的配位数主要受空间和半径比限制。\n\n2. 同一元素不同价态的正离子，电荷越高半径越大。\n\n3. Lewis 八隅体规则可以严格解释所有主族元素化合物。\n\n4. 价键理论认为共价键形成的关键包括轨道重叠、自旋相反电子配对和体系能量降低。\n\n5. 在 VSEPR 中，\\(H_2O\\) 的电子对几何构型和分子构型都叫正四面体。\n\n6. \\(CO_2\\) 含极性键，但因线形对称，键偶极抵消，所以分子偶极矩为 0。\n\n7. 氢键的强度一般弱于化学键，但强于普通范德华力，并具有方向性和饱和性。\n\n8. 离子极化越强，离子键的共价成分通常越小。\n\n## 四、综合题\n\n1. 结合价键理论、杂化轨道理论和 VSEPR，说明为什么 \\(CH_4\\)、\\(NH_3\\)、\\(H_2O\\) 中心原子周围都可看作 4 对电子，但分子构型和键角不同。\n\n2. 结合半径比规则和离子极化，解释为什么 AB 型离子晶体可出现 CsCl 型、NaCl 型、ZnS 型等不同结构，并说明 \\(AgF\\rightarrow AgI\\) 为什么会出现键型和晶型变化。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 静电吸引；方向性；饱和性。离子键本质是库仑静电作用，所以只要空间许可，一个离子可吸引多个异号离子。\n\n2. C。NaCl 表示晶体中 \\(Na^+\\) 与 \\(Cl^-\\) 的比例，不表示独立分子；离子键没有方向性，配位数不只由电荷数决定。\n\n3. 价电子；共享电子对。Lewis 结构用点表示价电子，用短线表示成键电子对。\n\n4. D。双键通常由一个 \\(\\sigma\\) 键和一个 \\(\\pi\\) 键组成，不是两个 \\(\\sigma\\) 键。\n\n5. \\(lp-lp \u003e lp-bp \u003e bp-bp\\)。孤对电子只受一个原子核束缚，电子云更分散，对邻近电子对排斥更强。\n\n6. C。\\(NH_3\\) 电子对几何构型为四面体，但分子构型不包括孤对电子，所以为三角锥形。\n\n7. \\(q\\cdot d\\)；\\(3.336\\times10^{-30}\\)。偶极矩等于偶极电荷量与偶极长乘积。\n\n8. C。\\(CO_2\\) 的 \\(C=O\\) 键有极性，但分子为线形对称，键偶极抵消。\n\n## 二、公式计算题答案\n\n1. 解题思路：正负离子接触时 \\(r_0=r_+ + r_-\\)。  \n   详细步骤：\n   \\[\n   r_+=r_0-r_-=282-181=101\\ \\mathrm{pm}\n   \\]\n   最终答案：\\(r_+=101\\ \\mathrm{pm}\\)。  \n   易错提醒：\\(r_0\\) 是核间距，不是正离子半径。\n\n2. 解题思路：Lande 模型中 \\(r_-=r_0/\\sqrt{2}\\)，再用 \\(r_+=r_0-r_-\\)。  \n   详细步骤：\n   \\[\n   r_-=\\frac{260}{\\sqrt{2}}=184\\ \\mathrm{pm}\n   \\]\n   \\[\n   r_+=260-184=76\\ \\mathrm{pm}\n   \\]\n   最终答案：\\(r_-\\approx184\\ \\mathrm{pm}\\)，\\(r_+\\approx76\\ \\mathrm{pm}\\)。  \n   易错提醒：是除以 \\(\\sqrt{2}\\)，不是除以 2。\n\n3. 解题思路：先算半径比，再与 AB 型离子晶体半径比范围比较。  \n   详细步骤：\n   \\[\n   \\frac{r_+}{r_-}=\\frac{95}{181}=0.525\n   \\]\n   \\(0.414\u003c0.525\u003c0.732\\)，对应 NaCl 型，配位数 \\(6:6\\)。  \n   最终答案：\\(r_+/r_-=0.525\\)，更可能为 NaCl 型。  \n   易错提醒：半径比规则是近似规则，离子极化可能造成例外。\n\n4. 解题思路：计算中心原子价层电子对总数和孤对数。  \n   详细步骤：\n   \\[\n   \\text{价层电子对数}=\\frac{8+4\\times1}{2}=6\n   \\]\n   其中 4 对为 Xe-F 成键电子对，孤对数为 \\(6-4=2\\)。6 对电子的理想电子对几何构型为正八面体，两对孤对电子取相对位置以减少排斥，分子构型为平面正方形。  \n   最终答案：\\(XeF_4\\) 为平面正方形。  \n   易错提醒：电子对几何构型是正八面体，分子构型才是平面正方形。\n\n5. 解题思路：先用 \\(\\mu=q d\\) 求 SI 单位，再除以 \\(1\\ \\mathrm{D}\\)。  \n   详细步骤：\n   \\[\n   \\mu=(1.60\\times10^{-20})(1.20\\times10^{-10})\n   =1.92\\times10^{-30}\\ \\mathrm{C\\cdot m}\n   \\]\n   \\[\n   \\mu=\\frac{1.92\\times10^{-30}}{3.336\\times10^{-30}}=0.576\\ \\mathrm{D}\n   \\]\n   最终答案：\\(\\mu=1.92\\times10^{-30}\\ \\mathrm{C\\cdot m}\\approx0.576\\ \\mathrm{D}\\)。  \n   易错提醒：键长不一定等于偶极长；本题已直接给出 \\(d\\)。\n\n## 三、判断题答案\n\n1. 正确。离子键是静电作用，不限定固定方向和固定成键数，配位数主要受半径比与堆积空间限制。\n\n2. 错误。同一元素不同价态正离子，电荷越高，对电子吸引越强，半径越小；如 \\(Fe^{3+}\u003cFe^{2+}\\)。\n\n3. 错误。八隅体规则有许多例外，如 \\(PCl_5\\)、\\(SF_6\\)、\\(BeF_2\\)、\\(BF_3\\)、\\(NO\\)、\\(NO_2\\)。\n\n4. 正确。这正是价键理论对共价键本质的描述。\n\n5. 错误。\\(H_2O\\) 中 O 周围电子对几何构型为四面体，但分子构型为角形。\n\n6. 正确。\\(CO_2\\) 为线形，两个 \\(C=O\\) 键偶极大小相等、方向相反，合偶极矩为 0。\n\n7. 正确。氢键通常 \\(10\\sim40\\ \\mathrm{kJ\\cdot mol^{-1}}\\)，比普通范德华力强，但弱于化学键，并且具有方向性、饱和性。\n\n8. 错误。离子极化越强，正负离子间电子云越偏向核间区域，共价成分通常增加。\n\n## 四、综合题答案\n\n1. 解析：价键理论认为共价键由轨道重叠和自旋相反电子配对形成。对 \\(CH_4\\) 来说，C 原子形成 4 个等性 \\(sp^3\\) 杂化轨道，与 4 个 H 成键，中心原子周围 4 对成键电子对互相排斥，按 VSEPR 采取四面体构型，键角约 \\(109.5^\\circ\\)。\\(NH_3\\) 中 N 周围也可看作 \\(sp^3\\) 电子对分布，但其中 1 对为孤对电子，分子构型不画孤对，所以为三角锥形；由于 \\(lp-bp\\) 排斥强于 \\(bp-bp\\)，\\(H-N-H\\) 键角压缩到约 \\(107.3^\\circ\\)。\\(H_2O\\) 中 O 周围有 2 对成键电子对和 2 对孤对电子，电子对几何构型仍近似四面体，但分子构型为角形；两个孤对电子排斥更强，使 \\(H-O-H\\) 键角进一步减小到约 \\(104.5^\\circ\\)。因此三者“电子对总数相同”，但孤对电子数不同，导致实际分子构型和键角不同。\n\n2. 解析：AB 型离子晶体中，离子键没有方向性和饱和性，稳定结构倾向于让正、负离子尽可能接触并提高配位数，但这受到 \\(r_+/r_-\\) 的限制。若 \\(r_+/r_-\u003e0.732\\)，正离子较大，可稳定占据立方体空隙，常见 CsCl 型，配位数 \\(8:8\\)；若 \\(0.414\\le r_+/r_-\\le0.732\\)，适合八面体空隙，常见 NaCl 型，配位数 \\(6:6\\)；若 \\(0.225\\le r_+/r_-\u003c0.414\\)，正离子较小，常见 ZnS 型，配位数 \\(4:4\\)。但半径比规则是硬球近似，离子极化会改变键型和结构。\\(Ag^+\\) 为 \\(d^{10}\\) 构型，极化能力和变形性都较强；从 \\(AgF\\) 到 \\(AgI\\)，卤离子半径和变形性增大，正负离子间极化增强，键的共价成分增加，实际核间距越来越短于离子半径和，并可使晶体由 NaCl 型向 ZnS 型转变。\n",
    "chemistry_review/13-chemistry_review.md":  "# 本章复习提纲\n\n## 一、本章知识框架\n\n### 1. 本章主线\n\n本章由两个部分合并组成：13.1 有机化学与 13.3 高分子化学。核心逻辑是：\n\n1. 有机化合物为什么多：碳骨架可形成直链、支链、环、多重键，并可引入多种官能团。\n2. 有机结构怎样区分：构造异构、构象异构、对映异构、顺反异构。\n3. 有机物怎样反应：按电子流和官能团变化理解取代、加成、消去、重排。\n4. 反应机理怎样判断：亲核体、亲电体、离去基团、碳正离子稳定性、位阻、溶剂效应共同决定 \\(S_N1/S_N2/E1/E2\\)。\n5. 高分子怎样形成：低分子单体经缩聚或加聚生成高分子。\n6. 高分子怎样表征：链节、结构单元、聚合度、数均分子量、重均分子量、分散系数。\n7. 高分子性质从哪里来：分子链结构、聚集态结构、\\(T_g\\)、\\(T_m\\)、\\(T_f\\)、交联程度决定塑料、橡胶、纤维等性能。\n\n### 2. 层级结构\n\n#### 2.1 有机化合物的结构\n\n- 有机化合物：碳氢化合物及其衍生物，但不包括碳的氧化物、碳酸盐、氰化物、碳化物等。\n- 结构表示：结构简式、键线式、楔形虚线式、球棍模型、空间填充模型。\n- 碳骨架拓展：直链、支链、环、杂原子、多重键。\n- 碳原子分类：伯碳、仲碳、叔碳、季碳；氢只能是伯氢、仲氢、叔氢，没有季氢。\n\n#### 2.2 同分异构\n\n- 构造异构：原子连接顺序不同。\n- 立体异构：连接顺序相同，空间排列不同。\n- 构象异构：单键旋转引起的空间排列差异，通常能垒较低。\n- 对映异构：实物与镜像不可重叠，和手性有关。\n- 顺反异构：由于双键或环等限制自由旋转，使取代基空间相对位置不同。\n\n#### 2.3 常见有机化合物类型\n\n- 烷烃：开链烷烃通式 \\(C_nH_{2n+2}\\)，只含 \\(C-C\\) 单键。\n- 烯烃：含 \\(C=C\\)，单烯烃通式 \\(C_nH_{2n}\\)，容易发生加成反应。\n- 炔烃：含 \\(C\\equiv C\\)，单炔烃通式 \\(C_nH_{2n-2}\\)。\n- 芳香化合物：环状闭合共轭体系；符合 \\(4n+2\\) \\(\\pi\\) 电子时有芳香性，稳定，易亲电取代，不易加成和氧化。\n- 醇、醚、醛、酮、羧酸、酯、酰胺、胺、杂环化合物：由官能团决定性质和常见反应。\n\n#### 2.4 有机反应与机理\n\n- 取代反应：一个原子或基团被另一个原子或基团替代。\n- 加成反应：不饱和键两端加上原子或基团，生成更饱和产物。\n- 消去反应：邻近原子上的原子或基团以小分子形式离去，生成不饱和键。\n- 亲核取代：亲核体进攻带正电或部分正电的碳，离去基团离去。\n- \\(S_N2\\)：双分子决速步骤，背面进攻，构型翻转。\n- \\(S_N1\\)：单分子决速步骤，先形成碳正离子，常生成外消旋体。\n- \\(E1\\)：先形成碳正离子，常与 \\(S_N1\\) 竞争。\n- \\(E2\\)：强碱参与，\\(\\beta\\)-H 离去、离去基团离去、形成 \\(\\pi\\) 键同时发生。\n\n#### 2.5 高分子基本概念\n\n- 高分子：分子量大，一般 \\(\\ge 10000\\)，由重复单元以共价键连接而成。\n- 单体：能够聚合生成聚合物的低分子原料。\n- 链节：高分子链中的重复结构单元。\n- 结构单元：单体进入大分子链后的基本原子组合，组成可以与单体相同，也可以不同。\n- 聚合度：链节重复次数 \\(n\\)。\n- 高分子不是单一分子量物质，而是不同聚合度和结构形态同系物的混合物。\n\n#### 2.6 高分子合成、结构与性能\n\n- 缩聚反应：含两个或多个官能团的单体逐步反应，常放出小分子，链节组成通常不同于单体。\n- 加聚反应：含不饱和键的单体通过 \\(\\pi\\) 键断裂加成聚合，无小分子副产物，链节组成通常与单体相同。\n- 连锁聚合：链引发、链增长、链终止；自由基聚合概括为“慢引发、快增长、速终止”。\n- 分子链结构：线型、支链型、体型/网状交联。\n- 聚集态结构：晶态、非晶态；晶态聚合物常兼有晶区和非晶区。\n- 热转变：非晶态聚合物有 \\(T_g\\) 和 \\(T_f\\)；晶态聚合物主要有 \\(T_m\\)。\n\n## 二、重点概念整理\n\n### 1. 有机化合物\n\n定义：泛指碳氢化合物及其衍生物。\n\n需要记忆的点：材料明确排除碳的氧化物、硫化物、碳酸化合物、氰化物、硫氰化物、氰酸盐、碳化物、碳硼烷、羰基金属等。\n\n容易混淆的地方：不是所有含碳物质都属于本章所说的有机化合物。\n\n可能怎么考：判断 \\(CO_2\\)、碳酸盐、氰化物是否按有机化合物处理。\n\n### 2. 构造异构\n\n定义：由于化合物原子连接顺序不同而产生的同分异构现象，也称结构异构。\n\n关键词：连接顺序不同、键连方式不同。\n\n适用条件：分子式相同，但原子连接关系不同。\n\n区别：构造异构改变键连方式；立体异构不改变键连方式，只改变空间排列。\n\n可能怎么考：画 \\(C_4H_9Br\\) 的构造异构体；比较正丁烷与异丁烷。\n\n### 3. 伯、仲、叔、季碳\n\n定义：饱和碳原子直接相连的其他碳原子数为 0-1、2、3、4 时，分别称为伯、仲、叔、季碳。\n\n需要记忆的点：伯碳 \\(1^\\circ\\)、仲碳 \\(2^\\circ\\)、叔碳 \\(3^\\circ\\)、季碳 \\(4^\\circ\\)。\n\n容易混淆的地方：没有“季氢”。季碳已经连着 4 个碳，没有 H。\n\n可能怎么考：标出有机分子中的伯、仲、叔、季碳和不同类型氢。\n\n### 4. 构象与构象异构\n\n定义：由 \\(C-C\\) 单键旋转而产生的原子或基团在空间的特定排列称为构象。\n\n需要记忆的点：交叉构象能量低，重叠构象能量高；碳碳单键室温下常能自由旋转；正丁烷反错构象能量最低。\n\n区别：构象异构通常能垒低，可相互转化；构造异构需要断键重连。\n\n可能怎么考：画 Newman 投影；判断交叉、重叠、扭式构象；比较构象能量。\n\n### 5. 手性与对映异构\n\n定义：物体与其镜像不能重合的性质称为手性；互为实物与镜像而不可重叠的立体异构体称为对映体。\n\n关键词：镜像不可重叠、手性碳、旋光性。\n\n需要记忆的点：连有四个不同原子或原子团的碳常称为手性碳，用 \\(*\\) 标识；只含一个手性碳原子的分子一定是手性分子。\n\n容易混淆的地方：有手性碳不一定总保证整个复杂分子手性，但材料强调“只含一个手性碳一定手性”；若分子具有对称因素，则不具有手性。\n\n可能怎么考：判断某分子是否手性；判断一对结构是同一化合物、对映体还是构造异构体。\n\n### 6. 顺反异构\n\n定义：由于存在自由旋转限制因素，使各基团在空间排列方式不同而出现的非对映异构。\n\n适用条件：常见于双键或环状结构。\n\n区别：顺反异构是非对映异构，不是对映异构。\n\n可能怎么考：判断顺-2-丁烯与反-2-丁烯关系；比较顺反异构体稳定性或物理性质。\n\n### 7. 官能团\n\n定义：有机化合物分子中决定有机化合物主要性质和反应类型的原子或原子团。\n\n需要记忆的点：烯烃 \\(C=C\\)、炔烃 \\(C\\equiv C\\)、醇 \\(-OH\\)、醛 \\(-CHO\\)、酮 \\(R-CO-R\u0027\\)、羧酸 \\(-COOH\\)、酯 \\(-COOR\\)、酰胺 \\(-CONH_2/-CONHR/-CONR_2\\)、胺 \\(-NH_2/-NHR/-NR_2\\) 等。\n\n容易混淆的地方：醛的羰基至少有一个 H；酮的羰基两侧都是烃基或芳香基。\n\n可能怎么考：根据结构识别化合物类别；判断官能团反应性。\n\n### 8. 芳香性\n\n定义：芳香性表现为环状闭合共轭体系具有特殊稳定性，化学性质上易亲电取代，不易加成和氧化。\n\n需要记忆的点：Hückel 规则：芳香性体系通常含 \\(4n+2\\) 个 \\(\\pi\\) 电子；反芳香性体系含 \\(4n\\) 个 \\(\\pi\\) 电子而不稳定。\n\n容易混淆的地方：有双键不一定芳香；必须考虑是否环状、共轭、满足电子数。\n\n可能怎么考：判断某环状共轭体系是否芳香；解释苯不易发生加成反应。\n\n### 9. 亲核体、亲电体、离去基团\n\n定义：亲核体是能提供孤对电子的原子或基团；亲电体是缺电子、能接受电子进攻的基团或原子；离去基团是在反应中带着电子离开的基团。\n\n需要记忆的点：亲核体常带负电或具有孤对电子；亲核性是动力学性质，碱性是热力学性质。\n\n容易混淆的地方：强碱不一定总是最强亲核体，位阻和溶剂会显著影响亲核性。\n\n可能怎么考：判断反应中谁是亲核体、亲电体和离去基团。\n\n### 10. \\(S_N2\\) 反应\n\n定义：双分子亲核取代反应，反应级数为 2，决速步骤涉及亲核体和底物。\n\n需要记忆的点：背面进攻，过渡态中成键和断键同时进行，产物构型发生 Walden 反转。\n\n适用条件：小位阻底物、强亲核体、极性非质子性溶剂有利于 \\(S_N2\\)。\n\n区别：\\(S_N2\\) 不经过碳正离子中间体；\\(S_N1\\) 经过碳正离子。\n\n可能怎么考：判断反应机理；判断手性中心构型是否翻转。\n\n### 11. \\(S_N1\\) 反应\n\n定义：单分子亲核取代反应，决速步骤为离去基团先离去生成碳正离子。\n\n需要记忆的点：第一步慢，生成平面 \\(sp^2\\) 碳正离子；亲核体可从两侧进攻，常生成外消旋体。\n\n适用条件：能形成稳定碳正离子的底物、极性质子性溶剂有利于 \\(S_N1\\)。\n\n区别：\\(S_N1\\) 反应性随碳正离子稳定性增加而增强：甲基、伯碳不利，叔碳有利。\n\n可能怎么考：根据底物、溶剂、亲核体判断 \\(S_N1\\) 或 \\(S_N2\\)。\n\n### 12. 亲核性影响因素\n\n定义：亲核性是亲核体进攻亲电中心的反应快慢能力。\n\n需要记忆的点：同一原子，负电荷亲核性强于中性分子；同周期原子，电负性越大亲核性越小；给电子基团增强亲核性，吸电子基团降低亲核性；同族原子半径和可极化性越大，亲核性越强；位阻降低亲核性。\n\n容易混淆的地方：质子性溶剂与非质子性溶剂对亲核性排序可能不同。\n\n可能怎么考：比较 \\(HO^-\\) 与 \\(H_2O\\)、\\(I^-\\) 与 \\(F^-\\) 的亲核性；判断溶剂对 \\(S_N2\\) 的影响。\n\n### 13. \\(E1\\) 与 \\(E2\\) 消去反应\n\n定义：消去反应是邻近原子上的原子或基团以小分子形式离去，生成不饱和键的反应。\n\n需要记忆的点：\\(E1\\) 先形成碳正离子，规律与 \\(S_N1\\) 相似，常伴随 \\(S_N1\\)；伯卤代烃通常不发生 \\(E1\\)。\\(E2\\) 是双分子机理，强碱参与，\\(\\beta\\)-H 离去、离去基团离去、形成 \\(\\pi\\) 键同时发生。\n\n容易混淆的地方：强碱对叔碳和仲碳卤代烃常促进 \\(E2\\)；对伯卤代烃，小位阻强碱更易 \\(S_N2\\)，大位阻强碱更易 \\(E2\\)。\n\n可能怎么考：判断 \\(S_N1/E1\\) 或 \\(S_N2/E2\\) 竞争；预测主要烯烃产物。\n\n### 14. 加成反应与马氏规则\n\n定义：加成反应是一个分子提供的原子和基团连接到不饱和键两端，得到饱和或较饱和产物的反应。\n\n需要记忆的点：烯烃 \\(\\pi\\) 电子云具有亲核性；氢卤酸加成通常遵循马氏规则：H 加到取代基少、氢多的碳上，形成更稳定碳正离子。\n\n容易混淆的地方：消去口诀常为“氢少减氢”，加成口诀为“氢多加氢”。\n\n可能怎么考：预测烯烃与 HX、水、卤素单质加成产物；解释卤素加成中的卤鎓离子与背面进攻。\n\n### 15. 高分子、单体、链节、结构单元、聚合度\n\n定义：高分子是由重复单元以共价键连接而成的大分子；单体是用于聚合的低分子原料；链节是重复结构单元；聚合度是链节重复次数 \\(n\\)。\n\n需要记忆的点：低聚物聚合度较低，材料给出 \\(1\\sim100\\)；高分子分子量常在 \\(10^4\\sim10^6\\ \\mathrm{g\\cdot mol^{-1}}\\)。\n\n容易混淆的地方：结构单元的元素组成可以与单体相同，也可以不同；缩聚常不同，加聚常相同。\n\n可能怎么考：由单体写聚合物链节；由分子量求聚合度。\n\n### 16. 数均分子量、重均分子量与分散系数\n\n定义：数均分子量按分子数统计平均；重均分子量按质量分数统计平均；分散系数 \\(D=M_w/M_n\\) 表示分子量分布宽窄。\n\n需要记忆的点：通常 \\(M_w\u003eM_n\\)，\\(M_n\\) 更受低分子量部分影响，\\(M_w\\) 更受高分子量部分影响；\\(D\\) 越接近 1，分子量分布越窄。\n\n容易混淆的地方：同一种“纯”高分子也不是单一分子量物质，而是混合物。\n\n可能怎么考：给不同分子量和物质的量，求 \\(M_n\\)、\\(M_w\\)、\\(D\\)。\n\n### 17. 缩聚反应与逐步聚合\n\n定义：具有两个或两个以上可反应官能团的单体，通过多次缩合生成聚合物，并析出小分子。\n\n关键词：小分子副产物、逐步、可逆、官能团反应。\n\n需要记忆的点：缩聚物链节通常与单体化学组成不完全相同，多为杂链聚合物，分子量不是单体分子量的整数倍。\n\n可能怎么考：判断尼龙-66、聚酯、聚酰胺、酚醛树脂、蛋白质、核酸等是否属于缩聚物。\n\n### 18. 加聚反应与连锁聚合\n\n定义：含不饱和双键或三键的单体 \\(\\pi\\) 键断裂后加成聚合。\n\n关键词：无小分子副产物、组成与单体基本相同、链式反应。\n\n需要记忆的点：自由基聚合包括链引发、链增长、链终止；机理特征是“慢引发、快增长、速终止”。\n\n可能怎么考：判断聚乙烯、聚氯乙烯、聚苯乙烯、聚丙烯腈、氯丁橡胶等属于加聚物。\n\n### 19. 线型、支链型、体型高分子\n\n定义：线型为长链结构；支链型为主链带侧枝；体型为链间通过化学键交联形成网状结构。\n\n需要记忆的点：线型和支链型一般可溶可熔，有热塑性；交联程度深的体型结构不溶不熔，有热固性。\n\n容易混淆的地方：溶解前常先溶胀；体型交联聚合物通常只溶胀不真正溶解。\n\n可能怎么考：判断热塑性与热固性材料；解释废橡胶在汽油中胀大但不溶解。\n\n### 20. \\(T_g\\)、\\(T_m\\)、\\(T_f\\)\n\n定义：\\(T_g\\) 为玻璃化转变温度；\\(T_m\\) 为熔点；\\(T_f\\) 为粘流温度。\n\n需要记忆的点：非晶态高分子在 \\(T_g\\) 以下为玻璃态，\\(T_g\\) 以上为高弹态，达到 \\(T_f\\) 后进入粘流态；晶态高分子主要热转变温度为 \\(T_m\\)。\n\n容易混淆的地方：橡胶只能是非晶态高聚物，处于高弹态；纤维多为晶态高聚物，需较高 \\(T_m\\) 和取向结构。\n\n可能怎么考：根据 \\(T_g,T_m,T_w\\) 判断材料在室温下表现为塑料、橡胶或纤维。\n\n## 三、重要公式整理\n\n### 1. 开链烷烃通式\n\n公式：\n\\[\nC_nH_{2n+2}\n\\]\n\n符号说明：\\(n\\) 为碳原子数；适用于开链饱和烷烃。\n\n适用条件：无环、无双键、无三键，仅含 \\(C-C\\) 单键。\n\n解题步骤：确定碳数 \\(n\\)，代入 \\(2n+2\\) 求氢数。\n\n易错点：环烷烃不适用该公式；有双键或三键也不适用。\n\n例题方向：写出己烷分子式 \\(C_6H_{14}\\)。\n\n### 2. 单烯烃通式\n\n公式：\n\\[\nC_nH_{2n}\n\\]\n\n符号说明：\\(n\\) 为碳原子数。\n\n适用条件：开链、只含一个 \\(C=C\\) 的单烯烃。\n\n解题步骤：确定碳数，代入 \\(2n\\)。\n\n易错点：环烷烃也可符合 \\(C_nH_{2n}\\)，不能仅凭分子式判断一定是烯烃。\n\n例题方向：写出戊烯分子式 \\(C_5H_{10}\\)。\n\n### 3. 单炔烃通式\n\n公式：\n\\[\nC_nH_{2n-2}\n\\]\n\n符号说明：\\(n\\) 为碳原子数。\n\n适用条件：开链、只含一个 \\(C\\equiv C\\) 的单炔烃。\n\n解题步骤：确定碳数，代入 \\(2n-2\\)。\n\n易错点：含两个双键的开链二烯烃也可能符合 \\(C_nH_{2n-2}\\)，要结合结构判断。\n\n例题方向：写出丁炔分子式 \\(C_4H_6\\)。\n\n### 4. Hückel 芳香性规则\n\n公式：\n\\[\n\\pi\\text{电子数}=4n+2\\quad(n=0,1,2,\\ldots)\n\\]\n\n符号说明：\\(n\\) 为非负整数；\\(\\pi\\) 电子数为环状共轭体系参与离域的 \\(\\pi\\) 电子总数。\n\n适用条件：环状、平面或近似平面、闭合共轭体系。\n\n解题步骤：先判断是否环状闭合共轭，再数 \\(\\pi\\) 电子，最后看是否符合 \\(4n+2\\)。\n\n易错点：只数双键不够，还要判断体系是否闭合共轭。\n\n例题方向：苯含 6 个 \\(\\pi\\) 电子，符合 \\(4n+2\\) 中 \\(n=1\\)，具有芳香性。\n\n### 5. 辛烷值\n\n公式：\n\\[\n\\text{辛烷值}=\\frac{V_{\\text{异辛烷}}}{V_{\\text{异辛烷}}+V_{\\text{正庚烷}}}\\times100\n\\]\n\n符号说明：\\(V_{\\text{异辛烷}}\\) 和 \\(V_{\\text{正庚烷}}\\) 为标准混合燃料中异辛烷和正庚烷的体积分数或体积。\n\n适用条件：用异辛烷辛烷值 100、正庚烷辛烷值 0 的混合物表示汽油抗爆性。\n\n解题步骤：确定异辛烷占混合物总体积的比例，乘以 100。\n\n易错点：辛烷值不是异辛烷的质量分数，通常按体积分数定义。\n\n例题方向：90 mL 异辛烷和 10 mL 正庚烷混合，对应辛烷值 90。\n\n### 6. 构象扭转能估算\n\n公式：\n\\[\nE_{\\text{总}}=\\sum E_i\n\\]\n\n材料示例：每一对 \\(C-H\\) 重叠相互作用贡献约 \\(4\\ \\mathrm{kJ\\cdot mol^{-1}}\\)；乙烷完全重叠构象约有 3 对，故：\n\\[\nE\\approx 3\\times4=12\\ \\mathrm{kJ\\cdot mol^{-1}}\n\\]\n\n符号说明：\\(E_i\\) 为每组重叠相互作用贡献的扭转能。\n\n适用条件：用课件给出的相互作用能近似估算构象能量差。\n\n易错点：交叉构象能量低，重叠构象能量高。\n\n例题方向：估算乙烷重叠构象相对交叉构象的能量升高。\n\n### 7. 高分子聚合度与分子量\n\n公式：\n\\[\nM=nM_0\n\\]\n\\[\nn=\\frac{M}{M_0}\n\\]\n\n符号说明：\\(M\\) 为聚合物平均分子量，单位常用 \\(\\mathrm{g\\cdot mol^{-1}}\\)；\\(M_0\\) 为链节相对分子质量；\\(n\\) 为聚合度。\n\n适用条件：按链节重复数估算聚合物分子量；加聚物中尤其常用。\n\n解题步骤：找出链节相对分子质量和聚合物平均分子量，代入计算。\n\n易错点：缩聚物常有小分子副产物，链节质量不能简单等于单体质量。\n\n例题方向：PVC 的 \\(M_0=62.5\\)，\\(M=50000\\sim150000\\)，则 \\(n=800\\sim2400\\)。\n\n### 8. 数均分子量\n\n公式：\n\\[\nM_n=\\frac{\\sum N_iM_i}{\\sum N_i}\n\\]\n\\[\nM_n=\\sum x_iM_i\n\\]\n\n符号说明：\\(N_i\\) 为第 \\(i\\) 类聚合物分子的物质的量或分子数；\\(M_i\\) 为对应分子量；\\(x_i\\) 为摩尔分数。\n\n适用条件：按分子数统计平均分子量。\n\n解题步骤：用每类分子数乘对应分子量求总质量，再除以总分子数。\n\n易错点：低分子量部分对 \\(M_n\\) 影响较大。\n\n例题方向：给出不同分子量组分的 mol 数，求 \\(M_n\\)。\n\n### 9. 重均分子量\n\n公式：\n\\[\nM_w=\\sum w_iM_i\n\\]\n\\[\nM_w=\\frac{\\sum N_iM_i^2}{\\sum N_iM_i}\n\\]\n\n符号说明：\\(w_i\\) 为质量分数；\\(N_i\\) 为分子数或物质的量；\\(M_i\\) 为对应分子量。\n\n适用条件：按质量分数统计平均分子量。\n\n解题步骤：先求总质量 \\(\\sum N_iM_i\\)，再求 \\(\\sum N_iM_i^2\\)，相除得 \\(M_w\\)。\n\n易错点：高分子量部分对 \\(M_w\\) 影响较大，因此通常 \\(M_w\u003eM_n\\)。\n\n例题方向：材料例题中 \\(M_n=40000\\)，\\(M_w=85000\\)。\n\n### 10. 分子量分布指数\n\n公式：\n\\[\nD=\\frac{M_w}{M_n}\n\\]\n\n符号说明：\\(D\\) 为分子量分布指数，也称分散系数；\\(M_w\\) 为重均分子量；\\(M_n\\) 为数均分子量。\n\n适用条件：表征聚合物分子量分布宽窄。\n\n解题步骤：分别求 \\(M_w\\) 和 \\(M_n\\)，再相除。\n\n易错点：\\(D\\ge1\\)，越接近 1 分布越窄。\n\n例题方向：若 \\(M_w=85000\\)、\\(M_n=40000\\)，则 \\(D=2.125\\)。\n\n### 11. 缩聚反应通式\n\n公式：\n\\[\nn\\,a-A-a+n\\,b-B-b\\rightarrow a-[AB]_n-b+(2n-1)ab\n\\]\n\\[\nn\\,a-R-b\\rightarrow a-[R]_n-b+(n-1)ab\n\\]\n\n符号说明：\\(a,b\\) 表示可反应官能团，\\(ab\\) 表示小分子副产物，\\(n\\) 为聚合度。\n\n适用条件：二官能度单体缩聚或自缩聚。\n\n解题步骤：判断单体官能度和官能团类型，写出链节，再写出小分子副产物。\n\n易错点：缩聚反应通常有小分子副产物，链节组成通常不同于单体。\n\n例题方向：二元胺与二元酸生成聚酰胺并放出水。\n\n### 12. 加聚反应通式\n\n公式：\n\\[\nnCH_2=CHX \\xrightarrow{\\text{光、热或引发剂}} [-CH_2-CHX-]_n\n\\]\n\n符号说明：\\(X\\) 为取代基；\\(n\\) 为聚合度。\n\n适用条件：含不饱和双键的单体加成聚合。\n\n解题步骤：打开双键，将单体转化为链节，外加括号和 \\(n\\)。\n\n易错点：加聚无小分子副产物，链节与单体化学组成通常一致。\n\n例题方向：氯乙烯加聚生成聚氯乙烯。\n\n## 四、需要记忆的性质和规律\n\n| 知识点 | 具体内容 | 记忆方法 | 常见考法 |\n|---|---|---|---|\n| 有机化合物范围 | 碳氢化合物及其衍生物，不包括碳氧化物、碳酸盐、氰化物等 | “含碳不一定有机” | 判断物质类别 |\n| Wöhler 合成尿素 | 1828 年打破生机论 | “氰酸铵是尿素” | 有机合成史判断 |\n| 构造异构 | 原子连接顺序不同 | “键连不同” | 画同分异构体 |\n| 构象异构 | 单键旋转产生 | “不断键，只转单键” | Newman 投影 |\n| 交叉/重叠构象 | 交叉能量低，重叠能量高 | “错开更稳” | 判断最低能量构象 |\n| 位阻 | 基团空间排斥影响构型、反应活性 | “越挤越慢” | 判断 \\(S_N2\\) 速率 |\n| 对映异构 | 镜像不可重叠 | “左右手” | 判断手性 |\n| 手性碳 | 连四个不同原子或基团 | “四不同” | 标手性中心 |\n| 分子对称性 | 有对称因素通常无手性 | “能对称就不手性” | 判断旋光性 |\n| 顺反异构 | 自由旋转受限导致 | “双键/环锁住” | 判断顺反关系 |\n| 烷烃 | 开链通式 \\(C_nH_{2n+2}\\)，主要来自石油 | “饱和多两个 H” | 写分子式 |\n| 辛烷值 | 异辛烷 100，正庚烷 0 | “异辛抗爆好” | 计算辛烷值 |\n| 烯烃 | 含 \\(C=C\\)，单烯烃 \\(C_nH_{2n}\\)，易加成 | “双键可加成” | 判断反应类型 |\n| 炔烃 | 含 \\(C\\equiv C\\)，单炔烃 \\(C_nH_{2n-2}\\) | “三键少两个 H” | 写分子式 |\n| 芳香性 | \\(4n+2\\) \\(\\pi\\) 电子稳定，易亲电取代 | “四 n 加二” | 判断芳香/反芳香 |\n| 醇 | \\(-OH\\) 连在 \\(sp^3\\) 碳上；长链水溶性变差 | “羟基亲水，烃链疏水” | 比较溶解性 |\n| 醛酮 | 羰基碳带正电较活泼 | “C=O 碳缺电子” | 判断亲核加成位点 |\n| 伯醇氧化 | 伯醇可氧化为醛，进一步为羧酸 | “一醇到醛酸” | 判断氧化产物 |\n| 仲醇氧化 | 仲醇可氧化为酮 | “二醇到酮” | 判断氧化产物 |\n| 叔醇氧化 | 叔醇不能直接氧化成酮 | “三无 α-H 难氧化” | 判断能否氧化 |\n| 羧酸 | 低分子羧酸有水溶性、弱酸性、较高熔沸点 | “氢键+酸性” | 比较沸点/酸性 |\n| 酯 | 常有香气，不溶于水，熔沸点低于相同碳数醇和羧酸 | “香味低沸” | 判断物性 |\n| 酰胺 | \\(-CO-NH-\\) 是肽键；反应活性低于羧酸衍生物前体 | “肽键酰胺” | 识别蛋白质连接 |\n| 胺 | 含孤对电子，显碱性；脂肪胺碱性强于氨，芳香胺弱于氨 | “孤对给质子” | 比较碱性 |\n| 杂环 | 环中含 N、O、S 等杂原子 | “环里有杂原子” | 识别吡啶等 |\n| 亲核性 | 负电荷强于中性；位阻降低；同族可极化性越强越强 | “电子多、好伸手、不太挤” | 比较亲核试剂 |\n| \\(S_N2\\) | 背面进攻、构型翻转，小位阻有利 | “二级一步翻转” | 判断机理和构型 |\n| \\(S_N1\\) | 碳正离子中间体，常外消旋，叔碳有利 | “一级两步平面” | 判断外消旋 |\n| 溶剂效应 | 极性非质子性利 \\(S_N2\\)，极性质子性利 \\(S_N1\\) | “非质子不包裹亲核体” | 判断反应条件 |\n| \\(E1\\) | 弱碱、不利 \\(E2\\)，常与 \\(S_N1\\) 相伴 | “先正离子后脱 H” | 判断竞争反应 |\n| \\(E2\\) | 强碱，三步同时发生，叔/仲卤代烃常主导 | “强碱一口气脱去” | 预测烯烃 |\n| 消去产物 | 通常生成内部且反式烯烃；口诀“氢少减氢” | “更取代更稳” | 判断主产物 |\n| 加成产物 | 氢卤酸加成遵循“氢多加氢” | “马氏规则” | 预测 HX 加成 |\n| 氢化反应 | Lindlar 催化剂可使炔烃生成顺式烯烃 | “林德拉停在顺烯” | 判断选择性 |\n| 高分子 | 分子量 \\(\\ge10000\\)，重复单元共价连接 | “大、长、重复” | 判断高分子 |\n| 单体 | 能聚合生成高分子的低分子 | “原料” | 从聚合物反推单体 |\n| 链节 | 重复结构单元 | “括号里的重复部分” | 写聚合物结构 |\n| 聚合度 | 链节重复次数 \\(n\\) | “重复多少次” | 用 \\(M=nM_0\\) 计算 |\n| 高分子分散性 | 高分子是不同聚合度同系物混合物 | “纯也不均一” | 判断 \\(M_n,M_w,D\\) |\n| \\(M_n\\) | 低分子量部分影响较大 | “按个数平均” | 计算数均分子量 |\n| \\(M_w\\) | 高分子量部分影响较大，常更能表征性能 | “按重量平均” | 计算重均分子量 |\n| \\(D\\) | \\(D=M_w/M_n\\)，越接近 1 分布越窄 | “1 最整齐” | 判断分布宽窄 |\n| 缩聚 | 有小分子副产物、逐步、可逆、链节不同于单体 | “缩掉小分子” | 判断反应类型 |\n| 加聚 | 无小分子副产物、链式、链节组成同单体 | “双键打开相加” | 判断聚乙烯等 |\n| 自由基聚合 | 慢引发、快增长、速终止 | “慢快快” | 判断机理特征 |\n| 线型高分子 | 可溶可熔，有热塑性 | “链能滑动” | 判断热塑性 |\n| 体型高分子 | 深度交联，不溶不熔，热固性 | “网锁死” | 判断热固性 |\n| 晶态聚合物 | 晶区和非晶区共存，有结晶度 | “不全是晶体” | 判断聚集态 |\n| 非晶态聚合物 | 无规线团，常有玻璃态、高弹态、粘流态 | “温度改变链段运动” | 判断力学状态 |\n| \\(T_g\\) | 以下玻璃态，以上高弹态 | “玻璃变软” | 判断室温状态 |\n| \\(T_m\\) | 晶态聚合物主要热转变温度 | “晶区熔化” | 判断耐热上限 |\n| 橡胶 | 非晶态，高弹态，\\(T_g\\) 需显著低于室温 | “室温有弹” | 判断材料类别 |\n| 纤维 | 多为晶态，链直、取向、极性基团、强度高 | “直、齐、强” | 判断纤维结构 |\n| 导电高分子 | 一般高分子绝缘；聚乙炔掺杂后可导电 | “共轭+掺杂” | 判断导电原因 |\n\n## 五、易错点总结\n\n1. 错误理解：所有含碳化合物都是有机物。  \n   正确理解：本章明确排除碳氧化物、碳酸化合物、氰化物、碳化物等。  \n   如何避免：遇到无机碳化合物先按教材排除清单判断。\n\n2. 错误理解：构造异构和构象异构都是“空间不同”。  \n   正确理解：构造异构是连接顺序不同；构象异构是单键旋转导致的空间排列不同。  \n   如何避免：先问“是否断键重连”。需要断键重连的是构造异构。\n\n3. 错误理解：有季碳就一定有季氢。  \n   正确理解：季碳连着 4 个碳，不能再连 H，所以没有季氢。  \n   如何避免：氢类型由它所连接的碳类型决定，季碳上没有 H。\n\n4. 错误理解：含手性碳的分子一定在任何情况下都有手性。  \n   正确理解：材料强调只含一个手性碳一定手性；但复杂分子还要检查对称因素。  \n   如何避免：先找手性碳，再检查是否有对称面或其他对称因素。\n\n5. 错误理解：顺反异构属于对映异构。  \n   正确理解：顺反异构属于非对映异构。  \n   如何避免：看是否互为镜像且不可重叠；不是镜像关系就不是对映体。\n\n6. 错误理解：芳香性就是有香味或有苯环。  \n   正确理解：芳香性是电子结构稳定性，关键是环状闭合共轭和 \\(4n+2\\) \\(\\pi\\) 电子。  \n   如何避免：按 Hückel 条件判断，不按气味判断。\n\n7. 错误理解：亲核性和碱性完全一样。  \n   正确理解：碱性是热力学性质，亲核性是动力学性质；溶剂和位阻会改变亲核性。  \n   如何避免：比较亲核性时同时看电荷、电负性、溶剂、可极化性和位阻。\n\n8. 错误理解：\\(S_N1\\) 和 \\(S_N2\\) 都会构型翻转。  \n   正确理解：\\(S_N2\\) 背面进攻导致构型翻转；\\(S_N1\\) 经平面碳正离子，常生成外消旋体。  \n   如何避免：看到“碳正离子”就想到平面中间体和外消旋。\n\n9. 错误理解：位阻越大越有利于 \\(S_N2\\)。  \n   正确理解：位阻越大，亲核体背面进攻越困难，\\(S_N2\\) 越慢。  \n   如何避免：\\(S_N2\\) 按甲基、伯碳较快，叔碳通常不利理解。\n\n10. 错误理解：强碱一定走 \\(S_N2\\)。  \n    正确理解：强碱也促进 \\(E2\\)，尤其叔碳和仲碳卤代烃；大位阻强碱对伯卤代烃也可促进 \\(E2\\)。  \n    如何避免：强碱题同时检查底物位阻和是否有 \\(\\beta\\)-H。\n\n11. 错误理解：消去和加成口诀一样。  \n    正确理解：消去常用“氢少减氢”，加成马氏规则常用“氢多加氢”。  \n    如何避免：先判断反应是消去还是加成，再套口诀。\n\n12. 错误理解：链节一定等于单体。  \n    正确理解：加聚物链节通常与单体组成相同；缩聚物因失去小分子，链节通常不同于单体。  \n    如何避免：看反应是否放出水、醇、胺等小分子。\n\n13. 错误理解：高分子有一个确定分子量。  \n    正确理解：高分子样品是不同聚合度分子的混合物，通常只能说平均分子量。  \n    如何避免：看到高分子分子量，默认是统计平均值。\n\n14. 错误理解：\\(M_n\\) 和 \\(M_w\\) 数值相同。  \n    正确理解：通常 \\(M_w\u003eM_n\\)，且 \\(D=M_w/M_n\\ge1\\)。  \n    如何避免：计算 \\(M_w\\) 时记得按质量加权，高分子量部分权重更大。\n\n15. 错误理解：缩聚反应一开始就得到高分子量聚合物。  \n    正确理解：逐步聚合中单体初期很快消失，但只有转化率很高时分子量才高。  \n    如何避免：把缩聚记为“低聚体逐步长大”。\n\n16. 错误理解：线型高分子和体型高分子溶解性一样。  \n    正确理解：线型高分子可溶可熔；深度交联体型高分子不溶不熔，只能溶胀或分解。  \n    如何避免：看是否有化学交联网络。\n\n17. 错误理解：玻璃态就是液体。  \n    正确理解：玻璃态和高弹态都属于固体；粘流态才表现为类似液体流动。  \n    如何避免：按 \\(T_g\u003cT\u003cT_f\\) 判断状态。\n\n18. 错误理解：所有高分子都绝缘。  \n    正确理解：一般高分子因共价键链不易导电而绝缘，但共轭高分子经掺杂可导电，如聚乙炔。  \n    如何避免：遇到“共轭+掺杂”要考虑导电高分子。\n\n19. 材料识别提醒：部分有机结构式、反应结构图和高分子结构图以图片形式呈现，PDF 文本只能提取文字说明，不能完整还原所有结构细节。若考试要求精确画某一页图片中的结构，请补充截图或按课件原图复习。\n\n# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：构造异构是由于化合物具有不同的 ______ 而产生的同分异构现象。\n\n2. 选择：下列说法正确的是  \n   A. 季碳上可以连一个季氢  \n   B. 只含一个手性碳原子的分子一定是手性分子  \n   C. 顺反异构属于对映异构  \n   D. 重叠构象通常比交叉构象能量低\n\n3. 填空：\\(S_N2\\) 反应中亲核体从离去基团的 ______ 进攻，产物构型发生 ______。\n\n4. 选择：极性非质子性溶剂通常更有利于  \n   A. \\(S_N2\\)  \n   B. \\(S_N1\\)  \n   C. 形成外消旋体  \n   D. 碳正离子长期稳定存在\n\n5. 填空：烯烃与氢卤酸加成时，按马氏规则，H 原子通常加到含氢较 ______ 的双键碳上。\n\n6. 选择：下列关于缩聚反应的说法正确的是  \n   A. 一定没有小分子副产物  \n   B. 链节组成总与单体完全相同  \n   C. 通常是逐步聚合反应  \n   D. 典型产物一定是碳链聚合物\n\n7. 填空：高分子分子量分布指数公式为 \\(D=______\\)，\\(D\\) 越接近 1，分子量分布越 ______。\n\n8. 选择：非晶态高分子在 \\(T_g\\) 以下通常处于  \n   A. 玻璃态  \n   B. 高弹态  \n   C. 粘流态  \n   D. 熔融晶态\n\n## 二、公式计算题\n\n1. 某开链单烯烃含 6 个碳原子，求其分子式。\n\n2. 某汽油抗爆性相当于 92 mL 异辛烷与 8 mL 正庚烷组成的标准混合物，求其辛烷值。\n\n3. 乙烷完全重叠构象中有 3 对 \\(C-H\\) 重叠相互作用，每对约贡献 \\(4\\ \\mathrm{kJ\\cdot mol^{-1}}\\) 扭转能。估算该构象相对交叉构象升高的能量。\n\n4. 某聚氯乙烯样品平均分子量为 \\(1.25\\times10^5\\ \\mathrm{g\\cdot mol^{-1}}\\)，链节相对分子质量为 62.5，求平均聚合度。\n\n5. 某聚合物样品中，分子量 \\(1.0\\times10^4\\) 的分子有 2 mol，分子量 \\(1.0\\times10^5\\) 的分子有 5 mol，分子量 \\(1.0\\times10^6\\) 的分子有 3 mol。求 \\(M_n\\)、\\(M_w\\) 和 \\(D\\)。\n\n## 三、判断题\n\n1. 构象异构通常由单键旋转产生，不需要改变原子的连接顺序。\n\n2. 分子有一个手性碳时一定不具有旋光性。\n\n3. 芳香化合物通常易进行亲电取代反应，不易进行加成反应和氧化反应。\n\n4. \\(S_N1\\) 反应的决速步骤是亲核体和底物同时发生碰撞并形成过渡态。\n\n5. 位阻越大，\\(S_N2\\) 反应通常越慢。\n\n6. 加聚反应通常无小分子副产物，所得聚合物链节与单体具有完全一致的化学成分与结构。\n\n7. 自由基聚合可概括为慢引发、快增长、速终止。\n\n8. 线型高分子一般可溶可熔，深度交联体型高分子通常不溶不熔。\n\n## 四、综合题\n\n1. 从底物结构、碳正离子稳定性、位阻和溶剂角度，比较 \\(S_N1\\) 与 \\(S_N2\\) 的机理差异，并说明它们的立体化学结果为什么不同。\n\n2. 比较缩聚反应和加聚反应，并结合高分子链结构说明为什么线型聚合物通常具有热塑性，而深度交联的体型聚合物具有热固性。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 原子连接顺序。构造异构也叫结构异构，关键是键连方式不同。\n\n2. B。季碳连 4 个碳，没有季氢；顺反异构属于非对映异构；交叉构象通常能量低于重叠构象。\n\n3. 背面；翻转。\\(S_N2\\) 背面进攻导致 Walden 反转。\n\n4. A。极性非质子性溶剂不容易紧密包裹亲核体，有利于 \\(S_N2\\)。\n\n5. 多。马氏规则常用口诀是“氢多加氢”，即 H 加到原来 H 较多的双键碳上。\n\n6. C。缩聚反应通常伴随小分子副产物生成，是典型逐步聚合反应，所得聚合物多为杂链聚合物。\n\n7. \\(M_w/M_n\\)；窄。\\(D\\ge1\\)，越接近 1 说明分子量越均一。\n\n8. A。非晶态高分子在 \\(T_g\\) 以下链段运动受限，表现为硬而脆的玻璃态。\n\n## 二、公式计算题答案\n\n1. 解题思路：开链单烯烃通式为 \\(C_nH_{2n}\\)。  \n   详细步骤：\n   \\[\n   n=6,\\quad H=2n=12\n   \\]\n   最终答案：\\(C_6H_{12}\\)。  \n   易错提醒：若是开链烷烃才用 \\(C_nH_{2n+2}\\)。\n\n2. 解题思路：辛烷值等于异辛烷体积分数乘以 100。  \n   详细步骤：\n   \\[\n   \\text{辛烷值}=\\frac{92}{92+8}\\times100=92\n   \\]\n   最终答案：辛烷值为 92。  \n   易错提醒：正庚烷辛烷值为 0，不是把两者体积直接相加后再乘别的系数。\n\n3. 解题思路：总扭转能为各重叠相互作用贡献之和。  \n   详细步骤：\n   \\[\n   E=3\\times4=12\\ \\mathrm{kJ\\cdot mol^{-1}}\n   \\]\n   最终答案：约 \\(12\\ \\mathrm{kJ\\cdot mol^{-1}}\\)。  \n   易错提醒：重叠构象能量高，交叉构象能量低。\n\n4. 解题思路：使用 \\(n=M/M_0\\)。  \n   详细步骤：\n   \\[\n   n=\\frac{1.25\\times10^5}{62.5}=2000\n   \\]\n   最终答案：平均聚合度 \\(n=2000\\)。  \n   易错提醒：单位保持一致；这里 \\(M\\) 和 \\(M_0\\) 都按 \\(\\mathrm{g\\cdot mol^{-1}}\\) 理解。\n\n5. 解题思路：先按分子数求 \\(M_n\\)，再按质量权重求 \\(M_w\\)，最后求 \\(D\\)。  \n   详细步骤：\n   \\[\n   M_n=\\frac{2(10^4)+5(10^5)+3(10^6)}{2+5+3}\n   =\\frac{3.52\\times10^6}{10}=3.52\\times10^5\n   \\]\n   \\[\n   M_w=\\frac{2(10^4)^2+5(10^5)^2+3(10^6)^2}{2(10^4)+5(10^5)+3(10^6)}\n   \\]\n   \\[\n   M_w=\\frac{3.0502\\times10^{12}}{3.52\\times10^6}=8.67\\times10^5\n   \\]\n   \\[\n   D=\\frac{M_w}{M_n}=\\frac{8.67\\times10^5}{3.52\\times10^5}=2.46\n   \\]\n   最终答案：\\(M_n=3.52\\times10^5\\ \\mathrm{g\\cdot mol^{-1}}\\)，\\(M_w\\approx8.67\\times10^5\\ \\mathrm{g\\cdot mol^{-1}}\\)，\\(D\\approx2.46\\)。  \n   易错提醒：\\(M_w\\) 不是简单平均，要用 \\(N_iM_i^2\\) 作分子。\n\n## 三、判断题答案\n\n1. 正确。构象异构来自单键旋转，原子连接顺序不变。\n\n2. 错误。材料强调只含一个手性碳原子的分子一定是手性分子，通常具有旋光性。\n\n3. 正确。芳香性体系稳定，典型反应倾向为亲电取代而不是加成。\n\n4. 错误。这是 \\(S_N2\\) 的特点；\\(S_N1\\) 的决速步骤是离去基团先离去形成碳正离子。\n\n5. 正确。位阻越大，亲核体背面进攻越困难，\\(S_N2\\) 反应速率越慢。\n\n6. 正确。加聚通常是双键或三键打开后链式聚合，无小分子副产物，链节组成与单体一致。\n\n7. 正确。自由基聚合包括链引发、链增长、链终止，机理特征为慢引发、快增长、速终止。\n\n8. 正确。线型高分子链可相对运动，常可溶可熔；深度交联体型高分子形成网状结构，通常不溶不熔。\n\n## 四、综合题答案\n\n1. 解析：\\(S_N2\\) 是双分子亲核取代，决速步骤中亲核体和底物同时参与。亲核体从离去基团背面进攻，成键和断键同时发生，因此手性中心发生构型翻转。小位阻底物、强亲核体、极性非质子性溶剂有利于 \\(S_N2\\)。\\(S_N1\\) 是单分子亲核取代，第一步离去基团先离去形成碳正离子，这是慢步骤。碳正离子为平面 \\(sp^2\\) 结构，亲核体可以从平面两侧进攻，因此常得到两个对映体近似 \\(1:1\\) 的外消旋产物。能形成稳定碳正离子的底物、极性质子性溶剂有利于 \\(S_N1\\)。所以，二者最核心差异是：\\(S_N2\\) 一步协同、背面进攻、构型翻转；\\(S_N1\\) 分步进行、碳正离子中间体、常外消旋。\n\n2. 解析：缩聚反应通常由含两个或两个以上官能团的单体逐步反应形成聚合物，并放出水、醇、胺等小分子副产物。其链节组成通常与单体不完全相同，常形成杂链聚合物；分子量在高转化率时才显著增大。加聚反应则多由含 \\(C=C\\) 或 \\(C\\equiv C\\) 的单体通过 \\(\\pi\\) 键断裂加成聚合，无小分子副产物，链节组成通常与单体一致，常为连锁聚合。高分子性能还取决于链结构：线型或支链型高分子分子链之间没有永久化学交联，受热时链段和分子链可运动，通常可溶可熔，表现热塑性；深度交联体型高分子由化学键连接成三维网状结构，分子链不能自由滑移，受热不熔而分解，通常不溶不熔，表现热固性。\n",
    "chemistry_quiz/01-quiz.md":  "# 本章测验题\n\n## 一、基础概念题\n\n1. 理想气体的两个基本假设是什么？\n\n2. 填空：气体状态方程 \\(pV=nRT\\) 中，若 \\(p\\) 用 Pa、\\(V\\) 用 m\\(^3\\)、\\(n\\) 用 mol、\\(T\\) 用 K，则 \\(R=\\_\\_\\_\\_\\_\\_\\)。\n\n3. 选择：下列条件下，真实气体最接近理想气体的是  \n   A. 高温低压  \n   B. 高温高压  \n   C. 低温高压  \n   D. 低温低压\n\n4. 填空：混合气体中某组分的分压等于总压乘以该组分的 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n5. 分压和分体积的定义条件分别是什么？\n\n6. 选择：高于临界温度时，气体能否通过单纯加压液化？  \n   A. 能  \n   B. 不能  \n   C. 只要压力足够大就能  \n   D. 与温度无关\n\n7. 填空：液体沸腾的条件是液体的蒸气压 \\(\\_\\_\\_\\_\\_\\_\\) 外界压力。\n\n8. 水的三相点温度和压力分别是多少？\n\n## 二、公式计算题\n\n1. 某气体在 \\(300\\text{ K}\\)、\\(100\\text{ kPa}\\) 下体积为 \\(24.0\\text{ dm}^3\\)。求该气体的物质的量。\n\n2. 某气体质量为 \\(0.132\\text{ g}\\)，在 \\(293\\text{ K}\\)、\\(9.97\\times10^4\\text{ Pa}\\) 下体积为 \\(0.190\\text{ dm}^3\\)。求摩尔质量，并判断可能是哪种气体。\n\n3. 空气近似含 \\(78\\%\\) N\\(_2\\)、\\(21\\%\\) O\\(_2\\)。若总压为 \\(1.00\\text{ atm}\\)，求 N\\(_2\\) 和 O\\(_2\\) 的分压。\n\n4. 深海 90 m 处总压约为 \\(10\\text{ atm}\\)。若呼吸混合气体含 \\(2\\%\\) O\\(_2\\)、\\(8\\%\\) N\\(_2\\)、\\(90\\%\\) He，求各气体分压。\n\n5. 已知某液体在 \\(T_1=350\\text{ K}\\) 时蒸气压 \\(p_1=40.0\\text{ kPa}\\)，摩尔蒸发热 \\(\\Delta H_{\\text{vap}}=35.0\\text{ kJ·mol}^{-1}\\)。求 \\(T_2=370\\text{ K}\\) 时的蒸气压 \\(p_2\\)。取 \\(R=8.314\\text{ J·mol}^{-1}\\text{·K}^{-1}\\)。\n\n## 三、判断题\n\n1. 理想气体模型认为气体分子间不存在相互作用力，分子本身体积也可忽略。\n\n2. 对所有真实气体，只要压力足够大，就一定能在任意温度下液化。\n\n3. 气体计算中，摄氏温度可以直接代入 \\(pV=nRT\\)。\n\n4. 在理想混合气体中，某组分分压等于该组分摩尔分数乘总压。\n\n5. 对组分 A，总有 \\(P_AV_A=n_ART\\)。\n\n6. 饱和蒸气压在温度恒定且气液共存时不随液体量改变。\n\n7. 水在高山上的沸点低于 \\(100^\\circ\\text{C}\\)。\n\n8. \\(Z=1\\) 时，该气体一定是真正的理想气体。\n\n## 四、综合题\n\n1. 现有 A、B 两种理想气体在同一容器中混合，温度为 \\(T\\)，总体积为 \\(V\\)，总压为 \\(P_{\\text{总}}\\)，物质的量分别为 \\(n_A,n_B\\)。  \n   问：  \n   (1) 写出 \\(P_A\\) 与 \\(P_{\\text{总}}\\) 的关系。  \n   (2) 写出 \\(V_A\\) 与 \\(V_{\\text{总}}\\) 的关系。  \n   (3) 判断 \\(P_AV_A=n_ART\\)、\\(P_AV_{\\text{总}}=n_ART\\)、\\(P_{\\text{总}}V_A=n_ART\\) 是否正确，并说明原因。\n\n2. 根据本章内容解释以下现象：  \n   (1) 高压锅中水更容易把食物煮熟。  \n   (2) 蒸馏时要加入沸石或进行搅拌。  \n   (3) 家用液化气钢瓶有时仍然很重却不易点燃。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 分子间作用力可忽略；分子本身体积相对于气体体积可忽略。\n\n2. \\(8.314\\ \\text{Pa}\\cdot\\text{m}^3\\cdot\\text{mol}^{-1}\\cdot\\text{K}^{-1}\\)。\n\n3. A。高温使分子间作用相对减弱，低压使分子自身体积影响减小。\n\n4. 摩尔分数。\n\n5. 分压：相同 \\(V,T\\)；分体积：相同 \\(p,T\\)。\n\n6. B。高于临界温度时，无论怎样加压都不能液化。\n\n7. 等于。\n\n8. \\(T=0.01^\\circ\\text{C}\\)，\\(p=610.6\\text{ Pa}\\)。\n\n## 二、公式计算题答案\n\n1. 解题思路：用 \\(n=pV/(RT)\\)，选择 \\(R=8.31\\text{ kPa·dm}^3\\text{·mol}^{-1}\\text{·K}^{-1}\\)。  \n   详细步骤：\n   \\[\n   n=\\frac{100\\times24.0}{8.31\\times300}=0.963\\text{ mol}\n   \\]\n   最终答案：\\(0.963\\text{ mol}\\)。  \n   易错提醒：kPa 与 dm\\(^3\\) 可以配套使用，但不能混用 Pa 与 dm\\(^3\\)。\n\n2. 解题思路：用 \\(M=mRT/(pV)\\)。  \n   详细步骤：\\(V=0.190\\text{ dm}^3=0.190\\times10^{-3}\\text{ m}^3\\)。\n   \\[\n   M=\\frac{0.132\\times8.314\\times293}{9.97\\times10^4\\times0.190\\times10^{-3}}\n   \\approx17.0\\text{ g·mol}^{-1}\n   \\]\n   最终答案：\\(M\\approx17.0\\text{ g·mol}^{-1}\\)，可能为 NH\\(_3\\)。  \n   易错提醒：体积必须从 dm\\(^3\\) 换成 m\\(^3\\)。\n\n3. 解题思路：用 \\(P_i=x_iP_{\\text{总}}\\)。  \n   详细步骤：\n   \\[\n   P_{\\text{N}_2}=0.78\\times1.00=0.78\\text{ atm}\n   \\]\n   \\[\n   P_{\\text{O}_2}=0.21\\times1.00=0.21\\text{ atm}\n   \\]\n   最终答案：N\\(_2\\) 分压 \\(0.78\\text{ atm}\\)，O\\(_2\\) 分压 \\(0.21\\text{ atm}\\)。  \n   易错提醒：分压不是质量分数乘总压，本题按体积分数/摩尔分数近似。\n\n4. 解题思路：分压等于摩尔分数乘总压。  \n   详细步骤：\n   \\[\n   P_{\\text{O}_2}=0.02\\times10=0.20\\text{ atm}\n   \\]\n   \\[\n   P_{\\text{N}_2}=0.08\\times10=0.80\\text{ atm}\n   \\]\n   \\[\n   P_{\\text{He}}=0.90\\times10=9.0\\text{ atm}\n   \\]\n   最终答案：O\\(_2\\) 为 \\(0.20\\text{ atm}\\)，N\\(_2\\) 为 \\(0.80\\text{ atm}\\)，He 为 \\(9.0\\text{ atm}\\)。  \n   易错提醒：深处总压大，但生理影响主要看各气体分压。\n\n5. 解题思路：用 Clausius-Clapeyron 两点式。  \n   详细步骤：\n   \\[\n   \\lg\\frac{p_2}{p_1}\n   =\\frac{35000}{2.303\\times8.314}\n   \\left(\\frac{370-350}{370\\times350}\\right)\n   \\]\n   \\[\n   \\lg\\frac{p_2}{40.0}\\approx0.282\n   \\]\n   \\[\n   \\frac{p_2}{40.0}=10^{0.282}\\approx1.91\n   \\]\n   \\[\n   p_2\\approx76.4\\text{ kPa}\n   \\]\n   最终答案：\\(p_2\\approx76.4\\text{ kPa}\\)。  \n   易错提醒：\\(\\Delta H_{\\text{vap}}\\) 要从 kJ·mol\\(^{-1}\\) 换成 J·mol\\(^{-1}\\)，且温度必须用 K。\n\n## 三、判断题答案\n\n1. 正确。理想气体的核心假设就是“无作用力、无体积”。\n\n2. 错误。高于临界温度时，无论怎样加压都不能液化。\n\n3. 错误。必须使用热力学温度 K。\n\n4. 正确。理想混合气体中 \\(P_i=x_iP_{\\text{总}}\\)。\n\n5. 错误。混合气体中正确关系是 \\(P_AV_{\\text{总}}=P_{\\text{总}}V_A=n_ART\\)，不能把分压和分体积直接相乘。\n\n6. 正确。饱和蒸气压在恒温且气液共存时为定值。\n\n7. 正确。高山大气压低，水蒸气压达到外压所需温度降低，所以沸点降低。\n\n8. 错误。真实气体可能因吸引力效应和体积效应相互抵消而 \\(Z=1\\)。\n\n## 四、综合题答案\n\n1. 解析：  \n   (1)\n   \\[\n   P_A=\\frac{n_A}{n_A+n_B}P_{\\text{总}}\n   \\]\n   (2)\n   \\[\n   V_A=\\frac{n_A}{n_A+n_B}V_{\\text{总}}\n   \\]\n   (3) \\(P_AV_A=n_ART\\) 错误，因为 \\(P_A\\) 对应的是组分 A 单独占有总体积 \\(V_{\\text{总}}\\) 时的压力；\\(V_A\\) 对应的是组分 A 在总压 \\(P_{\\text{总}}\\) 下的分体积。  \n   \\[\n   P_AV_{\\text{总}}=n_ART\n   \\]\n   正确。  \n   \\[\n   P_{\\text{总}}V_A=n_ART\n   \\]\n   正确。  \n   核心结论：分压配总体积，分体积配总压。\n\n2. 解析：  \n   (1) 高压锅内外界压力升高，水必须在更高温度下蒸气压才等于外压，因此沸点升高，食物更容易煮熟。  \n   (2) 液体可能形成过热液体，突然产生大量气泡导致爆沸。沸石或搅拌能引入小气泡，提供气化中心，避免爆沸。  \n   (3) 液化气主要成分为丙烷、丁烷，减压后容易气化；但钢瓶中若剩余较多 C\\(_5\\)H\\(_{12}\\)、C\\(_6\\)H\\(_{14}\\) 等较高级烷烃，它们室温下不易气化，所以钢瓶仍重却不易点燃。\n",
    "chemistry_quiz/02-quiz.md":  "# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：广义溶液是由两种或两种以上物质组成的 \\(\\_\\_\\_\\_\\_\\_\\)、\\(\\_\\_\\_\\_\\_\\_\\) 的分散体系。\n\n2. 选择：两种液体互相溶解时，一般把哪一种称为溶剂？  \n   A. 摩尔质量大的  \n   B. 量多的  \n   C. 密度大的  \n   D. 沸点高的\n\n3. 填空：质量摩尔浓度的分母是 \\(\\_\\_\\_\\_\\_\\_\\)，单位通常为 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n4. 选择：下列浓度表示中，分母为“溶液体积”的是  \n   A. 质量分数  \n   B. 摩尔分数  \n   C. 质量摩尔浓度  \n   D. 物质的量浓度\n\n5. 填空：固体溶解度一般随温度升高而 \\(\\_\\_\\_\\_\\_\\_\\)，气体溶解度一般随温度升高而 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：下列属于依数性的是  \n   A. 颜色  \n   B. 黏度  \n   C. 沸点升高  \n   D. 气味\n\n7. 填空：稀溶液的渗透压公式可写为 \\(\\Pi=\\_\\_\\_\\_\\_\\_\\)。\n\n8. 选择：丁铎尔效应主要用于鉴别  \n   A. 真溶液和胶体  \n   B. 酸和碱  \n   C. 强电解质和弱电解质  \n   D. 饱和溶液和不饱和溶液\n\n## 二、公式计算题\n\n1. 将 \\(10.0\\text{ g}\\) NaCl 溶于 \\(100.0\\text{ g}\\) 水中，求 NaCl 的质量分数。\n\n2. 将 \\(10.0\\text{ g}\\) NaCl 溶于 \\(100.0\\text{ g}\\) 水中，已知 \\(M(\\mathrm{NaCl})=58.4\\text{ g·mol}^{-1}\\)，求 NaCl 的质量摩尔浓度。\n\n3. \\(20.0^\\circ\\text{C}\\) 时水的饱和蒸气压为 \\(2.34\\text{ kPa}\\)。将 \\(17.1\\text{ g}\\) 蔗糖 \\((M=342\\text{ g·mol}^{-1})\\) 溶于 \\(100.0\\text{ g}\\) 水中，求溶液蒸气压。\n\n4. 将 \\(2.50\\text{ g}\\) 蔗糖 \\((M=342\\text{ g·mol}^{-1})\\) 溶于 \\(253.0\\text{ g}\\) 水；另将 \\(5.20\\text{ g}\\) 未知非电解质溶于 \\(1000\\text{ g}\\) 水。两溶液在同一温度结冰，求未知物摩尔质量。\n\n5. 人类血浆凝固点为 \\(272.59\\text{ K}\\)，纯水凝固点取 \\(273.15\\text{ K}\\)，水的 \\(K_f=1.86\\text{ K·kg·mol}^{-1}\\)。求血浆的质量摩尔浓度，并估算 \\(310\\text{ K}\\) 时血浆渗透压。稀水溶液取 \\(c\\approx m\\)，\\(R=8.31\\text{ kPa·dm}^3\\text{·mol}^{-1}\\text{·K}^{-1}\\)。\n\n## 三、判断题\n\n1. 质量分数的分母是溶剂质量。\n\n2. 物质的量浓度的单位可写作 mol/L 或 M。\n\n3. 质量摩尔浓度不直接受温度引起的体积变化影响。\n\n4. 固体溶解度受压力影响显著，所以描述固体溶解度必须同时注明温度和压力。\n\n5. 气体溶解度一般随压力增大而增大。\n\n6. 非电解质稀溶液的依数性只与溶质粒子数有关，与溶质本性无关。\n\n7. 强电解质在水中完全电离，因此不需要活度概念。\n\n8. 胶体的丁铎尔效应来自胶粒对光的散射。\n\n## 四、综合题\n\n1. 比较质量分数、质量摩尔浓度、物质的量浓度三种浓度表示方法：分别说明定义、分母是什么、是否受温度体积变化影响，以及常见考法。\n\n2. 用本章知识解释以下现象：  \n   (1) 汽水瓶打开时有大量气泡冒出；  \n   (2) 汽车防冻液可降低结冰温度；  \n   (3) 用激光笔照射 Fe(OH)\\(_3\\) 胶体可看到光路。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 均匀、稳定。溶液的关键词就是均匀分散且能稳定存在。\n\n2. B。液液互溶时通常量多者为溶剂，量少者为溶质。\n\n3. 溶剂质量；mol·kg\\(^{-1}\\)。质量摩尔浓度强调“每 kg 溶剂中含多少 mol 溶质”。\n\n4. D。物质的量浓度 \\(c=n/V_{\\text{溶液}}\\)，分母是溶液体积。\n\n5. 增大；减小。固体一般升温更易溶，气体升温更易逸出。\n\n6. C。依数性包括蒸气压下降、沸点升高、凝固点降低、渗透压。\n\n7. \\(cRT\\)。稀溶液渗透压可写为 \\(\\Pi=cRT\\)。\n\n8. A。丁铎尔效应是胶粒散射光形成光路，可用于区别胶体和真溶液。\n\n## 二、公式计算题答案\n\n1. 解题思路：质量分数为溶质质量除以溶液总质量。  \n   详细步骤：\n   \\[\n   \\omega=\\frac{10.0}{10.0+100.0}\\times100\\%=9.09\\%\\approx9.1\\%\n   \\]\n   最终答案：\\(9.1\\%\\)。  \n   易错提醒：分母是溶液质量，不是水的质量。\n\n2. 解题思路：先求 NaCl 物质的量，再除以溶剂质量 kg。  \n   详细步骤：\n   \\[\n   n(\\mathrm{NaCl})=\\frac{10.0}{58.4}=0.171\\text{ mol}\n   \\]\n   \\[\n   m=\\frac{0.171}{100.0\\times10^{-3}}=1.71\\text{ mol·kg}^{-1}\n   \\]\n   最终答案：\\(1.71\\text{ mol·kg}^{-1}\\)。  \n   易错提醒：分母是 \\(0.1000\\text{ kg}\\) 水。\n\n3. 解题思路：用 Raoult 定律 \\(p=p^0x_1\\)，其中 \\(x_1\\) 是水的摩尔分数。  \n   详细步骤：\n   \\[\n   n(\\text{蔗糖})=\\frac{17.1}{342}=0.0500\\text{ mol}\n   \\]\n   \\[\n   n(\\mathrm{H_2O})=\\frac{100.0}{18.0}=5.56\\text{ mol}\n   \\]\n   \\[\n   x_{\\mathrm{H_2O}}=\\frac{5.56}{5.56+0.0500}=0.991\n   \\]\n   \\[\n   p=2.34\\times0.991=2.32\\text{ kPa}\n   \\]\n   最终答案：约 \\(2.32\\text{ kPa}\\)。  \n   易错提醒：Raoult 定律中乘的是溶剂摩尔分数。\n\n4. 解题思路：同一温度结冰说明两溶液 \\(\\Delta T_f\\) 相同；同一溶剂时 \\(K_f\\) 相同，因此质量摩尔浓度相同。  \n   详细步骤：\n   \\[\n   m_{\\text{蔗糖}}=\\frac{2.50/342}{253.0\\times10^{-3}}\n   \\]\n   \\[\n   m_{\\text{未知}}=\\frac{5.20/M}{1000\\times10^{-3}}\n   \\]\n   令二者相等：\n   \\[\n   \\frac{2.50/342}{0.253}=\\frac{5.20/M}{1.000}\n   \\]\n   \\[\n   M\\approx180\\text{ g·mol}^{-1}\n   \\]\n   最终答案：\\(180\\text{ g·mol}^{-1}\\)。  \n   易错提醒：两溶液同温结冰不是质量相同，而是质量摩尔浓度相同。\n\n5. 解题思路：先用凝固点降低求 \\(m\\)，再用 \\(\\Pi=cRT\\) 估算渗透压。  \n   详细步骤：\n   \\[\n   \\Delta T_f=273.15-272.59=0.56\\text{ K}\n   \\]\n   \\[\n   m=\\frac{\\Delta T_f}{K_f}=\\frac{0.56}{1.86}=0.301\\text{ mol·kg}^{-1}\n   \\]\n   稀水溶液近似：\n   \\[\n   c\\approx m=0.301\\text{ mol·dm}^{-3}\n   \\]\n   \\[\n   \\Pi=cRT=0.301\\times8.31\\times310=775\\text{ kPa}\n   \\]\n   最终答案：\\(m=0.301\\text{ mol·kg}^{-1}\\)，\\(\\Pi\\approx775\\text{ kPa}\\)。  \n   易错提醒：只有稀水溶液才可近似 \\(c\\approx m\\)。\n\n## 三、判断题答案\n\n1. 错误。质量分数分母是溶液质量。\n\n2. 正确。物质的量浓度单位为 mol/L，常用 M 表示。\n\n3. 正确。质量摩尔浓度分母是溶剂质量，质量不随温度体积变化。\n\n4. 错误。固体溶解度压力影响极小，一般只注明温度。\n\n5. 正确。气体溶解度一般随压力增大而增大。\n\n6. 正确。这正是依数性的核心含义。\n\n7. 错误。强电解质完全电离，但离子间作用显著，需要活度描述有效浓度。\n\n8. 正确。丁铎尔效应由胶粒对光线散射产生。\n\n## 四、综合题答案\n\n1. 解析：  \n   质量分数：\n   \\[\n   \\omega=\\frac{m_{\\text{溶质}}}{m_{\\text{溶液}}}\n   \\]\n   分母是溶液质量，无量纲，常考“10 g 溶质加 100 g 水不是 10%”。  \n   质量摩尔浓度：\n   \\[\n   m=\\frac{n_{\\text{溶质}}}{m_{\\text{溶剂}}(\\text{kg})}\n   \\]\n   分母是溶剂质量，不受温度导致的体积变化影响，依数性计算常用。  \n   物质的量浓度：\n   \\[\n   c=\\frac{n_{\\text{溶质}}}{V_{\\text{溶液}}}\n   \\]\n   分母是溶液体积，会受温度影响，常用于配制溶液和渗透压计算。\n\n2. 解析：  \n   (1) 汽水中 CO\\(_2\\) 是气体溶质，气体溶解度随压力增大而增大。开瓶后压力降低，CO\\(_2\\) 溶解度下降，于是大量气泡逸出。  \n   (2) 防冻液含乙二醇等非电解质溶质，溶液发生凝固点降低，浓度越大凝固点越低，因此可降低结冰温度。  \n   (3) Fe(OH)\\(_3\\) 胶体中胶粒能散射光，激光通过时可从侧面看到浑浊发亮的光柱，即丁铎尔效应。\n",
    "chemistry_quiz/03-quiz.md":  "# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：本章符号约定中，体系吸热 \\(Q\\) 为 \\(\\_\\_\\_\\_\\_\\_\\)，体系放热 \\(Q\\) 为 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n2. 选择：下列属于状态函数的是  \n   A. \\(Q\\)  \n   B. \\(W\\)  \n   C. \\(H\\)  \n   D. 途径\n\n3. 填空：封闭体系与环境之间可以交换 \\(\\_\\_\\_\\_\\_\\_\\)，但不交换 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n4. 选择：恒压且只做体积功时，体系吸收的热量等于  \n   A. \\(\\Delta U\\)  \n   B. \\(\\Delta H\\)  \n   C. \\(\\Delta S\\)  \n   D. \\(\\Delta G\\)\n\n5. 填空：稳定态单质的标准生成焓为 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：气体分子数增加的反应，一般 \\(\\Delta S\\)  \n   A. 大于 0  \n   B. 小于 0  \n   C. 等于 0  \n   D. 无法判断且没有规律\n\n7. 填空：等温过程 Gibbs-Helmholtz 方程为 \\(\\Delta G=\\_\\_\\_\\_\\_\\_\\)。\n\n8. 选择：当 \\(\\Delta G\u003c0\\) 时，反应在该条件下  \n   A. 正向自发  \n   B. 正向非自发  \n   C. 平衡  \n   D. 一定瞬间完成\n\n## 二、公式计算题\n\n1. 某体系由 A 态到 B 态，沿途径 I 放热 \\(100\\text{ J}\\)，环境对体系做功 \\(50\\text{ J}\\)。求 \\(\\Delta U\\)。\n\n2. 反应 \\(\\mathrm{H_2(g)+0.5O_2(g)=H_2O(g)}\\) 在 \\(373\\text{ K}\\) 下 \\(\\Delta H=-241.8\\text{ kJ·mol}^{-1}\\)。求 \\(\\Delta U\\)。取 \\(R=8.31\\times10^{-3}\\text{ kJ·mol}^{-1}\\text{·K}^{-1}\\)。\n\n3. 已知：\n\\[\n\\mathrm{C(石墨)+O_2(g)=CO_2(g)}\\quad \\Delta H=-393.5\\text{ kJ·mol}^{-1}\n\\]\n\\[\n\\mathrm{CO(g)+0.5O_2(g)=CO_2(g)}\\quad \\Delta H=-283.0\\text{ kJ·mol}^{-1}\n\\]\n求：\n\\[\n\\mathrm{C(石墨)+0.5O_2(g)=CO(g)}\n\\]\n的 \\(\\Delta H\\)。\n\n4. 已知反应：\n\\[\n\\mathrm{CaCO_3(s)=CaO(s)+CO_2(g)}\n\\]\n且 \\(S^\\theta(\\mathrm{CaCO_3})=91.7\\)，\\(S^\\theta(\\mathrm{CaO})=38.1\\)，\\(S^\\theta(\\mathrm{CO_2})=213.8\\)，单位均为 J·mol\\(^{-1}\\)·K\\(^{-1}\\)。求 \\(\\Delta S^\\theta\\)。\n\n5. 某反应 \\(\\Delta H^\\theta=+182.6\\text{ kJ·mol}^{-1}\\)，\\(\\Delta S^\\theta=+0.0248\\text{ kJ·mol}^{-1}\\text{·K}^{-1}\\)。求转变温度 \\(T_{\\text{转}}\\)，并判断低温、高温下自发性。\n\n## 三、判断题\n\n1. 热和功只存在于变化过程中，不是状态函数。\n\n2. 孤立体系既不与环境交换物质，也不与环境交换能量。\n\n3. 可逆过程是真实过程，很容易在实验中完全实现。\n\n4. 恒容且无其他功时，\\(Q_V=\\Delta U\\)。\n\n5. 反应式反过来写时，\\(\\Delta H\\) 的数值和符号都不变。\n\n6. 键焓越大，断开该键所需吸收的热量越多。\n\n7. 熵增原理可直接写作：封闭体系 \\(\\Delta S_{\\text{体系}}\u003e0\\) 必自发。\n\n8. \
