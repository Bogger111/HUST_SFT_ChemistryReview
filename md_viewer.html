<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown 资料浏览</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #d8e0ea;
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --code-bg: #f1f5f9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.7;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246, 248, 251, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .wrap {
      width: min(1240px, calc(100% - 28px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 32px);
      letter-spacing: 0;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover,
    a:focus {
      text-decoration: underline;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 16px;
      padding: 18px 0 40px;
    }

    aside,
    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    aside {
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 98px);
      overflow: auto;
      padding: 12px;
    }

    article {
      min-height: 70vh;
      padding: clamp(16px, 3vw, 30px);
      overflow-wrap: anywhere;
    }

    .group {
      margin-bottom: 14px;
    }

    .group-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .file-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .file-button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 8px 10px;
      background: transparent;
      color: var(--text);
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .file-button:hover,
    .file-button:focus {
      border-color: var(--line);
      background: var(--primary-soft);
      outline: none;
    }

    .file-button.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
    }

    .doc-title {
      margin-top: 0;
    }

    .muted {
      color: var(--muted);
    }

    .markdown h1,
    .markdown h2,
    .markdown h3,
    .markdown h4 {
      line-height: 1.3;
      letter-spacing: 0;
    }

    .markdown h1 { font-size: 30px; }
    .markdown h2 {
      margin-top: 28px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
      font-size: 24px;
    }
    .markdown h3 { margin-top: 22px; font-size: 20px; }
    .markdown h4 { margin-top: 18px; font-size: 17px; }

    .markdown p {
      margin: 10px 0;
    }

    .markdown ul,
    .markdown ol {
      padding-left: 24px;
    }

    .markdown li {
      margin: 4px 0;
    }

    .markdown code {
      border-radius: 5px;
      padding: 2px 5px;
      background: var(--code-bg);
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 0.94em;
    }

    .markdown pre {
      overflow: auto;
      border-radius: 8px;
      padding: 12px;
      background: var(--code-bg);
    }

    .markdown pre code {
      padding: 0;
      background: transparent;
    }

    .markdown blockquote {
      margin: 12px 0;
      padding: 8px 12px;
      border-left: 4px solid var(--line);
      color: var(--muted);
      background: #fafcff;
    }

    .markdown details {
      margin: 12px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
    }

    .markdown summary {
      cursor: pointer;
      font-weight: 700;
    }

    .math {
      font-family: Consolas, "SFMono-Regular", monospace;
      white-space: pre-wrap;
    }

    .error {
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px;
      background: #fef2f2;
      color: #991b1b;
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <h1>Markdown 资料浏览</h1>
      <a href="index.html">返回首页</a>
    </div>
  </header>

  <main class="wrap layout">
    <aside id="fileNav" aria-label="Markdown 文件列表"></aside>
    <article>
      <p class="muted" id="filePath">正在加载...</p>
      <div class="markdown" id="content"></div>
    </article>
  </main>

  <script>
    const groups = [
      {
        title: "章节复习",
        files: [
          ["01 第一章复习", "chemistry_review/01-chemistry_review.md"],
          ["02 第二章复习", "chemistry_review/02-chemistry_review.md"],
          ["03 第三章复习", "chemistry_review/03-chemistry_review.md"],
          ["04 第四章复习", "chemistry_review/04-chemistry_review.md"],
          ["05 第五章复习", "chemistry_review/05-chemistry_review.md"],
          ["07 第七章复习", "chemistry_review/07-chemistry_review.md"],
          ["08 第八章复习", "chemistry_review/08-chemistry_review.md"],
          ["09 第九章复习", "chemistry_review/09-chemistry_review.md"],
          ["10 第十章复习", "chemistry_review/10-chemistry_review.md"],
          ["13 有机/高分子复习", "chemistry_review/13-chemistry_review.md"]
        ]
      },
      {
        title: "章节测验",
        files: [
          ["01 第一章测验", "chemistry_quiz/01-quiz.md"],
          ["02 第二章测验", "chemistry_quiz/02-quiz.md"],
          ["03 第三章测验", "chemistry_quiz/03-quiz.md"],
          ["04 第四章测验", "chemistry_quiz/04-quiz.md"],
          ["05 第五章测验", "chemistry_quiz/05-quiz.md"],
          ["07 第七章测验", "chemistry_quiz/07-quiz.md"],
          ["08 第八章测验", "chemistry_quiz/08-quiz.md"],
          ["09 第九章测验", "chemistry_quiz/09-quiz.md"],
          ["10 第十章测验", "chemistry_quiz/10-quiz.md"],
          ["13 有机/高分子测验", "chemistry_quiz/13-quiz.md"]
        ]
      },
      {
        title: "例题",
        files: [
          ["01 例题", "chemistry_example/01_markdown.md"],
          ["02 例题", "chemistry_example/02_markdown.md"],
          ["03 例题", "chemistry_example/03_markdown.md"],
          ["04 例题", "chemistry_example/04_markdown.md"]
        ]
      }
    ];

    const nav = document.getElementById("fileNav");
    const filePath = document.getElementById("filePath");
    const content = document.getElementById("content");

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderInline(value) {
      return escapeHtml(value)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*]+)\*/g, "<em>$1</em>")
        .replace(/\$([^$]+)\$/g, '<span class="math">$1</span>')
        .replace(/&lt;(\/?details)&gt;/g, "<$1>")
        .replace(/&lt;summary&gt;([^<]+)&lt;\/summary&gt;/g, "<summary>$1</summary>");
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let inCode = false;
      let inUl = false;
      let inOl = false;
      let inParagraph = false;

      function closeParagraph() {
        if (inParagraph) {
          html.push("</p>");
          inParagraph = false;
        }
      }

      function closeLists() {
        if (inUl) {
          html.push("</ul>");
          inUl = false;
        }
        if (inOl) {
          html.push("</ol>");
          inOl = false;
        }
      }

      for (const line of lines) {
        if (line.trim().startsWith("```")) {
          closeParagraph();
          closeLists();
          html.push(inCode ? "</code></pre>" : "<pre><code>");
          inCode = !inCode;
          continue;
        }

        if (inCode) {
          html.push(escapeHtml(line) + "\n");
          continue;
        }

        const trimmed = line.trim();

        if (!trimmed) {
          closeParagraph();
          closeLists();
          continue;
        }

        const heading = trimmed.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          closeParagraph();
          closeLists();
          const level = heading[1].length;
          html.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
          continue;
        }

        if (/^<\/?details>$/.test(trimmed) || /^<summary>.*<\/summary>$/.test(trimmed)) {
          closeParagraph();
          closeLists();
          html.push(renderInline(trimmed));
          continue;
        }

        const ul = trimmed.match(/^[-*]\s+(.+)$/);
        if (ul) {
          closeParagraph();
          if (inOl) {
            html.push("</ol>");
            inOl = false;
          }
          if (!inUl) {
            html.push("<ul>");
            inUl = true;
          }
          html.push(`<li>${renderInline(ul[1])}</li>`);
          continue;
        }

        const ol = trimmed.match(/^\d+\.\s+(.+)$/);
        if (ol) {
          closeParagraph();
          if (inUl) {
            html.push("</ul>");
            inUl = false;
          }
          if (!inOl) {
            html.push("<ol>");
            inOl = true;
          }
          html.push(`<li>${renderInline(ol[1])}</li>`);
          continue;
        }

        if (trimmed.startsWith("> ")) {
          closeParagraph();
          closeLists();
          html.push(`<blockquote>${renderInline(trimmed.slice(2))}</blockquote>`);
          continue;
        }

        closeLists();
        if (!inParagraph) {
          html.push("<p>");
          inParagraph = true;
        } else {
          html.push("<br>");
        }
        html.push(renderInline(trimmed));
      }

      closeParagraph();
      closeLists();
      if (inCode) {
        html.push("</code></pre>");
      }
      return html.join("\n");
    }

    function setActive(path) {
      for (const button of nav.querySelectorAll("button")) {
        button.classList.toggle("active", button.dataset.path === path);
      }
    }

    async function loadFile(path) {
      setActive(path);
      filePath.textContent = path;
      content.innerHTML = "<p class=\"muted\">正在加载...</p>";
      const params = new URLSearchParams(location.search);
      params.set("file", path);
      history.replaceState(null, "", `${location.pathname}?${params.toString()}`);

      try {
        const response = await fetch(encodeURI(path));
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const markdown = await response.text();
        content.innerHTML = renderMarkdown(markdown);
      } catch (error) {
        content.innerHTML = `<div class="error">无法读取这个 Markdown 文件：${escapeHtml(error.message)}</div>`;
      }
    }

    function buildNav() {
      nav.innerHTML = groups.map(group => `
        <section class="group">
          <h2 class="group-title">${group.title}</h2>
          <ul class="file-list">
            ${group.files.map(([label, path]) => `
              <li><button class="file-button" type="button" data-path="${path}">${label}</button></li>
            `).join("")}
          </ul>
        </section>
      `).join("");

      nav.addEventListener("click", event => {
        const button = event.target.closest("button[data-path]");
        if (button) {
          loadFile(button.dataset.path);
        }
      });
    }

    buildNav();

    const allFiles = groups.flatMap(group => group.files.map(file => file[1]));
    const requestedFile = new URLSearchParams(location.search).get("file");
    loadFile(allFiles.includes(requestedFile) ? requestedFile : allFiles[0]);
  </script>
</body>
</html>
