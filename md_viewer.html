<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown 资料浏览</title>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"], ["$", "$"]],
        displayMath: [["\\[", "\\]"], ["$$", "$$"]],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    :root {
      --bg: #f3fbff;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-solid: #ffffff;
      --text: #203949;
      --muted: #6f8796;
      --line: #d4edf7;
      --primary: #7bbfe5;
      --primary-dark: #4f9bc8;
      --primary-soft: #eef9fd;
      --code-bg: #f1faff;
      --shadow: 0 16px 38px rgba(115, 176, 210, 0.14);
      --radius: 8px;
      color-scheme: light;
    }

    :root[data-theme="dark"] {
      --bg: #101820;
      --panel: rgba(24, 36, 46, 0.9);
      --panel-solid: #182630;
      --text: #e8f5fb;
      --muted: #9fb6c4;
      --line: #314957;
      --primary: #93cfe8;
      --primary-dark: #bde8f6;
      --primary-soft: #223744;
      --code-bg: #1d303c;
      --shadow: 0 16px 38px rgba(0, 0, 0, 0.32);
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 0%, rgba(202, 235, 248, 0.7), transparent 30%),
        linear-gradient(160deg, var(--bg), #ffffff 56%, #e9f7fc);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.72;
    }

    :root[data-theme="dark"] body {
      background:
        radial-gradient(circle at 15% 0%, rgba(90, 137, 156, 0.22), transparent 30%),
        linear-gradient(160deg, var(--bg), #0f171e 56%, #172631);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(212, 237, 247, 0.92);
      background: rgba(243, 251, 255, 0.92);
      backdrop-filter: blur(12px);
    }

    :root[data-theme="dark"] header {
      border-color: rgba(73, 105, 121, 0.78);
      background: rgba(16, 24, 32, 0.92);
    }

    .progress {
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #8ecae6, #c9edf7);
    }

    .wrap {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .theme-toggle {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px 12px;
      background: var(--panel-solid);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .theme-toggle:hover,
    .theme-toggle:focus-visible {
      border-color: var(--primary);
      background: var(--primary-soft);
      outline: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    a {
      color: var(--primary-dark);
      font-weight: 750;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      color: var(--primary);
      outline: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 16px;
      padding: 18px 0 44px;
    }

    aside,
    article {
      border: 1px solid rgba(195, 229, 242, 0.9);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    :root[data-theme="dark"] aside,
    :root[data-theme="dark"] article {
      border-color: rgba(73, 105, 121, 0.78);
    }

    aside {
      align-self: start;
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 98px);
      overflow: auto;
      padding: 12px;
    }

    article {
      min-height: 70vh;
      padding: clamp(18px, 3vw, 34px);
      overflow-wrap: anywhere;
    }

    .search {
      width: 100%;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: var(--panel-solid);
      color: var(--text);
      font: inherit;
    }

    .search:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(123, 191, 229, 0.18);
      outline: none;
    }

    .group {
      margin-bottom: 14px;
    }

    .group-title {
      margin: 0 0 8px;
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 900;
    }

    .file-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .file-button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 9px 10px;
      background: transparent;
      color: var(--text);
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .file-button:hover,
    .file-button:focus-visible {
      border-color: var(--line);
      background: var(--primary-soft);
      outline: none;
      transform: translateX(2px);
    }

    .file-button.active {
      border-color: #b8e1f1;
      background: linear-gradient(135deg, #eef9fd, #ffffff);
      color: var(--primary-dark);
      font-weight: 850;
      box-shadow: inset 3px 0 0 var(--primary);
    }

    :root[data-theme="dark"] .file-button.active {
      background: linear-gradient(135deg, #223744, #182630);
    }

    .doc-meta {
      display: inline-flex;
      max-width: 100%;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 7px 10px;
      background: var(--primary-soft);
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .muted {
      color: var(--muted);
    }

    .markdown h1,
    .markdown h2,
    .markdown h3,
    .markdown h4 {
      color: #113957;
      line-height: 1.3;
      letter-spacing: 0;
    }

    :root[data-theme="dark"] .markdown h1,
    :root[data-theme="dark"] .markdown h2,
    :root[data-theme="dark"] .markdown h3,
    :root[data-theme="dark"] .markdown h4 {
      color: #d7f0fb;
    }

    .markdown h1 { font-size: 30px; }
    .markdown h2 {
      margin-top: 30px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
      font-size: 24px;
    }
    .markdown h3 { margin-top: 22px; font-size: 20px; }
    .markdown h4 { margin-top: 18px; font-size: 17px; }

    .markdown p { margin: 10px 0; }
    .markdown ul,
    .markdown ol { padding-left: 24px; }
    .markdown li { margin: 5px 0; }

    .markdown code {
      border: 1px solid #d8eff8;
      border-radius: 6px;
      padding: 2px 6px;
      background: var(--code-bg);
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 0.94em;
    }

    .markdown pre {
      overflow: auto;
      border: 1px solid #d8eff8;
      border-radius: var(--radius);
      padding: 13px;
      background: #f4fbff;
    }

    :root[data-theme="dark"] .markdown pre {
      border-color: #314957;
      background: #152630;
    }

    .markdown pre code {
      border: 0;
      padding: 0;
      background: transparent;
    }

    .markdown blockquote {
      margin: 14px 0;
      padding: 9px 12px;
      border-left: 4px solid var(--primary);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--muted);
      background: #f1faff;
    }

    :root[data-theme="dark"] .markdown blockquote {
      background: #1d303c;
    }

    .markdown .table-wrap {
      overflow-x: auto;
      margin: 16px 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .markdown table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      background: #fff;
      font-size: 14px;
    }

    :root[data-theme="dark"] .markdown table {
      background: #182630;
    }

    .markdown th,
    .markdown td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 9px 10px;
      vertical-align: top;
      text-align: left;
    }

    .markdown th:last-child,
    .markdown td:last-child {
      border-right: 0;
    }

    .markdown tr:last-child td {
      border-bottom: 0;
    }

    .markdown thead th {
      background: var(--primary-soft);
      color: #113957;
      font-weight: 850;
    }

    .blank-input,
    .formula-answer-input {
      width: min(180px, 100%);
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 6px 9px;
      background: var(--panel-solid);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      vertical-align: middle;
    }

    .blank-input {
      display: inline-block;
      margin: 0 4px;
    }

    .blank-input:focus,
    .formula-answer-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(123, 191, 229, 0.18);
      outline: none;
    }

    .formula-answer-box {
      display: grid;
      gap: 5px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
    }

    .formula-answer-box span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .blank-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin: 0 0 16px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--primary-soft);
    }

    .blank-toolbar button {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px 10px;
      background: var(--panel-solid);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .blank-toolbar button:hover,
    .blank-toolbar button:focus-visible {
      border-color: var(--primary);
      outline: none;
    }

    :root[data-theme="dark"] .markdown thead th {
      color: #d7f0fb;
    }

    .markdown details {
      margin: 14px 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: #fff;
    }

    :root[data-theme="dark"] .markdown details {
      background: #182630;
    }

    .markdown summary {
      cursor: pointer;
      font-weight: 800;
    }

    .error {
      border: 1px solid #fecaca;
      border-radius: var(--radius);
      padding: 12px;
      background: #fef2f2;
      color: #991b1b;
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      aside {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 620px) {
      .wrap { width: min(100% - 22px, 1240px); }
      article { padding: 16px; }
    }
  </style>
</head>

  <header>
    <div class="wrap topbar">
      <h1>Markdown 资料浏览</h1>
      <div class="top-actions">
        <a href="index.html">返回首页</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换深色模式">深色模式</button>

  <script>
    (function initTheme() {
      const key = "chemistry-theme";
      const root = document.documentElement;
      const toggle = document.querySelector("[data-theme-toggle]");
      let saved = null;
      try { saved = localStorage.getItem(key); } catch (error) {}
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      const initial = saved || (prefersDark ? "dark" : "light");

      function applyTheme(theme) {
        root.dataset.theme = theme;
        if (toggle) {
          toggle.textContent = theme === "dark" ? "浅色模式" : "深色模式";
          toggle.setAttribute("aria-pressed", String(theme === "dark"));
        }
      }

      applyTheme(initial);
      if (toggle) {
        toggle.addEventListener("click", () => {
          const next = root.dataset.theme === "dark" ? "light" : "dark";
          try { localStorage.setItem(key, next); } catch (error) {}
          applyTheme(next);
        });
      }
    })();

    "chemistry_summary/constants-handbook.md":  "# 大学化学常用常数速记表\n\n这份只整理考试、作业和公式计算里最常用的常数。优先背“常用值 + 单位 + 什么时候用”，不要只背数字。\n\n## 一、最优先记忆\n\n| 常数 | 符号 | 常用值 | 常见用途 | 易错提醒 |\n|---|---|---:|---|---|\n| 摩尔气体常数 | \\(R\\) | \\(8.314\\ \\mathrm{J\\cdot mol^{-1}\\cdot K^{-1}}\\) | 热力学、电化学、气体、Arrhenius | 与 J、Pa·m\\(^3\\) 配套 |\n| 摩尔气体常数 | \\(R\\) | \\(8.314\\ \\mathrm{kPa\\cdot L\\cdot mol^{-1}\\cdot K^{-1}}\\) | \\(pV=nRT\\) 中 \\(p\\) 用 kPa、\\(V\\) 用 L | \\(1\\ \\mathrm{L}=1\\ \\mathrm{dm^3}\\) |\n| 摩尔气体常数 | \\(R\\) | \\(0.08206\\ \\mathrm{L\\cdot atm\\cdot mol^{-1}\\cdot K^{-1}}\\) | 气体题中压力用 atm | 不要和 kPa 混用 |\n| Avogadro 常数 | \\(N_A\\) | \\(6.022\\times10^{23}\\ \\mathrm{mol^{-1}}\\) | 粒子数与物质的量换算 | \\(N=nN_A\\) |\n| Faraday 常数 | \\(F\\) | \\(9.6485\\times10^4\\ \\mathrm{C\\cdot mol^{-1}}\\) | \\(\\Delta G=-nFE\\)、电解计算 | 可近似 \\(9.65\\times10^4\\) |\n| 元电荷 | \\(e\\) | \\(1.602\\times10^{-19}\\ \\mathrm{C}\\) | 电荷、电势能、电子加速 | \\(F=N_Ae\\) |\n| Planck 常数 | \\(h\\) | \\(6.626\\times10^{-34}\\ \\mathrm{J\\cdot s}\\) | \\(E=h\\nu\\)、\\(\\lambda=h/p\\) | 单位不能漏 \\(s\\) |\n| 光速 | \\(c\\) | \\(2.998\\times10^8\\ \\mathrm{m\\cdot s^{-1}}\\) | \\(\\Delta E=hc/\\lambda\\) | nm 要换算成 m |\n| Boltzmann 常数 | \\(k_B\\) | \\(1.381\\times10^{-23}\\ \\mathrm{J\\cdot K^{-1}}\\) | 微观热运动、统计热力学 | \\(R=N_Ak_B\\) |\n\n## 二、气体和标准状态\n\n| 常数/换算 | 常用值 | 用法 |\n|---|---:|---|\n| \\(0^\\circ\\mathrm{C}\\) | \\(273.15\\ \\mathrm{K}\\) | \\(T=t+273.15\\) |\n| \\(25^\\circ\\mathrm{C}\\) | \\(298.15\\ \\mathrm{K}\\) | 常温、298 K 计算 |\n| 标准大气压 | \\(1\\ \\mathrm{atm}=101325\\ \\mathrm{Pa}\\) | 气体压力换算 |\n| 标准大气压 | \\(1\\ \\mathrm{atm}=101.325\\ \\mathrm{kPa}\\) | \\(R=8.314\\ \\mathrm{kPa\\cdot L}\\) 时常用 |\n| 汞柱压力 | \\(1\\ \\mathrm{atm}=760\\ \\mathrm{mmHg}\\) | 蒸气压、气压换算 |\n| 标准压力 | \\(p^\\theta=100\\ \\mathrm{kPa}=1\\ \\mathrm{bar}\\) | 标准平衡常数、标准态 |\n| 标况气体摩尔体积 | \\(22.4\\ \\mathrm{L\\cdot mol^{-1}}\\) | \\(0^\\circ\\mathrm{C}\\)、1 atm 近似 |\n| \\(1\\ \\mathrm{L}\\) | \\(1\\ \\mathrm{dm^3}=10^{-3}\\ \\mathrm{m^3}\\) | 体积单位换算 |\n| \\(1\\ \\mathrm{mL}\\) | \\(1\\ \\mathrm{cm^3}\\) | 溶液体积换算 |\n\n## 三、溶液和酸碱常数\n\n| 常数 | 常用值 | 常见用途 | 易错提醒 |\n|---|---:|---|---|\n| 标准浓度 | \\(c^\\theta=1\\ \\mathrm{mol\\cdot L^{-1}}\\) | 标准平衡常数、反应商 | 热力学表达式用相对浓度 |\n| 水的离子积 | \\(K_w=1.0\\times10^{-14}\\) | 298 K 水溶液酸碱计算 | 温度改变，\\(K_w\\) 会变 |\n| \\(pK_w\\) | \\(14.00\\) | 298 K 下 \\(pH+pOH=14\\) | 只严格适用于 298 K |\n| 水的摩尔质量 | \\(M(\\mathrm{H_2O})=18.0\\ \\mathrm{g\\cdot mol^{-1}}\\) | 溶液、摩尔分数、依数性 | 常用 18.0 |\n| 水的密度 | \\(\\rho\\approx1.00\\ \\mathrm{g\\cdot mL^{-1}}\\) | 稀水溶液近似 | 温度和浓度变化时只是近似 |\n| 水的沸点升高常数 | \\(K_b=0.512\\ \\mathrm{K\\cdot kg\\cdot mol^{-1}}\\) | \\(\\Delta T_b=K_bm\\) | 非电解质稀溶液 |\n| 水的凝固点降低常数 | \\(K_f=1.86\\ \\mathrm{K\\cdot kg\\cdot mol^{-1}}\\) | \\(\\Delta T_f=K_fm\\) | 非电解质稀溶液 |\n\n## 四、电化学常数\n\n| 常数/公式项 | 常用值 | 常见用途 | 易错提醒 |\n|---|---:|---|---|\n| Faraday 常数 | \\(F=96485\\ \\mathrm{C\\cdot mol^{-1}}\\) | \\(\\Delta G=-nFE\\)、电解 | \\(n\\) 是转移电子数 |\n| \\(RT/F\\) at 298 K | \\(0.02569\\ \\mathrm{V}\\) | Nernst 方程自然对数形式 | 用 \\(\\ln\\) |\n| \\(2.303RT/F\\) at 298 K | \\(0.05916\\ \\mathrm{V}\\) | Nernst 方程常用十进对数形式 | 用 \\(\\lg\\) |\n| Nernst 常数 | \\(\\frac{0.0592}{n}\\) | \\(E=E^\\theta-\\frac{0.0592}{n}\\lg Q\\) | 只适用于 298 K |\n| 标准氢电极 | \\(E^\\theta=0\\ \\mathrm{V}\\) | 电极电势基准 | 是人为规定的基准 |\n\n## 五、原子结构和光谱常数\n\n| 常数 | 常用值 | 常见用途 | 易错提醒 |\n|---|---:|---|---|\n| Planck 常数 | \\(h=6.626\\times10^{-34}\\ \\mathrm{J\\cdot s}\\) | \\(E=h\\nu\\)、\\(\\lambda=h/mv\\) | 用 SI 单位 |\n| 光速 | \\(c=2.998\\times10^8\\ \\mathrm{m\\cdot s^{-1}}\\) | \\(c=\\lambda\\nu\\)、\\(E=hc/\\lambda\\) | 波长单位要统一 |\n| \\(hc\\) | \\(1240\\ \\mathrm{eV\\cdot nm}\\) | 快速算光子波长/能量 | 只在 eV 和 nm 配套时用 |\n| Rydberg 常数 | \\(R_H=1.097\\times10^7\\ \\mathrm{m^{-1}}\\) | 氢原子光谱 | \\(\\lambda\\) 用 m |\n| Bohr 半径 | \\(a_0=52.9\\ \\mathrm{pm}\\) | \\(r_n=a_0n^2\\) | 氢原子或类氢离子近似 |\n| 氢原子基态能量 | \\(-13.6\\ \\mathrm{eV}\\) | \\(E_n=-13.6/n^2\\ \\mathrm{eV}\\) | 氢原子专用 |\n| 电子质量 | \\(m_e=9.109\\times10^{-31}\\ \\mathrm{kg}\\) | 电子 de Broglie 波长 | 题目常给     "chemistry_summary/concept-fill-blanks.md":  "# 大学化学全章概念填空\n\n使用方法：先遮住每章答案区，把空格补完；再用答案区核对关键词。空格优先考定义、适用条件、易混点和判断依据。\n\n## 第一章 气体与液体\n\n1. 理想气体模型假定气体分子间没有__________，分子本身的__________可以忽略。\n2. 真实气体在__________较高、__________较低时更接近理想气体。\n3. 气体压力来自气体分子对容器壁的__________。\n4. 道尔顿分压定律指出，混合气体总压等于各组分__________之和。\n5. 分压定义要求某组分单独占有混合气体的__________和相同__________。\n6. 阿玛格分体积定律指出，混合气体总体积等于各组分__________之和。\n7. 分体积定义要求某组分处在混合气体的相同__________和相同__________下。\n8. 压缩系数 \\(Z\\) 用来表示真实气体相对__________气体的偏离程度。\n9. 当 \\(Z<1\\) 时，主要说明分子间__________作用占主导。\n10. 当 \\(Z>1\\) 时，主要说明分子本身__________效应占主导。\n11. 临界温度是气体能够被液化的__________温度；高于它，加压也不能液化。\n12. 蒸发发生在液体__________，沸腾发生在液体__________和__________。\n13. 沸腾条件是液体的__________等于外界压力。\n14. 饱和蒸气压主要由__________和物质本性决定，不由液体多少决定。\n15. 相是体系中物理性质和化学性质__________的均匀部分。\n16. 水的三相点对应冰、水、水蒸气三相__________。\n\n<details>\n<summary>第一章答案</summary>\n\n1. 相互作用力；体积\n2. 温度；压力\n3. 碰撞\n4. 分压\n5. 总体积；温度\n6. 分体积\n7. 压力；温度\n8. 理想\n9. 吸引\n10. 体积\n11. 最高\n12. 表面；表面；内部\n13. 饱和蒸气压\n14. 温度\n15. 均一\n16. 共存\n\n</details>\n\n## 第二章 溶液\n\n1. 溶液是由一种或多种物质分散到另一种物质中形成的__________体系。\n2. 溶液中含量较多、起分散作用的组分通常称为__________。\n3. 质量分数的分母是__________质量，不是溶剂质量。\n4. 摩尔分数必须用各组分的__________计算，不能直接用质量。\n5. 质量摩尔浓度的分母是__________质量，单位必须换成 kg。\n6. 物质的量浓度的分母是__________体积，常用单位是 mol·L\\(^{-1}\\)。\n7. 饱和溶液是在一定温度下溶解和析出达到__________平衡的溶液。\n8. “相似相溶”指极性溶质易溶于__________溶剂，非极性溶质易溶于__________溶剂。\n9. 非挥发性、非电解质稀溶液的依数性只与溶质粒子__________有关。\n10. Raoult 定律中溶液蒸气压等于纯溶剂蒸气压乘以__________摩尔分数。\n11. 溶液的蒸气压下降会导致沸点__________、凝固点__________。\n12. 渗透压产生的原因是半透膜两侧溶剂的__________不同。\n13. 电解质溶液中粒子数会因__________而增多，因此依数性常需考虑校正。\n14. 活度用于描述实际溶液中离子或分子的__________浓度。\n15. 胶体分散相粒径通常介于真溶液和粗分散体系之间，具有__________效应。\n\n<details>\n<summary>第二章答案</summary>\n\n1. 均匀\n2. 溶剂\n3. 溶液\n4. 物质的量\n5. 溶剂\n6. 溶液\n7. 动态\n8. 极性；非极性\n9. 数目\n10. 溶剂\n11. 升高；降低\n12. 化学势\n13. 电离\n14. 有效\n15. 丁达尔\n\n</details>\n\n## 第三章 化学热力学\n\n1. 热力学研究反应的__________和__________，不直接研究反应快慢。\n2. 系统以外并与系统发生能量或物质交换的部分称为__________。\n3. 状态函数只与体系的__________和__________有关，与途径无关。\n4. 按本课程符号约定，体系吸热 \\(Q\\) 为__________，体系对外做功 \\(W\\) 为__________。\n5. 内能 \\(U\\) 是状态函数，但热 \\(Q\\) 和功 \\(W\\) 是__________函数。\n6. 恒容且只做体积功时，反应热 \\(Q_V\\) 等于__________变化。\n7. 焓定义为 \\(H=U+pV\\)，恒压且只做体积功时 \\(Q_p\\) 等于__________。\n8. 热化学方程式必须注明物质的__________和反应的__________。\n9. 盖斯定律说明反应焓变只与__________和__________有关。\n10. 标准生成焓是由稳定单质生成 1 mol 物质时的__________。\n11. 熵是体系__________程度的量度。\n12. 孤立体系中自发过程总是向总熵__________的方向进行。\n13. Gibbs 自由能判据中，恒温恒压条件下 \\(\\Delta G<0\\) 表示过程__________。\n14. \\(\\Delta H<0,\\Delta S>0\\) 的反应在任何温度下通常都__________。\n15. 转变温度近似由 \\(\\Delta H=T\\Delta S\\) 得到，此时 \\(\\Delta G=__________\\)。\n\n<details>\n<summary>第三章答案</summary>\n\n1. 能量变化；方向\n2. 环境\n3. 始态；终态\n4. 正；负\n5. 途径\n6. 内能\n7. 焓变\n8. 聚集状态；焓变\n9. 始态；终态\n10. 焓变\n11. 混乱\n12. 增大\n13. 自发\n14. 自发\n15. 0\n\n</details>\n\n## 第四章 化学反应的限度\n\n1. 化学平衡是正、逆反应速率__________且各组分浓度不再随时间变化的__________平衡。\n2. 平衡常数表达式中生成物写在__________，反应物写在__________。\n3. 平衡常数的指数等于反应方程式中的__________。\n4. 纯固体和纯液体的活度近似为__________，通常不写入平衡常数表达式。\n5. 反应商 \\(Q\\) 的形式与平衡常数相同，但使用的是__________状态下的浓度或分压。\n6. 若 \\(Q<K\\)，反应倾向于向__________方向进行。\n7. 标准 Gibbs 自由能和平衡常数满足 \\(\\Delta G^\\theta=-RT\\ln K^\\theta\\)，因此 \\(K^\\theta>1\\) 时 \\(\\Delta G^\\theta\\) 为__________。\n8. Le Chatelier 原理说明体系受扰动后会向__________扰动影响的方向移动。\n9. 改变浓度或压力通常改变平衡__________，但不改变平衡常数。\n10. 改变温度会改变__________，因为温度影响反应的热力学函数。\n11. 对气体反应，加压有利于气体计量数__________的一侧。\n12. 催化剂可以改变达到平衡的__________，但不改变平衡位置。\n13. 多重平衡相加时，总平衡常数等于各分步平衡常数的__________。\n\n<details>\n<summary>第四章答案</summary>\n\n1. 相等；动态\n2. 分子；分母\n3. 化学计量数\n4. 1\n5. 任意\n6. 正反应\n7. 负值\n8. 减弱\n9. 组成\n10. 平衡常数\n11. 减小\n12. 速率\n13. 乘积\n\n</details>\n\n## 第五章 酸碱电离平衡\n\n1. Arrhenius 理论中酸在水中电离产生__________，碱产生__________。\n2. Brønsted-Lowry 理论中酸是质子__________，碱是质子__________。\n3. 共轭酸碱对之间只相差一个__________。\n4. 弱酸电离常数 \\(K_a\\) 越大，酸性越__________。\n5. 弱酸或弱碱的电离度 \\(\\alpha\\) 表示已电离部分占__________浓度的比例。\n6. 水的离子积 \\(K_w=[H_3O^+][OH^-]\\)，298 K 常取__________。\n7. 298 K 水溶液中 \\(pH+pOH=__________\\)。\n8. 同离子效应会使弱电解质电离平衡向__________方向移动，电离度减小。\n9. 缓冲溶液通常由弱酸及其__________或弱碱及其__________组成。\n10. 缓冲能力有限，加入大量强酸或强碱后 pH 会__________变化。\n11. 酸碱指示剂的变色范围通常约为 \\(pK_a\\pm__________\\)。\n12. 等浓度强酸强碱完全中和后，溶液 pH 约为__________。\n13. 弱酸强碱等计量中和后，溶液通常显__________性。\n14. 多元弱酸通常第一步电离__________，后续电离逐级减弱。\n\n<details>\n<summary>第五章答案</summary>\n\n1. \\(H^+\\) 或 \\(H_3O^+\\)；\\(OH^-\\)\n2. 供体；受体\n3. 质子\n4. 强\n5. 初始\n6. \\(1.0\\times10^{-14}\\)\n7. 14\n8. 未电离\n9. 共轭碱盐；共轭酸盐\n10. 明显\n11. 1\n12. 7\n13. 碱\n14. 最强\n\n</details>\n\n## 第七章 氧化还原与电化学\n\n1. 氧化是失去电子、氧化数__________；还原是得到电子、氧化数__________。\n2. 氧化剂本身被__________，还原剂本身被__________。\n3. 原电池把化学能转化为__________能。\n4. 原电池中负极发生__________反应，正极发生__________反应。\n5. 电池符号中通常左侧写__________极，右侧写__________极。\n6. 标准电极电势越大，该电对中氧化态物质的氧化能力越__________。\n7. 电池电动势 \\(E_{\\text{池}}\\) 等于正极电势减__________电势。\n8. \\(\\Delta G=-nFE\\)，所以自发电池 \\(E>0\\) 时 \\(\\Delta G__________0\\)。\n9. Nernst 方程说明电极电势会随浓度、分压和__________改变。\n10. 写 Nernst 反应商时，固体、纯液体和__________不写入。\n11. 含 \\(H^+\\) 的电极反应受__________影响明显。\n12. 电极电势不能随反应式系数扩大而__________。\n13. 元素电势图可用于判断中间价态是否发生__________反应。\n\n<details>\n<summary>第七章答案</summary>\n\n1. 升高；降低\n2. 还原；氧化\n3. 电\n4. 氧化；还原\n5. 负；正\n6. 强\n7. 负极\n8. <\n9. 温度\n10. 电子\n11. 酸度或 pH\n12. 扩大\n13. 歧化\n\n</details>\n\n## 第八章 化学反应速率与机理\n\n1. 化学动力学研究反应的__________和__________。\n2. 反应速率用浓度随时间的变化表示，并要按__________数归一化。\n3. 反应速率规定为__________值。\n4. 速率常数 \\(k\\) 与浓度无关，但受__________影响。\n5. 基元反应的速率方程可由反应方程式按__________定律直接写出。\n6. 非基元反应的速率方程必须由__________确定。\n7. 反应级数是速率方程中浓度指数的__________。\n8. 一级反应半衰期与初始浓度__________。\n9. 二级反应半衰期与初始浓度成__________比。\n10. Arrhenius 公式中活化能越大，温度对速率的影响越__________。\n11. 催化剂通过改变反应__________来降低活化能。\n12. 催化剂不能改变反应的__________常数和平衡组成。\n13. 稳态近似认为活泼中间体的生成速率和消耗速率近似__________。\n\n<details>\n<summary>第八章答案</summary>\n\n1. 速率；机理\n2. 化学计量\n3. 正\n4. 温度\n5. 质量作用\n6. 实验\n7. 总和\n8. 无关\n9. 反\n10. 大\n11. 路径\n12. 平衡\n13. 相等\n\n</details>\n\n## 第九章 原子结构\n\n1. 能量量子化说明微观体系能量只能取__________值。\n2. 光子能量与频率成__________比。\n3. Bohr 模型主要适用于__________原子或类氢离子。\n4. 微观粒子具有波粒__________性。\n5. de Broglie 关系说明粒子动量越大，波长越__________。\n6. 测不准原理说明不能同时准确确定粒子的__________和__________。\n7. 波函数 \\(\\psi\\) 本身没有直接物理意义，\\(|\\psi|^2\\) 表示__________密度。\n8. 主量子数 \\(n\\) 主要决定电子层和能量，取值为__________整数。\n9. 角量子数 \\(l\\) 决定原子轨道的__________。\n10. 磁量子数 \\(m\\) 决定轨道在空间的__________。\n11. 自旋量子数 \\(m_s\\) 只能取__________两个值。\n12. Pauli 不相容原理指出同一原子中没有两个电子的四个量子数__________相同。\n13. Hund 规则要求等价轨道中电子优先__________占据且自旋平行。\n14. 屏蔽效应使外层电子感受到的有效核电荷__________。\n15. 同周期元素从左到右，原子半径总体__________，第一电离能总体__________。\n\n<details>\n<summary>第九章答案</summary>\n\n1. 分立\n2. 正\n3. 氢\n4. 二象\n5. 短\n6. 位置；动量\n7. 概率\n8. 正\n9. 形状\n10. 取向\n11. \\(+\\frac12\\)、\\(-\\frac12\\)\n12. 完全\n13. 单独\n14. 减小\n15. 减小；增大\n\n</details>\n\n## 第十章 分子与晶体结构\n\n1. 电负性表示成键原子吸引__________的能力。\n2. 离子键本质是正、负离子之间的__________作用。\n3. 晶格能越大，离子晶体通常熔点越__________、硬度越__________。\n4. Lewis 结构重点表示价电子和__________电子对。\n5. 价键理论认为共价键来自原子轨道的__________重叠。\n6. \\(\\sigma\\) 键沿键轴__________重叠，\\(\\pi\\) 键为侧向重叠。\n7. 杂化轨道用于解释分子的__________构型和等价键。\n8. VSEPR 理论先看价层__________数，再区分成键对和孤对电子。\n9. 分子极性取决于键的极性和分子__________。\n10. 范德华力包括取向力、诱导力和__________力。\n11. 氢键通常发生在 H 与 F、O、N 等强电负性原子相连并与另一强电负性原子相互作用时。\n12. 晶胞是晶体结构中能够通过平移重复得到整个晶体的__________单位。\n13. 离子极化能力强的阳离子通常半径小、电荷__________。\n14. 分子轨道理论中键级越大，键通常越__________、键长越__________。\n\n<details>\n<summary>第十章答案</summary>\n\n1. 电子\n2. 静电吸引\n3. 高；大\n4. 孤对\n5. 最大\n6. 头碰头\n7. 空间\n8. 电子对\n9. 构型\n10. 色散\n11. 氢键\n12. 最小重复\n13. 高\n14. 强；短\n\n</details>\n\n## 第十三章 有机化学与高分子\n\n1. 有机化合物以__________元素为骨架，常含 H、O、N、卤素等。\n2. 构造异构是分子式相同但原子连接__________不同。\n3. 构象异构来自单键__________造成的空间排布差异。\n4. 手性分子与其镜像不能__________，常具有旋光性。\n5. 顺反异构要求双键或环结构限制旋转，并且相关原子上有__________取代基。\n6. 官能团决定有机物的主要__________性质。\n7. 芳香性通常要求环状、平面、闭合共轭，并满足__________规则。\n8. 亲核体富电子，倾向进攻__________中心。\n9. 亲电体缺电子，倾向接受__________。\n10. \\(S_N2\\) 反应是一步协同过程，常发生__________进攻并导致构型反转。\n11. \\(S_N1\\) 反应先形成__________中间体，速率只与底物浓度有关。\n12. \\(E1\\) 和 \\(S_N1\\) 都常经过碳正离子，因此可能发生__________。\n13. Markovnikov 规则常用于判断不对称烯烃加成的__________方向。\n14. 高分子由许多重复的__________连接而成。\n15. 单体是合成高分子的__________小分子。\n16. 聚合度表示高分子链中__________重复单元的数目。\n17. 数均分子量按__________数平均，重均分子量按__________分数加权。\n18. \\(T_g\\) 是玻璃化转变温度，\\(T_m\\) 是__________温度。\n\n<details>\n<summary>第十三章答案</summary>\n\n1. 碳\n2. 顺序\n3. 旋转\n4. 重合\n5. 不同\n6. 化学\n7. Hückel\n8. 缺电子\n9. 电子对\n10. 背面\n11. 碳正离子\n12. 重排\n13. 区域选择\n14. 链节\n15. 起始\n16. 链节或结构单元\n17. 分子；质量\n18. 熔融\n\n</details>\n\n",
    "chemistry_summary/formula-handbook.md":  "# 大学化学公式总表\n\n本表按课程章节整理。背公式时不要只背等式，还要同时记住适用条件、符号意义和常见错误。\n\n## 第一章 气体与液体\n\n| 主题 | 公式 | 适用和提醒 |\n|---|---|---|\n| 理想气体 | \\(pV=nRT\\) | \\(T\\) 必须用 K；\\(R\\) 与 \\(p,V\\) 单位匹配 |\n| Boyle 定律 | \\(p_1V_1=p_2V_2\\) | 等温、定量气体 |\n| Charles-Gay-Lussac 定律 | \\(\\frac{V_1}{T_1}=\\frac{V_2}{T_2}\\) | 等压、定量气体 |\n| 综合气体定律 | \\(\\frac{p_1V_1}{T_1}=\\frac{p_2V_2}{T_2}\\) | 同一份气体，物质的量不变 |\n| 摩尔质量 | \\(M=\\frac{mRT}{pV}\\) | 由 \\(pV=nRT,\\ n=m/M\\) 得到 |\n| 气体密度 | \\(\\rho=\\frac{pM}{RT}\\) | \\(M\\) 与 \\(\\rho\\) 单位要匹配 |\n| 分压 | \\(P_{\\text{总}}=\\sum P_i,\\ P_A=x_AP_{\\text{总}}\\) | 分压对应相同 \\(V,T\\) |\n| 分体积 | \\(V_{\\text{总}}=\\sum V_i,\\ V_A=x_AV_{\\text{总}}\\) | 分体积对应相同 \\(p,T\\) |\n| 混合气体统一式 | \\(P_{\\text{总}}V_A=P_AV_{\\text{总}}=n_ART\\) | 不能写成 \\(P_AV_A=n_ART\\) |\n| 压缩系数 | \\(Z=\\frac{pV}{nRT}\\) | \\(Z<1\\) 吸引力主导，\\(Z>1\\) 自身体积主导 |\n| Van der Waals 方程 | \\(\\left(P+\\frac{an^2}{V^2}\\right)(V-nb)=nRT\\) | 压力加校正项，体积减校正项 |\n| Clausius-Clapeyron | \\(\\lg p=-\\frac{\\Delta H_{\\text{vap}}}{2.303RT}+B\\) | 用 \\(\\lg\\) 时分母有 \\(2.303R\\) |\n| 两点式 | \\(\\lg\\frac{p_2}{p_1}=\\frac{\\Delta H_{\\text{vap}}}{2.303R}\\left(\\frac{T_2-T_1}{T_2T_1}\\right)\\) | \\(p_1,p_2\\) 单位保持一致即可 |\n\n## 第二章 溶液\n\n| 主题 | 公式 | 适用和提醒 |\n|---|---|---|\n| 质量分数 | \\(\\omega_B=\\frac{m_B}{m_{\\text{溶液}}}\\) | 分母是溶液总质量 |\n| 摩尔分数 | \\(x_B=\\frac{n_B}{\\sum n_i}\\) | 必须先换算为物质的量 |\n| 质量摩尔浓度 | \\(m_B=\\frac{n_B}{m_A(\\text{kg})}\\) | 分母是溶剂质量，单位 kg |\n| 体积分数 | \\(\\varphi_B=\\frac{V_B}{\\sum V_i}\\) | 通常取混合前体积 |\n| 物质的量浓度 | \\(c_B=\\frac{n_B}{V_{\\text{溶液}}}\\) | 分母是溶液体积 |\n| Raoult 定律 | \\(p=p^0x_1\\) | \\(x_1\\) 是溶剂摩尔分数 |\n| 蒸气压下降 | \\(\\Delta p=p^0x_2\\) | 非挥发性、非电解质稀溶液 |\n| 沸点升高 | \\(\\Delta T_b=K_bm\\) | 温差 K 和 \\(^\\circ C\\) 数值相同 |\n| 凝固点降低 | \\(\\Delta T_f=K_fm\\) | 常用于摩尔质量测定 |\n| 渗透压 | \\(\\pi=cRT\\) | 稀溶液近似；电解质需考虑粒子数 |\n| 活度 | \\(a_i=\\gamma_i c_i/c^\\theta\\) | 实际溶液用有效浓度描述 |\n\n## 第三章 化学热力学\n\n| 主题 | 公式 | 适用和提醒 |\n|---|---|---|\n| 体积功 | \\(W=-p_{\\text{外}}\\Delta V\\) | 膨胀时 \\(W<0\\) |\n| 可逆体积功 | \\(W=-\\int p_{\\text{外}}\\,dV\\) | 可逆过程常取 \\(p_{\\text{外}}\\approx p\\) |\n| 第一定律 | \\(\\Delta U=Q+W\\) | 本课程符号：吸热、受功为正 |\n| 恒容热 | \\(Q_V=\\Delta U\\) | 恒容且无非体积功 |\n| 焓 | \\(H=U+pV\\) | 状态函数 |\n| 恒压热 | \\(Q_p=\\Delta H\\) | 恒压且无非体积功 |\n| 恒压恒容热关系 | \\(\\Delta H=\\Delta U+\\Delta n_gRT\\) | 只统计气体计量数 |\n| 盖斯定律 | \\(\\Delta H_{\\text{总}}=\\sum \\Delta H_i\\) | 反应反向则焓变变号 |\n| 标准反应焓 | \\(\\Delta_rH^\\theta=\\sum\\nu\\Delta_fH^\\theta(\\text{产物})-\\sum\\nu\\Delta_fH^\\theta(\\text{反应物})\\) | 稳定单质 \\(\\Delta_fH^\\theta=0\\) |\n| 键焓估算 | \\(\\Delta H\\approx\\sum D(\\text{断键})-\\sum D(\\text{成键})\\) | 断键吸热，成键放热 |\n| 熵变 | \\(\\Delta_rS^\\theta=\\sum\\nu S^\\theta(\\text{产物})-\\sum\\nu S^\\theta(\\text{反应物})\\) | 注意计量数 |\n| Gibbs-Helmholtz | \\(\\Delta G=\\Delta H-T\\Delta S\\) | 恒温近似常用 |\n| 转变温度 | \\(T=\\frac{\\Delta H}{\\Delta S}\\) | \\(\\Delta G=0\\) 时 |\n| 标准反应自由能 | \\(\\Delta_rG^\\theta=\\sum\\nu\\Delta_fG^\\theta(\\text{产物})-\\sum\\nu\\Delta_fG^\\theta(\\text{反应物})\\) | 判断标准态方向 |\n\n## 第四章 化学平衡\n\n| 主题 | 公式 | 适用和提醒 |\n|---|---|---|\n| 浓度平衡常数 | \\(K_c=\\frac{[C]^c[D]^d}{[A]^a[B]^b}\\) | 使用平衡浓度 |\n| 压力平衡常数 | \\(K_p=\\frac{p_C^cp_D^d}{p_A^ap_B^b}\\) | 使用气体平衡分压 |\n| \\(K_p,K_c\\) 关系 | \\(K_p=K_c(RT)^{\\Delta n_g}\\) | \\(\\Delta n_g\\) 只统计气体 |\n| 标准平衡常数 | \\(K^\\theta=\\prod a_i^{\\nu_i}\\) | 热力学公式用 \\(K^\\theta\\) |\n| \\(\\Delta G^\\theta\\) 与 \\(K^\\theta\\) | \\(\\Delta G_T^\\theta=-2.303RT\\lg K^\\theta\\) | \\(T\\) 用 K，\\(R\\) 单位匹配 |\n| 任意态自由能 | \\(\\Delta G_T=\\Delta G_T^\\theta+2.303RT\\lg Q\\) | 非标准态要用 \\(Q\\) |\n| 判据 | \\(\\Delta G_T=2.303RT\\lg(Q/K^\\theta)\\) | \\(Q<K\\) 正向自发 |\n| 多重平衡 | \\(K_{\\text{总}}=K_1K_2\\cdots\\) | 反应相加，常数相乘 |\n| Van't Hoff 方程 | \\(\\lg\\frac{K_2}{K_1}=-\\frac{\\Delta H^\\theta}{2.303R}\\left(\\frac1{T_2}-\\frac1{T_1}\\right)\\) | 放热升温 \\(K\\) 减小 |\n| 转化率 | \\(\\alpha=\\frac{\\text{已转化量}}{\\text{起始量}}\\times100\\%\\) | 注意限量组分 |\n\n## 第五章 酸碱平衡\n\n| 主题 | 公式 | 适用和提醒 |\n|---|---|---|\n| 酸常数 | \\(K_a=\\frac{[H_3O^+][A^-]}{[HA]}\\) | 弱酸电离平衡 |\n| 碱常数 | \\(K_b=\\frac{[BH^+][OH^-]}{[B]}\\) | 弱碱电离平衡 |\n| 共轭关系 | \\(K_aK_b=K_w\\) | 必须是共轭酸碱对 |\n| 水的离子积 | \\(K_w=[H_3O^+][OH^-]\\) | 298 K 为 \\(1.0\\times10^{-14}\\) |\n| pH | \\(pH=-\\lg[H_3O^+]\\) | 稀水溶液常用 |\n| pOH | \\(pOH=-\\lg[OH^-]\\) | 298 K 时 \\(pH+pOH=14\\) |\n| 一元弱酸近似 | \\([H_3O^+]\\approx\\sqrt{K_ac}\\) | \\(c/K_a\\ge400\\) |\n| 一元弱碱近似 | \\([OH^-]\\approx\\sqrt{K_bc}\\) | 求 pH 前先求 pOH |\n| 电离度 | \\(\\alpha\\approx\\sqrt{K_a/c}\\) 或 \\(\\sqrt{K_b/c}\\) | 近似条件同上 |\n| 缓冲公式 | \\(pH=pK_a+\\lg\\frac{[A^-]}{[HA]}\\) | 酸在分母，盐在分子 |\n| 指示剂范围 | \\(pH=pK_a\\pm1\\) | 粗略变色范围 |\n| 中和平衡常数 | \\(K=\\frac1{K_w}\\) 或由酸碱常数组合 | 强酸强碱中和趋于完全 |\n\n## 第七章 电化学\n\n| 主题 | 公式 | 适用和提醒 |\n|---|---|---|\n| 电动势 | \\(E_{\\text{池}}=E_{\\text{正}}-E_{\\text{负}}\\) | 正极还原，负极氧化 |\n| 自由能与电动势 | \\(\\Delta G=-nFE\\) | \\(E>0\\) 对应 \\(\\Delta G<0\\) |\n| 标准自由能 | \\(\\Delta G^\\theta=-nFE^\\theta\\) | \\(n\\) 是转移电子数 |\n| 标准电动势与平衡 | \\(E^\\theta=\\frac{2.303RT}{nF}\\lg K^\\theta\\) | 298 K 可写 \\(0.0592/n\\) |\n| 298 K 形式 | \\(E^\\theta=\\frac{0.0592}{n}\\lg K^\\theta\\) | 电势不随配平系数倍增 |\n| 电池 Nernst | \\(E=E^\\theta-\\frac{0.0592}{n}\\lg Q\\) | 298 K |\n| 电极 Nernst | \\(E=E^\\theta+\\frac{0.0592}{n}\\lg\\frac{(Ox)^m}{(Red)^q}\\) | 半反应按还原方向写 |\n| 氢电极 | \\(E(H^+/H_2)=-0.0592pH\\) | \\(p_{H_2}=p^\\theta\\)，298 K |\n| 浓差电池测 pH | \\(E_{\\text{池}}=0.0592pH\\) | 与标准氢电极比较 |\n\n## 第八章 化学动力学\n\n| 主题 | 公式 | 适用和提醒 |\n|---|---|---|\n| 反应速率 | \\(v=-\\frac1a\\frac{d[A]}{dt}=\\frac1c\\frac{d[C]}{dt}\\) | 按计量数归一化 |\n| 速率方程 | \\(v=k[A]^m[B]^n\\) | 非基元反应由实验确定 |\n| 一级积分式 | \\(\\ln[A]=\\ln[A]_0-kt\\) | \\(\\ln[A]\\) 对 \\(t\\) 直线 |\n| 一级半衰期 | \\(t_{1/2}=\\frac{0.693}{k}\\) | 与初始浓度无关 |\n| 二级积分式 | \\(\\frac1{[A]}=\\frac1{[A]_0}+kt\\) | \\(1/[A]\\) 对 \\(t\\) 直线 |\n| 二级半衰期 | \\(t_{1/2}=\\frac1{k[A]_0}\\) | 与初始浓度成反比 |\n| 三级积分式 | \\(\\frac1{[A]^2}=\\frac1{[A]_0^2}+2kt\\) | 斜率为 \\(2k\\) |\n| 三级半衰期 | \\(t_{1/2}=\\frac3{2k[A]_0^2}\\) | 较少见 |\n| 零级积分式 | \\([A]=[A]_0-kt\\) | 匀速消耗 |\n| 零级半衰期 | \\(t_{1/2}=\\frac{[A]_0}{2k}\\) | 与初始浓度成正比 |\n| Arrhenius | \\(\\ln k=-\\frac{E_a}{RT}+C\\) | \\(T\\) 用 K |\n| 两温度式 | \\(\\ln\\frac{k_2}{k_1}=\\frac{E_a}{R}\\left(\\frac1{T_1}-\\frac1{T_2}\\right)\\) | \\(E_a\\) 与 \\(R\\) 单位一致 |\n| 活化能与反应热 | \\(\\Delta H=E_{a,\\text{正}}-E_{a,\\text{逆}}\\) | 近似能垒图关系 |\n| 稳态近似 | \\(\\frac{d[\\text{中间体}]}{dt}\\approx0\\) | 中间体浓度近似恒定 |\n\n## 第九章 原子结构\n\n| 主题 | 公式 | 适用和提醒 |\n|---|---|---|\n| 光子能量 | \\(E=h\\nu\\) | 频率越高，能量越大 |\n| 光电效应 | \\(E_k=h\\nu-E_0\\) | 频率决定最大动能 |\n| Rydberg 公式 | \\(\\frac1\\lambda=R_H(\\frac1{n_1^2}-\\frac1{n_2^2})\\) | \\(n_2>n_1\\) |\n| Bohr 半径 | \\(r_n=a_0n^2\\) | 氢原子近似 |\n| 氢原子能级 | \\(E_n=-\\frac{13.6}{n^2}\\text{ eV}\\) | \\(n\\to\\infty\\) 时趋近 0 |\n| 跃迁能量 | \\(\\Delta E=h\\nu=\\frac{hc}{\\lambda}\\) | 吸收向高能级，发射向低能级 |\n| de Broglie | \\(\\lambda=\\frac hp=\\frac h{mv}\\) | 动量越大，波长越短 |\n| 电子加速 | \\(eV=\\frac12mv^2\\) | 可与 de Broglie 联用 |\n| 测不准 | \\(\\Delta x\\Delta p\\ge\\frac h{4\\pi}\\) | 否定经典确定轨道 |\n| 径向分布 | \\(D(r)=4\\pi r^2R^2\\) | 球壳概率分布 |\n| 有效核电荷 | \\(Z^*=Z-\\sigma\\) | \\(\\sigma\\) 为屏蔽常数 |\n| 轨道数 | 第 \\(n\\) 层轨道数 \\(n^2\\) | 最大电子数 \\(2n^2\\) |\n\n## 第十章 分子与晶体结构\n\n| 主题 | 公式 | 适用和提醒 |\n|---|---|---|\n| 离子半径 | \\(r_0=r_++r_-\\) | \\(r_0\\) 是离子核间距 |\n| Lande 模型 | \\(r_-=\\frac{r_0}{\\sqrt2},\\ r_+=r_0-r_-\\) | 特定几何模型 |\n| Born-Haber 循环 | \\(\\Delta H_{\\text{overall}}=\\sum \\Delta H_i\\) | 注意符号约定 |\n| Born-Lande | \\(U=\\frac{N_AAZ_1Z_2e^2}{4\\pi\\varepsilon_0r_0}(1-\\frac1n)\\) | 比较时看 \\(Z_1Z_2/r_0\\) |\n| VSEPR | 价层电子对数 \\(=\\frac{\\text{中心价电子数}+\\text{配原子提供电子数}}2\\) | 多重键按一个电子域 |\n| 偶极矩 | \\(\\mu=q d\\) | 偶极矩是矢量 |\n| Debye 换算 | \\(1D=3.336\\times10^{-30}C\\cdot m\\) | 常见单位换算 |\n| 范德华力 | \\(F_{\\text{vdW}}\\propto\\frac1{r^6}\\) | 距离增大迅速减弱 |\n| 空间利用率 | \\(\\frac{\\text{晶胞球数}\\times\\text{单球体积}}{\\text{晶胞体积}}\\times100\\%\\) | fcc/hcp 为 74% |\n| 半径比规则 | \\(r_+/r_-\\) 判断配位数 | 0.225, 0.414, 0.732 为常用界值 |\n| 离子势 | \\(\\phi=\\frac z r\\) | 电荷高、半径小，极化能力强 |\n| 键级 | \\(BO=\\frac{N_b-N_a}{2}\\) | 键级越大，键越强 |\     "chemistry_review/01-chemistry_review.md":  "# 本章复习提纲\n\n## 一、本章知识框架\n\n### 1. 气体\n\n1. 理想气体模型\n   - 基本假设：分子间无作用力；分子自身无体积。\n   - 适用范围：真实气体在“温度不太低、压力不太高”时可近似看作理想气体。\n\n2. 理想气体定律与状态方程\n   - 波义耳定律：等温、定量气体，\\(pV=\\text{恒量}\\)。\n   - 查理-盖吕萨克定律：等压、定量气体，\\(V/T=\\text{恒量}\\)。\n   - 理想气体状态方程：\\(pV=nRT\\)。\n\n3. 理想气体状态方程的应用\n   - 求 \\(p,V,T,n\\)。\n   - 求摩尔质量 \\(M\\)。\n   - 求气体密度 \\(\\rho\\)。\n   - 与化学反应计量结合，例如叠氮化钠制氮气。\n\n4. 混合气体\n   - 道尔顿分压定律：总压等于各组分分压之和。\n   - 阿玛格分体积定律：总体积等于各组分分体积之和。\n   - 分压、分体积都与摩尔分数有关。\n\n5. 实际气体\n   - 偏离理想气体的原因：分子本身体积、分子间作用力。\n   - 压缩系数 \\(Z=pV/(nRT)\\)。\n   - Van der Waals 方程修正真实气体。\n\n### 2. 液体与气液转化\n\n1. 气体液化\n   - 由热运动和分子间吸引共同决定。\n   - 降温减弱热运动；加压有利于凝聚。\n   - 临界温度以上，加压也不能液化。\n\n2. 液体气化\n   - 蒸发：液体表面的气化。\n   - 沸腾：液体表面和内部同时气化。\n   - 饱和蒸气压：液体与蒸气动态平衡时蒸气的压力。\n   - 沸点：蒸气压等于外界压力时的温度。\n\n3. 蒸气压与温度\n   - 蒸气压随温度升高而增大。\n   - \\( \\lg p \\) 与 \\(1/T\\) 近似呈线性关系。\n   - 可用 Clausius-Clapeyron 方程求蒸发热或蒸气压。\n\n### 3. 液固转化与相平衡\n\n1. 凝固与熔化\n   - 凝固点：液相与固相处于平衡时的温度。\n   - 熔点：固体与液体共存、固液平衡时的温度。\n   - 过冷液体：低于凝固点但尚未析出晶体的液体。\n\n2. 相、相变、相平衡、相图\n   - 相：体系中的均匀部分。\n   - 相变：固体熔化、液体气化、气体液化、液体凝固等。\n   - 相图：温度和压力对相变影响的关系图。\n\n3. 水的相图\n   - 三相点：冰、水、水蒸气三相共存。\n   - 水的三相点：\\(T=0.01^\\circ\\text{C}\\)，\\(p=610.6\\text{ Pa}\\)。\n   - 水的临界点：约 \\(647\\text{ K}\\)，\\(2.2\\times10^7\\text{ Pa}\\)。\n\n## 二、重点概念整理\n\n### 理想气体\n\n定义：假想气体模型，认为气体分子间无相互作用力，且分子本身体积可忽略。\n\n需要记忆的点：\n- 理想气体并不存在，是近似模型。\n- 温度不太低、压力不太高时，真实气体可近似为理想气体。\n- 压力来自气体分子对容器壁的碰撞。\n\n容易混淆的地方：\n- \\(Z=1\\) 不一定说明气体就是理想气体，可能是吸引力效应和体积效应恰好抵消。\n\n可能怎么考：\n- 判断某条件下真实气体能否近似看作理想气体。\n- 解释高压、低温下偏离理想气体的原因。\n\n### 摩尔气体常数 \\(R\\)\n\n定义：理想气体状态方程中的比例常数。\n\n需要记忆的点：\n- 当 \\(p,V,n,T\\) 单位分别为 Pa、m\\(^3\\)、mol、K 时：\n  \\[\n  R=8.314\\ \\text{Pa}\\cdot\\text{m}^3\\cdot\\text{mol}^{-1}\\cdot\\text{K}^{-1}\n  \\]\n- 当 \\(p,V\\) 使用 kPa、dm\\(^3\\) 时：\n  \\[\n  R=8.31\\ \\text{kPa}\\cdot\\text{dm}^3\\cdot\\text{mol}^{-1}\\cdot\\text{K}^{-1}\n  \\]\n\n容易混淆的地方：\n- 不能把 Pa 和 dm\\(^3\\)、kPa 和 m\\(^3\\) 随意混用。\n\n可能怎么考：\n- 给出不同单位，要求选择合适的 \\(R\\) 并完成单位换算。\n\n### 分压\n\n定义：在恒温条件下，混合气体中某一组分气体单独占有整个混合气体容积时产生的压力。\n\n需要记忆的点：\n- 分压条件：相同 \\(V\\)、相同 \\(T\\)。\n- 对理想混合气体：\n  \\[\n  P_A=x_A P_{\\text{总}}=\\frac{n_A}{n_{\\text{总}}}P_{\\text{总}}\n  \\]\n\n容易混淆的地方：\n- 分压不是该组分“原来单独放在自己分体积里”的压力。\n- \\(P_A V_A=n_ART\\) 在混合气体题中通常是错误搭配。\n\n可能怎么考：\n- 判断 \\(P_AV_{\\text{总}}=n_ART\\)、\\(P_{\\text{总}}V_A=n_ART\\) 等式是否成立。\n\n### 分体积\n\n定义：混合气体中某一组分单独存在于混合气体的温度、压力条件下所占有的体积。\n\n需要记忆的点：\n- 分体积条件：相同 \\(p\\)、相同 \\(T\\)。\n- 对理想混合气体：\n  \\[\n  V_A=x_A V_{\\text{总}}=\\frac{n_A}{n_{\\text{总}}}V_{\\text{总}}\n  \\]\n\n容易混淆的地方：\n- 分体积与分压的条件不同：分压固定 \\(V,T\\)，分体积固定 \\(p,T\\)。\n\n可能怎么考：\n- 用摩尔分数求分体积；或判断分压、分体积公式的适用条件。\n\n### 压缩系数 \\(Z\\)\n\n定义：\n\\[\nZ=\\frac{pV}{nRT}\n\\]\n用于描述真实气体相对理想气体的偏离程度。\n\n需要记忆的点：\n- 理想气体：\\(Z=1\\)。\n- 吸引力占主导：实测压力偏小，\\(Z\u003c1\\)。\n- 分子自身体积占主导：实测体积偏大，\\(Z\u003e1\\)。\n\n容易混淆的地方：\n- \\(Z\u003c1\\) 不是体积因素导致，而主要是分子间吸引力导致。\n- \\(Z\u003e1\\) 主要与分子自身占据空间有关。\n\n可能怎么考：\n- 给出 \\(Z\\) 的大小，判断主要偏离原因。\n\n### 临界温度、临界压力、临界体积\n\n定义：\n- 临界温度 \\(T_c\\)：气体能被液化的最高温度；高于 \\(T_c\\)，无论怎样加压都不能液化。\n- 临界压力 \\(P_c\\)：在临界温度时使气体液化所需的最低压力。\n- 临界体积 \\(V_c\\)：在 \\(T_c\\)、\\(P_c\\) 下 1 mol 气体所占体积。\n\n需要记忆的点：\n- 临界常数与分子间作用力及分子质量有关。\n- 室温下是否能加压液化，要看室温与 \\(T_c\\) 的关系。\n\n容易混淆的地方：\n- “加压可液化”只适用于 \\(T\u003cT_c\\) 的气体。\n\n可能怎么考：\n- 根据 \\(T_b,T_c\\) 与室温比较，判断永久气体、可凝聚气体、常温液体。\n\n### 蒸发与沸腾\n\n定义：\n- 蒸发：液体表面的气化现象。\n- 沸腾：液体表面和内部同时发生气化的现象。\n\n需要记忆的点：\n- 二者都是吸热过程。\n- 沸腾条件：液体蒸气压等于外界压力。\n- 外界压力越低，沸点越低；外界压力越高，沸点越高。\n\n容易混淆的地方：\n- 液体不是“只有一个固定沸点”，沸点随外压变化。\n\n可能怎么考：\n- 解释高山煮饭不易熟、高压锅易煮熟。\n\n### 饱和蒸气压\n\n定义：与液相处于动态平衡的蒸气称为饱和蒸气，其压力称为饱和蒸气压，简称蒸气压。\n\n需要记忆的点：\n- 温度恒定时，蒸气压为定值。\n- 气液共存时，蒸气压不受液体或蒸气量变化影响。\n- 不同物质蒸气压不同。\n\n容易混淆的地方：\n- 蒸气压不是由容器中液体多少决定，而主要由温度和物质本性决定。\n\n可能怎么考：\n- 判断密闭容器中增减少量液体是否改变饱和蒸气压。\n\n### 相、相变、相平衡、相图\n\n定义：\n- 相：体系中的均匀部分。\n- 相变：固体熔化、液体气化、气体液化、液体凝固等物态变化。\n- 相平衡：相变时两相之间的动态平衡。\n- 相图：温度、压力对相变影响的关系图。\n\n需要记忆的点：\n- 水的三相点：\\(0.01^\\circ\\text{C}\\)、\\(610.6\\text{ Pa}\\)。\n- 水的临界点：\\(647\\text{ K}\\)、\\(2.2\\times10^7\\text{ Pa}\\)。\n\n容易混淆的地方：\n- 三相点不是普通冰水混合物在 1 atm 下的温度；它有特定压力。\n\n可能怎么考：\n- 识别相图中的气液平衡线、固液平衡线、气固平衡线。\n\n## 三、重要公式整理\n\n### 1. 理想气体状态方程\n\n公式：\n\\[\npV=nRT\n\\]\n\n符号说明：\n- \\(p\\)：气体压力，常用 Pa、kPa、atm。\n- \\(V\\)：气体体积，常用 m\\(^3\\)、dm\\(^3\\)、L。\n- \\(n\\)：物质的量，mol。\n- \\(R\\)：摩尔气体常数。\n- \\(T\\)：热力学温度，K。\n\n适用条件：\n- 理想气体。\n- 真实气体在温度不太低、压力不太高时的近似计算。\n\n解题步骤：\n1. 判断是否可近似用理想气体。\n2. 把温度换成 K：\\(T=t+273\\)。\n3. 统一 \\(p,V,R\\) 的单位。\n4. 代入求未知量。\n\n常见变形：\n\\[\nn=\\frac{pV}{RT}\n\\]\n\\[\np=\\frac{nRT}{V}\n\\]\n\\[\nV=\\frac{nRT}{p}\n\\]\n\\[\nT=\\frac{pV}{nR}\n\\]\n\n易错点：\n- 摄氏温度不能直接代入。\n- \\(R\\) 的单位必须与 \\(p,V\\) 匹配。\n\n例题方向：\n- 已知 \\(p,V,T\\) 求 \\(n\\)。\n- 气体反应计量与 \\(pV=nRT\\) 结合。\n\n### 2. 波义耳定律\n\n公式：\n\\[\npV=\\text{恒量}\n\\]\n或\n\\[\np_1V_1=p_2V_2\n\\]\n\n符号说明：\n- \\(p_1,V_1\\)：初态压力和体积。\n- \\(p_2,V_2\\)：终态压力和体积。\n\n适用条件：\n- 温度恒定。\n- 气体物质的量恒定。\n\n解题步骤：\n1. 确认等温、定量。\n2. 代入 \\(p_1V_1=p_2V_2\\)。\n\n易错点：\n- 温度或气体物质的量变化时不能直接用。\n\n例题方向：\n- 压缩气体体积，求压力变化。\n\n### 3. 查理-盖吕萨克定律\n\n公式：\n\\[\n\\frac{V}{T}=\\text{恒量}\n\\]\n或\n\\[\n\\frac{V_1}{T_1}=\\frac{V_2}{T_2}\n\\]\n\n符号说明：\n- \\(V\\)：体积。\n- \\(T\\)：热力学温度，K。\n\n适用条件：\n- 压力恒定。\n- 气体物质的量恒定。\n\n常见变形：\n\\[\nV_t=V_0\\left(1+\\frac{t}{273}\\right)\n\\]\n\\[\nT=t+273\n\\]\n\n易错点：\n- \\(T\\) 必须用 K。\n- \\(V_t=V_0(1+t/273)\\) 是以 \\(0^\\circ\\text{C}\\) 的体积 \\(V_0\\) 为基准。\n\n例题方向：\n- 等压升温或降温时求体积。\n\n### 4. 综合气体定律\n\n公式：\n\\[\n\\frac{p_1V_1}{T_1}=\\frac{p_2V_2}{T_2}\n\\]\n\n适用条件：\n- 气体物质的量不变。\n- 可近似看作理想气体。\n\n解题步骤：\n1. 温度换算为 K。\n2. 压力、体积前后单位保持一致。\n3. 代入求未知量。\n\n易错点：\n- 不能用摄氏温度。\n- 前后压力单位可不同，但必须先统一。\n\n例题方向：\n- 同一份气体改变 \\(p,V,T\\) 中两个量，求第三个量。\n\n### 5. 摩尔质量计算\n\n公式：\n\\[\npV=nRT,\\quad n=\\frac{m}{M}\n\\]\n\\[\nM=\\frac{mRT}{pV}\n\\]\n\n符号说明：\n- \\(M\\)：摩尔质量，g·mol\\(^{-1}\\) 或 kg·mol\\(^{-1}\\)。\n- \\(m\\)：气体质量。\n\n适用条件：\n- 气体近似理想。\n- \\(m,p,V,T\\) 已知。\n\n解题步骤：\n1. 将 \\(V\\) 换成与 \\(R\\) 匹配的单位。\n2. 将 \\(T\\) 换成 K。\n3. 代入 \\(M=mRT/(pV)\\)。\n4. 根据摩尔质量判断可能气体。\n\n易错点：\n- \\(0.19\\text{ dm}^3=0.19\\times10^{-3}\\text{ m}^3\\)。\n\n例题方向：\n- 课件例题：\\(293\\text{ K}\\)、\\(9.97\\times10^4\\text{ Pa}\\)、\\(0.19\\text{ dm}^3\\)、\\(0.132\\text{ g}\\)，求得 \\(M\\approx17\\text{ g·mol}^{-1}\\)，可能为 NH\\(_3\\)。\n\n### 6. 气体密度\n\n公式：\n\\[\n\\rho=\\frac{m}{V}\n\\]\n\\[\n\\rho=\\frac{pM}{RT}\n\\]\n\n符号说明：\n- \\(\\rho\\)：密度。\n- \\(M\\)：摩尔质量。\n\n适用条件：\n- 气体近似理想。\n\n常见变形：\n\\[\nM=\\frac{\\rho RT}{p}\n\\]\n\\[\npM=\\rho RT\n\\]\n\n易错点：\n- 若 \\(M\\) 用 g·mol\\(^{-1}\\)，体积单位和密度单位要相互匹配。\n\n例题方向：\n- 已知气体密度、压力、温度求摩尔质量。\n\n### 7. 道尔顿分压定律\n\n公式：\n\\[\nP_{\\text{总}}=\\sum_i P_i\n\\]\n\\[\nP_A=x_A P_{\\text{总}}=\\frac{n_A}{n_{\\text{总}}}P_{\\text{总}}\n\\]\n\\[\nP_AV_{\\text{总}}=n_ART\n\\]\n\n符号说明：\n- \\(P_A\\)：组分 A 的分压。\n- \\(x_A\\)：组分 A 的摩尔分数。\n- \\(n_A\\)：组分 A 的物质的量。\n\n适用条件：\n- 理想气体混合物。\n- 组分之间无化学反应。\n- 分压定义对应相同 \\(V,T\\)。\n\n解题步骤：\n1. 求各组分摩尔数或摩尔分数。\n2. 用 \\(P_i=x_iP_{\\text{总}}\\) 求分压。\n3. 必要时用 \\(P_{\\text{总}}=\\sum P_i\\) 检查。\n\n易错点：\n- \\(P_AV_A=n_ART\\) 在分压计算中不成立。\n\n例题方向：\n- 空气中 \\(x_{\\text{N}_2}\\approx0.78\\)，\\(x_{\\text{O}_2}\\approx0.21\\)，总压为 1 atm 时，\\(P_{\\text{N}_2}\\approx0.78\\text{ atm}\\)，\\(P_{\\text{O}_2}\\approx0.21\\text{ atm}\\)。\n\n### 8. 阿玛格分体积定律\n\n公式：\n\\[\nV_{\\text{总}}=\\sum_i V_i\n\\]\n\\[\nV_A=x_A V_{\\text{总}}=\\frac{n_A}{n_{\\text{总}}}V_{\\text{总}}\n\\]\n\\[\nP_{\\text{总}}V_A=n_ART\n\\]\n\n适用条件：\n- 理想气体混合物。\n- 分体积定义对应相同 \\(p,T\\)。\n\n易错点：\n- 分体积不是实际在容器中分开占据的空间，而是假想单独存在于相同 \\(p,T\\) 下的体积。\n\n例题方向：\n- 判断 \\(P_{\\text{总}}V_A=n_ART\\) 是否正确。\n\n### 9. 混合气体分压与分体积统一关系\n\n公式：\n\\[\nP_{\\text{总}}V_{\\text{分}}=P_{\\text{分}}V_{\\text{总}}=n_{\\text{分}}RT\n\\]\n\n适用条件：\n- 理想混合气体。\n- 对同一组分使用。\n\n易错点：\n- 不能把某组分的分压和分体积随意配对成 \\(P_AV_A=n_ART\\)。\n\n例题方向：\n- 判断表达式正误。\n\n### 10. 压缩系数\n\n公式：\n\\[\nZ=\\frac{pV}{nRT}\n\\]\n\n符号说明：\n- \\(Z\\)：压缩系数，无量纲。\n\n适用条件：\n- 用于判断真实气体偏离理想气体的程度。\n\n判断规律：\n- \\(Z=1\\)：表现与理想气体相同，但不一定是真正理想气体。\n- \\(Z\u003c1\\)：分子间吸引力影响占主导。\n- \\(Z\u003e1\\)：分子自身体积影响占主导。\n\n易错点：\n- 不要把 \\(Z=1\\) 机械等同于“无分子间作用力、无分子体积”。\n\n例题方向：\n- 根据 \\(Z\\) 大小判断真实气体偏离原因。\n\n### 11. Van der Waals 方程\n\n公式：\n\\[\n\\left(P+\\frac{an^2}{V^2}\\right)(V-nb)=nRT\n\\]\n\n符号说明：\n- \\(a\\)：压力校正项相关常数，与分子间作用力有关。\n- \\(b\\)：体积校正项相关常数，约等于气体凝聚为液体时的摩尔体积。\n\n适用条件：\n- 真实气体，比理想气体方程更接近实际。\n\n解题步骤：\n1. 判断是否需要考虑真实气体偏差。\n2. 代入 \\(a,b\\) 常数。\n3. 注意 \\(a,b,R,p,V\\) 的单位体系必须一致。\n\n易错点：\n- 压力修正是加 \\(an^2/V^2\\)，体积修正是减 \\(nb\\)。\n\n例题方向：\n- 解释 \\(a,b\\) 的物理意义；判断哪种气体分子间作用力更强。\n\n### 12. Clausius-Clapeyron 方程\n\n公式：\n\\[\n\\lg p=-\\frac{\\Delta H_{\\text{vap}}}{2.303RT}+B\n\\]\n\n两点式：\n\\[\n\\lg\\frac{p_2}{p_1}\n=\\frac{\\Delta H_{\\text{vap}}}{2.303R}\n\\left(\\frac{T_2-T_1}{T_2T_1}\\right)\n\\]\n\n符号说明：\n- \\(p_1,p_2\\)：不同温度下的蒸气压。\n- \\(T_1,T_2\\)：热力学温度，K。\n- \\(\\Delta H_{\\text{vap}}\\)：摩尔蒸发热。\n- \\(R\\)：摩尔气体常数。\n- \\(B\\)：积分常数。\n\n适用条件：\n- 温度区间不太大。\n- 假定 \\(\\Delta H_{\\text{vap}}\\) 不随温度变化。\n\n解题步骤：\n1. 温度换算为 K。\n2. 压力单位在 \\(p_2/p_1\\) 中保持一致。\n3. 确认 \\(R\\) 与 \\(\\Delta H_{\\text{vap}}\\) 单位一致。\n4. 根据已知量求蒸气压或蒸发热。\n\n易错点：\n- 使用 \\(\\lg\\) 时分母有 \\(2.303R\\)。\n- \\(\\Delta H\\) 若用 J·mol\\(^{-1}\\)，\\(R\\) 应用 J·mol\\(^{-1}\\)·K\\(^{-1}\\)。\n\n例题方向：\n- 已知两个温度的蒸气压求 \\(\\Delta H_{\\text{vap}}\\)。\n- 已知 \\(\\Delta H_{\\text{vap}}\\) 和一个温度的蒸气压求另一个温度的蒸气压。\n\n## 四、需要记忆的性质和规律\n\n| 知识点 | 具体内容 | 记忆方法 | 常见考法 |\n|---|---|---|---|\n| 物质聚集状态 | 气态、液态、固态；材料还提到等离子体、玻色-爱因斯坦凝聚态、费米子凝聚态 | 常规三态为主，其他状态了解 | 判断物态或相的概念 |\n| 气体一般性质 | 扩散、可压缩、热胀冷缩、可液化 | 气体分子间距大 | 概念判断 |\n| 理想气体假设 | 分子间无作用力，分子本身体积忽略 | “无作用力、无体积” | 判断近似条件 |\n| 理想气体近似条件 | 温度不太低、压力不太高 | 高温低压更理想 | 判断真实气体能否用 \\(pV=nRT\\) |\n| 标准状况摩尔体积 | 课件用到 1 mol 氮气约 22.4 L | 1 mol 气体常用 22.4 L | 补充常考点：注意材料未展开标准状况定义 |\n| 气体温度 | 热力学温度单位 K，\\(T=t+273\\) | 摄氏加 273 | 气体计算必考 |\n| 空气分压 | 1 atm 空气中氮气约 0.78 atm，氧气约 0.21 atm | 空气约 78% N\\(_2\\)、21% O\\(_2\\) | 分压计算 |\n| 潜水分压 | 水深每增加 10 m，总压约增加 1 atm；90 m 约 10 atm | 深 10 m 加 1 atm | 分压与安全分析 |\n| 深海混合气 | 90 m、总压 10 atm，2% O\\(_2\\)、8% N\\(_2\\)、90% He 时分压分别为 0.2、0.8、9.0 atm | 摩尔分数乘总压 | 综合应用 |\n| 实际气体偏差 | 分子体积和分子间作用力导致偏差 | “体积使 \\(Z\u003e1\\)，吸引使 \\(Z\u003c1\\)” | 判断 \\(Z\\) 大小 |\n| 温度对实际气体 | 一定压力下，温度越高气体越接近理想气体 | 高温削弱分子间作用 | \\(Z\\) 趋势题 |\n| 分子种类对 \\(Z\\) | 分子量小、非极性、作用力弱时，体积因素可主导，\\(Z\u003e1\\)，如 H\\(_2\\) | 作用弱则体积效应明显 | 真实气体偏差判断 |\n| 范德华常数 \\(a\\) | 与分子间作用力有关；随沸点升高而增加 | 沸点高，作用强，\\(a\\) 大 | 比较分子间作用力 |\n| 范德华常数 \\(b\\) | 约等于气体液态时的摩尔体积 | \\(b\\) 修正体积 | 判断 \\(a,b\\) 含义 |\n| 气体液化 | 降温、加压有利于液化，但 \\(T\u003eT_c\\) 时加压无效 | 临界温度是液化上限 | 临界条件判断 |\n| 永久气体 | \\(T_b\u003c\\) 室温，\\(T_c\u003c\\) 室温，室温下加压不能液化 | \\(T_c\\) 低于室温 | 根据表格分类 |\n| 可凝聚气体 | \\(T_b\u003c\\) 室温，\\(T_c\u003e\\) 室温，室温下加压可以液化 | 室温低于 \\(T_c\\) | 判断液化可能性 |\n| 常温液体 | \\(T_b\u003e\\) 室温，\\(T_c\u003e\\) 室温，常温常压下为液体 | 沸点高于室温 | 物态判断 |\n| 蒸发 | 液体表面气化，吸热 | 表面发生 | 与沸腾比较 |\n| 沸腾 | 液体表面和内部同时气化 | 内外同时 | 判断沸腾条件 |\n| 饱和蒸气压 | 恒温下为定值；气液共存时不受量的变化；不同物质数值不同 | “只看温度和物质” | 密闭容器判断 |\n| 沸点与外压 | 蒸气压等于外压时沸腾；外压升高沸点升高 | 高压锅升沸点，高山降沸点 | 解释生活现象 |\n| 过热液体 | 温度高于沸点但未沸腾的液体，易爆沸 | 过热会爆沸 | 蒸馏实验安全 |\n| 防爆沸 | 蒸馏时加入沸石或搅拌，引入气化中心 | 沸石给气泡 | 实验题 |\n| 水的蒸气压 | 0、20、40、60、80、100 ℃ 时约为 0.6、2.3、7.4、19.9、47.3、101.3 kPa | 温度升高，蒸气压快速增大 | 查表或趋势判断 |\n| 凝固点 | 液相与固相平衡时的温度 | 固液共存温度 | 冷却曲线读图 |\n| 过冷液体 | 低于凝固点仍无晶体析出 | 低于凝固点但未结晶 | 概念判断 |\n| 熔点 | 固体与液体共存、固液平衡时的温度 | 固液共存平台 | 受热曲线读图 |\n| 水三相点 | \\(0.01^\\circ\\text{C}\\)，\\(610.6\\text{ Pa}\\) | 三相共存特定点 | 相图题 |\n| 水临界点 | \\(647\\text{ K}\\)，\\(2.2\\times10^7\\text{ Pa}\\) | 气液平衡线终点 | 相图题 |\n\n### 课件表格中出现的临界数据\n\n| 物质 | \\(T_b/K\\) | \\(T_c/K\\) | \\(p_c/100\\text{ kPa}\\) | \\(V_c/(\\text{cm}^3\\cdot\\text{mol}^{-1})\\) | 分类提示 |\n|---|---:|---:|---:|---:|---|\n| He | 4.22 | 5.19 | 2.27 | 57 | 永久气体 |\n| H\\(_2\\) | 20.28 | 32.97 | 12.93 | 65 | 永久气体 |\n| N\\(_2\\) | 77.36 | 126.21 | 33.9 | 90 | 永久气体 |\n| O\\(_2\\) | 90.20 | 154.59 | 50.83 | 73 | 永久气体 |\n| CH\\(_4\\) | 111.67 | 190.56 | 45.99 | 98.60 | 永久气体 |\n| CO\\(_2\\) | 194.65 | 304.13 | 73.75 | 94 | 可凝聚气体 |\n| C\\(_3\\)H\\(_8\\) | 231.1 | 369.83 | 42.48 | 200 | 可凝聚气体 |\n| Cl\\(_2\\) | 239.11 | 416.9 | 79.91 | 123 | 可凝聚气体 |\n| NH\\(_3\\) | 239.82 | 405.5 | 113.5 | 72 | 可凝聚气体 |\n| n-C\\(_4\\)H\\(_{10}\\) | 272.7 | 425.12 | 37.96 | 255 | 可凝聚气体 |\n| n-C\\(_5\\)H\\(_{12}\\) | 309.21 | 469.7 | 33.70 | 311 | 常温液体倾向 |\n| n-C\\(_6\\)H\\(_{14}\\) | 341.88 | 507.6 | 30.25 | 368 | 常温液体倾向 |\n| n-C\\(_6\\)H\\(_6\\) | 353.24 | 562.05 | 48.95 | 256 | 常温液体倾向 |\n| n-C\\(_7\\)H\\(_{16}\\) | 371.6 | 540.2 | 27.4 | 428 | 常温液体倾向 |\n| H\\(_2\\)O | 373.2 | 647.14 | 220.6 | 56 | 常温液体 |\n\n## 五、易错点总结\n\n1. 错误理解：理想气体真实存在。  \n   正确理解：理想气体是模型，真实气体只是在高温、低压附近可近似。  \n   避免方法：看到“低温、高压”就主动考虑真实气体偏差。\n\n2. 错误理解：气体计算可以直接使用摄氏温度。  \n   正确理解：气体状态方程必须使用热力学温度 K。  \n   避免方法：所有气体公式先写 \\(T=t+273\\)。\n\n3. 错误理解：只要套 \\(pV=nRT\\)，单位无所谓。  \n   正确理解：\\(R\\) 的单位必须与 \\(p,V\\) 匹配。  \n   避免方法：Pa 配 m\\(^3\\)，kPa 配 dm\\(^3\\)。\n\n4. 错误理解：\\(P_AV_A=n_ART\\) 是混合气体组分 A 的通用公式。  \n   正确理解：分压对应总容积，分体积对应总压强；正确关系是 \\(P_AV_{\\text{总}}=P_{\\text{总}}V_A=n_ART\\)。  \n   避免方法：记住“分压乘总体积，分体积乘总压”。\n\n5. 错误理解：分压和分体积的定义条件一样。  \n   正确理解：分压相同 \\(V,T\\)；分体积相同 \\(p,T\\)。  \n   避免方法：题目问分压先锁定容器总体积，问分体积先锁定总压。\n\n6. 错误理解：\\(Z=1\\) 就说明是真正理想气体。  \n   正确理解：真实气体也可能因两种偏差相抵消而 \\(Z=1\\)。  \n   避免方法：判断理想气体要看模型假设，不只看数值。\n\n7. 错误理解：所有气体加压都能液化。  \n   正确理解：只有低于临界温度时，加压才可能液化；高于 \\(T_c\\) 时加压无效。  \n   避免方法：液化题先比较温度与 \\(T_c\\)。\n\n8. 错误理解：液体有固定不变的沸点。  \n   正确理解：沸点随外界压力改变；正常沸点是在 101 kPa 下的沸点。  \n   避免方法：看到“高山”“高压锅”就联想到外压改变。\n\n9. 错误理解：饱和蒸气压由液体量决定。  \n   正确理解：恒温、气液共存时，饱和蒸气压为定值，与量无关。  \n   避免方法：判断是否恒温、是否气液共存。\n\n10. 错误理解：蒸馏时液体温度到沸点就一定平稳沸腾。  \n    正确理解：可能形成过热液体并爆沸，需要沸石或搅拌提供气化中心。  \n    避免方法：实验题写“加沸石防爆沸”。\n\n11. 错误理解：三相点就是普通冰水共存的温度。  \n    正确理解：水三相点有特定温度和压力：\\(0.01^\\circ\\text{C}\\)、\\(610.6\\text{ Pa}\\)。  \n    避免方法：三相点必须同时写温度和压力。\n\n12. 错误理解：Clausius-Clapeyron 方程中 \\(\\Delta H_{\\text{vap}}\\) 单位随便用。  \n    正确理解：\\(R\\) 与 \\(\\Delta H_{\\text{vap}}\\) 单位必须一致。  \n    避免方法：若 \\(\\Delta H\\) 用 kJ·mol\\(^{-1}\\)，先换成 J·mol\\(^{-1}\\) 或同步调整 \\(R\\)。\n\n# 本章测验题\n\n## 一、基础概念题\n\n1. 理想气体的两个基本假设是什么？\n\n2. 填空：气体状态方程 \\(pV=nRT\\) 中，若 \\(p\\) 用 Pa、\\(V\\) 用 m\\(^3\\)、\\(n\\) 用 mol、\\(T\\) 用 K，则 \\(R=\\_\\_\\_\\_\\_\\_\\)。\n\n3. 选择：下列条件下，真实气体最接近理想气体的是  \n   A. 高温低压  \n   B. 高温高压  \n   C. 低温高压  \n   D. 低温低压\n\n4. 填空：混合气体中某组分的分压等于总压乘以该组分的 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n5. 分压和分体积的定义条件分别是什么？\n\n6. 选择：高于临界温度时，气体能否通过单纯加压液化？  \n   A. 能  \n   B. 不能  \n   C. 只要压力足够大就能  \n   D. 与温度无关\n\n7. 填空：液体沸腾的条件是液体的蒸气压 \\(\\_\\_\\_\\_\\_\\_\\) 外界压力。\n\n8. 水的三相点温度和压力分别是多少？\n\n## 二、公式计算题\n\n1. 某气体在 \\(300\\text{ K}\\)、\\(100\\text{ kPa}\\) 下体积为 \\(24.0\\text{ dm}^3\\)。求该气体的物质的量。\n\n2. 某气体质量为 \\(0.132\\text{ g}\\)，在 \\(293\\text{ K}\\)、\\(9.97\\times10^4\\text{ Pa}\\) 下体积为 \\(0.190\\text{ dm}^3\\)。求摩尔质量，并判断可能是哪种气体。\n\n3. 空气近似含 \\(78\\%\\) N\\(_2\\)、\\(21\\%\\) O\\(_2\\)。若总压为 \\(1.00\\text{ atm}\\)，求 N\\(_2\\) 和 O\\(_2\\) 的分压。\n\n4. 深海 90 m 处总压约为 \\(10\\text{ atm}\\)。若呼吸混合气体含 \\(2\\%\\) O\\(_2\\)、\\(8\\%\\) N\\(_2\\)、\\(90\\%\\) He，求各气体分压。\n\n5. 已知某液体在 \\(T_1=350\\text{ K}\\) 时蒸气压 \\(p_1=40.0\\text{ kPa}\\)，摩尔蒸发热 \\(\\Delta H_{\\text{vap}}=35.0\\text{ kJ·mol}^{-1}\\)。求 \\(T_2=370\\text{ K}\\) 时的蒸气压 \\(p_2\\)。取 \\(R=8.314\\text{ J·mol}^{-1}\\text{·K}^{-1}\\)。\n\n## 三、判断题\n\n1. 理想气体模型认为气体分子间不存在相互作用力，分子本身体积也可忽略。\n\n2. 对所有真实气体，只要压力足够大，就一定能在任意温度下液化。\n\n3. 气体计算中，摄氏温度可以直接代入 \\(pV=nRT\\)。\n\n4. 在理想混合气体中，某组分分压等于该组分摩尔分数乘总压。\n\n5. 对组分 A，总有 \\(P_AV_A=n_ART\\)。\n\n6. 饱和蒸气压在温度恒定且气液共存时不随液体量改变。\n\n7. 水在高山上的沸点低于 \\(100^\\circ\\text{C}\\)。\n\n8. \\(Z=1\\) 时，该气体一定是真正的理想气体。\n\n## 四、综合题\n\n1. 现有 A、B 两种理想气体在同一容器中混合，温度为 \\(T\\)，总体积为 \\(V\\)，总压为 \\(P_{\\text{总}}\\)，物质的量分别为 \\(n_A,n_B\\)。  \n   问：  \n   (1) 写出 \\(P_A\\) 与 \\(P_{\\text{总}}\\) 的关系。  \n   (2) 写出 \\(V_A\\) 与 \\(V_{\\text{总}}\\) 的关系。  \n   (3) 判断 \\(P_AV_A=n_ART\\)、\\(P_AV_{\\text{总}}=n_ART\\)、\\(P_{\\text{总}}V_A=n_ART\\) 是否正确，并说明原因。\n\n2. 根据本章内容解释以下现象：  \n   (1) 高压锅中水更容易把食物煮熟。  \n   (2) 蒸馏时要加入沸石或进行搅拌。  \n   (3) 家用液化气钢瓶有时仍然很重却不易点燃。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 分子间作用力可忽略；分子本身体积相对于气体体积可忽略。\n\n2. \\(8.314\\ \\text{Pa}\\cdot\\text{m}^3\\cdot\\text{mol}^{-1}\\cdot\\text{K}^{-1}\\)。\n\n3. A。高温使分子间作用相对减弱，低压使分子自身体积影响减小。\n\n4. 摩尔分数。\n\n5. 分压：相同 \\(V,T\\)；分体积：相同 \\(p,T\\)。\n\n6. B。高于临界温度时，无论怎样加压都不能液化。\n\n7. 等于。\n\n8. \\(T=0.01^\\circ\\text{C}\\)，\\(p=610.6\\text{ Pa}\\)。\n\n## 二、公式计算题答案\n\n1. 解题思路：用 \\(n=pV/(RT)\\)，选择 \\(R=8.31\\text{ kPa·dm}^3\\text{·mol}^{-1}\\text{·K}^{-1}\\)。  \n   详细步骤：\n   \\[\n   n=\\frac{100\\times24.0}{8.31\\times300}=0.963\\text{ mol}\n   \\]\n   最终答案：\\(0.963\\text{ mol}\\)。  \n   易错提醒：kPa 与 dm\\(^3\\) 可以配套使用，但不能混用 Pa 与 dm\\(^3\\)。\n\n2. 解题思路：用 \\(M=mRT/(pV)\\)。  \n   详细步骤：\\(V=0.190\\text{ dm}^3=0.190\\times10^{-3}\\text{ m}^3\\)。\n   \\[\n   M=\\frac{0.132\\times8.314\\times293}{9.97\\times10^4\\times0.190\\times10^{-3}}\n   \\approx17.0\\text{ g·mol}^{-1}\n   \\]\n   最终答案：\\(M\\approx17.0\\text{ g·mol}^{-1}\\)，可能为 NH\\(_3\\)。  \n   易错提醒：体积必须从 dm\\(^3\\) 换成 m\\(^3\\)。\n\n3. 解题思路：用 \\(P_i=x_iP_{\\text{总}}\\)。  \n   详细步骤：\n   \\[\n   P_{\\text{N}_2}=0.78\\times1.00=0.78\\text{ atm}\n   \\]\n   \\[\n   P_{\\text{O}_2}=0.21\\times1.00=0.21\\text{ atm}\n   \\]\n   最终答案：N\\(_2\\) 分压 \\(0.78\\text{ atm}\\)，O\\(_2\\) 分压 \\(0.21\\text{ atm}\\)。  \n   易错提醒：分压不是质量分数乘总压，本题按体积分数/摩尔分数近似。\n\n4. 解题思路：分压等于摩尔分数乘总压。  \n   详细步骤：\n   \\[\n   P_{\\text{O}_2}=0.02\\times10=0.20\\text{ atm}\n   \\]\n   \\[\n   P_{\\text{N}_2}=0.08\\times10=0.80\\text{ atm}\n   \\]\n   \\[\n   P_{\\text{He}}=0.90\\times10=9.0\\text{ atm}\n   \\]\n   最终答案：O\\(_2\\) 为 \\(0.20\\text{ atm}\\)，N\\(_2\\) 为 \\(0.80\\text{ atm}\\)，He 为 \\(9.0\\text{ atm}\\)。  \n   易错提醒：深处总压大，但生理影响主要看各气体分压。\n\n5. 解题思路：用 Clausius-Clapeyron 两点式。  \n   详细步骤：\n   \\[\n   \\lg\\frac{p_2}{p_1}\n   =\\frac{35000}{2.303\\times8.314}\n   \\left(\\frac{370-350}{370\\times350}\\right)\n   \\]\n   \\[\n   \\lg\\frac{p_2}{40.0}\\approx0.282\n   \\]\n   \\[\n   \\frac{p_2}{40.0}=10^{0.282}\\approx1.91\n   \\]\n   \\[\n   p_2\\approx76.4\\text{ kPa}\n   \\]\n   最终答案：\\(p_2\\approx76.4\\text{ kPa}\\)。  \n   易错提醒：\\(\\Delta H_{\\text{vap}}\\) 要从 kJ·mol\\(^{-1}\\) 换成 J·mol\\(^{-1}\\)，且温度必须用 K。\n\n## 三、判断题答案\n\n1. 正确。理想气体的核心假设就是“无作用力、无体积”。\n\n2. 错误。高于临界温度时，无论怎样加压都不能液化。\n\n3. 错误。必须使用热力学温度 K。\n\n4. 正确。理想混合气体中 \\(P_i=x_iP_{\\text{总}}\\)。\n\n5. 错误。混合气体中正确关系是 \\(P_AV_{\\text{总}}=P_{\\text{总}}V_A=n_ART\\)，不能把分压和分体积直接相乘。\n\n6. 正确。饱和蒸气压在恒温且气液共存时为定值。\n\n7. 正确。高山大气压低，水蒸气压达到外压所需温度降低，所以沸点降低。\n\n8. 错误。真实气体可能因吸引力效应和体积效应相互抵消而 \\(Z=1\\)。\n\n## 四、综合题答案\n\n1. 解析：  \n   (1)\n   \\[\n   P_A=\\frac{n_A}{n_A+n_B}P_{\\text{总}}\n   \\]\n   (2)\n   \\[\n   V_A=\\frac{n_A}{n_A+n_B}V_{\\text{总}}\n   \\]\n   (3) \\(P_AV_A=n_ART\\) 错误，因为 \\(P_A\\) 对应的是组分 A 单独占有总体积 \\(V_{\\text{总}}\\) 时的压力；\\(V_A\\) 对应的是组分 A 在总压 \\(P_{\\text{总}}\\) 下的分体积。  \n   \\[\n   P_AV_{\\text{总}}=n_ART\n   \\]\n   正确。  \n   \\[\n   P_{\\text{总}}V_A=n_ART\n   \\]\n   正确。  \n   核心结论：分压配总体积，分体积配总压。\n\n2. 解析：  \n   (1) 高压锅内外界压力升高，水必须在更高温度下蒸气压才等于外压，因此沸点升高，食物更容易煮熟。  \n   (2) 液体可能形成过热液体，突然产生大量气泡导致爆沸。沸石或搅拌能引入小气泡，提供气化中心，避免爆沸。  \n   (3) 液化气主要成分为丙烷、丁烷，减压后容易气化；但钢瓶中若剩余较多 C\\(_5\\)H\\(_{12}\\)、C\\(_6\\)H\\(_{14}\\) 等较高级烷烃，它们室温下不易气化，所以钢瓶仍重却不易点燃。\n\n## 材料完整性说明\n\n- PDF 的文字层可以识别，表格、公式和主要图示结论已整理。\n- 部分曲线图只给出了趋势和关键点，材料中没有给出完整坐标数据，因此本整理按“趋势、定义、关键点”归纳。\n- “标准状况 1 mol 气体约 22.4 L”和“收集含水蒸气气体时需扣除水蒸气分压”属于补充常考点；后者材料只提示“混合气体中有水蒸汽时要注意凝聚问题”，未展开计算步骤。\n",
    "chemistry_review/02-chemistry_review.md":  "# 本章复习提纲\n\n## 一、本章知识框架\n\n### 1. 溶液及其分类\n\n1. 广义溶液：两种或两种以上物质组成的均匀、稳定分散体系。\n2. 按聚集状态分类：\n   - 气态：空气、天然气，常称混合气体。\n   - 固态：黄铜等，常称固溶体或合金。\n   - 液态：气体、固体或液体溶于液体，狭义溶液通常指液态溶液。\n3. 按分散相性质分类：\n   - 电解质溶液：盐、酸、碱水溶液等。\n   - 非电解质溶液：糖水、白酒等。\n4. 按分散介质分类：\n   - 水溶液：以水为分散介质，常用 \\((aq.)\\) 表示。\n   - 非水溶液：如碘溶于酒精。\n\n### 2. 溶液浓度\n\n1. 相对量浓度：质量分数、摩尔分数、体积分数。\n2. 有量纲浓度：物质的量浓度、质量摩尔浓度。\n3. 浓度换算常依赖摩尔质量 \\(M\\) 和密度 \\(\\rho\\)。\n4. ppm、ppb 可指质量、物质的量、体积等比例，材料指出“不明确，所以不再使用”。\n\n### 3. 溶解度及经验规律\n\n1. 溶解过程：既有溶质质点离散，又有溶剂化。\n2. 饱和溶液与溶解度：溶解达到动态平衡时，与溶质固体共存的溶液叫饱和溶液。\n3. 温度、压力影响：\n   - 固体溶解度主要受温度影响，压力影响极小。\n   - 气体溶解度受温度和压力显著影响，一般随温度升高而减小，随压力增大而增大。\n4. 相似相溶：溶质与溶剂结构越相似越易溶。\n5. 过饱和溶液：溶质含量超过平衡溶解量，属于暂时不稳定的非平衡状态。\n\n### 4. 非电解质稀溶液的依数性\n\n依数性指只与溶质粒子数目或浓度有关，而与溶质本性无关的性质。\n\n1. 蒸气压下降：非挥发性、非电解质稀溶液满足 Raoult 定律。\n2. 沸点升高：蒸气压下降导致沸点升高。\n3. 凝固点降低：蒸气压下降导致凝固点降低。\n4. 渗透压：半透膜导致溶剂迁移；稀溶液渗透压满足 van\u0027t Hoff 方程。\n\n### 5. 电解质溶液\n\n1. 电解质：本身有离子导电性，或在熔融/水溶液中能呈现离子导电性的物质。\n2. Arrhenius 电离学说：\n   - 电解质在溶液中电离为带电质点。\n   - 离子使溶液导电。\n   - 学说缺陷：把所有电解质都看成部分电离，不符合强电解质事实。\n3. 活度与活度系数：\n   - 强电解质完全电离，但离子间作用显著。\n   - 用活度 \\(a\\) 代替实际浓度描述有效浓度。\n\n### 6. 胶体溶液\n\n1. 分散体系按粒径分：\n   - 真溶液：分散相粒径 \\(\u003c1\\text{ nm}\\)，均相、稳定。\n   - 胶体溶液：\\(1\\sim1000\\text{ nm}\\)，通常非均相但较稳定。\n   - 悬浊液和乳浊液：\\(\u003e1000\\text{ nm}\\)，非均相、不稳定。\n2. 胶体溶液类型：溶胶、大分子溶液、缔合胶体。\n3. 溶胶特点：热力学不稳定、动力学稳定。\n4. 胶体性质：丁铎尔效应、电泳、渗析、聚沉。\n\n## 二、重点概念整理\n\n### 溶液\n\n定义：两种或两种以上物质组成的均匀、稳定分散体系。\n\n需要记忆的点：\n- 广义溶液可为气态、液态、固态。\n- 狭义溶液通常指液态溶液。\n- 均匀、稳定是关键词。\n\n容易混淆的地方：\n- 胶体也较稳定，但粒径与真溶液不同，且通常不是严格均相。\n\n可能怎么考：\n- 判断空气、黄铜、盐水分别属于哪类分散体系。\n\n### 溶剂和溶质\n\n定义：能溶解其他物质的物质叫溶剂；被溶解的物质叫溶质。\n\n需要记忆的点：\n- 气体或固体溶于液体时，液体为溶剂。\n- 两种液体互溶时，量多者为溶剂，量少者为溶质。\n\n容易混淆的地方：\n- 啤酒、白酒中乙醇含量不同，但液液互溶时通常按量多少判断溶剂/溶质。\n\n可能怎么考：\n- 给出乙醇水溶液，判断溶剂和溶质。\n\n### 质量分数\n\n定义：溶质质量与溶液质量之比，符号 \\(\\omega\\)。\n\n需要记忆的点：\n- 分母是“溶液质量”，不是溶剂质量。\n- 常用 wt% 表示质量百分比。\n\n容易混淆的地方：\n- 10 g NaCl 溶于 100 g 水，质量分数不是 10%，而是 \\(10/(10+100)=9.1\\%\\)。\n\n可能怎么考：\n- 溶质质量、溶剂质量给出，计算质量分数。\n\n### 摩尔分数\n\n定义：某组分物质的量与溶液中各组分总物质的量之比，符号 \\(x\\)。\n\n需要记忆的点：\n- 无量纲。\n- 各组分摩尔分数之和为 1。\n\n容易混淆的地方：\n- 质量多不等于摩尔分数大，因为摩尔质量不同。\n- 材料中“10.0 g NaCl 溶于 100.0 g 水”的摩尔分数数值疑似笔误：按计算 \\(x_{\\mathrm{NaCl}}\\approx0.0298\\)，不是 0.298。\n\n可能怎么考：\n- 由质量和摩尔质量求摩尔分数。\n\n### 质量摩尔浓度\n\n定义：溶质物质的量除以溶剂质量，符号 \\(m\\)，单位 mol·kg\\(^{-1}\\)。\n\n需要记忆的点：\n- 分母是溶剂质量，单位必须是 kg。\n- 与温度无关，因为质量不随温度变化。\n\n容易混淆的地方：\n- 质量摩尔浓度 \\(m\\) 与物质的量浓度 \\(c\\) 不同。\n\n可能怎么考：\n- 依数性计算中常用 \\(m\\)。\n\n### 体积分数\n\n定义：相同温度、压力下，某组分混合前体积与混合前各组分体积总和之比，符号 \\(\\varphi\\)。\n\n需要记忆的点：\n- 用混合前体积。\n- 常用 v% 表示。\n\n容易混淆的地方：\n- 液体混合后体积可能不等于混合前体积和，因此定义强调“混合前”。\n\n可能怎么考：\n- 配制乙醇水溶液时计算体积分数。\n\n### 物质的量浓度\n\n定义：溶质物质的量除以溶液体积，符号 \\(c\\)，单位 mol·L\\(^{-1}\\)，常用 M 表示。\n\n需要记忆的点：\n- 分母是溶液体积。\n- 溶液体积随温度略变，因此浓度 \\(c\\) 会受温度影响。\n\n容易混淆的地方：\n- 只有溶质质量和溶剂质量时，若无溶液体积或密度，不能直接求 \\(c\\)。\n\n可能怎么考：\n- 配制 \\(1.00\\text{ mol·L}^{-1}\\) CuSO\\(_4\\) 溶液。\n\n### 饱和溶液和溶解度\n\n定义：达到溶解平衡时，与溶质固体共存的溶液叫饱和溶液；一定温度、压力下，一定量饱和溶液中溶质含量叫溶解度。\n\n需要记忆的点：\n- 溶解是动态平衡过程。\n- 习惯上用 g/100 g 溶剂表示溶解度。\n- IUPAC 建议用饱和溶液浓度表示。\n\n容易混淆的地方：\n- “难溶”不等于绝对不溶；严格说绝对不溶物不存在。\n\n可能怎么考：\n- 判断易溶、微溶、难溶。\n\n### 相似相溶\n\n定义：溶质与溶剂结构相似时更易互溶。\n\n需要记忆的点：\n- 极性相似、结构相似更易溶。\n- 同类固体中，熔点越低，在液体中的溶解度往往越大。\n- 同类气体中，沸点越高，在液体中的溶解度往往越大。\n\n容易混淆的地方：\n- 水和乙醇无限混溶，但水和煤油不相溶。\n\n可能怎么考：\n- 用相似相溶解释溶解度差异。\n\n### 过饱和溶液\n\n定义：溶液中溶质含量超过平衡状态所能溶解的最高量。\n\n需要记忆的点：\n- 暂时、不稳定、非平衡。\n- 外界扰动会导致过剩晶体析出。\n- 结构越复杂越容易发生过饱和，如 NaAc 比 NaCl 容易。\n\n容易混淆的地方：\n- 过饱和不是稳定平衡状态。\n\n可能怎么考：\n- 判断过饱和溶液受扰动后的现象。\n\n### 依数性\n\n定义：非电解质稀溶液中，只与溶质粒子数目或浓度有关，而与溶质本性无关的性质。\n\n需要记忆的点：\n- 包括蒸气压下降、沸点升高、凝固点降低、渗透压。\n- 主要适用于非挥发性、非电解质稀溶液。\n\n容易混淆的地方：\n- 电解质因电离产生更多粒子，不能直接套非电解质公式。\n\n可能怎么考：\n- 由沸点升高或凝固点降低求摩尔质量。\n\n### 渗透和渗透压\n\n定义：半透膜允许溶剂通过而不允许溶质通过，溶剂由蒸气压较高处向较低处移动；刚好阻止渗透所需外加压力叫渗透压。\n\n需要记忆的点：\n- 稀溶液满足 \\(\\Pi V=nRT\\) 或 \\(\\Pi=cRT\\)。\n- 渗透压在生物体内调节细胞内外水分和体液平衡。\n- 反渗透用于海水淡化。\n\n容易混淆的地方：\n- 反渗透要求外加压力超过溶液渗透压。\n\n可能怎么考：\n- 用血浆凝固点降低求渗透压或等渗浓度。\n\n### 电解质与活度\n\n定义：电解质是在熔融或水溶液中能呈现离子导电性的物质；活度 \\(a\\) 表示有效离子浓度。\n\n需要记忆的点：\n- 强电解质完全电离，但离子间作用使实际浓度不能直接代表有效作用。\n- \\(a=\\gamma c\\)，\\(\\gamma\\) 为活度系数。\n- 浓度越小，\\(\\gamma\\) 越趋于 1；离子电荷越大，\\(\\gamma\\) 越小。\n\n容易混淆的地方：\n- 强电解质不是“部分电离”，但行为仍可偏离理想。\n\n可能怎么考：\n- 判断活度系数变化趋势。\n\n### 胶体溶液\n\n定义：分散相粒径约 \\(1\\sim1000\\text{ nm}\\) 的分散体系，包括溶胶、大分子溶液、缔合胶体。\n\n需要记忆的点：\n- 真溶液粒径 \\(\u003c1\\text{ nm}\\)，悬浊液/乳浊液粒径 \\(\u003e1000\\text{ nm}\\)。\n- 丁铎尔效应用于鉴别胶体。\n- 电泳说明胶粒带电。\n- 渗析可除去小分子或离子杂质。\n- 聚沉是电解质破坏胶体稳定性导致沉淀。\n\n容易混淆的地方：\n- 溶胶热力学不稳定，但可因双电层等原因具有动力学稳定性。\n\n可能怎么考：\n- 比较真溶液、胶体、粗分散体系；解释丁铎尔效应。\n\n## 三、重要公式整理\n\n### 1. 质量分数\n\n公式：\n\\[\n\\omega_B=\\frac{m_B}{m_{\\text{溶液}}}\n=\\frac{m_B}{m_B+m_A}\n\\]\n\n符号说明：\n- \\(\\omega_B\\)：溶质 B 的质量分数，无量纲。\n- \\(m_B\\)：溶质质量。\n- \\(m_A\\)：溶剂质量。\n- \\(m_{\\text{溶液}}\\)：溶液总质量。\n\n适用条件：\n- 任意溶液浓度表示。\n\n解题步骤：\n1. 求溶液总质量。\n2. 用溶质质量除以溶液总质量。\n3. 若要求百分数，乘以 100%。\n\n易错点：\n- 分母不是溶剂质量。\n\n例题方向：\n- \\(10.0\\text{ g}\\) NaCl 溶于 \\(100.0\\text{ g}\\) 水，\\(\\omega=9.1\\%\\)。\n\n### 2. 摩尔分数\n\n公式：\n\\[\nx_B=\\frac{n_B}{\\sum_i n_i}\n\\]\n\n符号说明：\n- \\(x_B\\)：组分 B 的摩尔分数。\n- \\(n_B\\)：组分 B 的物质的量。\n- \\(\\sum_i n_i\\)：各组分物质的量总和。\n\n适用条件：\n- 多组分混合物。\n\n解题步骤：\n1. 由质量和摩尔质量求各组分物质的量。\n2. 求总物质的量。\n3. 计算某组分占比。\n\n易错点：\n- 不能用质量直接代替物质的量。\n- 材料中 NaCl 摩尔分数例题疑似笔误，按数据应为 \\(0.0298\\)。\n\n例题方向：\n- 已知 NaCl 和水的质量，求 \\(x_{\\mathrm{NaCl}}\\) 和 \\(x_{\\mathrm{H_2O}}\\)。\n\n### 3. 质量摩尔浓度\n\n公式：\n\\[\nm_B=\\frac{n_B}{m_A(\\text{kg})}\n\\]\n\n符号说明：\n- \\(m_B\\)：质量摩尔浓度，mol·kg\\(^{-1}\\)。\n- \\(n_B\\)：溶质物质的量，mol。\n- \\(m_A\\)：溶剂质量，kg。\n\n适用条件：\n- 依数性计算中常用。\n\n解题步骤：\n1. 求溶质物质的量。\n2. 将溶剂质量换算为 kg。\n3. 相除得 \\(m_B\\)。\n\n易错点：\n- 分母是溶剂质量，不是溶液质量。\n\n例题方向：\n- \\(10.0\\text{ g}\\) NaCl 溶于 \\(100.0\\text{ g}\\) 水，\\(m=1.71\\text{ mol·kg}^{-1}\\)。\n\n### 4. 体积分数\n\n公式：\n\\[\n\\varphi_B=\\frac{V_B}{\\sum_i V_i}\n\\]\n\n符号说明：\n- \\(\\varphi_B\\)：组分 B 的体积分数。\n- \\(V_B\\)：组分 B 混合前体积。\n- \\(\\sum_i V_i\\)：混合前各组分体积之和。\n\n适用条件：\n- 相同温度、压力下的体积比。\n\n解题步骤：\n1. 取混合前体积。\n2. 用某组分体积除以混合前总体积。\n\n易错点：\n- 使用混合前体积，而不是混合后溶液体积。\n\n例题方向：\n- \\(10.0\\text{ mL}\\) 乙醇与 \\(100.0\\text{ mL}\\) 水混合，\\(\\varphi=9.1\\%\\)。\n\n### 5. 物质的量浓度\n\n公式：\n\\[\nc_B=\\frac{n_B}{V_{\\text{溶液}}}\n\\]\n\n符号说明：\n- \\(c_B\\)：物质的量浓度，mol·L\\(^{-1}\\)。\n- \\(n_B\\)：溶质物质的量，mol。\n- \\(V_{\\text{溶液}}\\)：溶液体积，L。\n\n适用条件：\n- 配制标准溶液、常规浓度计算。\n\n解题步骤：\n1. 求溶质物质的量。\n2. 确定溶液总体积。\n3. 相除。\n\n易错点：\n- 仅知道溶质质量和溶剂质量，若无溶液体积或密度，不能求 \\(c\\)。\n\n例题方向：\n- 配制 \\(1.00\\text{ mol·L}^{-1}\\) CuSO\\(_4\\) 溶液。\n\n### 6. Raoult 定律\n\n公式：\n\\[\np=p^0x_1\n\\]\n\n符号说明：\n- \\(p\\)：溶液蒸气压。\n- \\(p^0\\)：同温度下纯溶剂蒸气压。\n- \\(x_1\\)：溶剂摩尔分数。\n\n适用条件：\n- 非挥发性、非电解质稀溶液。\n\n常见变形：\n\\[\n\\Delta p=p^0-p=p^0x_2\n\\]\n稀溶液中：\n\\[\n\\Delta p=km,\\qquad k=\\frac{p^0M}{1000}\n\\]\n\n解题步骤：\n1. 求溶剂和溶质物质的量。\n2. 求溶剂摩尔分数 \\(x_1\\)。\n3. 代入 \\(p=p^0x_1\\)。\n\n易错点：\n- \\(x_1\\) 是溶剂摩尔分数，不是溶质摩尔分数。\n- 只适用于非挥发性、非电解质稀溶液。\n\n例题方向：\n- 根据蒸气压下降求溶液蒸气压或溶质摩尔质量。\n\n### 7. 沸点升高\n\n公式：\n\\[\n\\Delta T_b=K_bm\n\\]\n\n符号说明：\n- \\(\\Delta T_b\\)：沸点升高值，K 或 \\(^\\circ\\text{C}\\) 的温差。\n- \\(K_b\\)：摩尔沸点升高常数，K·kg·mol\\(^{-1}\\)。\n- \\(m\\)：质量摩尔浓度，mol·kg\\(^{-1}\\)。\n\n适用条件：\n- 非挥发性、非电解质稀溶液。\n\n补充表达式（材料给出）：\n\\[\nK_b=\\frac{RT^2M}{\\Delta H\\times1000}\n\\]\n\n解题步骤：\n1. 求 \\(\\Delta T_b=T_b(\\text{溶液})-T_b(\\text{纯溶剂})\\)。\n2. 代入 \\(\\Delta T_b=K_bm\\) 求 \\(m\\)。\n3. 若求摩尔质量，用 \\(m=(m_{\\text{溶质}}/M)/m_{\\text{溶剂}}(\\text{kg})\\)。\n\n易错点：\n- \\(m\\) 是质量摩尔浓度，不是物质的量浓度 \\(c\\)。\n\n例题方向：\n- 由沸点升高求尼古丁摩尔质量和分子式。\n\n### 8. 凝固点降低\n\n公式：\n\\[\n\\Delta T_f=K_fm\n\\]\n\n符号说明：\n- \\(\\Delta T_f\\)：凝固点降低值。\n- \\(K_f\\)：摩尔凝固点降低常数，K·kg·mol\\(^{-1}\\)。\n- \\(m\\)：质量摩尔浓度。\n\n适用条件：\n- 非电解质稀溶液。\n\n补充表达式（材料给出）：\n\\[\nK_f=\\frac{RT^2M}{\\Delta H\\times1000}\n\\]\n\n解题步骤：\n1. 计算 \\(\\Delta T_f=T_f(\\text{纯溶剂})-T_f(\\text{溶液})\\)。\n2. 用 \\(\\Delta T_f=K_fm\\) 求 \\(m\\)。\n3. 结合溶质质量和溶剂质量求摩尔质量。\n\n易错点：\n- 凝固点降低值取正值。\n- 对挥发性溶质，凝固点法比蒸气压法、沸点法更适用。\n\n例题方向：\n- 两种溶液同温结冰，说明质量摩尔浓度相同，据此求未知物摩尔质量。\n\n### 9. 渗透压公式\n\n公式：\n\\[\n\\Pi V=nRT\n\\]\n或\n\\[\n\\Pi=cRT\n\\]\n\n符号说明：\n- \\(\\Pi\\)：渗透压。\n- \\(V\\)：溶液体积。\n- \\(n\\)：溶质物质的量。\n- \\(c=n/V\\)：物质的量浓度。\n- \\(R=8.31\\text{ kPa·dm}^3\\text{·mol}^{-1}\\text{·K}^{-1}\\)。\n- \\(T\\)：热力学温度，K。\n\n适用条件：\n- 非电解质稀溶液近似。\n- 对稀水溶液，可近似 \\(c\\approx m\\)。\n\n解题步骤：\n1. 求溶液浓度 \\(c\\)。\n2. 温度换算为 K。\n3. 代入 \\(\\Pi=cRT\\)。\n\n易错点：\n- 单位体系要一致。\n- 电解质溶液要考虑电离后粒子数增加，不能直接当作非电解质。\n\n例题方向：\n- 由血浆凝固点降低求渗透压和等渗溶液浓度。\n\n### 10. 活度\n\n公式：\n\\[\na=\\gamma c\n\\]\n\n符号说明：\n- \\(a\\)：活度。\n- \\(\\gamma\\)：活度系数。\n- \\(c\\)：实际浓度。\n\n适用条件：\n- 强电解质溶液或离子间作用明显的溶液。\n\n解题步骤：\n1. 判断是否需要用有效浓度。\n2. 用 \\(a=\\gamma c\\) 修正浓度。\n\n易错点：\n- 浓度越小，\\(\\gamma\\to1\\)。\n- 离子电荷越大，\\(\\gamma\\) 越小。\n\n例题方向：\n- 判断活度系数随浓度、离子电荷的变化趋势。\n\n补充常考点：离子强度常写为\n\\[\nI=\\frac12\\sum_i c_i z_i^2\n\\]\n但材料中没有给出完整公式，只说明 \\(I\\) 与离子浓度和电价数有关。\n\n## 四、需要记忆的性质和规律\n\n| 知识点 | 具体内容 | 记忆方法 | 常见考法 |\n|---|---|---|---|\n| 溶液定义 | 均匀、稳定的分散体系 | “均匀稳定”四字 | 判断是否为溶液 |\n| 溶液分类 | 气态、固态、液态；电解质/非电解质；水溶液/非水溶液 | 按状态、分散相、溶剂分类 | 举例分类 |\n| 溶剂判断 | 固/气溶于液体时液体为溶剂；液液互溶时量多者为溶剂 | “液体优先，液液看量” | 判断乙醇水溶液中溶质溶剂 |\n| 质量分数 | 溶质质量/溶液质量 | 分母“溶液” | 计算 wt% |\n| 摩尔分数 | 组分物质的量/总物质的量 | 先换成 mol | 浓度换算 |\n| 质量摩尔浓度 | 溶质物质的量/溶剂质量 kg | 分母“溶剂 kg” | 依数性计算 |\n| 体积分数 | 混合前体积比 | “混合前” | 配制 v% 溶液 |\n| 物质的量浓度 | 溶质物质的量/溶液体积 | 分母“溶液体积” | 配制 mol/L 溶液 |\n| ppm/ppb | 可指质量、物质的量、体积比例，材料指出不明确，不再使用 | 不明确就谨慎 | 判断浓度单位是否规范 |\n| 溶解过程 | 离散吸热、溶剂化放热 | “拆开吸热，结合放热” | 判断溶解热、体积变化原因 |\n| 易溶/微溶/难溶 | \\(\u003e1\\text{ g}\\)、\\(0.01\\sim1\\text{ g}\\)、\\(\u003c0.01\\text{ g}\\) 每 100 g 水 | 1 和 0.01 两个界限 | 溶解性分类 |\n| 绝对不溶 | 严格地说不存在 | 难溶不等于不溶 | 概念判断 |\n| 固体溶解度与温度 | 一般随温度升高而增大，少数降低如 CaSO\\(_4\\)、Ce\\(_2\\)(SO\\(_4\\))\\(_3\\) | 大多数升，少数降 | 结晶、重结晶 |\n| 固体溶解度与压力 | 压力影响极小 | 固体看温度 | 判断条件是否需写压力 |\n| 气体溶解度 | 温度升高而减小，压力增大而增大 | “冷水多气，加压多气” | 汽水、鱼类冷水生活 |\n| 相似相溶 | 结构相似易溶 | 极性相似、结构相似 | 水/乙醇/煤油互溶性 |\n| 固体熔点与溶解度 | 同类固体熔点越低，在液体中溶解度越大 | 熔点低更像液体 | 表格趋势判断 |\n| 气体沸点与溶解度 | 同类气体沸点越高，在液体中溶解度越大 | 沸点高作用强 | 比较 H\\(_2\\)、N\\(_2\\)、O\\(_2\\)、Cl\\(_2\\) |\n| 过饱和溶液 | 暂时不稳定，扰动后析晶 | “超过平衡，扰动析出” | 现象解释 |\n| 依数性 | 与浓度有关，与溶质本性无关 | “只数粒子数” | 判断性质 |\n| 蒸气压下降 | 溶液蒸气压低于纯溶剂，浓度越大下降越多 | 溶质占表面 | Raoult 定律 |\n| 沸点升高 | 蒸气压下降导致沸点升高 | 外压相同，要更高温 | 求摩尔质量 |\n| 凝固点降低 | 蒸气压下降导致凝固点降低 | 防冻液、植物抗冻 | 求摩尔质量 |\n| 渗透 | 溶剂通过半透膜向蒸气压较低处移动 | 半透膜只让溶剂过 | 生理盐水、海水淡化 |\n| 反渗透 | 外压超过渗透压，溶剂反向通过半透膜 | 加压制纯水 | 海水淡化 |\n| 电解质 | 熔融或水溶液中能离子导电 | 导电靠离子 | 概念判断 |\n| Arrhenius 学说 | 电解质因溶剂作用电离，离子使溶液导电 | “先有离子，后导电” | 判断导电原因 |\n| 活度系数 | 浓度越小越接近 1；电荷越大越小 | 稀溶液趋理想 | 强电解质题 |\n| 分散体系粒径 | 真溶液 \\(\u003c1\\text{ nm}\\)，胶体 \\(1\\sim1000\\text{ nm}\\)，粗分散 \\(\u003e1000\\text{ nm}\\) | 1 与 1000 两个界限 | 分类题 |\n| 溶胶稳定性 | 热力学不稳定，动力学稳定 | 表面能高但双电层稳定 | 溶胶结构 |\n| 丁铎尔效应 | 胶粒散射光形成光柱 | 胶体看光路 | 鉴别胶体 |\n| 电泳 | 带电胶粒在电场中向异性电极运动 | 带电才会移 | 判断胶粒电性 |\n| 渗析 | 半透膜让小分子/离子过，不让胶粒过 | 大胶粒过不去 | 净化胶体 |\n| 聚沉 | 电解质破坏胶粒排斥，形成沉淀 | 加盐可聚沉 | 胶体稳定性 |\n\n## 五、易错点总结\n\n1. 错误理解：10 g 溶质加 100 g 水就是 10% 溶液。  \n   正确理解：质量分数分母是溶液质量，所以是 \\(10/(10+100)=9.1\\%\\)。  \n   如何避免：看到质量分数先求总质量。\n\n2. 错误理解：质量摩尔浓度和物质的量浓度一样。  \n   正确理解：\\(m\\) 的分母是溶剂质量 kg；\\(c\\) 的分母是溶液体积 L。  \n   如何避免：依数性优先找 \\(m\\)，渗透压常用 \\(c\\)。\n\n3. 错误理解：体积分数用混合后体积。  \n   正确理解：体积分数定义用混合前体积。  \n   如何避免：题中出现 v% 时写明“混合前”。\n\n4. 错误理解：已知溶质质量和溶剂质量一定能求物质的量浓度。  \n   正确理解：还需溶液体积或密度。  \n   如何避免：没有体积数据时，不要硬算 \\(c\\)。\n\n5. 错误理解：难溶就是完全不溶。  \n   正确理解：绝对不溶物不存在，难溶只是溶解度很小。  \n   如何避免：用“难溶”而非“不溶”。\n\n6. 错误理解：固体溶解度总随温度升高而增大。  \n   正确理解：一般增大，但 CaSO\\(_4\\)、Ce\\(_2\\)(SO\\(_4\\))\\(_3\\) 等可降低。  \n   如何避免：写“一般”并记少数例外。\n\n7. 错误理解：气体溶解度随温度升高而增大。  \n   正确理解：气体一般随温度升高溶解度减小，随压力增大而增大。  \n   如何避免：联系汽水开瓶和鱼类生活在冷水中。\n\n8. 错误理解：过饱和溶液是稳定平衡态。  \n   正确理解：过饱和是暂时不稳定非平衡态，扰动后会析晶。  \n   如何避免：关键词“暂时、不稳定、非平衡”。\n\n9. 错误理解：依数性与溶质种类有关。  \n   正确理解：非电解质稀溶液依数性与浓度或粒子数有关，与溶质本性无关。  \n   如何避免：看粒子数，不看化学性质。\n\n10. 错误理解：Raoult 定律中的 \\(x_1\\) 是溶质摩尔分数。  \n    正确理解：\\(p=p^0x_1\\) 中 \\(x_1\\) 是溶剂摩尔分数。  \n    如何避免：蒸气压来自溶剂，所以下标 1 代表溶剂。\n\n11. 错误理解：沸点升高和凝固点降低公式可直接用于电解质。  \n    正确理解：材料公式适用于非电解质稀溶液；电解质电离会改变粒子数。  \n    如何避免：看到 NaCl、KNO\\(_3\\) 等先考虑电离。\n\n12. 错误理解：渗透压中 \\(c\\) 和 \\(m\\) 总是相等。  \n    正确理解：只有稀水溶液可近似 \\(c\\approx m\\)。  \n    如何避免：题目明确“稀水溶液”时才近似。\n\n13. 错误理解：电解质溶液导电是通电后才产生离子。  \n    正确理解：离子本来存在，电场只使离子迁移并发生电极反应。  \n    如何避免：记“先有离子，后导电”。\n\n14. 错误理解：强电解质浓度就是有效浓度。  \n    正确理解：强电解质完全电离，但离子间作用显著，要用活度描述有效浓度。  \n    如何避免：强电解质题关注 \\(\\gamma\\) 和 \\(a\\)。\n\n15. 错误理解：胶体是真溶液。  \n    正确理解：胶体粒径 \\(1\\sim1000\\text{ nm}\\)，与真溶液粒径和性质不同。  \n    如何避免：用丁铎尔效应和粒径判断。\n\n16. 材料疑似笔误：第 7 页 \\(10.0\\text{ g}\\) NaCl 溶于 \\(100.0\\text{ g}\\) 水的摩尔分数。  \n    正确计算：\\(n(\\mathrm{NaCl})=0.171\\text{ mol}\\)，\\(n(\\mathrm{H_2O})=5.56\\text{ mol}\\)，所以\n    \\[\n    x(\\mathrm{NaCl})=\\frac{0.171}{0.171+5.56}\\approx0.0298\n    \\]\n    而不是材料中显示的 0.298；\\(x(\\mathrm{H_2O})\\approx0.970\\)。  \n    如何避免：摩尔分数结果要检查总和是否为 1。\n\n# 本章测验题\n\n## 一、基础概念题\n\n1. 填空：广义溶液是由两种或两种以上物质组成的 \\(\\_\\_\\_\\_\\_\\_\\)、\\(\\_\\_\\_\\_\\_\\_\\) 的分散体系。\n\n2. 选择：两种液体互相溶解时，一般把哪一种称为溶剂？  \n   A. 摩尔质量大的  \n   B. 量多的  \n   C. 密度大的  \n   D. 沸点高的\n\n3. 填空：质量摩尔浓度的分母是 \\(\\_\\_\\_\\_\\_\\_\\)，单位通常为 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n4. 选择：下列浓度表示中，分母为“溶液体积”的是  \n   A. 质量分数  \n   B. 摩尔分数  \n   C. 质量摩尔浓度  \n   D. 物质的量浓度\n\n5. 填空：固体溶解度一般随温度升高而 \\(\\_\\_\\_\\_\\_\\_\\)，气体溶解度一般随温度升高而 \\(\\_\\_\\_\\_\\_\\_\\)。\n\n6. 选择：下列属于依数性的是  \n   A. 颜色  \n   B. 黏度  \n   C. 沸点升高  \n   D. 气味\n\n7. 填空：稀溶液的渗透压公式可写为 \\(\\Pi=\\_\\_\\_\\_\\_\\_\\)。\n\n8. 选择：丁铎尔效应主要用于鉴别  \n   A. 真溶液和胶体  \n   B. 酸和碱  \n   C. 强电解质和弱电解质  \n   D. 饱和溶液和不饱和溶液\n\n## 二、公式计算题\n\n1. 将 \\(10.0\\text{ g}\\) NaCl 溶于 \\(100.0\\text{ g}\\) 水中，求 NaCl 的质量分数。\n\n2. 将 \\(10.0\\text{ g}\\) NaCl 溶于 \\(100.0\\text{ g}\\) 水中，已知 \\(M(\\mathrm{NaCl})=58.4\\text{ g·mol}^{-1}\\)，求 NaCl 的质量摩尔浓度。\n\n3. \\(20.0^\\circ\\text{C}\\) 时水的饱和蒸气压为 \\(2.34\\text{ kPa}\\)。将 \\(17.1\\text{ g}\\) 蔗糖 \\((M=342\\text{ g·mol}^{-1})\\) 溶于 \\(100.0\\text{ g}\\) 水中，求溶液蒸气压。\n\n4. 将 \\(2.50\\text{ g}\\) 蔗糖 \\((M=342\\text{ g·mol}^{-1})\\) 溶于 \\(253.0\\text{ g}\\) 水；另将 \\(5.20\\text{ g}\\) 未知非电解质溶于 \\(1000\\text{ g}\\) 水。两溶液在同一温度结冰，求未知物摩尔质量。\n\n5. 人类血浆凝固点为 \\(272.59\\text{ K}\\)，纯水凝固点取 \\(273.15\\text{ K}\\)，水的 \\(K_f=1.86\\text{ K·kg·mol}^{-1}\\)。求血浆的质量摩尔浓度，并估算 \\(310\\text{ K}\\) 时血浆渗透压。稀水溶液取 \\(c\\approx m\\)，\\(R=8.31\\text{ kPa·dm}^3\\text{·mol}^{-1}\\text{·K}^{-1}\\)。\n\n## 三、判断题\n\n1. 质量分数的分母是溶剂质量。\n\n2. 物质的量浓度的单位可写作 mol/L 或 M。\n\n3. 质量摩尔浓度不直接受温度引起的体积变化影响。\n\n4. 固体溶解度受压力影响显著，所以描述固体溶解度必须同时注明温度和压力。\n\n5. 气体溶解度一般随压力增大而增大。\n\n6. 非电解质稀溶液的依数性只与溶质粒子数有关，与溶质本性无关。\n\n7. 强电解质在水中完全电离，因此不需要活度概念。\n\n8. 胶体的丁铎尔效应来自胶粒对光的散射。\n\n## 四、综合题\n\n1. 比较质量分数、质量摩尔浓度、物质的量浓度三种浓度表示方法：分别说明定义、分母是什么、是否受温度体积变化影响，以及常见考法。\n\n2. 用本章知识解释以下现象：  \n   (1) 汽水瓶打开时有大量气泡冒出；  \n   (2) 汽车防冻液可降低结冰温度；  \n   (3) 用激光笔照射 Fe(OH)\\(_3\\) 胶体可看到光路。\n\n# 答案与解析\n\n## 一、基础概念题答案\n\n1. 均匀、稳定。溶液的关键词就是均匀分散且能稳定存在。\n\n2. B。液液互溶时通常量多者为溶剂，量少者为溶质。\n\n3. 溶剂质量；mol·kg\\(^{-1}\\)。质量摩尔浓度强调“每 kg 溶剂中含多少 mol 溶质”。\n\n4. D。物质的量浓度 \\(c=n/V_{\\text{溶液}}\\)，分母是溶液体积。\n\n5. 增大；减小。固体一般升温更易溶，气体升温更易逸出。\n\n6. C。依数性包括蒸气压下降、沸点升高、凝固点降低、渗透压。\n\n7. \\(cRT\\)。稀溶液渗透压可写为 \\(\\Pi=cRT\\)。\n\n8. A。丁铎尔效应是胶粒散射光形成光路，可用于区别胶体和真溶液。\n\n## 二、公式计算题答案\n\n1. 解题思路：质量分数为溶质质量除以溶液总质量。  \n   详细步骤：\n   \\[\n   \\omega=\\frac{10.0}{10.0+100.0}\\times100\\%=9.09\\%\\approx9.1\\%\n   \\]\n   最终答案：\\(9.1\\%\\)。  \n   易错提醒：分母是溶液质量，不是水的质量。\n\n2. 解题思路：先求 NaCl 物质的量，再除以溶剂质量 kg。  \n   详细步骤：\n   \\[\n   n(\\mathrm{NaCl})=\\frac{10.0}{58.4}=0.171\\text{ mol}\n   \\]\n   \\[\n   m=\\frac{0.171}{100.0\\times10^{-3}}=1.71\\text{ mol·kg}^{-1}\n   \\]\n   最终答案：\\(1.71\\text{ mol·kg}^{-1}\\)。  \n   易错提醒：分母是 \\(0.1000\\text{ kg}\\) 水。\n\n3. 解题思路：用 Raoult 定律 \\(p=p^0x_1\\)，其中 \\(x_1\\) 是水的摩尔分数。  \n   详细步骤：\n   \\[\n   n(\\text{蔗糖})=\\frac{17.1}{342}=0.0500\\text{ mol}\n   \\]\n   \\[\n   n(\\mathrm{H_2O})=\\frac{100.0}{18.0}=5.56\\text{ mol}\n   \\]\n   \\[\n   x_{\\mathrm{H_2O}}=\\frac{5.56}{5.56+0.0500}=0.991\n   \\]\n   \\[\n   p=2.34\\times0.991=2.32\\text{ kPa}\n   \\]\n   最终答案：约 \\(2.32\\text{ kPa}\\)。  \n   易错提醒：Raoult 定律中乘的是溶剂摩尔分数。\n\n4. 解题思路：同一温度结冰说明两溶液 \\(\\Delta T_f\\) 相同；同一溶剂时 \\(K_f\\) 相同，因此质量摩尔浓度相同。  \n   详细步骤：\n   \\[\n   m_{\\text{蔗糖}}=\\frac{2.50/342}{253.0\\times10^{-3}}\n   \\]\n   \\[\n   m_{\\text{未知}}=\\frac{5.20/M}{1000\\times10^{-3}}\n   \\]\n   令二者相等：\n   \\[\n   \\frac{2.50/342}{0.253}=\\frac{5.20/M}{1.000}\n   \\]\n   \\[\n   M\\approx180\\text{ g·mol}^{-1}\n   \\]\n   最终答案：\\(180\\text{ g·mol}^{-1}\\)。  \n   易错提醒：两溶液同温结冰不是质量相同，而是质量摩尔浓度相同。\n\n5. 解题思路：先用凝固点降低求 \\(m\\)，再用 \\(\\Pi=cRT\\) 估算渗透压。  \n   详细步骤：\n   \\[\n   \\Delta T_f=273.15-272.59=0.56\\text{ K}\n   \\]\n   \\[\n   m=\\frac{\\Delta T_f}{K_f}=\\frac{0.56}{1.86}=0.301\\text{ mol·kg}^{-1}\n   \\]\n   稀水溶液近似：\n   \\[\n   c\\approx m=0.301\\text{ mol·dm}^{-3}\n   \\]\n   \\[\n   \\Pi=cRT=0.301\\times8.31\\times310=775\\text{ kPa}\n   \\]\n   最终答案：\\(m=0.301\\text{ mol·kg}^{-1}\\)，\\(\\Pi\\approx775\\text{ kPa}\\)。  \n   易错提醒：只有稀水溶液才可近似 \\(c\\approx m\\)。\n\n## 三、判断题答案\n\n1. 错误。质量分数分母是溶液质量。\n\n2. 正确。物质的量浓度单位为 mol/L，常用 M 表示。\n\n3. 正确。质量摩尔浓度分母是溶剂质量，质量不随温度体积变化。\n\n4. 错误。固体溶解度压力影响极小，一般只注明温度。\n\n5. 正确。气体溶解度一般随压力增大而增大。\n\n6. 正确。这正是依数性的核心含义。\n\n7. 错误。强电解质完全电离，但离子间作用显著，需要活度描述有效浓度。\n\n8. 正确。丁铎尔效应由胶粒对光线散射产生。\n\n## 四、综合题答案\n\n1. 解析：  \n   质量分数：\n   \\[\n   \\omega=\\frac{m_{\\text{溶质}}}{m_{\\text{溶液}}}\n   \\]\n   分母是溶液质量，无量纲，常考“10 g 溶质加 100 g 水不是 10%”。  \n   质量摩尔浓度：\n   \\[\n   m=\\frac{n_{\\text{溶质}}}{m_{\\text{溶剂}}(\\text{kg})}\n   \\]\n   分母是溶剂质量，不受温度导致的体积变化影响，依数性计算常用。  \n   物质的量浓度：\n   \\[\n   c=\\frac{n_{\\text{溶质}}}{V_{\\text{溶液}}}\n   \\]\n   分母是溶液体积，会受温度影响，常用于配制溶液和渗透压计算。\n\n2. 解析：  \n   (1) 汽水中 CO\\(_2\\) 是气体溶质，气体溶解度随压力增大而增大。开瓶后压力降低，CO\\(_2\\) 溶解度下降，于是大量气泡逸出。  \n   (2) 防冻液含乙二醇等非电解质溶质，溶液发生凝固点降低，浓度越大凝固点越低，因此可降低结冰温度。  \n   (3) Fe(OH)\\(_3\\) 胶体中胶粒能散射光，激光通过时可从侧面看到浑浊发亮的光柱，即丁铎尔效应。\n\n## 材料完整性说明\n\n- PDF 文字层可识别，表格、公式、图示结论已纳入整理。\n- 材料中“离子强度 \\(I\\)”只说明与离子浓度和电价数有关，没有给出完整公式；本整理在公式部分将 \\(I=\\frac12\\sum c_iz_i^2\\) 标为“补充常考点”。\n- 材料第 7 页 NaCl 摩尔分数例题数值疑似笔误，本整理已在易错点中说明并给出按数据计算的正确结果。\n",
    "chemistry_review/03-chemistry_review.md":  "# 本章复习提纲\n\n## 一、本章知识框架\n\n### 1. 化学热力学研究什么\n\n化学热力学是用热力学基本原理定量研究化学变化与能量变化的科学。本章围绕三个问题展开：\n\n1. 反应能量变化：用热力学第一定律、内能、焓和反应热描述。\n2. 反应方向：单独用焓变或熵变都不可靠，需要 Gibbs 自由能。\n3. 反应限度：本章只引入 \\(\\Delta G=0\\) 为平衡判据，具体平衡问题在后续章节展开。\n\n### 2. 热力学基本术语\n\n1. 体系与环境\n   - 体系：被研究对象。\n   - 环境：体系之外与体系密切相关的部分。\n   - 体系类型：敞开体系、封闭体系、孤立体系。\n\n2. 状态、状态函数、状态方程\n   - 状态：体系各性质的总和。\n   - 状态函数：只由状态决定，与途径无关，如 \\(p,V,T,U,H,S,G\\)。\n   - 状态方程：状态函数之间的定量关系，如 \\(pV=nRT\\)。\n\n3. 过程与途径\n   - 过程：体系状态随时间变化。\n   - 途径：从同一始态到同一终态的不同方式。\n   - 常见过程：等温、等压、等容、循环、绝热、相变、化学变化。\n\n4. 热与功\n   - 热 \\(Q\\)：因温度差传递的能量。\n   - 功 \\(W\\)：除热以外的能量交换形式。\n   - 二者都是过程量，不是状态函数。\n\n5. 可逆过程\n   - 理想化极限过程。\n   - 体系始终无限接近平衡。\n   - 等温可逆膨胀时体系对环境做最大功。\n\n### 3. 热化学与反应热\n\n1. 热力学第一定律：\n\\[\n\\Delta U=Q+W\n\\]\n\n2. 等容热效应：\n\\[\nQ_V=\\Delta U\n\\]\n\n3. 焓与等压热效应：\n\\[\nH=U+pV\n\\]\n\\[\nQ_p=\\Delta H\n\\]\n\n4. 恒容热与恒压热关系：\n\\[\nQ_p=Q_V+p\\Delta V\n\\]\n理想气体反应：\n\\[\nQ_p=Q_V+\\Delta n_gRT\n\\]\n\n5. 反应焓变计算\n   - 盖斯定律。\n   - 标准生成焓。\n   - 键焓。\n\n### 4. 熵与反应方向\n\n1. 熵 \\(S\\)：体系无序度、混乱度、自由度的量度。\n2. Boltzmann 公式：\n\\[\nS=k\\ln W\n\\]\n3. 可逆过程熵变：\n\\[\n\\Delta S=\\frac{Q_r}{T}\n\\]\n4. 熵增原理：\n\\[\n\\Delta S_{\\text{孤}}\u003e0\n\\]\n孤立体系中，熵增加过程自发。\n\n### 5. Gibbs 自由能与反应方向\n\n1. Gibbs 自由能：\n\\[\nG=H-TS\n\\]\n2. 等温过程：\n\\[\n\\Delta G=\\Delta H-T\\Delta S\n\\]\n3. 反应方向判据：\n\\[\n\\Delta G\u003c0 \\quad \\text{正向自发}\n\\]\n\\[\n\\Delta G\u003e0 \\quad \\text{正向非自发}\n\\]\n\\[\n\\Delta G=0 \\quad \\text{平衡}\n\\]\n4. 温度对自发性的影响：\n   - \\(\\Delta H\u003c0,\\Delta S\u003e0\\)：任何温度自发。\n   - \\(\\Delta H\u003e0,\\Delta S\u003c0\\)：任何温度非自发。\n   - \\(\\Delta H\u003c0,\\Delta S\u003c0\\)：低温自发，高温非自发。\n   - \\(\\Delta H\u003e0,\\Delta S\u003e0\\)：低温非自发，高温自发。\n\n## 二、重点概念整理\n\n### 化学热力学\n\n定义：定量研究化学变化与能量变化关系的科学。\n\n需要记忆的点：\n- 研究反应热效应、方向和限度。\n- 热力学能判断反应“可能性”，不能说明反应速率。\n\n容易混淆的地方：\n- 热力学自发不等于反应一定很快发生，如丁烯氧化需要催化剂。\n\n可能怎么考：\n- 判断“\\(\\Delta G\u003c0\\) 但反应很慢”是否矛盾。\n\n### 体系、环境和体系类型\n\n定义：\n- 体系：被研究对象。\n- 环境：体系之外相关部分。\n\n需要记忆的点：\n- 敞开体系：既有物质交换又有能量交换。\n- 封闭体系：只有能量交换，无物质交换。\n- 孤立体系：既无能量交换，也无物质交换。\n\n容易混淆的地方：\n- “封闭”不等于“绝热”；封闭体系仍可与环境交换能量。\n\n可能怎么考：\n- 冰箱、电源、房间作为不同体系时判断体系类型。\n\n### 状态函数\n\n定义：由体系状态决定的物理量。\n\n需要记忆的点：\n- \\(p,V,T,U,H,S,G\\) 是状态函数。\n- 状态函数变化只与始末态有关，与途径无关。\n- 循环过程状态函数变化为 0。\n\n容易混淆的地方：\n- \\(Q,W\\) 不是状态函数。\n\n可能怎么考：\n- 判断 \\(Q,W,\\Delta U,\\Delta H\\) 是否与途径有关。\n\n### 热和功\n\n定义：\n- 热 \\(Q\\)：因温度不同传递的能量。\n- 功 \\(W\\)：除热以外的能量交换。\n\n需要记忆的点：\n- \\(Q\u003e0\\)：体系吸热；\\(Q\u003c0\\)：体系放热。\n- \\(W\u003e0\\)：环境对体系做功；\\(W\u003c0\\)：体系对环境做功。\n- 本章采用 \\(\\Delta U=Q+W\\) 的符号约定。\n\n容易混淆的地方：\n- 体系对外膨胀做功时 \\(W\u003c0\\)。\n\n可能怎么考：\n- 给出吸热、做功情况，判断 \\(\\Delta U\\)。\n\n### 可逆过程\n\n定义：体系和环境都能沿原途径反向恢复原状、不留下任何痕迹的过程。\n\n需要记忆的点：\n- 始终无限接近平衡态。\n- 推动力与阻力只相差无穷小。\n- 是理想化极限，耗时无限长。\n- 等温可逆膨胀做最大功。\n\n容易混淆的地方：\n- 可逆过程不是现实中普通“能倒回去”的过程，而是体系和环境都复原。\n\n可能怎么考：\n- 比较自由膨胀、一次膨胀、准静态膨胀做功大小。\n\n### 内能 \\(U\\)\n\n定义：体系内部储存的总能量。\n\n需要记忆的点：\n- 包括分子运动能、分子间位能、原子和电子相互作用能等。\n- 是状态函数。\n- 内能绝对值尚无法测定，但 \\(\\Delta U\\) 可计算。\n\n容易混淆的地方：\n- \\(\\Delta U\\) 与途径无关，但 \\(Q,W\\) 与途径有关。\n\n可能怎么考：\n- 同一始末态不同途径中 \\(Q,W,\\Delta U\\) 的比较。\n\n### 焓 \\(H\\)\n\n定义：\n\\[\nH=U+pV\n\\]\n\n需要记忆的点：\n- 焓是状态函数。\n- 恒压、只做体积功时：\n\\[\nQ_p=\\Delta H\n\\]\n- 放热反应 \\(\\Delta H\u003c0\\)，吸热反应 \\(\\Delta H\u003e0\\)。\n\n容易混淆的地方：\n- \\(\\Delta H\\) 不是任何条件下的热，只在恒压且无非体积功时等于 \\(Q_p\\)。\n\n可能怎么考：\n- 恒压反应热与焓变关系。\n\n### 热化学方程式\n\n定义：表示化学反应与热效应关系的方程式。\n\n需要记忆的点：\n- 必须标明物质状态。\n- 固体应注明晶型，如石墨、金刚石。\n- 反应式系数改变，\\(\\Delta H\\) 同比例改变。\n- 反应逆写，\\(\\Delta H\\) 变号。\n\n容易混淆的地方：\n- \\(\\Delta H\\) 对应“1 mol 反应”，与方程式写法有关。\n\n可能怎么考：\n- 改写热化学方程式并调整焓变。\n\n### 盖斯定律\n\n定义：恒温、恒压条件下，反应无论一步完成还是分几步完成，总焓变相同。\n\n需要记忆的点：\n- 本质：焓是状态函数。\n- 可通过已知反应线性组合求目标反应焓变。\n\n容易混淆的地方：\n- 反应式反向要变号，乘系数焓变也乘同系数。\n\n可能怎么考：\n- 由燃烧焓求不易直接测量的反应焓。\n\n### 标准生成焓\n\n定义：标准状态和指定温度下，由稳定态单质生成 1 mol 物质时的焓变。\n\n需要记忆的点：\n- 稳定态单质标准生成焓为 0。\n- 常用 298 K 数据。\n\n容易混淆的地方：\n- 稳定态单质为 0，不是所有单质形态都为 0。\n\n可能怎么考：\n- 用 \\(\\Delta H_f^\\theta\\) 计算反应焓变。\n\n### 键焓\n\n定义：标准状态和指定温度下，断开气态物质 1 mol 化学键并生成气态原子时的焓变。\n\n需要记忆的点：\n- 键焓均为正值。\n- 键焓越大，键越强。\n- 多原子分子的键焓常是平均近似值。\n- 只适用于气态物质估算。\n\n容易混淆的地方：\n- 键焓计算是“断键吸热 - 成键放热”，即反应物键焓总和减生成物键焓总和。\n\n可能怎么考：\n- 用键焓估算气相反应热。\n\n### 熵 \\(S\\)\n\n定义：体系无序度、混乱度、自由度的量度。\n\n需要记忆的点：\n- \\(S=k\\ln W\\)。\n- \\(S\\) 是状态函数。\n- 同种物质通常 \\(S(s)\u003cS(l)\u003cS(g)\\)。\n- 温度升高，熵值增大；气体压力增大，熵值减小。\n\n容易混淆的地方：\n- 熵增加有利于自发，但封闭体系不能只看体系熵。\n\n可能怎么考：\n- 判断某反应 \\(\\Delta S\\) 正负。\n\n### Gibbs 自由能\n\n定义：\n\\[\nG=H-TS\n\\]\n\n需要记忆的点：\n- \\(G\\) 是状态函数。\n- 等温过程：\\(\\Delta G=\\Delta H-T\\Delta S\\)。\n- \\(\\Delta G\\) 是封闭体系等温等压下判断方向的核心判据。\n\n容易混淆的地方：\n- 标准 \\(\\Delta G^\\theta\\) 只说明标准状态下方向，不一定代表任意实际条件。\n\n可能怎么考：\n- 由 \\(\\Delta H,\\Delta S,T\\) 判断反应自发性。\n\n## 三、重要公式整理\n\n### 1. 体积功\n\n公式：\n\\[\nW=-p_{\\text{外}}\\Delta V\n\\]\n更一般地：\n\\[\nW=-\\int p_{\\text{外}}\\,dV\n\\]\n\n符号说明：\n- \\(W\\)：功，J 或 kJ。\n- \\(p_{\\text{外}}\\)：外压。\n- \\(\\Delta V=V_2-V_1\\)：体积变化。\n\n适用条件：\n- 体积功。\n- 外压恒定时用 \\(W=-p_{\\text{外}}\\Delta V\\)。\n\n解题步骤：\n1. 判断膨胀还是压缩。\n2. 确定外压。\n3. 代入公式，注意符号。\n\n易错点：\n- 膨胀时 \\(\\Delta V\u003e0\\)，体系对环境做功，\\(W\u003c0\\)。\n\n例题方向：\n- 自由膨胀 \\(p_{\\text{外}}=0\\)，所以 \\(W=0\\)。\n\n### 2. 热力学第一定律\n\n公式：\n\\[\n\\Delta U=Q+W\n\\]\n\n符号说明：\n- \\(\\Delta U\\)：内能变化。\n- \\(Q\\)：体系吸收的热。\n- \\(W\\)：环境对体系做的功。\n\n适用条件：\n- 封闭体系能量变化。\n\n解题步骤：\n1. 按本章符号约定判断 \\(Q,W\\) 正负。\n2. 代入求 \\(\\Delta U\\) 或未知量。\n\n易错点：\n- 体系放热 \\(Q\u003c0\\)，体系对外做功 \\(W\u003c0\\)。\n\n例题方向：\n- 已知某途径 \\(Q,W\\)，求另一途径 \\(Q\\)。\n\n### 3. 恒容热效应\n\n公式：\n\\[\nQ_V=\\Delta U\n\\]\n\n符号说明：\n- \\(Q_V\\)：恒容热效应。\n- \\(\\Delta U\\)：内能变化。\n\n适用条件：\n- 恒容。\n- 无非体积功。\n- \\(\\Delta V=0\\)，体系不做体积功。\n\n解题步骤：\n1. 确认恒容条件。\n2. 直接令 \\(Q_V=\\Delta U\\)。\n\n易错点：\n- 只有在不做其他功时成立。\n\n例题方向：\n- 弹式量热计测定恒容反应热。\n\n### 4. 焓定义与恒压热效应\n\n公式：\n\\[\nH=U+pV\n\\]\n\\[\nQ_p=\\Delta H\n\\]\n\n符号说明：\n- \\(H\\)：焓。\n- \\(Q_p\\)：恒压热效应。\n- \\(\\Delta H\\)：焓变。\n\n适用条件：\n- 恒压。\n- 只做体积功，无非体积功。\n\n解题步骤：\n1. 确认恒压过程。\n2. 若无非体积功，用 \\(Q_p=\\Delta H\\)。\n\n易错点：\n- 恒压热才等于焓变；非恒压条件不能直接套。\n\n例题方向：\n- 保温杯量热计测中和热、溶解热。\n\n### 5. 恒压热与恒容热关系\n\n公式：\n\\[\nQ_p=Q_V+p\\Delta V\n\\]\n理想气体反应：\n\\[\nQ_p=Q_V+\\Delta n_gRT\n\\]\n或\n\\[\n\\Delta H=\\Delta U+\\Delta n_gRT\n\\]\n\n符号说明：\n- \\(\\Delta n_g\\)：产物气体物质的量系数和减反应物气体物质的量系数和。\n- \\(R\\)：气体常数。\n- \\(T\\)：热力学温度。\n\n适用条件：\n- 理想气体参与。\n- 只做体积功。\n\n解题步骤：\n1. 写出配平方程式。\n2. 只统计气体的 \\(\\Delta n_g\\)。\n3. 代入 \\(\\Delta H=\\Delta U+\\Delta n_gRT\\)。\n\n易错点：\n- 液体、固体不计入 \\(\\Delta n_g\\)。\n- \\(R\\) 单位要和 \\(\\Delta H,\\Delta U\\) 一致。\n\n例题方向：\n- 已知 \\(\\Delta H\\) 求 \\(\\Delta U\\)，或由恒容燃烧热求恒压燃烧热。\n\n### 6. 盖斯定律\n\n公式：\n\\[\n\\Delta H_{\\text{总}}=\\sum_i \\Delta H_i\n\\]\n\n符号说明：\n- \\(\\Delta H_i\\)：各分步反应焓变。\n\n适用条件：\n- 恒温、恒压。\n- 只关心同一始态和终态。\n\n解题步骤：\n1. 找到目标反应。\n2. 将已知反应反向或乘系数，使相加后得到目标反应。\n3. 焓变同步变号、乘系数、相加。\n\n易错点：\n- 方程式反向，焓变必须变号。\n\n例题方向：\n- 由 \\(C+\\mathrm{O_2}\\to\\mathrm{CO_2}\\) 和 \\(\\mathrm{CO}+0.5\\mathrm{O_2}\\to\\mathrm{CO_2}\\) 求 \\(C+0.5\\mathrm{O_2}\\to\\mathrm{CO}\\)。\n\n### 7. 标准生成焓计算反应焓变\n\n公式：\n\\[\n\\Delta_r H^\\theta\n=\\sum_i \\nu_i \\Delta_f H_i^\\theta(\\text{生成物})\n-\\sum_i \\nu_i \\Delta_f H_i^\\theta(\\text{反应物})\n\\]\n\n符号说明：\n- \\(\\Delta_r H^\\theta\\)：标准反应焓变。\n- \\(\\Delta_f H_i^\\theta\\)：物质 \\(i\\) 的标准生成焓。\n- \\(\\nu_i\\)：化学计量数。\n\n适用条件：\n- 标准状态。\n- 可查到各物质标准生成焓。\n\n解题步骤：\n1. 配平方程式。\n2. 查各物质 \\(\\Delta_f H^\\theta\\)。\n3. 按“生成物减反应物”计算。\n\n易错点：\n- 稳定态单质 \\(\\Delta_f H^\\theta=0\\)。\n\n例题方向：\n- 计算 \\(3\\mathrm{Fe_2O_3}+\\mathrm{CO}\\to2\\mathrm{Fe_3O_4}+\\mathrm{CO_2}\\) 的焓变。\n\n### 8. 键焓计算反应热\n\n公式：\n\\[\n\\Delta H^\\theta\n=\\sum_i \\nu_i BE(\\text{反应物})\n-\\sum_i \\nu_i BE(\\text{生成物})\n\\]\n\n符号说明：\n- \\(BE\\)：键焓，kJ·mol\\(^{-1}\\)。\n\n适用条件：\n- 气态物质反应。\n- 用平均键焓估算。\n\n解题步骤：\n1. 写出反应物中断裂的键。\n2. 写出生成物中形成的键。\n3. 断键总能量减成键总能量。\n\n易错点：\n- 键焓均为正值。\n- 公式方向与生成焓公式不同：键焓是“反应物减生成物”。\n\n例题方向：\n- 用 H-H、O=O、H-O 键焓估算 \\(\\mathrm{H_2(g)+0.5O_2(g)\\to H_2O(g)}\\)。\n\n### 9. 熵变计算\n\n公式：\n\\[\n\\Delta_r S^\\theta\n=\\sum_i \\nu_i S_i^\\theta(\\text{生成物})\n-\\sum_i \\nu_i S_i^\\theta(\\text{反应物})\n\\]\n\n符号说明：\n- \\(\\Delta_r S^\\theta\\)：标准反应熵变。\n- \\(S_i^\\theta\\)：标准摩尔熵，J·mol\\(^{-1}\\)·K\\(^{-1}\\)。\n\n适用条件：\n- 标准状态下反应熵变计算。\n\n解题步骤：\n1. 配平方程式。\n2. 查各物质标准摩尔熵。\n3. 按“生成物减反应物”计算。\n\n易错点：\n- 熵单位常为 J·mol\\(^{-1}\\)·K\\(^{-1}\\)，与 \\(\\Delta H\\) 计算 \\(\\Delta G\\) 时需换成 kJ。\n\n例题方向：\n- 计算 \\(\\mathrm{CaCO_3(s)\\to CaO(s)+CO_2(g)}\\) 的熵变。\n\n### 10. Gibbs-Helmholtz 方程\n\n公式：\n\\[\n\\Delta G=\\Delta H-T\\Delta S\n\\]\n标准状态近似：\n\\[\n\\Delta G^\\theta(T)=\\Delta H_{298}^\\theta-T\\Delta S_{298}^\\theta\n\\]\n\n符号说明：\n- \\(\\Delta G\\)：Gibbs 自由能变。\n- \\(\\Delta H\\)：焓变。\n- \\(\\Delta S\\)：熵变。\n- \\(T\\)：热力学温度，K。\n\n适用条件：\n- 等温过程。\n- 封闭体系。\n- 近似式假定 \\(\\Delta H,\\Delta S\\) 随温度变化不大。\n\n解题步骤：\n1. 统一 \\(\\Delta H\\) 和 \\(T\\Delta S\\) 单位。\n2. 代入 \\(\\Delta G=\\Delta H-T\\Delta S\\)。\n3. 根据 \\(\\Delta G\\) 正负判断方向。\n\n易错点：\n- \\(\\Delta S\\) 常给 J·mol\\(^{-1}\\)·K\\(^{-1}\\)，要除以 1000 转成 kJ。\n\n例题方向：\n- 由 \\(\\Delta H^\\theta,\\Delta S^\\theta\\) 求转变温度和自发性。\n\n### 11. 转变温度\n\n公式：\n\\[\nT_{\\text{转}}=\\frac{\\Delta H^\\theta}{\\Delta S^\\theta}\n\\]\n\n符号说明：\n- \\(T_{\\text{转}}\\)：\\(\\Delta G^\\theta=0\\) 时的温度。\n\n适用条件：\n- \\(\\Delta H,\\Delta S\\) 近似不随温度变化。\n\n解题步骤：\n1. 令 \\(\\Delta G^\\theta=0\\)。\n2. 由 \\(\\Delta H^\\theta=T\\Delta S^\\theta\\) 求 \\(T\\)。\n3. 结合 \\(\\Delta H,\\Delta S\\) 符号判断高低温自发性。\n\n易错点：\n- \\(\\Delta H\\) 与 \\(\\Delta S\\) 单位必须一致。\n\n例题方向：\n- \\(\\mathrm{N_2+O_2\\to2NO}\\) 高温自发；合成氨低温自发。\n\n### 12. 标准 Gibbs 生成自由能计算\n\n公式：\n\\[\n\\Delta_r G^\\theta\n=\\sum_i \\nu_i \\Delta_f G_i^\\theta(\\text{生成物})\n-\\sum_i \\nu_i \\Delta_f G_i^\\theta(\\text{反应物})\n\\]\n\n符号说明：\n- \\(\\Delta_f G_i^\\theta\\)：物质 \\(i\\) 的标准 Gibbs 生成自由能。\n\n适用条件：\n- 标准状态。\n- 常见为 298 K。\n\n解题步骤：\n1. 配平方程式。\n2. 查 \\(\\Delta_f G^\\theta\\)。\n3. 生成物减反应物。\n\n易错点：\n- \\(\\Delta G^\\theta\u003c0\\) 只说明标准状态下正向自发。\n\n例题方向：\n- 计算氨氧化反应的 \\(\\Delta G^\\theta\\)。\n\n## 四、需要记忆的性质和规律\n\n| 知识点 | 具体内容 | 记忆方法 | 常见考法 |\n|---|---|---|---|\n| 体系类型 | 敞开：物质和能量交换；封闭：只交换能量；孤立：都不交换 | 开封孤：全、有能、全无 | 判断体系类型 |\n| 状态函数 | \\(p,V,T,U,H,S,G\\) | “状态定，函数定” | 判断是否与途径有关 |\n| 非状态函数 | \\(Q,W\\) | “热功走路径” | 比较不同途径 |\n| 热符号 | 吸热 \\(Q\u003e0\\)，放热 \\(Q\u003c0\\) | 体系得
